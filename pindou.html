<link rel="manifest" href="manifest.webmanifest">

<title>拼豆工坊 · 像素拼贴</title>
<style>
:root {
  --bg: #fef9f0;
  --card: #fffdf8;
  --text: #4a3728;
  --accent: #d4843a;
  --border: #e0d5c1;
  --tool-bg: #fff8f0;
  --board: #f5efe6;
}
[data-theme="dark"] {
  --bg: #1e1b18;
  --card: #2a2520;
  --text: #d4c5a9;
  --accent: #e8a860;
  --border: #4a3f35;
  --tool-bg: #2a2520;
  --board: #1a1814;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  display: flex;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* 左侧模板面板 */
.tpl-panel {
  width: 260px;
  min-width: 260px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
  transition: background 0.3s, transform 0.25s ease;
}
.panel-header {
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.panel-header h1 {
  font-size: 1.2em;
  color: var(--accent);
  letter-spacing: 2px;
  margin-bottom: 2px;
}
.panel-header .sub {
  font-size: 0.7em;
  opacity: 0.5;
  margin-top: 4px;
}
.tpl-grid {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-content: start;
}
.tpl-grid::-webkit-scrollbar { width: 4px; }
.tpl-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.tpl-card {
  padding: 10px 6px;
  border-radius: 10px;
  border: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  background: var(--tool-bg);
}
.tpl-card:hover { border-color: var(--accent); background: rgba(212,132,58,0.08); }
.tpl-card.active { border-color: var(--accent); background: rgba(212,132,58,0.15); }
.tpl-card .emoji { font-size: 1.8em; display: block; }
.tpl-card .name { font-size: 0.72em; font-weight: 600; margin-top: 4px; }

.panel-footer {
  padding: 10px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.panel-footer a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.75em;
  font-weight: 600;
}

.main {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-wrap: wrap;
  flex-shrink: 0;
  transition: background 0.3s;
}
.toolbar button, .toolbar select {
  padding: 8px 14px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--tool-bg);
  color: var(--text);
  font-family: inherit;
  font-size: 0.8em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.toolbar button:hover, .toolbar select:hover {
  background: rgba(212,132,58,0.12);
  border-color: var(--accent);
}
.toolbar button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.toolbar .sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 2px;
}
.toolbar .spacer { flex: 1; }

.palette {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  max-width: 420px;
}
.palette .swatch {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
  transition: transform 0.15s, border-color 0.15s;
}
.palette .swatch:hover { transform: scale(1.12); }
.palette .swatch.active {
  border-color: var(--text);
  box-shadow: 0 0 0 2px var(--accent);
  transform: scale(1.1);
}
.palette .swatch.erase {
  background:
    linear-gradient(135deg, transparent 46%, #c44 46%, #c44 54%, transparent 54%),
    #fff;
}

.board-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: var(--board);
  position: relative;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: none;
}
.board-frame {
  position: relative;
  border-radius: 12px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.12);
  background: #f8f4ec;
  padding: 10px;
  border: 1px solid var(--border);
  transform-origin: center center;
  transition: transform 0.05s ease-out;
  will-change: transform;
}
[data-theme="dark"] .board-frame {
  background: #2c2620;
}
#beadCanvas {
  display: block;
  cursor: crosshair;
  border-radius: 4px;
  background: #ebe4d8;
  touch-action: none;
  max-width: min(92vw, 560px);
  max-height: min(70vh, 560px);
  width: auto;
  height: auto;
}
[data-theme="dark"] #beadCanvas { background: #3a322a; }

.zoom-hint {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 0.7em;
  opacity: 0.4;
  pointer-events: none;
}

.status-bar {
  display: flex;
  gap: 14px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  font-size: 0.75em;
  opacity: 0.75;
  justify-content: center;
  flex-wrap: wrap;
  flex-shrink: 0;
  background: var(--card);
}

.panel-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 15;
}
.panel-backdrop.show { display: block; }
#panelToggleBtn { display: none; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border-radius: 20px;
  background: var(--accent);
  color: #fff;
  font-size: 0.85em;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* 全屏：主区域铺满 */
.main.is-fullscreen,
.main:fullscreen,
.main:-webkit-full-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
}
.main.is-fullscreen .board-wrap,
.main:fullscreen .board-wrap,
.main:-webkit-full-screen .board-wrap {
  flex: 1;
}
.main.is-fullscreen #beadCanvas,
.main:fullscreen #beadCanvas,
.main:-webkit-full-screen #beadCanvas {
  max-width: min(92vw, 720px);
  max-height: min(78vh, 720px);
}

@media (max-width: 768px) {
  .tpl-panel {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    z-index: 20;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
  }
  .tpl-panel.open { transform: translateX(0); }
  #panelToggleBtn { display: inline-block; }
  .toolbar {
    flex-wrap: nowrap;
    overflow-x: auto;
    white-space: nowrap;
    padding: 6px 8px;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .toolbar button, .toolbar select {
    flex-shrink: 0;
    padding: 6px 10px;
    font-size: 0.7em;
  }
  .palette { max-width: none; flex-wrap: nowrap; }
  .palette .swatch { width: 24px; height: 24px; flex-shrink: 0; }
  .board-wrap { padding: 10px; }
  #beadCanvas { max-width: 94vw; max-height: 62vh; }
}
</style>
</head>
<body>

<div class="tpl-panel" id="tplPanel">
  <div class="panel-header">
    <h1>🫘 拼豆工坊</h1>
    <div class="sub">选模板 · 点格子 · 拼出图案</div>
  </div>
  <div class="tpl-grid" id="tplGrid"></div>
  <div class="panel-footer">
    <a href="index.html">🏠 回首页</a>
  </div>
</div>

<div class="panel-backdrop" id="panelBackdrop" onclick="closePanel()"></div>

<div class="main">
  <div class="toolbar" id="toolbar">
    <button id="panelToggleBtn" onclick="togglePanel()" title="模板">🎨 模板</button>
    <button class="active" id="toolPaint" onclick="setTool('paint')" title="放豆">🫘 放豆</button>
    <button id="toolErase" onclick="setTool('erase')" title="擦除">🧽 擦除</button>
    <button id="toolPicker" onclick="setTool('picker')" title="取色">💉 取色</button>
    <span class="sep"></span>
    <select id="gridSize" onchange="changeGridSize(+this.value)" title="画板大小">
      <option value="12">12×12</option>
      <option value="16" selected>16×16</option>
      <option value="24">24×24</option>
      <option value="32">32×32</option>
    </select>
    <span class="sep"></span>
    <div class="palette" id="palette"></div>
    <span class="sep"></span>
    <button onclick="undo()" title="撤销 (Ctrl+Z)">↩ 撤销</button>
    <button onclick="clearBoard()" title="清空">🗑 清空</button>
    <button onclick="toggleGrid()" id="gridBtn" title="网格">▦ 网格</button>
    <button onclick="zoomBy(-0.15)" title="缩小">➖</button>
    <button onclick="zoomBy(0.15)" title="放大">➕</button>
    <button onclick="resetZoom()" title="重置缩放 (0)">⟲ 100%</button>
    <button onclick="toggleTheme()" title="主题">🌓</button>
    <button onclick="toggleFullscreen()" id="fullscreenBtn" title="全屏 (F)">📺 全屏</button>
    <button onclick="saveImage()" title="保存">💾 保存</button>
    <a href="index.html" style="padding:8px 12px;border-radius:18px;border:1px solid var(--border);background:var(--tool-bg);color:var(--text);text-decoration:none;font-size:0.8em;">🏠</a>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="board-frame">
      <canvas id="beadCanvas" width="480" height="480"></canvas>
    </div>
    <div class="zoom-hint">滚轮缩放 · 拖动放豆 · F 全屏 · 0 重置 · H 回首页</div>
  </div>

  <div class="status-bar" id="statusBar">
    <span id="statSize">16×16</span>
    <span id="statBeads">豆子 0</span>
    <span id="statZoom">缩放 100%</span>
    <span id="statTpl">空白画板</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 调色板（仿拼豆经典色） ============
const PALETTE = [
  { name: '红', hex: '#e53935' },
  { name: '橙', hex: '#fb8c00' },
  { name: '黄', hex: '#fdd835' },
  { name: '浅绿', hex: '#9ccc65' },
  { name: '绿', hex: '#43a047' },
  { name: '青', hex: '#26a69a' },
  { name: '浅蓝', hex: '#42a5f5' },
  { name: '蓝', hex: '#1e88e5' },
  { name: '紫', hex: '#8e24aa' },
  { name: '粉', hex: '#ec407a' },
  { name: '棕', hex: '#8d6e63' },
  { name: '米', hex: '#ffe0b2' },
  { name: '白', hex: '#fafafa' },

// 模板：字符串行，字符映射到颜色下标（. 为空）
// R红 O橙 Y黄 L浅绿 G绿 T青 C浅蓝 B蓝 P紫 K粉 N棕 M米 W白 A灰 D深灰 K黑 → 用数字字母
// 映射表：
const CHAR_MAP = {
  '.': -1,
  'R': 0, 'O': 1, 'Y': 2, 'L': 3, 'G': 4, 'T': 5, 'C': 6, 'B': 7,
  'V': 8, 'K': 9, 'N': 10, 'M': 11, 'W': 12, 'A': 13, 'D': 14, 'X': 15
};

function parseTpl(rows) {
  return rows.map(row => row.split('').map(ch => (CHAR_MAP[ch] !== undefined ? CHAR_MAP[ch] : -1)));
}

const TEMPLATES = [
  { name: '空白', emoji: '⬜', size: 16, grid: null },
  {

      '.YYY.XXXXXX.YYY.',

    ])
  },
  {
    name: '小花', emoji: '🌸', size: 16,
    grid: parseTpl([
      '................',
      '......KKK.......',

    grid: parseTpl([

      '..C...CCCCCCCC..',
      '.CCC.CCCCCCCCCC.',

    grid: parseTpl([

      '.....NNNNN......',

    ])
  },
  {
    name: '彩虹', emoji: '🌈', size: 16,
    grid: parseTpl([
      '................',
      '................',
      '....RRRRRRRR....',
      '...ROOOOOOOOR...',
      '..ROYYYYYYYYOR..',
      '.ROYLGGGGGGLYOR.',
      '.OYLGTCCCCTGLYO.',
      '.YLGTCBBBCTGLYY.',
      '.LGTC......CTGL.',
      '.GTC........CTG.',
      '.TC..........CT.',

    ])

];

// ============ 状态 ============
let gridSize = 16;
let cells = []; // row-major color index or -1
let colorIndex = 0;
let tool = 'paint'; // paint | erase | picker
let showGrid = true;
let history = [];
let painting = false;
let currentTplName = '空白画板';
let viewScale = 1;
const MIN_SCALE = 0.4;
const MAX_SCALE = 3.5;

const canvas = document.getElementById('beadCanvas');
const ctx = canvas.getContext('2d');
const boardWrap = document.getElementById('boardWrap');
const boardFrame = document.querySelector('.board-frame');

// ============ 初始化 ============
function emptyBoard(n) {
  return Array(n * n).fill(-1);
}

function pushHistory() {
  history.push(cells.slice());
  if (history.length > 60) history.shift();
}

function undo() {
  if (!history.length) {
    showToast('没有可撤销的操作');
    return;
  }
  cells = history.pop();
  draw();
  updateStats();
}

function clearBoard() {
  if (!cells.some(c => c >= 0)) return;
  pushHistory();
  cells = emptyBoard(gridSize);
  currentTplName = '空白画板';
  draw();
  updateStats();
  showToast('已清空');
}

function changeGridSize(n) {
  pushHistory();
  const old = cells;
  const oldN = gridSize;
  gridSize = n;
  cells = emptyBoard(n);
  // 尽量拷贝旧内容到左上角
  for (let y = 0; y < Math.min(oldN, n); y++) {
    for (let x = 0; x < Math.min(oldN, n); x++) {
      cells[y * n + x] = old[y * oldN + x];
    }
  }
  currentTplName = n + '×' + n + ' 画板';
  draw();
  updateStats();
}

function setTool(t) {
  tool = t;
  document.getElementById('toolPaint').classList.toggle('active', t === 'paint');
  document.getElementById('toolErase').classList.toggle('active', t === 'erase');
  document.getElementById('toolPicker').classList.toggle('active', t === 'picker');
  canvas.style.cursor = t === 'picker' ? 'copy' : (t === 'erase' ? 'cell' : 'crosshair');
}

function setColor(i) {
  colorIndex = i;
  document.querySelectorAll('.palette .swatch').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  if (tool === 'erase' || tool === 'picker') setTool('paint');
}

function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('gridBtn').classList.toggle('active', showGrid);
  draw();
}

// ============ 绘制 ============
function cellSizePx() {
  // 逻辑画布边长固定，按格子数缩放
  const side = 480;
  return side / gridSize;
}

function resizeCanvas() {
  const side = 480;
  canvas.width = side;
  canvas.height = side;
}

function draw() {
  const n = gridSize;
  const cs = cellSizePx();
  const pad = cs * 0.08;
  const r = Math.max(1, cs * 0.42);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 底板
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board').trim() || '#ebe4d8';
  // 使用浅色钉板
  ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#3a322a' : '#ebe4d8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      const cx = x * cs + cs / 2;
      const cy = y * cs + cs / 2;
      const ci = cells[y * n + x];

      // 钉板小孔
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(1, cs * 0.12), 0, Math.PI * 2);
      ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#2a2420' : '#d8d0c4';
      ctx.fill();

      if (ci >= 0 && ci < PALETTE.length) {
        // 豆子：立体圆
        const hex = PALETTE[ci].hex;
        const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
        grd.addColorStop(0, lighten(hex, 0.25));
        grd.addColorStop(0.55, hex);
        grd.addColorStop(1, darken(hex, 0.2));
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        // 高光
        ctx.beginPath();
        ctx.arc(cx - r * 0.28, cy - r * 0.28, r * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();
        // 中心孔
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.12)';
        ctx.fill();
      }
    }
  }

  if (showGrid) {
    ctx.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark'
      ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= n; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cs + 0.5, 0);
      ctx.lineTo(i * cs + 0.5, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cs + 0.5);
      ctx.lineTo(canvas.width, i * cs + 0.5);
      ctx.stroke();
    }
  }
}

function lighten(hex, amt) {
  const { r, g, b } = hexToRgb(hex);
  return `rgb(${Math.min(255, r + 255 * amt)|0},${Math.min(255, g + 255 * amt)|0},${Math.min(255, b + 255 * amt)|0})`;
}
function darken(hex, amt) {
  const { r, g, b } = hexToRgb(hex);
  return `rgb(${Math.max(0, r * (1 - amt))|0},${Math.max(0, g * (1 - amt))|0},${Math.max(0, b * (1 - amt))|0})`;
}
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return {
    r: parseInt(h.slice(0, 2), 16),
    g: parseInt(h.slice(2, 4), 16),
    b: parseInt(h.slice(4, 6), 16)
  };
}

function updateStats() {
  const count = cells.filter(c => c >= 0).length;
  document.getElementById('statSize').textContent = gridSize + '×' + gridSize;
  document.getElementById('statBeads').textContent = '豆子 ' + count;
  document.getElementById('statTpl').textContent = currentTplName;
  const z = document.getElementById('statZoom');
  if (z) z.textContent = '缩放 ' + Math.round(viewScale * 100) + '%';
}

// ============ 滚轮缩放 ============
function applyViewScale() {
  viewScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, viewScale));
  if (boardFrame) {
    boardFrame.style.transform = 'scale(' + viewScale + ')';
  }
  updateStats();
}

function zoomBy(delta) {
  viewScale += delta;
  applyViewScale();
}

function resetZoom() {
  viewScale = 1;
  applyViewScale();
  showToast('缩放已重置');
}

function zoomAtPoint(clientX, clientY, factor) {
  if (!boardWrap || !boardFrame) {
    viewScale *= factor;
    applyViewScale();
    return;
  }
  // 以鼠标位置为中心缩放：先记录内容相对滚动位置
  const rect = boardFrame.getBoundingClientRect();
  const ox = (clientX - rect.left) / rect.width;
  const oy = (clientY - rect.top) / rect.height;
  const prev = viewScale;
  viewScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, viewScale * factor));
  applyViewScale();
  // 调整滚动，使缩放点尽量保持在指针下
  const rect2 = boardFrame.getBoundingClientRect();
  const dx = (clientX - rect2.left) - ox * rect2.width;
  const dy = (clientY - rect2.top) - oy * rect2.height;
  boardWrap.scrollLeft -= dx;
  boardWrap.scrollTop -= dy;
  if (Math.abs(viewScale - prev) < 0.001) return;
}

boardWrap.addEventListener('wheel', function (e) {
  // 仅在画板区域滚轮缩放（按住 Ctrl 也可缩放，默认直接缩放）
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoomAtPoint(e.clientX, e.clientY, factor);
}, { passive: false });

// ============ 交互 ============
function eventToCell(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const clientY = e.touches ? e.touches[0].clientY : (e.changedTouches ? e.changedTouches[0].clientY : e.clientY);
  const x = (clientX - rect.left) / rect.width * gridSize;
  const y = (clientY - rect.top) / rect.height * gridSize;
  const cx = Math.floor(x);
  const cy = Math.floor(y);
  if (cx < 0 || cy < 0 || cx >= gridSize || cy >= gridSize) return null;
  return { x: cx, y: cy };
}

let lastPaintKey = '';

function applyAt(cell, record) {
  if (!cell) return;
  const i = cell.y * gridSize + cell.x;
  const key = cell.x + ',' + cell.y + ',' + tool + ',' + colorIndex;
  if (key === lastPaintKey && painting) return;
  lastPaintKey = key;

  if (tool === 'picker') {
    if (cells[i] >= 0) {
      setColor(cells[i]);
      showToast('已取色：' + PALETTE[cells[i]].name);
    }
    return;
  }

  const next = tool === 'erase' ? -1 : colorIndex;
  if (cells[i] === next) return;
  if (record) pushHistory();
  cells[i] = next;
  draw();
  updateStats();
}

function onPointerDown(e) {
  e.preventDefault();
  painting = true;
  lastPaintKey = '';
  const cell = eventToCell(e);
  applyAt(cell, true);
}

function onPointerMove(e) {
  if (!painting) return;
  e.preventDefault();
  const cell = eventToCell(e);
  applyAt(cell, false);
}

function onPointerUp() {
  painting = false;
  lastPaintKey = '';
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', () => { /* keep painting if drag out optional stop */ });

canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp);
canvas.addEventListener('touchcancel', onPointerUp);

// ============ 模板 ============
function renderTemplates() {
  const box = document.getElementById('tplGrid');
  box.innerHTML = TEMPLATES.map((t, i) =>
    '<div class="tpl-card" data-i="' + i + '" onclick="loadTemplate(' + i + ')">' +
    '<span class="emoji">' + t.emoji + '</span>' +
    '<span class="name">' + t.name + '</span></div>'
  ).join('');
}

function loadTemplate(i) {
  const t = TEMPLATES[i];
  if (!t) return;
  pushHistory();
  if (!t.grid) {
    cells = emptyBoard(gridSize);
    currentTplName = '空白画板';
  } else {
    const n = t.size || t.grid.length;
    gridSize = n;
    document.getElementById('gridSize').value = String(n);
    cells = emptyBoard(n);
    for (let y = 0; y < n; y++) {
      for (let x = 0; x < n; x++) {
        const row = t.grid[y] || [];
        cells[y * n + x] = row[x] !== undefined ? row[x] : -1;
      }
    }
    currentTplName = t.name;
  }
  document.querySelectorAll('.tpl-card').forEach((el, idx) => el.classList.toggle('active', idx === i));
  draw();
  updateStats();
  closePanel();
  showToast('已加载：' + t.name);
}

// ============ 调色板 UI ============
function renderPalette() {
  const el = document.getElementById('palette');
  el.innerHTML = PALETTE.map((c, i) =>
    '<button type="button" class="swatch' + (i === colorIndex ? ' active' : '') +
    '" style="background:' + c.hex + '" title="' + c.name +
    '" onclick="setColor(' + i + ')"></button>'
  ).join('');
}

// ============ 保存（高清无损 PNG，按格整数像素，不拉伸不压缩） ============
function saveImage() {
  const n = gridSize;
  // 每格固定 64 逻辑像素，再乘 devicePixelRatio 的上限，保证清晰
  const cellPx = 64;
  const margin = Math.round(cellPx * 0.3);
  const side = n * cellPx + margin * 2;
  // 再 2× 超采样，导出更锐利，下载时仍是整数倍
  const scale = 2;
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = side * scale;
  exportCanvas.height = side * scale;
  const ex = exportCanvas.getContext('2d');
  // 禁止浏览器对导出位图做模糊缩放
  ex.imageSmoothingEnabled = true;
  ex.imageSmoothingQuality = 'high';
  ex.setTransform(scale, 0, 0, scale, 0, 0);

  // 钉板底色
  ex.fillStyle = '#f5efe6';
  ex.fillRect(0, 0, side, side);

  // 可选外框
  ex.strokeStyle = 'rgba(0,0,0,0.08)';
  ex.lineWidth = 1;
  ex.strokeRect(0.5, 0.5, side - 1, side - 1);

  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      const cx = margin + x * cellPx + cellPx / 2;
      const cy = margin + y * cellPx + cellPx / 2;
      const ci = cells[y * n + x];
      const holeR = cellPx * 0.12;
      const beadR = cellPx * 0.42;

      // 钉板小孔
      ex.beginPath();
      ex.arc(cx, cy, holeR, 0, Math.PI * 2);
      ex.fillStyle = '#d8d0c4';
      ex.fill();

      if (ci >= 0 && ci < PALETTE.length) {
        const hex = PALETTE[ci].hex;
        const grd = ex.createRadialGradient(
          cx - beadR * 0.3, cy - beadR * 0.3, beadR * 0.08,
          cx, cy, beadR
        );
        grd.addColorStop(0, lighten(hex, 0.28));
        grd.addColorStop(0.55, hex);
        grd.addColorStop(1, darken(hex, 0.22));
        ex.beginPath();
        ex.arc(cx, cy, beadR, 0, Math.PI * 2);
        ex.fillStyle = grd;
        ex.fill();
        // 高光
        ex.beginPath();
        ex.arc(cx - beadR * 0.28, cy - beadR * 0.28, beadR * 0.22, 0, Math.PI * 2);
        ex.fillStyle = 'rgba(255,255,255,0.38)';
        ex.fill();
        // 中心孔
        ex.beginPath();
        ex.arc(cx, cy, beadR * 0.22, 0, Math.PI * 2);
        ex.fillStyle = 'rgba(0,0,0,0.12)';
        ex.fill();
      }
    }
  }

  // PNG 无损；toBlob 优先，避免 dataURL 在部分浏览器被二次处理
  const fileName = 'pindou-' + n + 'x' + n + '-' + Date.now() + '.png';
  const finish = function (blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = fileName;
    a.href = url;
    a.click();
    setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
    showToast('已保存高清图 ' + exportCanvas.width + '×' + exportCanvas.height);
  };

  if (exportCanvas.toBlob) {
    exportCanvas.toBlob(function (blob) {
      if (blob) finish(blob);
      else {
        // 回退
        const a = document.createElement('a');
        a.download = fileName;
        a.href = exportCanvas.toDataURL('image/png');
        a.click();
        showToast('已保存高清图 ' + exportCanvas.width + '×' + exportCanvas.height);
      }
    }, 'image/png');
  } else {
    const a = document.createElement('a');
    a.download = fileName;
    a.href = exportCanvas.toDataURL('image/png');
    a.click();
    showToast('已保存高清图 ' + exportCanvas.width + '×' + exportCanvas.height);
  }
}

// ============ 面板 / 主题 / Toast ============
function togglePanel() {
  document.getElementById('tplPanel').classList.toggle('open');
  document.getElementById('panelBackdrop').classList.toggle('show');
}
function closePanel() {
  document.getElementById('tplPanel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('show');
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('pindou_theme', next);
  draw();
}

function toggleFullscreen() {
  const main = document.querySelector('.main');
  if (!main) return;
  if (!document.fullscreenElement) {
    const req = main.requestFullscreen || main.webkitRequestFullscreen;
    if (req) req.call(main).catch(function () { showToast('无法进入全屏'); });
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  }
}

document.addEventListener('fullscreenchange', function () {
  const main = document.querySelector('.main');
  const btn = document.getElementById('fullscreenBtn');
  if (document.fullscreenElement) {
    if (main) main.classList.add('is-fullscreen');
    if (btn) btn.textContent = '⛶ 退出';
  } else {
    if (main) main.classList.remove('is-fullscreen');
    if (btn) btn.textContent = '📺 全屏';
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1500);
}

// ============ 快捷键 ============
document.addEventListener('keydown', function (e) {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (e.ctrlKey && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    undo();
    return;
  }
  if (e.ctrlKey && (e.key === 's' || e.key === 'S')) {
    e.preventDefault();
    saveImage();
    return;
  }
  if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    window.open('index.html', '_self');
    return;
  }
  if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    toggleFullscreen();
    return;
  }
  if ((e.key === '0' || e.code === 'Digit0' || e.code === 'Numpad0') && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    resetZoom();
    return;
  }
  if ((e.key === '=' || e.key === '+') && !e.ctrlKey) { e.preventDefault(); zoomBy(0.15); }
  if (e.key === '-' && !e.ctrlKey) { e.preventDefault(); zoomBy(-0.15); }
  if (e.key === 'e' || e.key === 'E') setTool('erase');
  if (e.key === 'b' || e.key === 'B') setTool('paint');
  if (e.key === 'g' || e.key === 'G') toggleGrid();
  if (e.key === 'Delete' || e.key === 'Backspace') {
    // 不默认清空，避免误触
  }
});

// ============ 启动 ============
function init() {
  const saved = localStorage.getItem('pindou_theme');
  if (saved !== null) document.documentElement.setAttribute('data-theme', saved);
  else if (window.cjgResolveTheme) {
    document.documentElement.setAttribute('data-theme', cjgResolveTheme('pindou_theme', ''));
  }
  cells = emptyBoard(gridSize);
  resizeCanvas();
  renderPalette();
  renderTemplates();
  setTool('paint');
  setColor(0);
  draw();
  updateStats();
}

init();
</script>
