<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="wb-theme">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="12345.png">
<title>道德经打字工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

:root {
  --bg: #fafafa; --text: #2c2c2c; --accent: #e65100;
  --card-bg: #fff; --border: #e0e0e0; --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --tag-bg: #fff3e0; --tag-text: #e65100;
  --result-bg: #fafafa;
}
[data-theme="dark"] {
  --bg: #1a1a2e; --text: #e0e0e0; --accent: #ff9800;
  --card-bg: #252540; --border: #3a3a55; --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --tag-bg: #3d2e1a; --tag-text: #ff9800;
  --result-bg: #1e1e35;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Serif SC', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
}
.header {
  display: flex; align-items: center; padding: 10px 20px;
  border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
}
.header a { color: var(--accent); text-decoration: none; font-size: 14px; }
.header h1 { font-size: 1.2em; letter-spacing: 2px; flex: 1; }
.header button {
  padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--card-bg); color: var(--text); cursor: pointer;
  font-family: inherit; font-size: 0.82em;
}
.header button:hover { background: var(--border); }

.main { flex:1; display:flex; flex-direction:column; align-items:center; padding:24px 20px; gap:20px; max-width:900px; margin:0 auto; width:100%; }

/* Input area */
.input-card {
  background: var(--card-bg); border:2px solid var(--border); border-radius:16px;
  padding:24px 32px; text-align:center; box-shadow:var(--shadow); width:100%; max-width:600px;
}
.input-card h2 { font-size:1em; opacity:0.5; letter-spacing:2px; margin-bottom:16px; }
#codeInput {
  width:100%; max-width:400px; padding:14px 20px; font-size:1.3em; text-align:center;
  border:2px solid var(--border); border-radius:12px; background:var(--bg); color:var(--text);
  font-family: 'Noto Serif SC', 'Courier New', monospace; letter-spacing:3px;
  outline:none; transition:border-color 0.2s;
}
#codeInput:focus { border-color: var(--accent); }
#codeInput::placeholder { letter-spacing:1px; font-size:0.8em; opacity:0.35; }

/* Encoding hints */
.hint-row {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px;
}
.hint-tag {
  font-size:0.72em; padding:3px 10px; border-radius:10px;
  background:var(--tag-bg); color:var(--tag-text); cursor:pointer;
  border:1px solid transparent; transition:all 0.15s;
}
.hint-tag:hover { border-color: var(--accent); }

/* Result area */
.result-card {
  background: var(--card-bg); border:2px solid var(--border); border-radius:16px;
  padding:28px 32px; box-shadow:var(--shadow); width:100%; max-width:700px;
  display:none; position:relative;
}
.result-card.show { display:block; }
.chapter-num {
  font-size:0.8em; opacity:0.4; letter-spacing:2px; margin-bottom:8px;
}
.chapter-title {
  font-size:1.6em; font-weight:700; color:var(--accent); margin-bottom:16px;
}
.chapter-text {
  font-size:1.15em; line-height:2.2; letter-spacing:1px;
  background:var(--result-bg); padding:20px 24px; border-radius:10px;
  white-space:pre-wrap;
}
.chapter-text .sentence { display:block; margin-bottom:8px; }
.chapter-text .sentence.last { margin-bottom:0; }

.copy-btn {
  position:absolute; top:16px; right:20px;
  padding:6px 16px; border:1px solid var(--border); border-radius:8px;
  background:var(--card-bg); color:var(--text); cursor:pointer;
  font-family:inherit; font-size:0.78em; transition:all 0.2s;
}
.copy-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.copy-btn.copied { background:#22c55e; color:#fff; border-color:#22c55e; }

/* Multiple results */
.result-list { display:flex; flex-direction:column; gap:12px; }
.result-item {
  background:var(--result-bg); border-radius:10px; padding:16px 20px;
  border-left:3px solid var(--accent); cursor:pointer; transition:all 0.2s;
}
.result-item:hover { transform:translateX(4px); }
.result-item .ri-chapter { font-size:0.75em; opacity:0.5; }
.result-item .ri-text { font-size:0.95em; line-height:1.8; margin-top:4px; }
.result-item .ri-highlight { color:var(--accent); font-weight:700; }

/* Empty state */
.empty-state {
  text-align:center; padding:40px 20px; opacity:0.4;
}
.empty-state .big { font-size:3em; margin-bottom:12px; }

/* Mobile */
@media (max-width:600px) {
  .input-card { padding:18px 16px; }
  #codeInput { font-size:1.1em; padding:12px 16px; }
  .chapter-text { font-size:1em; padding:14px 16px; }
  .chapter-title { font-size:1.3em; }
}
</style>
</head>
<body>

<div class="header">
  <a href="wubi-practice.html">← 五笔练习</a>
  <h1>道德经打字工具</h1>
  <button onclick="toggleTheme()" id="themeBtn">🌙 暗色</button>
</div>

<div class="main">
  <div class="input-card">
    <h2>输入编码 / 关键词</h2>
    <input type="text" id="codeInput" placeholder="试试输入: 25  /  ssrs  /  无为  /  GKHS" autocomplete="off" oninput="handleInput()">
    <div class="hint-row">
      <span class="hint-tag" onclick="quickCode('25')">25 道法自然</span>
      <span class="hint-tag" onclick="quickCode('8')">8 上善若水</span>
      <span class="hint-tag" onclick="quickCode('1')">1 第一章</span>
      <span class="hint-tag" onclick="quickCode('ssrs')">ssrs 上善若水</span>
      <span class="hint-tag" onclick="quickCode('dfzr')">dfzr 道法自然</span>
      <span class="hint-tag" onclick="quickCode('无为')">无为</span>
      <span class="hint-tag" onclick="quickCode('GKHS')">GKHS 橐</span>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <button class="copy-btn" id="copyBtn" onclick="copyResult()">📋 复制</button>
    <div id="resultContent"></div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="big">📖</div>
    <div>输入编码查看道德经全文</div>
  </div>
</div>

<script>
// ═══════════════ 道德经全文 81章 ═══════════════
const chapters = [
  {n:1,text:'道可道，非常道；名可名，非常名。\n无名天地之始，有名万物之母。\n故常无欲，以观其妙；常有欲，以观其徼。\n此两者同出而异名，同谓之玄。玄之又玄，众妙之门。'},
  {n:2,text:'天下皆知美之为美，斯恶已；皆知善之为善，斯不善已。\n故有无相生，难易相成，长短相较，高下相倾，音声相和，前后相随。\n是以圣人处无为之事，行不言之教。万物作焉而不辞，生而不有，为而不恃，功成而弗居。夫唯弗居，是以不去。'},
  {n:3,text:'不尚贤，使民不争；不贵难得之货，使民不为盗；不见可欲，使民心不乱。\n是以圣人之治，虚其心，实其腹，弱其志，强其骨。常使民无知无欲，使夫智者不敢为也。为无为，则无不治。'},
  {n:4,text:'道冲而用之或不盈，渊兮似万物之宗。\n挫其锐，解其纷，和其光，同其尘。湛兮似或存。\n吾不知谁之子，象帝之先。'},
  {n:5,text:'天地不仁，以万物为刍狗；圣人不仁，以百姓为刍狗。\n天地之间，其犹橐籥乎？虚而不屈，动而愈出。\n多言数穷，不如守中。'},
  {n:6,text:'谷神不死，是谓玄牝。玄牝之门，是谓天地根。绵绵若存，用之不勤。'},
  {n:7,text:'天长地久。天地所以能长且久者，以其不自生，故能长生。\n是以圣人后其身而身先，外其身而身存。非以其无私邪？故能成其私。'},
  {n:8,text:'上善若水。水善利万物而不争，处众人之所恶，故几于道。\n居善地，心善渊，与善仁，言善信，政善治，事善能，动善时。夫唯不争，故无尤。'},
  {n:9,text:'持而盈之，不如其已。揣而锐之，不可长保。\n金玉满堂，莫之能守。富贵而骄，自遗其咎。功遂身退，天之道。'},
  {n:10,text:'载营魄抱一，能无离乎？专气致柔，能如婴儿乎？\n涤除玄览，能无疵乎？爱民治国，能无为乎？\n天门开阖，能为雌乎？明白四达，能无知乎？\n生之畜之，生而不有，为而不恃，长而不宰，是谓玄德。'},
  {n:11,text:'三十辐共一毂，当其无，有车之用。\n埏埴以为器，当其无，有器之用。\n凿户牖以为室，当其无，有室之用。\n故有之以为利，无之以为用。'},
  {n:12,text:'五色令人目盲，五音令人耳聋，五味令人口爽，驰骋畋猎令人心发狂，难得之货令人行妨。\n是以圣人为腹不为目，故去彼取此。'},
  {n:13,text:'宠辱若惊，贵大患若身。\n何谓宠辱若惊？宠为下，得之若惊，失之若惊，是谓宠辱若惊。\n何谓贵大患若身？吾所以有大患者，为吾有身，及吾无身，吾有何患？\n故贵以身为天下，若可寄天下；爱以身为天下，若可托天下。'},
  {n:14,text:'视之不见名曰夷，听之不闻名曰希，搏之不得名曰微。此三者不可致诘，故混而为一。\n其上不皦，其下不昧，绳绳不可名，复归于无物。是谓无状之状，无物之象，是谓惚恍。\n迎之不见其首，随之不见其后。执古之道，以御今之有。能知古始，是谓道纪。'},
  {n:15,text:'古之善为士者，微妙玄通，深不可识。夫唯不可识，故强为之容：\n豫兮若冬涉川，犹兮若畏四邻，俨兮其若客，涣兮若冰之将释，敦兮其若朴，旷兮其若谷，混兮其若浊。\n孰能浊以静之徐清？孰能安以久动之徐生？保此道者不欲盈。夫唯不盈，故能蔽而新成。'},
  {n:16,text:'致虚极，守静笃。万物并作，吾以观复。\n夫物芸芸，各复归其根。归根曰静，是谓复命。复命曰常，知常曰明。不知常，妄作凶。\n知常容，容乃公，公乃王，王乃天，天乃道，道乃久，没身不殆。'},
  {n:17,text:'太上，下知有之；其次，亲而誉之；其次，畏之；其次，侮之。信不足焉，有不信焉。\n悠兮其贵言。功成事遂，百姓皆谓我自然。'},
  {n:18,text:'大道废，有仁义；智慧出，有大伪；六亲不和，有孝慈；国家昏乱，有忠臣。'},
  {n:19,text:'绝圣弃智，民利百倍；绝仁弃义，民复孝慈；绝巧弃利，盗贼无有。此三者以为文不足，故令有所属：见素抱朴，少私寡欲。'},
  {n:20,text:'绝学无忧。唯之与阿，相去几何？善之与恶，相去若何？人之所畏，不可不畏。荒兮其未央哉！\n众人熙熙，如享太牢，如春登台。我独泊兮其未兆，如婴儿之未孩；傫傫兮若无所归。\n众人皆有余，而我独若遗。我愚人之心也哉！沌沌兮！\n俗人昭昭，我独昏昏；俗人察察，我独闷闷。澹兮其若海，飂兮若无止。\n众人皆有以，而我独顽且鄙。我独异于人，而贵食母。'},
  {n:21,text:'孔德之容，惟道是从。道之为物，惟恍惟惚。惚兮恍兮，其中有象；恍兮惚兮，其中有物；窈兮冥兮，其中有精。其精甚真，其中有信。\n自古及今，其名不去，以阅众甫。吾何以知众甫之状哉？以此。'},
  {n:22,text:'曲则全，枉则直，洼则盈，敝则新，少则得，多则惑。\n是以圣人抱一为天下式。不自见故明，不自是故彰，不自伐故有功，不自矜故长。夫唯不争，故天下莫能与之争。\n古之所谓曲则全者，岂虚言哉！诚全而归之。'},
  {n:23,text:'希言自然。故飘风不终朝，骤雨不终日。孰为此者？天地。天地尚不能久，而况于人乎？\n故从事于道者，道者同于道，德者同于德，失者同于失。同于道者，道亦乐得之；同于德者，德亦乐得之；同于失者，失亦乐得之。信不足焉，有不信焉。'},
  {n:24,text:'企者不立，跨者不行。自见者不明，自是者不彰，自伐者无功，自矜者不长。\n其在道也，曰余食赘行。物或恶之，故有道者不处。'},
  {n:25,text:'有物混成，先天地生。寂兮寥兮，独立而不改，周行而不殆，可以为天下母。\n吾不知其名，字之曰道，强为之名曰大。大曰逝，逝曰远，远曰反。\n故道大，天大，地大，王亦大。域中有四大，而王居其一焉。人法地，地法天，天法道，道法自然。'},
  {n:26,text:'重为轻根，静为躁君。是以圣人终日行不离辎重。虽有荣观，燕处超然。\n奈何万乘之主，而以身轻天下？轻则失本，躁则失君。'},
  {n:27,text:'善行无辙迹，善言无瑕谪，善数不用筹策，善闭无关楗而不可开，善结无绳约而不可解。\n是以圣人常善救人，故无弃人；常善救物，故无弃物。是谓袭明。\n故善人者，不善人之师；不善人者，善人之资。不贵其师，不爱其资，虽智大迷，是谓要妙。'},
  {n:28,text:'知其雄，守其雌，为天下谿。为天下谿，常德不离，复归于婴儿。\n知其白，守其黑，为天下式。为天下式，常德不忒，复归于无极。\n知其荣，守其辱，为天下谷。为天下谷，常德乃足，复归于朴。\n朴散则为器，圣人用之则为官长。故大制不割。'},
  {n:29,text:'将欲取天下而为之，吾见其不得已。天下神器，不可为也。为者败之，执者失之。\n故物或行或随，或嘘或吹，或强或羸，或挫或隳。是以圣人去甚，去奢，去泰。'},
  {n:30,text:'以道佐人主者，不以兵强天下，其事好还。师之所处，荆棘生焉。大军之后，必有凶年。\n善有果而已，不敢以取强。果而勿矜，果而勿伐，果而勿骄，果而不得已，果而勿强。\n物壮则老，是谓不道，不道早已。'},
  {n:31,text:'夫佳兵者，不祥之器，物或恶之，故有道者不处。\n君子居则贵左，用兵则贵右。兵者不祥之器，非君子之器，不得已而用之，恬淡为上。胜而不美，而美之者，是乐杀人。夫乐杀人者，则不可以得志于天下矣。\n吉事尚左，凶事尚右。偏将军居左，上将军居右，言以丧礼处之。杀人之众，以哀悲泣之，战胜以丧礼处之。'},
  {n:32,text:'道常无名，朴虽小，天下莫能臣也。侯王若能守之，万物将自宾。\n天地相合，以降甘露，民莫之令而自均。\n始制有名，名亦既有，夫亦将知止。知止可以不殆。譬道之在天下，犹川谷之于江海。'},
  {n:33,text:'知人者智，自知者明。胜人者有力，自胜者强。知足者富，强行者有志。不失其所者久，死而不亡者寿。'},
  {n:34,text:'大道泛兮，其可左右。万物恃之以生而不辞，功成不名有。衣养万物而不为主，常无欲，可名于小；万物归焉而不为主，可名为大。以其终不自为大，故能成其大。'},
  {n:35,text:'执大象，天下往。往而不害，安平太。乐与饵，过客止。道之出口，淡乎其无味，视之不足见，听之不足闻，用之不足既。'},
  {n:36,text:'将欲歙之，必固张之；将欲弱之，必固强之；将欲废之，必固兴之；将欲夺之，必固与之。是谓微明。\n柔弱胜刚强。鱼不可脱于渊，国之利器不可以示人。'},
  {n:37,text:'道常无为而无不为。侯王若能守之，万物将自化。化而欲作，吾将镇之以无名之朴。无名之朴，夫亦将无欲。不欲以静，天下将自定。'},
  {n:38,text:'上德不德，是以有德；下德不失德，是以无德。\n上德无为而无以为；下德为之而有以为。上仁为之而无以为；上义为之而有以为。上礼为之而莫之应，则攘臂而扔之。\n故失道而后德，失德而后仁，失仁而后义，失义而后礼。夫礼者，忠信之薄，而乱之首。前识者，道之华，而愚之始。\n是以大丈夫处其厚，不居其薄；处其实，不居其华。故去彼取此。'},
  {n:39,text:'昔之得一者：天得一以清，地得一以宁，神得一以灵，谷得一以盈，万物得一以生，侯王得一以为天下贞。\n其致之，天无以清将恐裂，地无以宁将恐废，神无以灵将恐歇，谷无以盈将恐竭，万物无以生将恐灭，侯王无以贵高将恐蹶。\n故贵以贱为本，高以下为基。是以侯王自称孤、寡、不谷。此非以贱为本邪？非乎？故致数誉无誉。不欲琭琭如玉，珞珞如石。'},
  {n:40,text:'反者道之动，弱者道之用。天下万物生于有，有生于无。'},
  {n:41,text:'上士闻道，勤而行之；中士闻道，若存若亡；下士闻道，大笑之。不笑不足以为道。\n故建言有之：明道若昧，进道若退，夷道若颣，上德若谷，大白若辱，广德若不足，建德若偷，质真若渝，大方无隅，大器晚成，大音希声，大象无形，道隐无名。夫唯道，善贷且成。'},
  {n:42,text:'道生一，一生二，二生三，三生万物。万物负阴而抱阳，冲气以为和。\n人之所恶，唯孤、寡、不谷，而王公以为称。故物或损之而益，或益之而损。人之所教，我亦教之。强梁者不得其死，吾将以为教父。'},
  {n:43,text:'天下之至柔，驰骋天下之至坚。无有入无间，吾是以知无为之有益。不言之教，无为之益，天下希及之。'},
  {n:44,text:'名与身孰亲？身与货孰多？得与亡孰病？是故甚爱必大费，多藏必厚亡。知足不辱，知止不殆，可以长久。'},
  {n:45,text:'大成若缺，其用不弊。大盈若冲，其用不穷。大直若屈，大巧若拙，大辩若讷。躁胜寒，静胜热。清静为天下正。'},
  {n:46,text:'天下有道，却走马以粪；天下无道，戎马生于郊。祸莫大于不知足，咎莫大于欲得。故知足之足，常足矣。'},
  {n:47,text:'不出户，知天下；不窥牖，见天道。其出弥远，其知弥少。是以圣人不行而知，不见而名，不为而成。'},
  {n:48,text:'为学日益，为道日损。损之又损，以至于无为。无为而无不为。取天下常以无事，及其有事，不足以取天下。'},
  {n:49,text:'圣人无常心，以百姓心为心。善者吾善之，不善者吾亦善之，德善。信者吾信之，不信者吾亦信之，德信。\n圣人在天下，歙歙为天下浑其心。百姓皆注其耳目，圣人皆孩之。'},
  {n:50,text:'出生入死。生之徒十有三，死之徒十有三，人之生动之死地亦十有三。夫何故？以其生生之厚。\n盖闻善摄生者，陆行不遇兕虎，入军不被甲兵。兕无所投其角，虎无所措其爪，兵无所容其刃。夫何故？以其无死地。'},
  {n:51,text:'道生之，德畜之，物形之，势成之。是以万物莫不尊道而贵德。道之尊，德之贵，夫莫之命而常自然。\n故道生之，德畜之，长之育之，亭之毒之，养之覆之。生而不有，为而不恃，长而不宰，是谓玄德。'},
  {n:52,text:'天下有始，以为天下母。既得其母，以知其子；既知其子，复守其母，没身不殆。\n塞其兑，闭其门，终身不勤。开其兑，济其事，终身不救。\n见小曰明，守柔曰强。用其光，复归其明，无遗身殃，是为习常。'},
  {n:53,text:'使我介然有知，行于大道，唯施是畏。大道甚夷，而民好径。朝甚除，田甚芜，仓甚虚，服文彩，带利剑，厌饮食，财货有余，是谓盗夸。非道也哉！'},
  {n:54,text:'善建者不拔，善抱者不脱，子孙以祭祀不辍。\n修之于身，其德乃真；修之于家，其德乃余；修之于乡，其德乃长；修之于国，其德乃丰；修之于天下，其德乃普。\n故以身观身，以家观家，以乡观乡，以国观国，以天下观天下。吾何以知天下然哉？以此。'},
  {n:55,text:'含德之厚，比于赤子。毒虫不螫，猛兽不据，攫鸟不搏。骨弱筋柔而握固。\n未知牝牡之合而朘作，精之至也。终日号而不嗄，和之至也。\n知和曰常，知常曰明。益生曰祥，心使气曰强。物壮则老，谓之不道，不道早已。'},
  {n:56,text:'知者不言，言者不知。塞其兑，闭其门，挫其锐，解其纷，和其光，同其尘，是谓玄同。\n故不可得而亲，不可得而疏；不可得而利，不可得而害；不可得而贵，不可得而贱。故为天下贵。'},
  {n:57,text:'以正治国，以奇用兵，以无事取天下。吾何以知其然哉？以此：天下多忌讳，而民弥贫；民多利器，国家滋昏；人多伎巧，奇物滋起；法令滋彰，盗贼多有。\n故圣人云：我无为而民自化，我好静而民自正，我无事而民自富，我无欲而民自朴。'},
  {n:58,text:'其政闷闷，其民淳淳；其政察察，其民缺缺。祸兮福之所倚，福兮祸之所伏。孰知其极？其无正。正复为奇，善复为妖。人之迷，其日固久。\n是以圣人方而不割，廉而不刿，直而不肆，光而不耀。'},
  {n:59,text:'治人事天莫若啬。夫唯啬，是谓早服。早服谓之重积德，重积德则无不克，无不克则莫知其极，莫知其极可以有国，有国之母可以长久。是谓深根固柢，长生久视之道。'},
  {n:60,text:'治大国若烹小鲜。以道莅天下，其鬼不神。非其鬼不神，其神不伤人。非其神不伤人，圣人亦不伤人。夫两不相伤，故德交归焉。'},
  {n:61,text:'大国者下流，天下之交，天下之牝。牝常以静胜牡，以静为下。\n故大国以下小国，则取小国；小国以下大国，则取大国。故或下以取，或下而取。大国不过欲兼畜人，小国不过欲入事人。夫两者各得其所欲，大者宜为下。'},
  {n:62,text:'道者万物之奥，善人之宝，不善人之所保。\n美言可以市尊，美行可以加人。人之不善，何弃之有？故立天子，置三公，虽有拱璧以先驷马，不如坐进此道。\n古之所以贵此道者何？不曰求以得，有罪以免邪？故为天下贵。'},
  {n:63,text:'为无为，事无事，味无味。大小多少，报怨以德。图难于其易，为大于其细。天下难事必作于易，天下大事必作于细。是以圣人终不为大，故能成其大。夫轻诺必寡信，多易必多难。是以圣人犹难之，故终无难矣。'},
  {n:64,text:'其安易持，其未兆易谋，其脆易泮，其微易散。为之于未有，治之于未乱。\n合抱之木，生于毫末；九层之台，起于累土；千里之行，始于足下。\n为者败之，执者失之。是以圣人无为故无败，无执故无失。\n民之从事，常于几成而败之。慎终如始，则无败事。是以圣人欲不欲，不贵难得之货；学不学，复众人之所过。以辅万物之自然而不敢为。'},
  {n:65,text:'古之善为道者，非以明民，将以愚之。民之难治，以其智多。故以智治国，国之贼；不以智治国，国之福。知此两者亦稽式。常知稽式，是谓玄德。玄德深矣远矣，与物反矣，然后乃至大顺。'},
  {n:66,text:'江海所以能为百谷王者，以其善下之，故能为百谷王。\n是以欲上民，必以言下之；欲先民，必以身后之。是以圣人处上而民不重，处前而民不害。是以天下乐推而不厌。以其不争，故天下莫能与之争。'},
  {n:67,text:'天下皆谓我道大，似不肖。夫唯大，故似不肖。若肖，久矣其细也夫！\n我有三宝，持而保之：一曰慈，二曰俭，三曰不敢为天下先。慈故能勇，俭故能广，不敢为天下先故能成器长。今舍慈且勇，舍俭且广，舍后且先，死矣！夫慈，以战则胜，以守则固。天将救之，以慈卫之。'},
  {n:68,text:'善为士者不武，善战者不怒，善胜敌者不与，善用人者为之下。是谓不争之德，是谓用人之力，是谓配天古之极。'},
  {n:69,text:'用兵有言：吾不敢为主而为客，不敢进寸而退尺。是谓行无行，攘无臂，扔无敌，执无兵。祸莫大于轻敌，轻敌几丧吾宝。故抗兵相加，哀者胜矣。'},
  {n:70,text:'吾言甚易知，甚易行。天下莫能知，莫能行。言有宗，事有君。夫唯无知，是以不我知。知我者希，则我者贵。是以圣人被褐怀玉。'},
  {n:71,text:'知不知上，不知知病。夫唯病病，是以不病。圣人不病，以其病病，是以不病。'},
  {n:72,text:'民不畏威，则大威至。无狎其所居，无厌其所生。夫唯不厌，是以不厌。是以圣人自知不自见，自爱不自贵。故去彼取此。'},
  {n:73,text:'勇于敢则杀，勇于不敢则活。此两者或利或害。天之所恶，孰知其故？是以圣人犹难之。天之道，不争而善胜，不言而善应，不召而自来，繟然而善谋。天网恢恢，疏而不失。'},
  {n:74,text:'民不畏死，奈何以死惧之？若使民常畏死，而为奇者，吾得执而杀之，孰敢？常有司杀者杀。夫代司杀者杀，是谓代大匠斫。夫代大匠斫者，希有不伤其手矣。'},
  {n:75,text:'民之饥，以其上食税之多，是以饥。民之难治，以其上之有为，是以难治。民之轻死，以其上求生之厚，是以轻死。夫唯无以生为者，是贤于贵生。'},
  {n:76,text:'人之生也柔弱，其死也坚强。万物草木之生也柔脆，其死也枯槁。故坚强者死之徒，柔弱者生之徒。是以兵强则灭，木强则折。强大处下，柔弱处上。'},
  {n:77,text:'天之道，其犹张弓与？高者抑之，下者举之；有余者损之，不足者补之。天之道，损有余而补不足。人之道则不然，损不足以奉有余。孰能有余以奉天下？唯有道者。是以圣人为而不恃，功成而不处，其不欲见贤。'},
  {n:78,text:'天下莫柔弱于水，而攻坚强者莫之能胜，以其无以易之。弱之胜强，柔之胜刚，天下莫不知，莫能行。是以圣人云：受国之垢是谓社稷主，受国不祥是为天下王。正言若反。'},
  {n:79,text:'和大怨，必有余怨，安可以为善？是以圣人执左契而不责于人。有德司契，无德司彻。天道无亲，常与善人。'},
  {n:80,text:'小国寡民。使有什伯之器而不用，使民重死而不远徙。虽有舟舆，无所乘之；虽有甲兵，无所陈之。使民复结绳而用之。甘其食，美其服，安其居，乐其俗。邻国相望，鸡犬之声相闻，民至老死不相往来。'},
  {n:81,text:'信言不美，美言不信。善者不辩，辩者不善。知者不博，博者不知。圣人不积，既以为人己愈有，既以与人己愈多。天之道，利而不害；圣人之道，为而不争。'}
];

// ═══════════ 核心逻辑 ═══════════
function handleInput() {
  const input = document.getElementById('codeInput').value.trim();
  const card = document.getElementById('resultCard');
  const content = document.getElementById('resultContent');
  const empty = document.getElementById('emptyState');

  if (!input) { card.classList.remove('show'); empty.style.display=''; return; }

  empty.style.display = 'none';
  card.classList.add('show');

  // 1. 章号
  if (/^\d+$/.test(input)) {
    const n = parseInt(input);
    if (n >= 1 && n <= 81) { showChapter(n); return; }
  }

  // 2. 五笔编码（大写字母）
  if (/^[A-Z]+$/.test(input) && ddjChars[input]) {
    showChar(input); return;
  }

  // 3. 拼音首字母（小写字母）
  if (/^[a-z]+$/.test(input) && phraseCodes[input]) {
    showPhrase(input); return;
  }

  // 4. 关键词搜索
  searchKeyword(input);
}

function showChapter(n) {
  const ch = chapters[n-1];
  const lines = ch.text.split('\n');
  const html = lines.map(l => `<span class="sentence">${l}</span>`).join('');
  document.getElementById('resultContent').innerHTML = `
    <div class="chapter-num">第${n}章</div>
    <div class="chapter-text">${html}</div>
  `;
  document.getElementById('copyBtn').style.display = '';
}

function showChar(code) {
  document.getElementById('resultContent').innerHTML = `
    <div class="chapter-title" style="font-size:3em;">${ddjChars[code]}</div>
    <div style="opacity:0.5;">五笔编码：<b>${code}</b></div>
  `;
  document.getElementById('copyBtn').style.display = '';
}

function showPhrase(code) {
  document.getElementById('resultContent').innerHTML = `
    <div class="chapter-title">${phraseCodes[code]}</div>
    <div style="opacity:0.4;">编码：${code}</div>
  `;
  document.getElementById('copyBtn').style.display = '';
}

function searchKeyword(kw) {
  const results = [];
  chapters.forEach(ch => {
    const idx = ch.text.indexOf(kw);
    if (idx >= 0) {
      // 提取包含关键词的句子
      const sentences = ch.text.split('\n');
      const matched = sentences.filter(s => s.includes(kw));
      results.push({ chapter:ch.n, matches:matched });
    }
  });

  if (results.length === 0) {
    // 也搜索短语
    const matchedPhrases = Object.entries(phraseCodes)
      .filter(([code,text]) => text.includes(kw));
    if (matchedPhrases.length > 0) {
      document.getElementById('resultContent').innerHTML = `
        <div class="result-list">
          ${matchedPhrases.map(([code,text]) => `
            <div class="result-item" onclick="quickCode('${code}')">
              <div class="ri-text"><span class="ri-highlight">${text}</span> · 编码:${code}</div>
            </div>
          `).join('')}
        </div>
      `;
    } else {
      document.getElementById('resultContent').innerHTML = `
        <div style="text-align:center;padding:20px;opacity:0.5;">未找到 "${kw}" 相关内容</div>
      `;
    }
    return;
  }

  document.getElementById('resultContent').innerHTML = `
    <div style="margin-bottom:12px;opacity:0.5;">找到 ${results.length} 章包含"<b>${kw}</b>"</div>
    <div class="result-list">
      ${results.map(r => `
        <div class="result-item" onclick="showChapter(${r.chapter})">
          <div class="ri-chapter">第${r.chapter}章</div>
          ${r.matches.slice(0,2).map(m => {
            const hl = m.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), `<span class="ri-highlight">${kw}</span>`);
            return `<div class="ri-text">${hl}</div>`;
          }).join('')}
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('copyBtn').style.display = '';
}

function quickCode(code) {
  document.getElementById('codeInput').value = code;
  handleInput();
  document.getElementById('codeInput').focus();
}

function copyResult() {
  const el = document.getElementById('resultContent');
  const text = el.textContent || el.innerText;
  navigator.clipboard.writeText(text.trim()).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 1500);
  });
}

// Theme
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme'); btn.textContent = '🌙 暗色';
  } else {
    html.setAttribute('data-theme', 'dark'); btn.textContent = '☀️ 亮色';
  }
  localStorage.setItem('wb-theme', html.getAttribute('data-theme'); 'light');
}

// Iframe 模式：同步主题、隐藏 header
(function() {
  if (window.self !== window.top) {
    var hdr = document.querySelector('.header');
    if (hdr) hdr.style.display = 'none';
    document.body.style.minHeight = 'auto';
    document.body.style.background = 'transparent';
    var main = document.querySelector('.main');
    if (main) main.style.padding = '12px 16px';
    var t = localStorage.getItem('wb-theme');
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    window.addEventListener('message', function(e) {
      if (e.data; e.data.type === 'theme') {
        if (e.data.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else document.documentElement.removeAttribute('data-theme');
      }
    });
  }
})();

// Enter key to copy
document.getElementById('codeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') copyResult();
});

// H 回首页（输入框内不触发）
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    location.href = 'index.html';
  }
});
</script>
