<script>
const ARTICLES = [
  {
    id: "overview",
    title: "概述：什么是海洋舟",
    status: "stable",
    html: "<p><strong>海洋舟</strong>在此专指以<strong>海洋皮划艇（sea kayak）</strong>为主的近海与开阔水域舟行：用双叶桨推进、艇体细长、可装喷裙与密封舱，适合沿岸巡航、岛礁跳跃与多日巡航。</p>\n<p>英文常见：<em>sea kayaking</em> / <em>touring kayaking</em>。与激流舟（whitewater）、休闲坐式舟（SOT）、SUP、赛艇不是同一套技术与风险模型。</p>\n<blockquote>核心能力不只是「会划」：还包括<strong>翻艇后自救/他救、风浪潮汐判断、导航与团队纪律</strong>。</blockquote>\n<h3>和相近活动对比</h3>\n<table>\n  <tr><th></th><th>海洋舟</th><th>激流舟</th><th>坐式休闲舟 / SUP</th></tr>\n  <tr><td>水域</td><td>海、大湖、宽河口</td><td>河流激流</td><td>静水、近岸休闲</td></tr>\n  <tr><td>艇型</td><td>细长、舱室、龙骨线</td><td>短、机动、防撞</td><td>稳、宽、易上</td></tr>\n  <tr><td>必备技能</td><td>湿出舱、再入水、支撑、导航</td><td>翻滚、读水、障碍</td><td>平衡、基础救生</td></tr>\n  <tr><td>典型风险</td><td>风浪、离岸风、低温、航道</td><td>暗礁、孔洞、冲击</td><td>落水、走神、晒伤</td></tr>\n</table>\n<div class=\"sea-diagram\" aria-label=\"海洋舟能力三角\">\n  <svg viewBox=\"0 0 420 200\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\">\n    <title>能力三角：船技 · 海况 · 团队</title>\n    <polygon points=\"210,28 60,170 360,170\" fill=\"currentColor\" opacity=\"0.06\" stroke=\"var(--accent,#0d6e7a)\" stroke-width=\"2\"/>\n    <circle cx=\"210\" cy=\"28\" r=\"6\" fill=\"var(--accent,#0d6e7a)\"/>\n    <circle cx=\"60\" cy=\"170\" r=\"6\" fill=\"var(--accent,#0d6e7a)\"/>\n    <circle cx=\"360\" cy=\"170\" r=\"6\" fill=\"var(--accent,#0d6e7a)\"/>\n    <text x=\"210\" y=\"18\" text-anchor=\"middle\" font-size=\"13\" fill=\"currentColor\">船技（桨/翻滚/救援）</text>\n    <text x=\"50\" y=\"192\" text-anchor=\"middle\" font-size=\"13\" fill=\"currentColor\">海况判断</text>\n    <text x=\"370\" y=\"192\" text-anchor=\"middle\" font-size=\"13\" fill=\"currentColor\">团队与决策</text>\n    <text x=\"210\" y=\"115\" text-anchor=\"middle\" font-size=\"12\" fill=\"currentColor\" opacity=\"0.7\">缺一不可</text>\n  </svg>\n  <p class=\"cap\">只练馆内静水翻滚、却不懂离岸风，或只懂天气预报却不会再入水——都不够出海。</p>\n</div>\n<div class=\"callout\">\n  <strong>⚠️ 安全声明：</strong>本页为自学笔记与概念整理，<strong>不能替代</strong>合格教练、俱乐部课程与本地航海/海事规定。开阔水域有生命危险，请勿仅凭文字出海。\n</div>"
  },
  {
    id: "history",
    title: "简史与文化",
    status: "stable",
    html: "<p>皮艇（kayak）起源于北极原住民（如因纽特）的猎捕与交通舟，传统为<strong>骨架 + 兽皮</strong>，人与舟高度一体。现代玻璃钢/聚乙烯/复合材料海洋舟在 20 世纪中后叶随休闲航海与探险热潮普及。</p>\n<table>\n  <tr><th>线索</th><th>说明</th></tr>\n  <tr><td>传统</td><td>窄舱、喷裙概念、滚转（rolling）与极地求生智慧</td></tr>\n  <tr><td>现代 tour</td><td>前后密封舱、舵/稳向板、日巡与多日装载</td></tr>\n  <tr><td>运动分支</td><td>竞速、冲浪式、探险穿越、无辅助远征等</td></tr>\n  <tr><td>中国语境</td><td>俱乐部、航海中心、海岛线路与桨板市场并行；标准与教练体系仍以各协会/俱乐部为准</td></tr>\n</table>\n<blockquote>尊重水域与文化：传统技术是生存系统，不是「酷炫动作库」。</blockquote>"
  },
  {
    id: "craft",
    title: "艇型与部件",
    status: "stable",
    html: "<p>选艇先问：<strong>在哪划、装多少、自己翻得起来吗</strong>。</p>\n<h3>常见艇型</h3>\n<table>\n  <tr><th>类型</th><th>特征</th><th>适合</th></tr>\n  <tr><td><strong>海洋巡航艇</strong></td><td>4.5–5.5 m 级常见；尖瘦；前后舱；可装舵/稳向板</td><td>沿岸、多日、风浪中的航向稳定</td></tr>\n  <tr><td><strong>日巡 / 过渡艇</strong></td><td>略短略稳；学习曲线友好</td><td>入门到中级海况</td></tr>\n  <tr><td><strong>坐式 SOT</strong></td><td>敞坐、自排；稳</td><td>暖水近岸；远海能力通常弱于坐舱海舟</td></tr>\n  <tr><td><strong>折叠 / 充气结构</strong></td><td>便携</td><td>旅行；刚性与风浪表现看具体产品</td></tr>\n</table>\n<h3>关键部件</h3>\n<ul>\n  <li><strong>座舱与喷裙桥</strong>：喷裙密封，防浪进舱</li>\n  <li><strong>前后密封舱</strong>：浮力与装载；舱口盖要真的密封</li>\n  <li><strong>舵（rudder）</strong>：脚控转向，巡航省力；浅水/登陆要注意</li>\n  <li><strong>稳向板（skeg）</strong>：改善偏航，不主动转向</li>\n  <li><strong>甲板绳与弹性网</strong>：固定泵、桨漂、地图盒</li>\n  <li><strong>安全线 / 拉手</strong>：救援抓握</li>\n</ul>\n<div class=\"sea-diagram\">\n  <svg viewBox=\"0 0 440 140\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\">\n    <title>海洋舟侧视示意</title>\n    <ellipse cx=\"220\" cy=\"70\" rx=\"190\" ry=\"28\" fill=\"none\" stroke=\"var(--accent,#0d6e7a)\" stroke-width=\"3\"/>\n    <rect x=\"185\" y=\"48\" width=\"70\" height=\"28\" rx=\"8\" fill=\"currentColor\" opacity=\"0.12\" stroke=\"currentColor\" stroke-width=\"1.5\"/>\n    <text x=\"220\" y=\"66\" text-anchor=\"middle\" font-size=\"11\" fill=\"currentColor\">座舱</text>\n    <text x=\"70\" y=\"55\" font-size=\"11\" fill=\"currentColor\" opacity=\"0.75\">船首舱</text>\n    <text x=\"340\" y=\"55\" font-size=\"11\" fill=\"currentColor\" opacity=\"0.75\">船尾舱</text>\n    <text x=\"220\" y=\"115\" text-anchor=\"middle\" font-size=\"12\" fill=\"currentColor\" opacity=\"0.7\">细长水线 · 甲板绳 · 舱盖</text>\n  </svg>\n  <p class=\"cap\">示意而已：真实艇有龙骨线、舷弧与干舷差异，试划比参数表重要。</p>\n</div>"
  },
  {
    id: "gear",
    title: "个人装备",
    status: "stable",
    html: "<p>「人的装备」与「艇的装备」分开想。以下为海洋日巡常见个人系统（俱乐部清单为准）。</p>\n<table>\n  <tr><th>装备</th><th>作用</th></tr>\n  <tr><td><strong>救生衣 PFD</strong></td><td>浮力与口袋；必须合身、可游泳活动；海上建议足够浮力等级（看当地规范）</td></tr>\n  <tr><td><strong>双叶桨</strong></td><td>推进；长度/羽角/左右手习惯要匹配</td></tr>\n  <tr><td><strong>喷裙</strong></td><td>挡浪；要能<strong>果断湿出舱拉开</strong></td></tr>\n  <tr><td><strong>舱底泵 / 海绵</strong></td><td>排水；泵最好甲板可取</td></tr>\n  <tr><td><strong>桨漂 paddle float</strong></td><td>自救再入水辅助</td></tr>\n  <tr><td><strong>吹管 / 保险绳</strong></td><td>防桨丢失（用法要防缠绕）</td></tr>\n  <tr><td>衣着</td><td>湿衣/干衣层、防风壳、帽、手套；按<strong>水温</strong>不是气温</td></tr>\n  <tr><td>通讯与信号</td><td>哨子（PFD 上）、防水手机/VHF、亮色/反光</td></tr>\n  <tr><td>导航</td><td>海图/地图盒、罗盘、备用电源的 GPS/手机</td></tr>\n  <tr><td>其他</td><td>刀具（队规）、急救、饮用水、防晒、头灯</td></tr>\n</table>\n<div class=\"callout\"><strong>原则：</strong>落水后 30 秒内能摸到的，才算「带着」。泵和哨子埋在后舱等于没带。</div>"
  },
  {
    id: "paddle",
    title: "桨法基础",
    status: "stable",
    html: "<p>海洋舟桨法目标：<strong>直航省力、转向可控、支撑防翻</strong>。细节以教练徒手纠姿为准。</p>\n<h3>常用桨</h3>\n<table>\n  <tr><th>桨法</th><th>用途</th></tr>\n  <tr><td><strong>前进桨 forward</strong></td><td>主推进；躯干转动，不只靠手臂</td></tr>\n  <tr><td><strong>横扫 sweep</strong></td><td>转向、调整船头</td></tr>\n  <tr><td><strong>倒桨 reverse</strong></td><td>减速、微调</td></tr>\n  <tr><td><strong>抽拉 draw</strong></td><td>侧移靠岸、贴伴</td></tr>\n  <tr><td><strong>支撑 brace</strong></td><td>低/高支撑抗侧倾；风浪中保命动作</td></tr>\n  <tr><td><strong>舵效 / 边缘 edge</strong></td><td>压舷协助转向（进阶）</td></tr>\n</table>\n<ul>\n  <li>握距大致与肩宽相关，勿过窄或过宽</li>\n  <li>直航看远处参照，用轻微扫桨修正，而不是猛纠</li>\n  <li>有舵时：舵辅助直航，不替代读风读浪</li>\n</ul>\n<p class=\"todo-tag\">馆内可先练：10 分钟直航不大幅蛇形 + 左右扫桨调头</p>"
  },
  {
    id: "wetexit",
    title: "湿出舱与再入水",
    status: "stable",
    html: "<p>翻艇后，若不会滚转，标准路径是：<strong>湿出舱（wet exit）→ 控艇 → 再入水（re-entry）或呼叫他救</strong>。</p>\n<h3>湿出舱原则</h3>\n<ol>\n  <li>保持冷静，双手找喷裙前环/释放</li>\n  <li>前推/拉开喷裙，膝移出，手扶船</li>\n  <li><strong>人先保呼吸</strong>，再抓桨与船；艇尽量不离手</li>\n  <li>到水面后清点：人、艇、桨、同伴位置</li>\n</ol>\n<div class=\"callout\"><strong>必须练到条件反射：</strong>喷裙释放不能「想不起来」。泳池课反复练。</div>\n<h3>自救再入水（概念）</h3>\n<ul>\n  <li>排空部分舱水（泵）再爬回，或使用<strong>桨漂 + 后甲板</strong>等教练所教方法</li>\n  <li>风浪中自救显著更难——这是限制出海等级的原因</li>\n  <li>穿喷裙、着 PFD 的真实配置下练，勿只穿泳裤假练</li>\n</ul>"
  },
  {
    id: "rolling",
    title: "翻滚（滚转）",
    status: "stable",

const navList = document.getElementById('navList');
const content = document.getElementById('content');
const titleNow = document.getElementById('titleNow');
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('backdrop');

function renderNav() {
  navList.innerHTML = ARTICLES.map((a, i) => {
    const tag = a.status === 'draft' ? ' <span style="opacity:.7;font-size:.75em">·待补</span>' : '';
    return '<button type="button" class="nav-item" data-id="' + a.id + '" onclick="showArticle(\'' + a.id + '\')">' +
      '<span class="num">' + String(i + 1).padStart(2, '0') + '</span>' + a.title + tag +
    '</button>';
  }).join('');
}

function showArticle(id) {
  const a = ARTICLES.find(x => x.id === id) || ARTICLES[0];
  titleNow.textContent = a.title.replace(/：.*/, '');
  content.innerHTML = '<article class="article">' +
    '<h2>' + a.title + (a.status === 'draft' ? '<span class="todo-tag">待补</span>' : '') + '</h2>' +
    '<div class="meta">海洋舟 · Sea Kayak · 藏经阁笔记</div>' +
    a.html +
    '<div class="footer-note">扫地僧 · 藏经阁 · 海洋舟专页 · 仅供学习备忘，出海请跟专业训练与本地规定</div>' +
  '</article>';
  content.scrollTop = 0;
  navList.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === a.id);
  });
  history.replaceState(null, '', '#' + a.id);
  closeSidebar();
}

function toggleSidebar() {
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  backdrop.classList.remove('show');
}
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  html.setAttribute('data-theme', next);
  try { localStorage.setItem('sea-theme', next); } catch (e) {}
}

document.addEventListener('keydown', e => {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'h' || e.key === 'H') { e.preventDefault(); location.href = 'index.html'; }
  if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleTheme(); }
  if (e.key === 'Escape') closeSidebar();
});

(function () {
  try {
    const s = localStorage.getItem('sea-theme');
    if (s !== null) document.documentElement.setAttribute('data-theme', s);
    else if (window.cjgResolveTheme) document.documentElement.setAttribute('data-theme', cjgResolveTheme('sea-theme', ''));
  } catch (e) {}
  renderNav();
  const hash = (location.hash || '').replace(/^#/, '');
  showArticle(hash && ARTICLES.some(a => a.id === hash) ? hash : ARTICLES[0].id);
})();
