<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="cangjingge-theme">
<meta name="cjg-theme-light" content="dark">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="扫地僧 · 文章库 — 读后感、随笔与扩写，可持续扩展">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="文章库">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
<title>文章库 · 扫地僧</title>
<style>
:root {
  --bg: #f5f0e8;
  --text: #3d3226;
  --text-muted: rgba(61,50,38,0.55);
  --accent: #8b4513;
  --gold: #c9a96e;
  --card-bg: #faf7f2;
  --border: #d4c5a9;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --input-bg: #fff;
  --chip-active: #8b4513;
  --chip-active-text: #faf7f2;
  --quote-bg: rgba(139,69,19,0.07);
  --reader-bg: #f7f2ea;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --read-size: 17px;
  --read-lh: 1.9;
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --text: #e4d8c0;
  --text-muted: rgba(228,216,192,0.55);
  --accent: #c9a96e;
  --gold: #c9a96e;
  --card-bg: #252540;
  --border: #3a3a55;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --input-bg: #1f1f35;
  --chip-active: #c9a96e;
  --chip-active-text: #1a1a2e;
  --quote-bg: rgba(201,169,110,0.1);
  --reader-bg: #1c1c30;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  transition: background 0.25s, color 0.25s;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; color: inherit; cursor: pointer; }

.page {
  max-width: 820px;
  margin: 0 auto;
  padding: 16px 14px calc(28px + var(--safe-bottom));
}
body.reading .page { display: none; }

.header { text-align: center; padding: 14px 8px 6px; }
.header .eyebrow {
  font-size: 0.75em; letter-spacing: 0.28em; color: var(--text-muted); margin-bottom: 8px;
}
.header h1 {
  font-size: 1.7em; color: var(--accent); letter-spacing: 0.16em; font-weight: 700;
}
.header .sub {
  margin-top: 8px; font-size: 0.88em; color: var(--text-muted); line-height: 1.55;
}
.nav-links {
  display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.nav-links a {
  font-size: 0.8em; padding: 6px 11px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text-muted);
}
.nav-links a.here {
  color: var(--chip-active-text); background: var(--chip-active); border-color: var(--chip-active);
}

.stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 14px 0 12px;
}
.stat {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 10px 6px; text-align: center; box-shadow: var(--shadow);
}
.stat .num {
  font-size: 1.15em; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums;
}
.stat .label { margin-top: 3px; font-size: 0.72em; color: var(--text-muted); }

.toolbar {
  position: sticky; top: 0; z-index: 20;
  background: color-mix(in srgb, var(--bg) 94%, transparent);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  padding: 8px 0 6px; margin: 0 -2px;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
  border-radius: 12px; padding: 11px 72px 11px 14px; font-size: 16px; outline: none; font-family: inherit;
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .count {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 0.75em; color: var(--text-muted); pointer-events: none; font-variant-numeric: tabular-nums;
}
.chips {
  display: flex; gap: 8px; overflow-x: auto; padding: 8px 2px 2px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  border-radius: 999px; padding: 7px 12px; font-size: 0.8em; white-space: nowrap;
}
.chip.active {
  background: var(--chip-active); color: var(--chip-active-text); border-color: var(--chip-active);
}

.article-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.card-item {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 14px 12px; box-shadow: var(--shadow); cursor: pointer;
  transition: transform 0.12s ease, border-color 0.15s;
  -webkit-user-select: none; user-select: none;
}
.card-item:active { transform: scale(0.985); border-color: var(--gold); }
.card-item .title {
  font-size: 1.02em; font-weight: 700; line-height: 1.4; color: var(--text);
}
.card-item .meta-row {
  display: flex; flex-wrap: wrap; gap: 6px 10px; margin-top: 8px;
  font-size: 0.75em; color: var(--text-muted);
}
.card-item .tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.card-item .tag {
  font-size: 0.72em; padding: 3px 8px; border-radius: 999px;
  background: color-mix(in srgb, var(--gold) 18%, transparent);
  color: var(--accent); border: 1px solid color-mix(in srgb, var(--gold) 35%, var(--border));
}
.card-item .summary {
  margin-top: 8px; font-size: 0.84em; color: var(--text-muted); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-item .chev {
  float: right; color: var(--text-muted); opacity: 0.7; margin-left: 8px;
}

.empty {
  text-align: center; padding: 48px 16px; color: var(--text-muted); line-height: 1.7;
}
.footer {
  margin-top: 28px; text-align: center; font-size: 0.78em; color: var(--text-muted); letter-spacing: 0.12em;
}
.home-btn, .theme-toggle {
  position: fixed; z-index: 50;
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--card-bg); box-shadow: var(--shadow);
  display: flex; align-items: center; justify-content: center; font-size: 1.15em; line-height: 1;
}
.home-btn {
  top: calc(10px + var(--safe-top)); left: 12px;
}
.theme-toggle {
  top: calc(10px + var(--safe-top)); right: 12px;
}
.home-btn:active, .theme-toggle:active { transform: scale(0.95); }
body.reading .home-btn,
body.reading .theme-toggle { display: none; }

/* Reader */
.reader {
  display: none;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--reader-bg);
}
body.reading .reader { display: block; }

.reader-bar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 8px;
  padding: calc(8px + var(--safe-top)) 10px 8px;
  background: color-mix(in srgb, var(--reader-bg) 92%, transparent);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.reader-bar .icon-btn {
  flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05em;
}
.reader-bar .bar-title {
  flex: 1; min-width: 0; font-size: 0.86em; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.reader-bar .bar-actions {
  display: flex; gap: 6px; flex: 0 0 auto;
}
.reader-bar .text-btn {
  border: 1px solid var(--border); background: var(--card-bg);
  border-radius: 999px; padding: 7px 12px; font-size: 0.78em;
}
.reader-bar .text-btn:active { border-color: var(--accent); color: var(--accent); }

.reader-body {
  max-width: 720px;
  margin: 0 auto;
  padding: 18px 16px calc(48px + var(--safe-bottom));
}
.reader-body .doc-title {
  font-size: 1.35em; font-weight: 700; line-height: 1.4; letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.reader-body .doc-meta {
  font-size: 0.82em; color: var(--text-muted); line-height: 1.65;
  padding-bottom: 14px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.reader-body .doc-meta .source { color: var(--accent); }
.reader-body .doc-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
}
.reader-body .doc-tags span {
  font-size: 0.72em; padding: 3px 8px; border-radius: 999px;
  border: 1px solid var(--border); color: var(--text-muted);
}

#articleContent {
  font-size: var(--read-size);
  line-height: var(--read-lh);
}
#articleContent p { margin: 0 0 0.95em; }
#articleContent h2 {
  font-size: 1.12em; font-weight: 700; margin: 1.4em 0 0.65em; color: var(--text);
}
#articleContent strong { font-weight: 700; }
#articleContent blockquote {
  margin: 0.7em 0 1em;
  padding: 0.65em 0.9em;
  border-left: 3px solid var(--accent);
  background: var(--quote-bg);
  color: var(--text);
  font-size: 0.94em;
}
#articleContent ol {
  margin: 0.4em 0 1em 1.2em;
  padding: 0;
}
#articleContent ol li { margin: 0.35em 0; }

.toast {
  position: fixed; left: 50%; bottom: calc(28px + var(--safe-bottom));
  transform: translateX(-50%) translateY(16px);
  background: var(--accent); color: #faf7f2;
  padding: 10px 18px; border-radius: 999px;
  font-size: 0.86em; opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s; z-index: 100;
}
[data-theme="dark"] .toast { color: #1a1a2e; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

mark.hit {
  background: color-mix(in srgb, var(--gold) 45%, transparent);
  color: inherit; border-radius: 2px; padding: 0 1px;
}

@media (max-width: 420px) {
  .header h1 { font-size: 1.45em; }
  .reader-body .doc-title { font-size: 1.2em; }
}
</style>
</head>
<body>
<a class="home-btn" href="index.html" title="回首页 (H)" aria-label="回首页">🏠</a>
<button class="theme-toggle" id="themeBtn" title="切换主题" type="button">🌓</button>

<div class="page" id="listPage">
  <header class="header">
    <div class="eyebrow">SAODI · DO</div>
    <h1>文章库</h1>
    <p class="sub">读后感 · 随笔 · 扩写<br>基于划线慢慢积累，一篇篇加进来</p>
    <nav class="nav-links" aria-label="阅读导航">
      <a href="index.html">🏠 首页</a>
      <a href="notes.html">划线与想法</a>
      <a href="saodi-read.html">助手</a>
      <a href="saodi-do.html" class="here">文章</a>
    </nav>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statCount">0</div><div class="label">篇文章</div></div>
    <div class="stat"><div class="num" id="statTags">0</div><div class="label">个标签</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="搜索标题 / 标签 / 摘要 / 正文" enterkeyhint="search" autocomplete="off">
      <span class="count" id="resultCount">0</span>
    </div>
    <div class="chips" id="tagChips" aria-label="标签筛选"></div>
  </div>

  <div class="article-list" id="articleList"></div>
  <div class="empty" id="emptyState" hidden>没有匹配的文章</div>
  <p class="footer">扫地僧 · 文章库 · 可继续扩展</p>
</div>

<div class="reader" id="reader" aria-hidden="true">
  <div class="reader-bar">
    <button type="button" class="icon-btn" id="backBtn" title="返回列表" aria-label="返回">←</button>
    <div class="bar-title" id="barTitle">文章</div>
    <div class="bar-actions">
      <button type="button" class="text-btn" id="sizeDown" title="缩小字号">A−</button>
      <button type="button" class="text-btn" id="sizeUp" title="放大字号">A+</button>
      <button type="button" class="text-btn" id="copyBtn" title="复制全文（含格式）">复制</button>
    </div>
  </div>
  <article class="reader-body" id="readerBody">
    <h1 class="doc-title" id="docTitle"></h1>
    <div class="doc-meta" id="docMeta"></div>
    <div id="articleContent"></div>
  </article>
</div>

<div class="toast" id="toast" role="status"></div>

<script src="saodi-do-data.js"></script>
<script>
(function () {
  var data = window.SAODI_DO || { ARTICLES: [] };
  var articles = (data.ARTICLES || []).slice().sort(function (a, b) {
    return (b.date || '').localeCompare(a.date || '');
  });
  var activeTag = '全部';
  var query = '';
  var current = null;
  var READ_KEY = 'saodi-do-read-size';

  var $list = document.getElementById('articleList');
  var $empty = document.getElementById('emptyState');
  var $search = document.getElementById('searchInput');
  var $resultCount = document.getElementById('resultCount');
  var $chips = document.getElementById('tagChips');
  var $toast = document.getElementById('toast');
  var $reader = document.getElementById('reader');
  var $articleContent = document.getElementById('articleContent');
  var $docTitle = document.getElementById('docTitle');
  var $docMeta = document.getElementById('docMeta');
  var $barTitle = document.getElementById('barTitle');

  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { $toast.classList.remove('show'); }, 1800);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function highlight(text, q) {
    var s = escapeHtml(text);
    if (!q) return s;
    var re;
    try { re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'); }
    catch (e) { return s; }
    return s.replace(re, '<mark class="hit">$1</mark>');
  }

  function allTags() {
    var set = {};
    articles.forEach(function (a) {
      (a.tags || []).forEach(function (t) { set[t] = true; });
    });
    return Object.keys(set).sort();
  }

  function filtered() {
    var q = query.trim().toLowerCase();
    return articles.filter(function (a) {
      if (activeTag !== '全部' && !(a.tags || []).includes(activeTag)) return false;
      if (!q) return true;
      var blob = [
        a.title, a.subtitle, a.summary, a.source, a.meta, (a.tags || []).join(' '),
        stripHtml(a.bodyHtml || '')
      ].join('\n').toLowerCase();
      return blob.indexOf(q) !== -1;
    });
  }

  function stripHtml(html) {
    var d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent || d.innerText || '';
  }

  function renderStats() {
    document.getElementById('statCount').textContent = String(articles.length);
    document.getElementById('statTags').textContent = String(allTags().length);
  }

  function renderChips() {
    var tags = ['全部'].concat(allTags());
    $chips.innerHTML = tags.map(function (t) {
      var cls = t === activeTag ? 'chip active' : 'chip';
      return '<button type="button" class="' + cls + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</button>';
    }).join('');
  }

  function renderList() {
    var list = filtered();
    $resultCount.textContent = String(list.length);
    if (!list.length) {
      $list.innerHTML = '';
      $empty.hidden = false;
      return;
    }
    $empty.hidden = true;
    $list.innerHTML = list.map(function (a) {
      var tags = (a.tags || []).map(function (t) {
        return '<span class="tag">' + escapeHtml(t) + '</span>';
      }).join('');
      return (
        '<article class="card-item" data-id="' + escapeHtml(a.id) + '" role="button" tabindex="0">' +
          '<span class="chev">›</span>' +
          '<div class="title">' + highlight(a.title, query.trim()) + '</div>' +
          '<div class="meta-row">' +
            '<span>' + escapeHtml(a.date || '') + '</span>' +
            (a.source ? '<span>' + escapeHtml(a.source) + '</span>' : '') +
          '</div>' +
          (tags ? '<div class="tags">' + tags + '</div>' : '') +
          (a.summary ? '<div class="summary">' + highlight(a.summary, query.trim()) + '</div>' : '') +
        '</article>'
      );
    }).join('');
  }

  function openArticle(id, pushHash) {
    var a = articles.find(function (x) { return x.id === id; });
    if (!a) return;
    current = a;
    document.body.classList.add('reading');
    $reader.setAttribute('aria-hidden', 'false');
    $docTitle.textContent = a.title;
    $barTitle.textContent = a.title;
    var metaParts = [];
    if (a.date) metaParts.push(escapeHtml(a.date));
    if (a.source) metaParts.push('<span class="source">' + escapeHtml(a.source) + '</span>');
    if (a.meta) metaParts.push(escapeHtml(a.meta));
    var tagsHtml = (a.tags || []).map(function (t) {
      return '<span>' + escapeHtml(t) + '</span>';
    }).join('');
    $docMeta.innerHTML =
      metaParts.join(' · ') +
      (tagsHtml ? '<div class="doc-tags">' + tagsHtml + '</div>' : '');
    $articleContent.innerHTML = a.bodyHtml || '';
    window.scrollTo(0, 0);
    if (pushHash !== false) {
      if (location.hash !== '#' + a.id) {
        history.pushState({ id: a.id }, '', '#' + a.id);
      }
    }
  }

  function closeArticle(pushHash) {
    current = null;
    document.body.classList.remove('reading');
    $reader.setAttribute('aria-hidden', 'true');
    if (pushHash !== false) {
      if (location.hash) history.pushState({}, '', location.pathname + location.search);
    }
  }

  function buildCopyHtml(a) {
    return (
      '<div style="font-family:PingFang SC,Microsoft YaHei,sans-serif;font-size:17px;line-height:1.85;color:#222;">' +
      '<h1 style="font-size:22px;font-weight:700;line-height:1.4;">' + escapeHtml(a.title) + '</h1>' +
      '<p style="font-size:13px;color:#666;line-height:1.6;">' +
        escapeHtml([a.date, a.source, a.meta].filter(Boolean).join(' · ')) +
      '</p>' +
      (a.bodyHtml || '') +
      '</div>'
    );
  }

  function buildCopyText(a) {
    var plain = stripHtml(a.bodyHtml || '');
    return [
      a.title,
      '',
      [a.date, a.source, a.meta].filter(Boolean).join(' · '),
      '',
      plain
    ].join('\n');
  }

  async function copyArticle() {
    if (!current) return;
    var html = buildCopyHtml(current);
    var text = buildCopyText(current);
    try {
      if (navigator.clipboard && window.ClipboardItem) {
        var item = new ClipboardItem({
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([text], { type: 'text/plain' })
        });
        await navigator.clipboard.write([item]);
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        throw new Error('no clipboard');
      }
      toast('已复制（含黑体与引用格式）');
    } catch (e) {
      try {
        var sel = window.getSelection();
        var range = document.createRange();
        range.selectNodeContents(document.getElementById('readerBody'));
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        sel.removeAllRanges();
        toast('已复制');
      } catch (e2) {
        toast('复制失败，请长按手动选择');
      }
    }
  }

  function applyReadSize(px) {
    px = Math.max(14, Math.min(24, px));
    document.documentElement.style.setProperty('--read-size', px + 'px');
    try { localStorage.setItem(READ_KEY, String(px)); } catch (e) {}
  }

  function loadReadSize() {
    var n = 17;
    try {
      var s = localStorage.getItem(READ_KEY);
      if (s) n = parseInt(s, 10) || 17;
    } catch (e) {}
    applyReadSize(n);
  }

  // events
  $chips.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-tag]');
    if (!btn) return;
    activeTag = btn.getAttribute('data-tag');
    renderChips();
    renderList();
  });

  $list.addEventListener('click', function (e) {
    var card = e.target.closest('[data-id]');
    if (!card) return;
    openArticle(card.getAttribute('data-id'));
  });

  $list.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var card = e.target.closest('[data-id]');
    if (!card) return;
    e.preventDefault();
    openArticle(card.getAttribute('data-id'));
  });

  $search.addEventListener('input', function () {
    query = $search.value || '';
    renderList();
  });

  document.getElementById('backBtn').addEventListener('click', function () {
    closeArticle();
  });
  document.getElementById('copyBtn').addEventListener('click', copyArticle);
  document.getElementById('sizeUp').addEventListener('click', function () {
    var cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--read-size'), 10) || 17;
    applyReadSize(cur + 1);
  });
  document.getElementById('sizeDown').addEventListener('click', function () {
    var cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--read-size'), 10) || 17;
    applyReadSize(cur - 1);
  });

  document.getElementById('themeBtn').addEventListener('click', function () {
    var root = document.documentElement;
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try {
      var key = document.querySelector('meta[name="cjg-theme-key"]');
      localStorage.setItem(key ? key.content : 'cangjingge-theme', next);
    } catch (e) {}
  });

  document.addEventListener('keydown', function (e) {
    if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
    if (e.key === 'Escape' && document.body.classList.contains('reading')) {
      closeArticle();
      return;
    }
    if ((e.key === 'h' || e.key === 'H') && !document.body.classList.contains('reading')) {
      location.href = 'index.html';
    }
  });

  window.addEventListener('popstate', function () {
    var id = (location.hash || '').replace(/^#/, '');
    if (id) openArticle(id, false);
    else closeArticle(false);
  });

  // init
  loadReadSize();
  renderStats();
  renderChips();
  renderList();
  var bootId = (location.hash || '').replace(/^#/, '');
  if (bootId) openArticle(bootId, false);
})();
</script>
<script src="pwa-register.js" defer></script>
</body>
</html>
