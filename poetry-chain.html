let used = [];
let currentFilter = 'all';
let currentQ = null;
let history = [];
let score = 0;
let streak = 0;
let bestStreak = 0;
let round = 0;
let hintLevel = 0;
let playerName = localStorage.getItem('chain-name') || '';
let lbData = [];

function shuffle(a) { const arr = [...a]; for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]]; } return arr; }

function setFilter(lv) {
  currentFilter = lv;
  document.querySelectorAll('.lv-filter').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lv-filter[data-lv="${lv}"]`).classList.add('active');
  restart();
}

function nextQ() {
  checking = false;
  if (currentQ) history.push({q: currentQ, score, streak});
  let pool = currentFilter === 'all' ? bank : bank.filter(b => b[3] === currentFilter);
  if (pool.length === 0) { alert('该学段暂无题目'); setFilter('all'); return; }
  if (used.length === 0) used = shuffle(pool);
  currentQ = used.pop();
  hintLevel = 0;
  round++;
  document.getElementById('qText').textContent = currentQ[0];
  const lvColors = {老子:'#d4a017',小学:'#22c55e',初中:'#3b82f6',高中:'#ef4444',苏轼:'#f97316'};
  document.getElementById('qSource').innerHTML = `<span style="font-size:0.75em;padding:2px 8px;border-radius:8px;background:${lvColors[currentQ[3]]||'#888'}15;color:${lvColors[currentQ[3]]||'#888'};margin-right:6px;">${currentQ[3]}</span>${currentQ[2]}`;
  document.getElementById('qHint').textContent = '';
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').className = '';
  document.getElementById('answerInput').focus();
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('roundEl').textContent = round;
}

let checking = false;
function check() {
  if (checking) return;
  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim().replace(/[，。、；：！？\s]/g, '');
  const correctAnswer = currentQ[1].replace(/[，。、；：！？\s]/g, '');
  const msg = document.getElementById('resultMsg');

  if (!userAnswer) return;

  if (userAnswer === correctAnswer) {
    input.className = 'correct';
    msg.textContent = '✅ 太棒了！';
    msg.className = 'result-msg correct-msg';
    cheerSound();
    streak++; score += 10 + streak * 2;
    if (streak > bestStreak) bestStreak = streak;
    checking = true;
    document.getElementById('checkBtn').disabled = true;
    setTimeout(nextQ, 1200);
  } else {
    input.className = 'wrong';
    msg.textContent = '❌ 不对，再试一次！';
    msg.className = 'result-msg wrong-msg';
    streak = 0;
    muyu();
    setTimeout(() => { input.className = ''; input.value = ''; input.focus(); }, 500);
  }
  updateStats();
  if (score > 0 && (score % 100 === 0 || round % 10 === 0)) saveScore();
  saveScore();
}

function showHint() {
  hintLevel++;
  hintSound();
  const answer = currentQ[1];
  const chars = [...answer];
  const reveal = Math.min(chars.length, Math.max(1, Math.floor(chars.length * hintLevel * 0.25)));
  let hint = '';
  for (let i = 0; i < chars.length; i++) {
    hint += i < reveal ? chars[i] : (chars[i].match(/[，。、；：！？\s]/) ? chars[i] : '_');
  }
  document.getElementById('qHint').textContent = hint;
}

function skip() {
  streak = 0;
  skipSound();
  document.getElementById('resultMsg').textContent = currentQ[1];
  document.getElementById('resultMsg').className = 'result-msg answer-reveal';
  document.getElementById('checkBtn').disabled = true;
  updateStats();
  setTimeout(nextQ, 4500);
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  if (currentQ) used.push(currentQ);
  currentQ = prev.q;
  score = prev.score;
  streak = prev.streak;
  round--;
  hintLevel = 0;
  updateStats();
  document.getElementById('qText').textContent = currentQ[0];
  const lvColors = {老子:'#d4a017',小学:'#22c55e',初中:'#3b82f6',高中:'#ef4444',苏轼:'#f97316'};
  document.getElementById('qSource').innerHTML = `<span style="font-size:0.75em;padding:2px 8px;border-radius:8px;background:${lvColors[currentQ[3]]||'#888'}15;color:${lvColors[currentQ[3]]||'#888'};margin-right:6px;">${currentQ[3]}</span>${currentQ[2]}`;
  document.getElementById('qHint').textContent = '';
  document.getElementById('resultMsg').textContent = '';
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').className = '';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('roundEl').textContent = round;
}

function restart() {
  score = 0; streak = 0; bestStreak = 0; round = 0; history = [];
  const pool = currentFilter === 'all' ? bank : bank.filter(b => b[3] === currentFilter);
  used = shuffle(pool);
  updateStats();
  nextQ();
}

function updateStats() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('streakEl').textContent = streak + (bestStreak > 0 ? ' (最佳' + bestStreak + ')' : '');
}

// ═══════ Leaderboard ═══════
function loadLB() { try { lbData = JSON.parse(localStorage.getItem('chain-lb')) || []; } catch(e) { lbData = []; } }
function saveLB() { localStorage.setItem('chain-lb', JSON.stringify(lbData)); }
function saveLbName() {
  playerName = document.getElementById('lbName').value.trim().slice(0,8) || '诗仙';
  localStorage.setItem('chain-name', playerName);
  renderLB();
}
function clearLB() { if (confirm('清空英雄榜？')) { lbData = []; saveLB(); renderLB(); } }

function saveScore() {
  const name = playerName || '诗仙';
  const idx = lbData.findIndex(e => e.name === name);
  if (idx >= 0) {
    if (score > lbData[idx].score) lbData[idx] = { name, score, date: new Date().toLocaleDateString('zh-CN') };
    else return;
  } else {
    lbData.push({ name, score, date: new Date().toLocaleDateString('zh-CN') });
  }
  lbData.sort((a,b) => b.score - a.score);
  if (lbData.length > 15) lbData = lbData.slice(0, 15);
  saveLB();
  renderLB();
}

function renderLB() {
  const tbody = document.getElementById('lbTbody');
  const empty = document.getElementById('lbEmpty');
  if (lbData.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = lbData.map((e, i) => {
    const rk = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const self = e.name === playerName ? ' self' : '';
    return `<tr class="${self}"><td class="${rk}">${i+1}</td><td>${e.name}</td><td>${e.score}</td></tr>`;
  }).join('');
}

// ═══════ Sounds ═══════
// 答错：短促木鱼下挫
function muyu(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime;const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(300,t+.08);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.12)}catch(e){}}
// 空格跳过：偏低滑音 + 轻敲，像翻页掠过
function skipSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime;const o=ctx.createOscillator();const g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(420,t);o.frequency.exponentialRampToValueAtTime(180,t+.16);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.22);const o2=ctx.createOscillator();const g2=ctx.createGain();o2.type='sine';o2.frequency.setValueAtTime(220,t+.02);g2.gain.setValueAtTime(.08,t+.02);g2.gain.exponentialRampToValueAtTime(.001,t+.18);o2.connect(g2);g2.connect(ctx.destination);o2.start(t+.02);o2.stop(t+.2)}catch(e){}}
// 提示：清亮双音叮咚（与跳过明显不同）
function hintSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime;[880,1320].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*.07);g.gain.setValueAtTime(.12,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.28);o.connect(g);g.connect(ctx.destination);o.start(t+i*.07);o.stop(t+i*.07+.32)})}catch(e){}}
function cheerSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime;[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*.08);g.gain.setValueAtTime(.15,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.4);o.connect(g);g.connect(ctx.destination);o.start(t+i*.08);o.stop(t+i*.08+.5)})}catch(e){}}

// ═══════ Theme ═══════
function toggleTheme() {
  const h = document.documentElement;
  const next = h.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('chain-theme', next);
}

// ═══════ Keyboard ═══════
document.addEventListener('keydown', e => {
  // Shortcuts that work even in input
  if (e.key === 'Backspace') {
    const inp = document.getElementById('answerInput');
    if (document.activeElement === inp && inp.value.length > 0) return; // normal delete
    e.preventDefault(); goBack(); return;
  }
  if (e.key === ' ' || e.key === '/') {
    e.preventDefault();
    // 音效分别在 skip() / showHint() 内播放，避免重复
    if (e.key === ' ') skip();
    if (e.key === '/') showHint();
    return;
  }
  if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;
  if (e.key === 't') toggleTheme();
  if (e.key === 's') skip();
  if (e.key === 'h' || e.key === 'H') { e.preventDefault(); location.href = 'index.html'; return; }
  if (e.key === 'i' || e.key === 'I') showHint();
  if (e.key === 'r') restart();
  if (e.key === '5') window.open('memory-game.html','_blank');
  if (e.key === '6') window.open('poetry-chain.html','_blank');
  if (e.key === '7') window.open('xiao-game.html','_blank');
  if (e.key === '8') window.open('emoji-match.html','_blank');
  if (e.key === '9') window.open('saolei.html','_blank');
  if (e.key === '0') window.open('2048.html','_blank');
});

// ═══════ Init ═══════
(function() {
  const t = localStorage.getItem('chain-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
  loadLB();
  document.getElementById('lbName').value = playerName;
  renderLB();
  restart();
})();
</script>
