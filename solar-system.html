<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="cangjingge-theme">
<meta name="cjg-theme-light" content="dark">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a0a18">
<meta name="description" content="扫地僧 · 太阳系模型 — 交互式行星轨道演示">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="太阳系">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
<link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
<title>太阳系模型 · 扫地僧</title>
<style>
:root {
  --bg: #070710;
  --text: #e8e4f0;
  --text-muted: rgba(232,228,240,0.55);
  --accent: #c9a96e;
  --card-bg: rgba(30,30,50,0.92);
  --border: #3a3a55;
  --panel: rgba(18,18,32,0.88);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="light"] {
  --bg: #0c1020;
  --text: #f0ebe3;
  --text-muted: rgba(240,235,227,0.55);
  --accent: #e0c07a;
  --card-bg: rgba(24,28,48,0.94);
  --border: #3d4560;
  --panel: rgba(12,16,32,0.9);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.home-btn, .theme-toggle {
  position: fixed; z-index: 40;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1em; color: var(--text); text-decoration: none; cursor: pointer;
}
.home-btn { top: calc(10px + var(--safe-top)); left: 12px; }
.theme-toggle { top: calc(10px + var(--safe-top)); right: 12px; }
.home-btn:active, .theme-toggle:active { transform: scale(0.95); }

#stage {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  display: block;
  cursor: grab;
  touch-action: none;
}
#stage:active { cursor: grabbing; }

.hud {
  position: fixed; z-index: 30;
  left: 50%; transform: translateX(-50%);
  bottom: calc(12px + var(--safe-bottom));
  width: min(520px, calc(100% - 20px));
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 12px 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}
.hud .title-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; margin-bottom: 8px;
}
.hud h1 {
  font-size: 0.95em; font-weight: 700; letter-spacing: 0.12em;
  color: var(--accent);
}
.hud .hint {
  font-size: 0.72em; color: var(--text-muted);
}
.controls {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
}
.controls button, .controls label {
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  border-radius: 999px;
  padding: 6px 11px;
  font-size: 0.78em;
  cursor: pointer;
  font-family: inherit;
}
.controls button.active {
  border-color: var(--accent);
  color: var(--accent);
}
.controls button:active { transform: scale(0.97); }
.controls label {
  display: inline-flex; align-items: center; gap: 6px;
  cursor: default;
}
.controls input[type="range"] {
  width: 88px; accent-color: var(--accent);
}

.info {
  position: fixed; z-index: 30;
  top: calc(58px + var(--safe-top));
  left: 12px; right: 12px;
  max-width: 360px;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: none;
}
.info.show { display: block; }
.info .name {
  font-size: 1.15em; font-weight: 700; color: var(--accent);
  margin-bottom: 4px;
}
.info .meta {
  font-size: 0.78em; color: var(--text-muted); margin-bottom: 8px;
}
.info .body {
  font-size: 0.86em; line-height: 1.65;
}
.info .close {
  float: right;
  border: none; background: transparent;
  color: var(--text-muted); font-size: 1.1em; cursor: pointer;
  padding: 0 4px;
}

.legend {
  position: fixed; z-index: 20;
  top: calc(58px + var(--safe-top));
  right: 12px;
  font-size: 0.7em; color: var(--text-muted);
  text-align: right;
  line-height: 1.5;
  pointer-events: none;
  max-width: 42vw;
}
@media (max-width: 420px) {
  .legend { display: none; }
  .controls input[type="range"] { width: 72px; }
}
</style>
</head>
<body>
<a class="home-btn" href="index.html" title="回首页" aria-label="回首页">🏠</a>
<button class="theme-toggle" id="themeBtn" type="button" title="切换主题">🌓</button>

<canvas id="stage" aria-label="太阳系动画"></canvas>

<div class="legend">
  拖动画布平移 · 双指/滚轮缩放<br>
  点行星查看简介
</div>

<div class="info" id="info">
  <button type="button" class="close" id="infoClose" aria-label="关闭">×</button>
  <div class="name" id="infoName"></div>
  <div class="meta" id="infoMeta"></div>
  <div class="body" id="infoBody"></div>
</div>

<div class="hud">
  <div class="title-row">
    <h1>☀ 太阳系模型</h1>
    <span class="hint" id="statusHint">示意比例 · 非精确天文</span>
  </div>
  <div class="controls">
    <button type="button" id="btnPause">暂停</button>
    <button type="button" id="btnReset">复位</button>
    <button type="button" id="btnOrbits" class="active">轨道</button>
    <button type="button" id="btnLabels" class="active">名称</button>
    <label>速度 <input type="range" id="speed" min="0" max="40" value="12"></label>
  </div>
</div>

<script>
(function () {
  var canvas = document.getElementById('stage');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);

  // Visual radii & orbit radii (AU-ish scaled for screen, NOT real scale)
  // Real order preserved; distances compressed for mobile
  var PLANETS = [
    { id: 'mercury', name: '水星', nameEn: 'Mercury', color: '#b1b1b1', r: 3.2, orbit: 42, period: 0.24, tilt: 0.02,
      blurb: '最靠近太阳的行星，表面昼夜温差极大，几乎没有大气。' },
    { id: 'venus', name: '金星', nameEn: 'Venus', color: '#e8c87a', r: 5.5, orbit: 62, period: 0.62, tilt: 0.01,
      blurb: '尺寸与地球相近，浓厚二氧化碳大气造成极端温室效应。' },
    { id: 'earth', name: '地球', nameEn: 'Earth', color: '#4aa3ff', r: 5.8, orbit: 86, period: 1, tilt: 0.03,
      blurb: '目前已知唯一存在生命的行星。有一颗天然卫星：月球。', moon: true },
    { id: 'mars', name: '火星', nameEn: 'Mars', color: '#e07a4a', r: 4.2, orbit: 112, period: 1.88, tilt: 0.02,
      blurb: '红色沙漠世界，有巨大峡谷与火山遗迹，是深空探测热点。' },
    { id: 'jupiter', name: '木星', nameEn: 'Jupiter', color: '#d4a574', r: 14, orbit: 160, period: 11.86, tilt: 0.015,
      blurb: '太阳系最大行星，气态巨行星，有大红斑与数十颗卫星。' },
    { id: 'saturn', name: '土星', nameEn: 'Saturn', color: '#e6d3a3', r: 12, orbit: 210, period: 29.46, tilt: 0.02,
      blurb: '以壮丽光环闻名，密度极低，主要由氢氦组成。', rings: true },
    { id: 'uranus', name: '天王星', nameEn: 'Uranus', color: '#7ec8e3', r: 8, orbit: 255, period: 84, tilt: 0.01,
      blurb: '冰巨星，自转轴几乎躺在轨道平面上，外观呈蓝绿色。' },
    { id: 'neptune', name: '海王星', nameEn: 'Neptune', color: '#4169e1', r: 7.6, orbit: 300, period: 164.8, tilt: 0.012,
      blurb: '最远的大行星，风速极高，呈深蓝色，有海卫一等卫星。' }
  ];

  var state = {
    t: 0,
    running: true,
    speed: 12,
    showOrbits: true,
    showLabels: true,
    scale: 1,
    offsetX: 0,
    offsetY: 0,
    selected: null
  };

  var drag = { active: false, x: 0, y: 0, moved: false };
  var pinch = { active: false, dist: 0 };

  function resize() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // fit outer orbit
    var fit = Math.min(w, h) / (320 * 2.15);
    if (!state._userScaled) state.scale = Math.max(0.55, Math.min(1.35, fit));
  }

  function cx() { return window.innerWidth / 2 + state.offsetX; }
  function cy() { return window.innerHeight / 2 + state.offsetY - 18; }

  function planetPos(p, t) {
    var ang = (t / p.period) * Math.PI * 2 + p.tilt * 10;
    var ox = p.orbit * state.scale;
    var oy = p.orbit * state.scale * 0.55; // slight ellipse for 3D feel
    return {
      x: cx() + Math.cos(ang) * ox,
      y: cy() + Math.sin(ang) * oy,
      ang: ang
    };
  }

  function drawStarfield() {
    // static-ish starfield based on size
    var w = window.innerWidth, h = window.innerHeight;
    var n = Math.floor((w * h) / 9000);
    ctx.fillStyle = '#05050c';
    ctx.fillRect(0, 0, w, h);
    for (var i = 0; i < n; i++) {
      var x = (Math.sin(i * 127.1 + 3.1) * 0.5 + 0.5) * w;
      var y = (Math.cos(i * 311.7 + 1.7) * 0.5 + 0.5) * h;
      var a = 0.25 + (i % 5) * 0.12;
      ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
      ctx.fillRect(x, y, (i % 3 === 0 ? 1.5 : 1), (i % 3 === 0 ? 1.5 : 1));
    }
  }

  function drawSun() {
    var x = cx(), y = cy();
    var r = 18 * state.scale;
    var g = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 2.8);
    g.addColorStop(0, 'rgba(255,220,100,0.55)');
    g.addColorStop(0.35, 'rgba(255,160,40,0.18)');
    g.addColorStop(1, 'rgba(255,120,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r * 2.8, 0, Math.PI * 2);
    ctx.fill();

    var core = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, r * 0.1, x, y, r);
    core.addColorStop(0, '#fff6c8');
    core.addColorStop(0.5, '#ffcc33');
    core.addColorStop(1, '#ff8a00');
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    if (state.showLabels) {
      ctx.fillStyle = 'rgba(255,220,150,0.85)';
      ctx.font = '600 ' + Math.max(11, 12 * state.scale) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('太阳', x, y + r + 14);
    }
  }

  function drawOrbit(p) {
    if (!state.showOrbits) return;
    var ox = p.orbit * state.scale;
    var oy = p.orbit * state.scale * 0.55;
    ctx.strokeStyle = 'rgba(180,180,220,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(cx(), cy(), ox, oy, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawPlanet(p, pos) {
    var pr = Math.max(2.2, p.r * state.scale * 0.85);

    if (p.rings) {
      ctx.strokeStyle = 'rgba(220,200,150,0.55)';
      ctx.lineWidth = Math.max(1.5, 2.2 * state.scale);
      ctx.beginPath();
      ctx.ellipse(pos.x, pos.y, pr * 1.9, pr * 0.55, -0.4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // soft glow
    var glow = ctx.createRadialGradient(pos.x, pos.y, pr * 0.2, pos.x, pos.y, pr * 2);
    glow.addColorStop(0, p.color);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pr * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, pr, 0, Math.PI * 2);
    ctx.fill();

    // earth highlight
    if (p.id === 'earth') {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(pos.x - pr * 0.25, pos.y - pr * 0.25, pr * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }

    if (p.moon) {
      var mx = pos.x + Math.cos(state.t * 12) * (pr + 7 * state.scale);
      var my = pos.y + Math.sin(state.t * 12) * (pr + 5 * state.scale) * 0.7;
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(mx, my, Math.max(1.2, 1.6 * state.scale), 0, Math.PI * 2);
      ctx.fill();
    }

    if (state.showLabels) {
      ctx.fillStyle = 'rgba(230,230,245,0.9)';
      ctx.font = Math.max(10, 11 * state.scale) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.name, pos.x, pos.y + pr + 12);
    }

    if (state.selected === p.id) {
      ctx.strokeStyle = 'rgba(255,220,120,0.9)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, pr + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function frame(ts) {
    if (!state._last) state._last = ts;
    var dt = Math.min(0.05, (ts - state._last) / 1000);
    state._last = ts;
    if (state.running) state.t += dt * (state.speed / 10);

    drawStarfield();
    PLANETS.forEach(drawOrbit);
    drawSun();

    // paint far-to-near by y for simple depth
    var drawn = PLANETS.map(function (p) {
      var pos = planetPos(p, state.t);
      return { p: p, pos: pos };
    }).sort(function (a, b) { return a.pos.y - b.pos.y; });
    drawn.forEach(function (d) { drawPlanet(d.p, d.pos); });

    requestAnimationFrame(frame);
  }

  function hitTest(x, y) {
    // reverse order for nearest
    for (var i = PLANETS.length - 1; i >= 0; i--) {
      var p = PLANETS[i];
      var pos = planetPos(p, state.t);
      var pr = Math.max(8, p.r * state.scale * 0.85 + 8);
      var dx = x - pos.x, dy = y - pos.y;
      if (dx * dx + dy * dy <= pr * pr) return p;
    }
    // sun
    var sdx = x - cx(), sdy = y - cy();
    var sr = 18 * state.scale + 10;
    if (sdx * sdx + sdy * sdy <= sr * sr) {
      return {
        id: 'sun', name: '太阳', nameEn: 'Sun', color: '#ffcc33',
        blurb: '太阳系的中心恒星，质量约占整个太阳系的 99.8%。目前处于主序星阶段，以核聚变提供光热。',
        metaExtra: '类型：G2V 黄矮星 · 年龄约 46 亿年'
      };
    }
    return null;
  }

  function showInfo(p) {
    if (!p) {
      document.getElementById('info').classList.remove('show');
      state.selected = null;
      return;
    }
    state.selected = p.id;
    document.getElementById('infoName').textContent = p.name + (p.nameEn ? ' · ' + p.nameEn : '');
    var meta = p.metaExtra || '';
    if (p.period) meta = '公转周期约 ' + p.period + ' 地球年' + (meta ? ' · ' + meta : '');
    document.getElementById('infoMeta').textContent = meta;
    document.getElementById('infoBody').textContent = p.blurb || '';
    document.getElementById('info').classList.add('show');
  }

  // events
  canvas.addEventListener('pointerdown', function (e) {
    drag.active = true;
    drag.moved = false;
    drag.x = e.clientX;
    drag.y = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', function (e) {
    if (!drag.active) return;
    var dx = e.clientX - drag.x;
    var dy = e.clientY - drag.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) drag.moved = true;
    state.offsetX += dx;
    state.offsetY += dy;
    drag.x = e.clientX;
    drag.y = e.clientY;
  });
  canvas.addEventListener('pointerup', function (e) {
    if (!drag.active) return;
    drag.active = false;
    if (!drag.moved) {
      var hit = hitTest(e.clientX, e.clientY);
      showInfo(hit);
    }
  });
  canvas.addEventListener('pointercancel', function () { drag.active = false; });

  canvas.addEventListener('wheel', function (e) {
    e.preventDefault();
    state._userScaled = true;
    var f = e.deltaY > 0 ? 0.92 : 1.08;
    state.scale = Math.max(0.35, Math.min(2.8, state.scale * f));
  }, { passive: false });

  canvas.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      pinch.active = true;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      pinch.dist = Math.hypot(dx, dy);
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', function (e) {
    if (!pinch.active || e.touches.length !== 2) return;
    e.preventDefault();
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var d = Math.hypot(dx, dy);
    if (pinch.dist > 0) {
      state._userScaled = true;
      state.scale = Math.max(0.35, Math.min(2.8, state.scale * (d / pinch.dist)));
    }
    pinch.dist = d;
  }, { passive: false });
  canvas.addEventListener('touchend', function () {
    if (arguments[0].touches.length < 2) pinch.active = false;
  });

  document.getElementById('btnPause').onclick = function () {
    state.running = !state.running;
    this.textContent = state.running ? '暂停' : '继续';
  };
  document.getElementById('btnReset').onclick = function () {
    state.offsetX = 0;
    state.offsetY = 0;
    state._userScaled = false;
    state.t = 0;
    resize();
    showInfo(null);
  };
  document.getElementById('btnOrbits').onclick = function () {
    state.showOrbits = !state.showOrbits;
    this.classList.toggle('active', state.showOrbits);
  };
  document.getElementById('btnLabels').onclick = function () {
    state.showLabels = !state.showLabels;
    this.classList.toggle('active', state.showLabels);
  };
  document.getElementById('speed').oninput = function () {
    state.speed = Number(this.value);
  };
  document.getElementById('infoClose').onclick = function () { showInfo(null); };

  document.getElementById('themeBtn').onclick = function () {
    var root = document.documentElement;
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try {
      var key = document.querySelector('meta[name="cjg-theme-key"]');
      localStorage.setItem(key ? key.content : 'cangjingge-theme', next);
    } catch (e) {}
  };

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', function (e) {
    if (e.key === 'h' || e.key === 'H') location.href = 'index.html';
    if (e.key === ' ') {
      e.preventDefault();
      document.getElementById('btnPause').click();
    }
    if (e.key === 'Escape') showInfo(null);
  });

  resize();
  requestAnimationFrame(frame);
})();
</script>
<script src="pwa-register.js" defer></script>
</body>
</html>
