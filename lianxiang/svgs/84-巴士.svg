<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">84=巴士</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">8像车轮圆圆滚，4是车身方方跑</text>
  <ellipse cx="512" cy="830" rx="350" ry="30" fill="#ECEFF1" opacity="0.4"/>
  <!-- 车身 - 4形 -->
  <rect x="160" y="470" width="704" height="200" rx="20" fill="#FFC107"/>
  <rect x="170" y="480" width="684" height="180" rx="15" fill="#FFD54F"/>
  <!-- 车窗 -->
  <rect x="190" y="500" width="100" height="70" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <rect x="310" y="500" width="100" height="70" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <rect x="430" y="500" width="100" height="70" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <rect x="550" y="500" width="100" height="70" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <rect x="670" y="500" width="100" height="70" rx="8" fill="#BBDEFB" opacity="0.7"/>
  <!-- 前挡风 -->
  <rect x="790" y="500" width="50" height="70" rx="6" fill="#BBDEFB" opacity="0.6"/>
  <!-- 条纹 -->
  <line x1="170" y1="580" x2="854" y2="580" stroke="#FFB300" stroke-width="4"/>
  <line x1="170" y1="610" x2="854" y2="610" stroke="#FFB300" stroke-width="4"/>
  <!-- 车轮 - 8形圆 -->
  <circle cx="310" cy="680" r="50" fill="#37474F"/>
  <circle cx="310" cy="680" r="35" fill="#546E7A"/>
  <circle cx="310" cy="680" r="10" fill="#90A4AE"/>
  <circle cx="714" cy="680" r="50" fill="#37474F"/>
  <circle cx="714" cy="680" r="35" fill="#546E7A"/>
  <circle cx="714" cy="680" r="10" fill="#90A4AE"/>
  <!-- 车顶 -->
  <rect x="200" y="450" width="624" height="20" rx="6" fill="#FFB300"/>
</svg>