  <text x="512" y="480" text-anchor="middle" font-size="80" font-weight="bold" fill="#FFD54F">91</text>
  <!-- 衣领 - 9形弯 -->
  <path d="M450 260 Q480 280 512 260 Q544 280 574 260" fill="none" stroke="#B71C1C" stroke-width="4"/>
  <rect x="460" y="265" width="104" height="15" rx="4" fill="#B71C1C"/>
  <!-- 袖口 -->
  <path d="M400 320 L380 340 L380 380 L400 360" fill="#F44336"/>
  <path d="M624 320 L644 340 L644 380 L624 360" fill="#F44336"/>
  <!-- 条纹 -->
