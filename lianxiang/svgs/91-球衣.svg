<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">91=球衣</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">9像衣领弯弯翻，1是衣身直直挂</text>
  <!-- 衣架 -->
  <line x1="300" y1="230" x2="724" y2="230" stroke="#90A4AE" stroke-width="4"/>
  <path d="M512 230 Q512 200 480 190 Q460 185 460 210" fill="none" stroke="#90A4AE" stroke-width="4"/>
