<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="100%" stop-color="#FF85A2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Subtle heart background decorations -->
  <g fill="#FFDEE9" opacity="0.3">
    <path d="M 150,200 A 8,8 0 0,1 166,200 A 8,8 0 0,1 150,218 A 8,8 0 0,1 134,200 A 8,8 0 0,1 150,200 Z"/>
    <path d="M 620,300 A 6,6 0 0,1 632,300 A 6,6 0 0,1 620,314 A 6,6 0 0,1 608,300 A 6,6 0 0,1 620,300 Z"/>
    <path d="M 200,500 A 5,5 0 0,1 210,500 A 5,5 0 0,1 200,512 A 5,5 0 0,1 190,500 A 5,5 0 0,1 200,500 Z"/>
    <path d="M 550,600 A 7,7 0 0,1 564,600 A 7,7 0 0,1 550,616 A 7,7 0 0,1 536,600 A 7,7 0 0,1 550,600 Z"/>
  </g>

  <!-- Full body figure = number 8 and 0 -->
  <g transform="translate(400, 380)">
    <!-- Head -->
    <circle cx="0" cy="-120" r="42" fill="#FDDCB5" stroke="#E8B88A" stroke-width="1.5"/>
    <!-- Hair -->
    <path d="M -42,-120 Q -45,-160 0,-165 Q 45,-160 42,-120 Q 30,-155 0,-158 Q -30,-155 -42,-120 Z"
          fill="#3A2010"/>
    <path d="M -42,-120 Q -50,-110 -45,-70 Q -40,-95 -35,-80 Q -30,-100 -25,-75"
          fill="#3A2010"/>
    <path d="M 42,-120 Q 50,-110 45,-70 Q 40,-95 35,-80 Q 30,-100 25,-75"
          fill="#3A2010"/>
    <!-- Smile -->
    <path d="M -12,-108 Q 0,-95 12,-108" fill="none" stroke="#C89060" stroke-width="2" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="-14" cy="-125" rx="5" ry="6" fill="#3A2010"/>
    <ellipse cx="14" cy="-125" rx="5" ry="6" fill="#3A2010"/>
    <circle cx="-12" cy="-127" r="2" fill="white"/>
    <circle cx="16" cy="-127" r="2" fill="white"/>
    <!-- Blush -->
    <ellipse cx="-22" cy="-112" rx="8" ry="5" fill="#FFB6C1" opacity="0.4"/>
    <ellipse cx="22" cy="-112" rx="8" ry="5" fill="#FFB6C1" opacity="0.4"/>

    <!-- Arms cradling belly -->
    <!-- Left arm -->
    <path d="M -20,-80 Q -55,-60 -60,-20 Q -65,10 -50,30" fill="none" stroke="#FDDCB5" stroke-width="14" stroke-linecap="round"/>
    <path d="M -20,-80 Q -55,-60 -60,-20 Q -65,10 -50,30" fill="none" stroke="#F5CCA0" stroke-width="12" stroke-linecap="round"/>

    <!-- Right arm -->
    <path d="M 20,-80 Q 55,-60 60,-20 Q 65,10 50,30" fill="none" stroke="#FDDCB5" stroke-width="14" stroke-linecap="round"/>
    <path d="M 20,-80 Q 55,-60 60,-20 Q 65,10 50,30" fill="none" stroke="#F5CCA0" stroke-width="12" stroke-linecap="round"/>

    <!-- Hands cradling belly -->
    <circle cx="-45" cy="35" r="10" fill="#FDDCB5"/>
    <circle cx="45" cy="35" r="10" fill="#FDDCB5"/>

    <!-- Pregnant belly = number 0 -->
    <ellipse cx="0" cy="60" rx="85" ry="95" fill="url(#dressGrad)"/>
    <!-- Belly highlight -->
    <ellipse cx="-20" cy="50" rx="40" ry="55" fill="white" opacity="0.15"/>
    <!-- Dress detail -->
    <line x1="-80" y1="120" x2="80" y2="120" stroke="#FF7096" stroke-width="1" opacity="0.5"/>
    <!-- Collar -->
    <path d="M -15,-78 L 0,-70 L 15,-78" fill="none" stroke="#FF85A2" stroke-width="2" stroke-linecap="round"/>

    <!-- Dress body = number 8 outline -->
    <path d="M -20,-85 Q -25,-70 -20,-50 Q 0,-30 0,0 Q 0,30 -5,60 Q -10,90 0,160" fill="none" stroke="transparent" stroke-width="40"/>
  </g>

  <!-- Title -->
  <text x="400" y="85" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="42" font-weight="bold" fill="#333">08=孕妇</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">0像肚子圆圆鼓，8是孕妈弯弯扶</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
