<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="skyGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="100%" stop-color="#DFE6E9"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8E6B"/>
      <stop offset="40%" stop-color="#4A704A"/>
      <stop offset="100%" stop-color="#2D4A2D"/>
    </linearGradient>
    <linearGradient id="valleyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A5A"/>
      <stop offset="100%" stop-color="#1A3A1A"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="url(#skyGrad2)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.8">
    <ellipse cx="180" cy="150" rx="55" ry="20"/>
    <ellipse cx="215" cy="142" rx="40" ry="24"/>
    <ellipse cx="620" cy="170" rx="50" ry="18"/>
  </g>

  <!-- Far mountain -->
  <polygon points="20,520 150,320 280,520" fill="#6B8E6B" opacity="0.4"/>
  <polygon points="200,520 350,280 500,520" fill="#7B9E7B" opacity="0.3"/>

  <!-- Left mountain ridge = part of 6 -->
  <polygon points="20,520 20,280 200,400 400,520" fill="url(#mountainGrad)"/>
  <!-- Right mountain ridge -->
  <polygon points="400,520 600,400 780,280 780,520" fill="url(#mountainGrad)"/>

  <!-- Valley between mountains = number 0 (deep valley shape between ridges) -->
  <path d="M 200,400 Q 400,300 600,400" fill="none" stroke="#2D4A2D" stroke-width="4" opacity="0.5"/>

  <!-- Dark valley hole = number 0 -->
  <ellipse cx="400" cy="480" rx="80" ry="100" fill="#142814"/>
  <ellipse cx="400" cy="480" rx="60" ry="80" fill="#0A180A"/>
  <!-- Valley depth effect -->
  <ellipse cx="400" cy="480" rx="30" ry="50" fill="#050D05"/>

  <!-- Mountain snow caps -->
  <path d="M 20,280 Q 60,310 100,340" fill="white" opacity="0.3"/>
  <path d="M 700,280 Q 740,310 780,280" fill="white" opacity="0.3"/>

  <!-- Mountain texture lines -->
  <g stroke="#3A5A3A" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M 70,400 Q 120,420 170,440"/>
    <path d="M 50,440 Q 100,455 150,470"/>
    <path d="M 650,440 Q 700,455 750,470"/>
    <path d="M 670,400 Q 700,420 750,440"/>
  </g>

  <!-- Green trees on mountains -->
  <g fill="#4A704A">
    <polygon points="120,420 130,390 140,420"/>
    <polygon points="160,430 170,405 180,430"/>
    <polygon points="620,430 630,400 640,430"/>
    <polygon points="660,420 670,395 680,420"/>
  </g>

  <!-- River in valley -->
  <path d="M 370,550 Q 400,600 430,550 Q 420,650 400,700 Q 380,650 370,550 Z" fill="#4A90D9" opacity="0.5"/>

  <!-- Green ground -->
  <path d="M 20,520 Q 200,550 400,520 Q 600,550 780,520 L 780,780 L 20,780 Z" fill="#3D6B3D"/>
  <path d="M 20,560 Q 200,580 400,560 Q 600,580 780,560 L 780,780 L 20,780 Z" fill="#346034"/>

  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="42" font-weight="bold" fill="#1a1a2e">06=山谷</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#2a3a2a">0像谷口圆圆深，6是山脊弯弯绕</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
