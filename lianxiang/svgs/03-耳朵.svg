<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#E8B88A"/>
    </linearGradient>
    <linearGradient id="innerEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C8A0"/>
      <stop offset="100%" stop-color="#E0A878"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#1a1a2e"/>

  <!-- Outer ear = number 0 (the round outer shape) -->
  <g transform="translate(400, 380)">
    <!-- Outer ear silhouette -->
    <path d="M 0,-180 Q 120,-200 140,-80 Q 160,20 130,80 Q 100,140 50,160 Q 0,175 -40,160 Q -100,140 -130,80 Q -160,20 -140,-80 Q -120,-200 0,-180 Z"
          fill="url(#skinGrad)" stroke="#C89060" stroke-width="2"/>

    <!-- Inner ear folds (representing the ear anatomy) -->
    <!-- Helix ridge -->
    <path d="M 0,-175 Q 105,-190 125,-80 Q 145,20 115,75 Q 85,130 40,148 Q 0,160 -35,148"
          fill="none" stroke="#E8B88A" stroke-width="3"/>

    <!-- Anti-helix -->
    <path d="M -20,-130 Q 50,-145 75,-70 Q 95,-10 80,40 Q 60,80 30,100"
          fill="none" stroke="#E0A878" stroke-width="2.5"/>

    <!-- Tragus -->
    <path d="M 35,60 Q 55,65 60,90 Q 55,110 35,115"
          fill="url(#innerEar)" stroke="#C89060" stroke-width="1.5"/>

    <!-- Earlobe area = number 3 -->
    <path d="M 0,170 Q 40,190 30,220 Q 20,240 -10,230 Q -35,215 -30,185 Q -20,170 0,170 Z"
          fill="#FDDCB5" stroke="#C89060" stroke-width="1.5"/>

    <!-- Concha (deep inner ear) -->
    <path d="M 0,-80 Q 40,-85 50,-40 Q 55,-10 40,25 Q 20,50 -10,45 Q -35,35 -45,0 Q -50,-30 -30,-60 Q -10,-78 0,-80 Z"
          fill="url(#innerEar)" opacity="0.7"/>

    <!-- Ear canal shadow -->
    <ellipse cx="5" cy="-25" rx="15" ry="18" fill="#C88048" opacity="0.4"/>

    <!-- Highlight -->
    <path d="M 0,-170 Q 50,-175 60,-130 Q 65,-100 55,-70"
          fill="none" stroke="white" stroke-width="12" opacity="0.2" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="110" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#FFEECC">03=耳朵</text>

  <!-- Subtitle -->
  <text x="400" y="720" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#CCBBAA">0像耳朵圆轮廓，3是耳垂弯弯挂</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
