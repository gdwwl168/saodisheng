  <circle cx="285" cy="342" r="5" fill="#2C1810"/>
  <circle cx="286" cy="341" r="2" fill="white"/>
  <!-- 喙 -->
  <path d="M295 350 L320 348 L300 358Z" fill="#FF9800"/>
  <!-- 垂肉 -->
  <path d="M282 370 Q280 385 290 390" fill="none" stroke="#F44336" stroke-width="3"/>
  <!-- 蛋 -->
  <ellipse cx="400" cy="735" rx="18" ry="22" fill="#FFE082"/>
  <ellipse cx="440" cy="738" rx="16" ry="20" fill="#FFE082"/>
  <ellipse cx="380" cy="730" rx="15" ry="19" fill="#FFE082"/>
</svg>