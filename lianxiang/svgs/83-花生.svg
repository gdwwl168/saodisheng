<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">83=花生</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">8像花生弯弯鼓，3是壳纹长长纵</text>
  <!-- 藤蔓 -->
  <path d="M300 280 Q400 260 500 300 Q600 340 700 300" fill="none" stroke="#66BB6A" stroke-width="4"/>
  <ellipse cx="320" cy="270" rx="18" ry="10" fill="#81C784" transform="rotate(-30 320 270)"/>
  <ellipse cx="680" cy="280" rx="18" ry="10" fill="#81C784" transform="rotate(30 680 280)"/>
  <!-- 花生1 - 8形双鼓 -->
  <ellipse cx="380" cy="520" rx="55" ry="75" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="3" transform="rotate(-10 380 520)"/>
  <ellipse cx="480" cy="540" rx="45" ry="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="3" transform="rotate(10 480 540)"/>
  <!-- 连接处 -->
  <ellipse cx="430" cy="530" rx="15" ry="40" fill="#BCAAA4" transform="rotate(-5 430 530)"/>
  <!-- 壳纹 - 3形纵 -->
  <path d="M355 500 Q370 520 360 550" fill="none" stroke="#BCAAA4" stroke-width="2" opacity="0.5"/>
  <path d="M380 500 Q395 520 385 550" fill="none" stroke="#BCAAA4" stroke-width="2" opacity="0.5"/>
  <path d="M470 520 Q480 540 475 570" fill="none" stroke="#BCAAA4" stroke-width="2" opacity="0.5"/>
  <path d="M495 515 Q505 540 500 565" fill="none" stroke="#BCAAA4" stroke-width="2" opacity="0.5"/>
  <!-- 花生2 -->
  <ellipse cx="580" cy="580" rx="55" ry="75" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="3" transform="rotate(-10 580 580)"/>
  <ellipse cx="680" cy="560" rx="40" ry="60" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="3" transform="rotate(10 680 560)"/>
  <ellipse cx="630" cy="570" rx="12" ry="35" fill="#BCAAA4"/>
  <!-- 盆 -->
  <ellipse cx="530" cy="820" rx="180" ry="30" fill="#FFECB3" stroke="#FFD54F" stroke-width="2"/>
  <rect x="350" y="700" width="360" height="120" rx="10" fill="#FFF9C4" opacity="0.4"/>
</svg>