<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">77=象棋</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">7像棋子弯弯刻，7是棋盘弯弯对</text>
  <!-- 棋盘 -->
  <rect x="250" y="350" width="524" height="500" rx="8" fill="#FFCC80"/>
  <rect x="260" y="360" width="504" height="480" rx="6" fill="#FFECB3"/>
  <rect x="270" y="370" width="120" height="120" fill="#FFCC80" opacity="0.5"/>
  <rect x="510" y="370" width="120" height="120" fill="#FFCC80" opacity="0.5"/>
  <rect x="750" y="370" width="120" height="120" fill="#FFCC80" opacity="0.3"/>
  <rect x="390" y="490" width="120" height="120" fill="#FFCC80" opacity="0.3"/>
  <rect x="630" y="490" width="120" height="120" fill="#FFCC80" opacity="0.5"/>
  <rect x="270" y="610" width="120" height="120" fill="#FFCC80" opacity="0.3"/>
  <rect x="510" y="610" width="120" height="120" fill="#FFCC80" opacity="0.5"/>
  <rect x="750" y="610" width="120" height="120" fill="#FFCC80" opacity="0.3"/>
  <!-- 棋子 - 7形弯刻 -->
  <circle cx="330" cy="430" r="30" fill="#8D6E63"/>
  <text x="330" y="440" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFD54F">車</text>
  <circle cx="570" cy="430" r="30" fill="#8D6E63"/>
  <text x="570" y="440" text-anchor="middle" font-size="28" font-weight="bold" fill="#FFD54F">馬</text>
  <circle cx="570" cy="670" r="30" fill="#8D6E63"/>
  <text x="570" y="680" text-anchor="middle" font-size="28" font-weight="bold" fill="#F44336">炮</text>
  <circle cx="330" cy="670" r="30" fill="#8D6E63"/>
  <text x="330" y="680" text-anchor="middle" font-size="28" font-weight="bold" fill="#F44336">兵</text>
  <!-- 河界 -->
  <line x1="270" y1="540" x2="870" y2="540" stroke="#8D6E63" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="512" y="530" text-anchor="middle" font-size="20" fill="#8D6E63" opacity="0.6">楚 河 汉 界</text>
</svg>