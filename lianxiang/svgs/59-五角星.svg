<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">59=五角星</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">5像星角弯弯闪，9是星光长长亮</text>
  <!-- 大五角星 - 5形 -->
  <polygon points="512,260 585,410 750,430 630,550 658,715 512,635 366,715 394,550 274,430 439,410" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/>
  <!-- 光芒线 - 9形放射 -->
  <line x1="512" y1="260" x2="512" y2="180" stroke="#FFD54F" stroke-width="3" opacity="0.5"/>
  <line x1="439" y1="410" x2="380" y2="350" stroke="#FFD54F" stroke-width="3" opacity="0.4"/>
  <line x1="585" y1="410" x2="644" y2="350" stroke="#FFD54F" stroke-width="3" opacity="0.4"/>
  <line x1="750" y1="430" x2="830" y2="430" stroke="#FFD54F" stroke-width="3" opacity="0.3"/>
  <line x1="274" y1="430" x2="194" y2="430" stroke="#FFD54F" stroke-width="3" opacity="0.3"/>
  <line x1="630" y1="550" x2="700" y2="610" stroke="#FFD54F" stroke-width="3" opacity="0.3"/>
  <line x1="394" y1="550" x2="324" y2="610" stroke="#FFD54F" stroke-width="3" opacity="0.3"/>
  <line x1="658" y1="715" x2="720" y2="790" stroke="#FFD54F" stroke-width="3" opacity="0.25"/>
  <line x1="366" y1="715" x2="304" y2="790" stroke="#FFD54F" stroke-width="3" opacity="0.25"/>
  <line x1="512" y1="635" x2="512" y2="720" stroke="#FFD54F" stroke-width="3" opacity="0.25"/>
  <!-- 小星星 -->
  <text x="220" y="380" font-size="20" fill="#FFD54F" opacity="0.3">✦</text>
  <text x="750" y="350" font-size="16" fill="#FFD54F" opacity="0.25">✦</text>
  <text x="700" y="650" font-size="18" fill="#FFD54F" opacity="0.2">✦</text>
