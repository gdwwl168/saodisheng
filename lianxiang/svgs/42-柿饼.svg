  <ellipse cx="512" cy="620" rx="140" ry="110" fill="#FF8F00"/>
  <ellipse cx="512" cy="620" rx="130" ry="100" fill="#FFA726"/>
  <ellipse cx="490" cy="590" rx="60" ry="40" fill="#FFB74D" opacity="0.4"/>
  <!-- 柿蒂 - 4形三角 -->
  <path d="M462 520 L512 460 L562 520Z" fill="#4E342E"/>
  <path d="M472 520 L512 475 L552 520Z" fill="#5D4037"/>
  <!-- 柿蒂叶片 -->
  <ellipse cx="470" cy="525" rx="18" ry="8" fill="#5D4037" transform="rotate(-30 470 525)"/>
  <ellipse cx="554" cy="525" rx="18" ry="8" fill="#5D4037" transform="rotate(30 554 525)"/>
  <ellipse cx="512" cy="510" rx="16" ry="7" fill="#5D4037"/>
  <!-- 白霜 -->
  <ellipse cx="460" cy="640" rx="30" ry="15" fill="white" opacity="0.2"/>
  <ellipse cx="550" cy="610" rx="25" ry="12" fill="white" opacity="0.15"/>
  <!-- 装饰 -->
  <text x="300" y="500" font-size="22" opacity="0.2">🍂</text>
