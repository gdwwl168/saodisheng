  <ellipse cx="512" cy="600" rx="120" ry="130" fill="#795548"/>
  <ellipse cx="512" cy="600" rx="105" ry="115" fill="#8D6E63"/>
  <!-- 炉口 -->
  <ellipse cx="512" cy="500" rx="90" ry="20" fill="#4E342E"/>
  <ellipse cx="512" cy="500" rx="75" ry="15" fill="#3E2723"/>
  <!-- 炉脚 -->
  <line x1="430" y1="720" x2="410" y2="800" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="730" x2="512" y2="800" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <line x1="594" y1="720" x2="614" y2="800" stroke="#5D4037" stroke-width="12" stroke-linecap="round"/>
  <!-- 炉火 - 9形弯焰 -->
  <path d="M512 500 Q490 450 500 400 Q510 350 490 310 Q475 280 500 260" fill="none" stroke="#FF9800" stroke-width="5" opacity="0.6"/>
  <path d="M512 500 Q530 440 520 390 Q510 340 530 300 Q545 270 520 250" fill="none" stroke="#FFC107" stroke-width="4" opacity="0.5"/>
  <path d="M512 500 Q512 460 512 420 Q512 380 512 340" fill="none" stroke="#FF8F00" stroke-width="8" opacity="0.4"/>
  <path d="M512 500 Q500 470 510 440 Q520 410 500 380" fill="none" stroke="#FF5722" stroke-width="6" opacity="0.5"/>
  <path d="M512 500 Q524 470 514 440 Q504 410 524 380" fill="none" stroke="#FF9800" stroke-width="5" opacity="0.4"/>
  <!-- 火星 -->
  <circle cx="490" cy="240" r="3" fill="#FF9800" opacity="0.4"/>
  <circle cx="530" cy="260" r="2" fill="#FFC107" opacity="0.35"/>
  <circle cx="510" cy="220" r="2.5" fill="#FF5722" opacity="0.3"/>
  <!-- 酒壶 - 9形弯 -->
  <ellipse cx="350" cy="680" rx="30" ry="40" fill="#A1887F"/>
  <path d="M335 650 Q320 630 330 610" fill="none" stroke="#A1887F" stroke-width="6" stroke-linecap="round"/>
