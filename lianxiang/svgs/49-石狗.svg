<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">49=石狗</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">4像狗身三角稳，9是尾巴弯弯卷</text>
  <!-- 底座 -->
  <rect x="280" y="740" width="464" height="60" rx="10" fill="#9E9E9E"/>
  <!-- 身体 - 4形三角 -->
  <path d="M340 520 Q512 500 684 520 L660 740 L364 740Z" fill="#BDBDBD"/>
  <path d="M350 530 Q512 510 674 530 L650 740 L374 740Z" fill="#D7CCC8"/>
  <!-- 前腿 -->
  <rect x="360" y="680" width="35" height="80" rx="10" fill="#BDBDBD"/>
  <rect x="629" y="680" width="35" height="80" rx="10" fill="#BDBDBD"/>
  <!-- 头部 -->
  <ellipse cx="400" cy="470" rx="50" ry="45" fill="#D7CCC8"/>
  <!-- 耳朵 -->
  <ellipse cx="370" cy="420" rx="18" ry="25" fill="#BDBDBD"/>
  <ellipse cx="430" cy="420" rx="18" ry="25" fill="#BDBDBD"/>
  <!-- 眼睛 -->
  <circle cx="385" cy="460" r="7" fill="#2C1810"/>
  <circle cx="420" cy="460" r="7" fill="#2C1810"/>
  <circle cx="387" cy="458" r="2.5" fill="white"/>
  <circle cx="422" cy="458" r="2.5" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="402" cy="480" rx="8" ry="5" fill="#616161"/>
  <!-- 嘴 -->
  <path d="M395 490 Q402 498 410 490" fill="none" stroke="#616161" stroke-width="2"/>
  <!-- 尾巴 - 9形弯卷 -->
  <path d="M684 560 Q730 540 740 510 Q750 470 720 450 Q700 440 690 460 Q680 480 700 500 Q710 510 720 505" fill="none" stroke="#BDBDBD" stroke-width="10" stroke-linecap="round"/>
</svg>