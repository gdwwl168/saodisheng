<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient>
  </defs>
  <!-- 卡片背景 -->
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">27=彩旗</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">2像旗面弯弯飘，7是旗杆直直立</text>

  <!-- 旗杆1 - 7形 -->
  <line x1="200" y1="250" x2="200" y2="850" stroke="#795548" stroke-width="12" stroke-linecap="round"/>
  <circle cx="200" cy="245" r="10" fill="#FFD54F"/>

  <!-- 旗杆2 -->
  <line x1="512" y1="300" x2="512" y2="850" stroke="#795548" stroke-width="12" stroke-linecap="round"/>
  <circle cx="512" cy="295" r="10" fill="#FFD54F"/>

  <!-- 旗杆3 -->
  <line x1="824" y1="230" x2="824" y2="850" stroke="#795548" stroke-width="12" stroke-linecap="round"/>
  <circle cx="824" cy="225" r="10" fill="#FFD54F"/>

  <!-- 旗面1 - 2形波浪（红色） -->
  <path d="M200 300 Q240 270 280 300 Q320 330 360 300" fill="none" stroke="#F44336" stroke-width="3"/>
  <path d="M200 305 Q240 275 280 305 Q320 335 360 305" fill="none" stroke="#F44336" stroke-width="3" opacity="0.5"/>
  <path d="M200 310 Q240 280 280 310 Q320 340 360 310" fill="none" stroke="#F44336" stroke-width="3" opacity="0.3"/>
  <!-- 旗面 -->
  <path d="M200 300 Q280 330 360 300 L360 400 Q280 430 200 400Z" fill="#F44336" opacity="0.75"/>

  <!-- 旗面2 - 2形波浪（蓝色） -->
  <path d="M512 340 Q560 310 620 340 Q680 370 740 340" fill="none" stroke="#2196F3" stroke-width="3"/>
  <path d="M512 345 Q560 315 620 345 Q680 375 740 345" fill="none" stroke="#2196F3" stroke-width="3" opacity="0.5"/>
  <path d="M512 350 Q560 320 620 350 Q680 380 740 350" fill="none" stroke="#2196F3" stroke-width="3" opacity="0.3"/>
  <path d="M512 340 Q620 370 740 340 L740 440 Q620 470 512 440Z" fill="#2196F3" opacity="0.7"/>

  <!-- 旗面3 - 2形波浪（绿色） -->
  <path d="M824 290 Q870 260 920 290 Q960 320 990 290" fill="none" stroke="#4CAF50" stroke-width="3"/>
  <path d="M824 295 Q870 265 920 295 Q960 325 990 295" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.5"/>
  <path d="M824 300 Q870 270 920 300 Q960 330 990 300" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.3"/>
  <path d="M824 290 Q920 320 990 290 L990 390 Q920 420 824 390Z" fill="#4CAF50" opacity="0.65"/>

  <!-- 彩旗之间拉绳 -->
  <path d="M210 280 Q356 320 502 330 Q668 320 814 260" fill="none" stroke="#FFD54F" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- 彩带 -->
  <path d="M200 250 Q190 220 210 200" fill="none" stroke="#FF9800" stroke-width="3"/>
  <path d="M512 300 Q500 260 520 230" fill="none" stroke="#9C27B0" stroke-width="3"/>
  <path d="M824 240 Q810 200 830 180" fill="none" stroke="#00BCD4" stroke-width="3"/>

  <!-- 云朵 -->
  <ellipse cx="350" cy="210" rx="40" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="680" cy="220" rx="35" ry="15" fill="white" opacity="0.4"/>
</svg>