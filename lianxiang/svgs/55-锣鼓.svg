<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">55=锣鼓</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">5像鼓面弯弯绷，5是锣面圆圆敲</text>
  <!-- 大鼓身 - 5形 -->
  <ellipse cx="420" cy="650" rx="140" ry="160" fill="#BF360C"/>
  <ellipse cx="420" cy="650" rx="130" ry="150" fill="#D84315"/>
  <!-- 鼓面 -->
  <ellipse cx="420" cy="520" rx="140" ry="30" fill="#FFCC80"/>
  <ellipse cx="420" cy="780" rx="140" ry="30" fill="#FFCC80"/>
  <!-- 鼓钉 -->
  <circle cx="300" cy="520" r="6" fill="#FFD54F"/>
  <circle cx="340" cy="510" r="6" fill="#FFD54F"/>
  <circle cx="380" cy="507" r="6" fill="#FFD54F"/>
  <circle cx="420" cy="505" r="6" fill="#FFD54F"/>
  <circle cx="460" cy="507" r="6" fill="#FFD54F"/>
  <circle cx="500" cy="510" r="6" fill="#FFD54F"/>
  <circle cx="540" cy="520" r="6" fill="#FFD54F"/>
  <!-- 鼓槌 -->
  <line x1="350" y1="440" x2="420" y2="505" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <circle cx="350" cy="435" r="10" fill="#5D4037"/>
  <line x1="500" y1="420" x2="460" y2="500" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <circle cx="505" cy="415" r="10" fill="#5D4037"/>
  <!-- 小锣 - 5形圆 -->
  <circle cx="740" cy="500" r="60" fill="#FFD54F" stroke="#F9A825" stroke-width="4"/>
  <circle cx="740" cy="500" r="50" fill="#FFECB3"/>
  <circle cx="740" cy="500" r="10" fill="#F9A825"/>
  <!-- 锣槌 -->
  <line x1="740" y1="560" x2="740" y2="640" stroke="#795548" stroke-width="6" stroke-linecap="round"/>
  <circle cx="740" cy="648" r="8" fill="#5D4037"/>
  <!-- 震动线 -->
  <path d="M800 460 Q820 440 810 410" fill="none" stroke="#F9A825" stroke-width="2" opacity="0.3"/>
  <path d="M805 475 Q835 455 820 420" fill="none" stroke="#F9A825" stroke-width="2" opacity="0.2"/>
</svg>