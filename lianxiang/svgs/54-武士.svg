<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">54=武士</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">5像铠甲弯弯护，4是头盔三角坚</text>
  <!-- 身体 -->
  <rect x="350" y="450" width="324" height="300" rx="15" fill="#455A64"/>
  <!-- 铠甲片 -->
  <rect x="370" y="470" width="284" height="40" rx="5" fill="#546E7A"/>
  <rect x="370" y="520" width="284" height="40" rx="5" fill="#607D8B"/>
  <rect x="370" y="570" width="284" height="40" rx="5" fill="#546E7A"/>
  <rect x="370" y="620" width="284" height="40" rx="5" fill="#607D8B"/>
  <rect x="370" y="670" width="284" height="40" rx="5" fill="#546E7A"/>
  <!-- 腰带 -->
  <rect x="350" y="640" width="324" height="16" fill="#F9A825"/>
  <!-- 头部 -->
  <circle cx="512" cy="360" r="45" fill="#FFCCBC"/>
  <!-- 头盔 - 4形三角 -->
  <path d="M420 350 L512 230 L604 350" fill="#607D8B" stroke="#455A64" stroke-width="3"/>
  <rect x="420" y="340" width="184" height="15" rx="4" fill="#78909C"/>
  <!-- 盔缨 -->
  <path d="M512 230 Q512 200 520 180" fill="none" stroke="#F44336" stroke-width="6"/>
  <text x="520" y="175" font-size="24" fill="#F44336">🏹</text>
  <!-- 护肩 - 5形弯 -->
  <path d="M350 430 Q320 450 330 490 Q340 530 380 520" fill="none" stroke="#78909C" stroke-width="12" stroke-linecap="round"/>
  <path d="M674 430 Q704 450 694 490 Q684 530 644 520" fill="none" stroke="#78909C" stroke-width="12" stroke-linecap="round"/>
  <!-- 剑 -->
  <line x1="674" y1="500" x2="760" y2="380" stroke="#B0BEC5" stroke-width="6" stroke-linecap="round"/>
  <rect x="750" y="370" width="20" height="30" rx="4" fill="#FFD54F"/>
</svg>