<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">69=鹿角</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">6像角根圆圆粗，9是角杈弯弯伸</text>
  <!-- 角干 - 9形弯 -->
  <path d="M350 600 Q330 550 340 480 Q350 420 380 380 Q410 340 440 320" fill="none" stroke="#8D6E63" stroke-width="20" stroke-linecap="round"/>
  <!-- 分叉1 - 6形弯 -->
  <path d="M370 420 Q400 390 430 370 Q460 350 500 340" fill="none" stroke="#8D6E63" stroke-width="14" stroke-linecap="round"/>
  <path d="M430 370 Q440 340 460 330" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>
  <!-- 分叉2 -->
  <path d="M390 380 Q420 360 460 350" fill="none" stroke="#8D6E63" stroke-width="12" stroke-linecap="round"/>
  <!-- 角基 - 6形圆 -->
  <ellipse cx="340" cy="620" rx="35" ry="20" fill="#8D6E63"/>
  <ellipse cx="340" cy="620" rx="25" ry="14" fill="#A1887F"/>
  <!-- 纹理 -->
  <line x1="345" y1="580" x2="355" y2="590" stroke="#6D4C41" stroke-width="1.5" opacity="0.5"/>
  <line x1="355" y1="550" x2="365" y2="560" stroke="#6D4C41" stroke-width="1.5" opacity="0.5"/>
  <line x1="365" y1="520" x2="375" y2="530" stroke="#6D4C41" stroke-width="1.5" opacity="0.5"/>
  <!-- 右角对称 -->
  <path d="M674 600 Q694 550 684 480 Q674 420 644 380 Q614 340 584 320" fill="none" stroke="#8D6E63" stroke-width="20" stroke-linecap="round"/>
  <path d="M654 420 Q624 390 594 370 Q564 350 524 340" fill="none" stroke="#8D6E63" stroke-width="14" stroke-linecap="round"/>
  <path d="M594 370 Q584 340 564 330" fill="none" stroke="#8D6E63" stroke-width="8" stroke-linecap="round"/>
  <path d="M634 380 Q604 360 564 350" fill="none" stroke="#8D6E63" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="684" cy="620" rx="35" ry="20" fill="#8D6E63"/>
  <ellipse cx="684" cy="620" rx="25" ry="14" fill="#A1887F"/>
  <!-- 装饰 -->
  <text x="512" y="330" text-anchor="middle" font-size="30" fill="#8D6E63" opacity="0.3">🦌</text>
