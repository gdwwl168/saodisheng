<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="whistleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="30%" stop-color="#C0C0C0"/>
      <stop offset="70%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <linearGradient id="whistleTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#B8B8B8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Whistle body = number 9 (curved body) -->
  <g transform="translate(400, 420)">
    <!-- Main whistle tube -->
    <path d="M 60,-80 Q 100,-100 120,-60 Q 140,-20 120,30 Q 100,80 60,100 Q 20,110 -10,90 Q -40,70 -50,40 Q -60,10 -50,-20 Q -40,-50 -10,-70 Q 10,-80 40,-75"
          fill="url(#whistleGrad)" stroke="#606060" stroke-width="2"/>

    <!-- Whistle top highlight -->
    <path d="M 10,-75 Q 40,-80 70,-75 Q 100,-65 110,-40" fill="none" stroke="white" stroke-width="5" opacity="0.25" stroke-linecap="round"/>

    <!-- Mouthpiece/blowing end = number 0 -->
    <ellipse cx="-55" cy="10" rx="20" ry="30" fill="#505050"/>
    <ellipse cx="-55" cy="10" rx="15" ry="25" fill="#303030"/>
    <!-- Mouthpiece opening -->
    <ellipse cx="-58" cy="10" rx="6" ry="18" fill="#151515"/>

    <!-- Ring for lanyard = part of 9 -->
    <circle cx="80" cy="-85" r="18" fill="none" stroke="#909090" stroke-width="5"/>
    <circle cx="80" cy="-85" r="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Sound waves emanating from the whistle -->
  <g fill="none" stroke="#FF9933" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
    <path d="M 250,430 Q 220,430 220,430"/>
    <path d="M 230,410 Q 180,410 160,400"/>
    <path d="M 230,450 Q 180,450 160,460"/>
    <path d="M 240,390 Q 170,380 130,360"/>
    <path d="M 240,470 Q 170,480 130,500"/>
  </g>
  <!-- Music notes -->
  <g fill="#FF9933" opacity="0.6">
    <circle cx="170" cy="370" r="6"/>
    <line x1="176" y1="370" x2="176" y2="330" stroke="#FF9933" stroke-width="2"/>
    <line x1="176" y1="330" x2="186" y2="335" stroke="#FF9933" stroke-width="2"/>

    <circle cx="140" cy="510" r="5"/>
    <line x1="145" y1="510" x2="145" y2="475" stroke="#FF9933" stroke-width="1.8"/>
    <line x1="145" y1="475" x2="153" y2="478" stroke="#FF9933" stroke-width="1.8"/>
  </g>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">09=口哨</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">0像哨口圆圆吹，9是哨背弯弯挂</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
