<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">87=白旗</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">8像旗面弯弯飘，7是旗杆直直立</text>
  <!-- 旗杆 - 7形直 -->
  <line x1="512" y1="250" x2="512" y2="850" stroke="#8D6E63" stroke-width="12" stroke-linecap="round"/>
  <circle cx="512" cy="245" r="10" fill="#FFD54F"/>
  <!-- 白旗 - 8形飘 -->
  <path d="M512 300 Q620 260 680 320 Q740 380 680 440 Q620 500 512 460" fill="#ECEFF1" stroke="#CFD8DC" stroke-width="2"/>
  <path d="M512 310 Q610 280 660 340 Q710 400 660 440 Q610 480 512 440" fill="#FAFAFA"/>
  <!-- 旗面褶皱 -->
  <path d="M550 330 Q580 360 560 400" fill="none" stroke="#EEEEEE" stroke-width="2" opacity="0.5"/>
  <path d="M600 340 Q630 370 610 410" fill="none" stroke="#EEEEEE" stroke-width="2" opacity="0.5"/>
  <!-- 底座 -->
  <rect x="480" y="855" width="64" height="30" rx="6" fill="#9E9E9E"/>
  <!-- 云朵 -->
  <ellipse cx="350" cy="350" rx="45" ry="15" fill="white" opacity="0.3"/>
</svg>