<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">65=老屋</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">6像屋顶圆圆拱，5是烟囱弯弯冒</text>
  <!-- 屋身 -->
  <rect x="250" y="480" width="524" height="350" rx="8" fill="#FFE082"/>
  <rect x="260" y="490" width="504" height="330" rx="6" fill="#FFF9C4"/>
  <!-- 屋顶 - 6形拱 -->
  <path d="M220 510 Q512 380 804 510 Q804 530 220 530Z" fill="#D32F2F"/>
  <path d="M240 505 Q512 390 784 505 L784 515 Q512 400 240 515Z" fill="#F44336"/>
  <!-- 屋顶瓦片纹理 -->
  <path d="M300 480 Q512 410 724 480" fill="none" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
  <path d="M350 460 Q512 400 674 460" fill="none" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
  <!-- 烟囱 - 5形弯 -->
  <rect x="600" y="360" width="40" height="100" rx="4" fill="#795548"/>
  <rect x="595" y="350" width="50" height="15" rx="4" fill="#8D6E63"/>
  <!-- 炊烟 -->
  <path d="M620 350 Q600 310 625 280 Q650 250 620 220" fill="none" stroke="#BCAAA4" stroke-width="5" opacity="0.4"/>
  <ellipse cx="615" cy="210" rx="15" ry="10" fill="#D7CCC8" opacity="0.2"/>
  <!-- 门 -->
  <rect x="440" y="600" width="144" height="230" rx="6" fill="#5D4037"/>
  <circle cx="570" cy="720" r="6" fill="#FFD54F"/>
  <!-- 窗户 -->
  <rect x="310" y="550" width="80" height="80" rx="4" fill="#BBDEFB" stroke="#5D4037" stroke-width="3"/>
  <line x1="350" y1="550" x2="350" y2="630" stroke="#5D4037" stroke-width="2"/>
  <line x1="310" y1="590" x2="390" y2="590" stroke="#5D4037" stroke-width="2"/>
  <!-- 右窗 -->
  <rect x="634" y="550" width="80" height="80" rx="4" fill="#BBDEFB" stroke="#5D4037" stroke-width="3"/>
  <line x1="674" y1="550" x2="674" y2="630" stroke="#5D4037" stroke-width="2"/>
  <line x1="634" y1="590" x2="714" y2="590" stroke="#5D4037" stroke-width="2"/>
  <!-- 小树 -->
  <circle cx="200" cy="550" r="25" fill="#66BB6A" opacity="0.5"/>
  <rect x="196" y="550" width="8" height="25" fill="#5D4037" opacity="0.6"/>
</svg>