<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="50%" stop-color="#C68A4A"/>
      <stop offset="100%" stop-color="#7A4A20"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Floor shadow -->
  <ellipse cx="400" cy="640" rx="160" ry="20" fill="#DDD" opacity="0.4"/>

  <!-- Chair legs = number 1 (four straight legs) -->
  <g stroke="url(#woodGrad)" stroke-width="14" stroke-linecap="round">
    <!-- Back legs -->
    <line x1="270" y1="320" x2="250" y2="620"/>
    <line x1="530" y1="320" x2="550" y2="620"/>
    <!-- Front legs -->
    <line x1="330" y1="350" x2="310" y2="630"/>
    <line x1="470" y1="350" x2="490" y2="630"/>
  </g>
  <!-- Leg highlights -->
  <g stroke="#D4A868" stroke-width="4" stroke-linecap="round" opacity="0.3">
    <line x1="268" y1="330" x2="248" y2="600"/>
    <line x1="332" y1="360" x2="312" y2="610"/>
  </g>

  <!-- Chair seat -->
  <path d="M 240,340 L 560,340 L 530,370 L 270,370 Z" fill="#A07030" stroke="#7A4A20" stroke-width="2"/>
  <path d="M 240,340 L 560,340 L 530,370 L 270,370 Z" fill="url(#woodGrad)" opacity="0.7"/>

  <!-- Chair back = number 2 (curved backrest) -->
  <path d="M 250,340 Q 250,240 320,200 Q 400,160 480,200 Q 550,240 550,340"
        fill="none" stroke="url(#woodGrad)" stroke-width="18" stroke-linecap="round"/>
  <!-- Back highlight -->
  <path d="M 255,340 Q 255,250 325,210 Q 400,175 475,210 Q 545,250 545,340"
        fill="none" stroke="#D4A868" stroke-width="4" opacity="0.3"/>

  <!-- Chair back spindles -->
  <g stroke="#A07030" stroke-width="6" stroke-linecap="round" opacity="0.6">
    <line x1="320" y1="330" x2="300" y2="240"/>
    <line x1="400" y1="330" x2="400" y2="200"/>
    <line x1="480" y1="330" x2="500" y2="240"/>
  </g>

  <!-- Seat cushion -->
  <rect x="255" y="325" width="290" height="20" rx="5" fill="#D4A868" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">12=椅儿</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">1像椅腿直直立，2是椅背弯弯靠</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
