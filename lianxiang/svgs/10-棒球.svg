<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="batGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A1A0A"/>
      <stop offset="20%" stop-color="#5A3A1A"/>
      <stop offset="50%" stop-color="#8B6B3A"/>
      <stop offset="80%" stop-color="#5A3A1A"/>
      <stop offset="100%" stop-color="#3A2010"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E0D0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Baseball bat = number 1 -->
  <g transform="translate(350, 300) rotate(-30, 350, 300)">
    <!-- Bat handle -->
    <rect x="420" y="-15" width="120" height="30" rx="6" fill="#3A2010"/>
    <!-- Handle grip tape -->
    <g stroke="#2A1A0A" stroke-width="3" opacity="0.5">
      <line x1="430" y1="-15" x2="425" y2="15"/>
      <line x1="445" y1="-15" x2="440" y2="15"/>
      <line x1="460" y1="-15" x2="455" y2="15"/>
      <line x1="475" y1="-15" x2="470" y2="15"/>
      <line x1="490" y1="-15" x2="485" y2="15"/>
      <line x1="505" y1="-15" x2="500" y2="15"/>
      <line x1="520" y1="-15" x2="515" y2="15"/>
    </g>
    <!-- Handle end knob -->
    <rect x="540" y="-18" width="20" height="36" rx="8" fill="#2A1A0A"/>

    <!-- Bat barrel -->
    <path d="M -10,-20 L 80,-22 Q 150,-20 200,-10 Q 250,0 350,0 Q 420,0 420,-15 L 420,15 Q 350,0 250,0 Q 150,20 80,22 Q 30,20 -10,20 Z"
          fill="url(#batGrad)" stroke="#2A1A0A" stroke-width="1.5"/>
    <!-- Bat highlight -->
    <path d="M -10,-8 L 150,-8 Q 250,0 350,0" fill="none" stroke="white" stroke-width="3" opacity="0.15"/>
  </g>

  <!-- Baseball = number 0 -->
  <g transform="translate(450, 460)">
    <!-- Motion lines behind ball showing it's flying -->
    <g stroke="#CCC" stroke-width="2" stroke-linecap="round" opacity="0.4">
      <line x1="-100" y1="-20" x2="-55" y2="-10"/>
      <line x1="-110" y1="0" x2="-60" y2="0"/>
      <line x1="-100" y1="20" x2="-55" y2="10"/>
    </g>

    <!-- Main ball -->
    <circle cx="0" cy="0" r="55" fill="url(#ballGrad)" stroke="#CCC0B0" stroke-width="2"/>

    <!-- Baseball stitches - red curved lines -->
    <g fill="none" stroke="#CC3333" stroke-width="3" stroke-linecap="round">
      <!-- Left seam -->
      <path d="M -50,-23 Q -30,-50 0,-52 Q 30,-50 50,-23"/>
      <path d="M -50,23 Q -30,50 0,52 Q 30,50 50,23"/>
    </g>
    <!-- Stitch marks -->
    <g stroke="#CC3333" stroke-width="2" stroke-linecap="round">
      <line x1="-45" y1="-30" x2="-40" y2="-35"/>
      <line x1="-38" y1="-38" x2="-32" y2="-42"/>
      <line x1="-30" y1="-45" x2="-23" y2="-48"/>
      <line x1="-15" y1="-50" x2="-8" y2="-52"/>
      <line x1="8" y1="-52" x2="15" y2="-50"/>
      <line x1="23" y1="-48" x2="30" y2="-45"/>
      <line x1="32" y1="-42" x2="38" y2="-38"/>
      <line x1="40" y1="-35" x2="45" y2="-30"/>

      <line x1="-45" y1="30" x2="-40" y2="35"/>
      <line x1="-38" y1="38" x2="-32" y2="42"/>
      <line x1="-30" y1="45" x2="-23" y2="48"/>
      <line x1="-15" y1="50" x2="-8" y2="52"/>
      <line x1="8" y1="52" x2="15" y2="50"/>
      <line x1="23" y1="48" x2="30" y2="45"/>
      <line x1="32" y1="42" x2="38" y2="38"/>
      <line x1="40" y1="35" x2="45" y2="30"/>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">10=棒球</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">1像球棒直直挥，0是棒球圆圆飞</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
