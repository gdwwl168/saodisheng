<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFEE88" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFCC44" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFCC44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wax" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="50%" stop-color="#FFFAF0"/>
      <stop offset="100%" stop-color="#F5E6CC"/>
    </linearGradient>
    <linearGradient id="candleBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A860"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#1a1a2e"/>

  <!-- Flame glow -->
  <circle cx="400" cy="260" r="120" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="400" cy="260" r="70" fill="#FFDD55" opacity="0.15"/>

  <!-- Candle base / holder = number 0 -->
  <ellipse cx="400" cy="620" rx="100" ry="30" fill="#8B6914" opacity="0.3"/>
  <g transform="translate(400, 550)">
    <ellipse cx="0" cy="30" rx="75" ry="22" fill="url(#candleBase)"/>
    <rect x="-75" y="0" width="150" height="30" rx="5" fill="url(#candleBase)"/>
    <ellipse cx="0" cy="0" rx="75" ry="22" fill="#C49840"/>
    <!-- Base plate -->
    <ellipse cx="0" cy="35" rx="90" ry="14" fill="#A07020"/>
    <ellipse cx="0" cy="40" rx="100" ry="12" fill="#8B6914"/>
  </g>

  <!-- Candle body = number 1 -->
  <rect x="380" y="300" width="40" height="250" rx="3" fill="url(#wax)"/>
  <!-- Wax highlight -->
  <rect x="383" y="300" width="8" height="250" fill="white" opacity="0.5"/>
  <rect x="415" y="300" width="4" height="250" fill="#DDD0B0" opacity="0.4"/>

  <!-- Wax drips -->
  <path d="M 380,380 Q 375,420 380,450 Q 383,440 384,400 Z" fill="#F5E6CC" opacity="0.8"/>
  <path d="M 420,340 Q 425,380 420,410 Q 417,400 416,360 Z" fill="#F5E6CC" opacity="0.7"/>
  <ellipse cx="382" cy="320" rx="4" ry="18" fill="#F0DDC0" opacity="0.6"/>

  <!-- Flame -->
  <g transform="translate(400, 270)">
    <ellipse cx="0" cy="-45" rx="8" ry="18" fill="#FFFFFF" opacity="0.9"/>
    <path d="M 0,-65 Q 12,-20 0,5 Q -12,-20 0,-65 Z" fill="#FFDD44"/>
    <path d="M 0,-55 Q 7,-15 0,0 Q -7,-15 0,-55 Z" fill="#FF9933"/>
    <path d="M 0,-40 Q 4,-15 0,-5 Q -4,-15 0,-40 Z" fill="#FF4400" opacity="0.7"/>
    <!-- Wick -->
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- Light rays -->
  <g stroke="#FFDD66" stroke-width="1.5" opacity="0.3">
    <line x1="400" y1="230" x2="400" y2="200"/>
    <line x1="440" y1="250" x2="460" y2="235"/>
    <line x1="360" y1="250" x2="340" y2="235"/>
    <line x1="450" y1="280" x2="475" y2="275"/>
    <line x1="350" y1="280" x2="325" y2="275"/>
  </g>

  <!-- Title -->
  <text x="400" y="110" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#FFEECC">01=蜡烛</text>

  <!-- Subtitle -->
  <text x="400" y="710" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#CCBBAA">0像烛台圆圆座，1是蜡烛直直燃</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
