<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667EEA"/>
      <stop offset="100%" stop-color="#3B4CCA"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#CCC"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Device body = number 1 (straight tablet/screen) -->
  <rect x="320" y="180" width="160" height="220" rx="12" fill="url(#deviceGrad)" stroke="#666" stroke-width="2"/>
  <!-- Screen -->
  <rect x="330" y="195" width="140" height="160" rx="4" fill="url(#screenGrad)"/>
  <!-- Screen content - EKG/heartbeat line -->
  <path d="M 340,300 L 360,300 L 365,280 L 370,320 L 375,260 L 380,300 L 460,300"
        fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screen data dots -->
  <g fill="#00FF88" opacity="0.7">
    <circle cx="345" cy="280" r="2"/>
    <circle cx="355" cy="270" r="2"/>
    <circle cx="450" cy="275" r="2"/>
  </g>

  <!-- Home button -->
  <circle cx="400" cy="390" r="4" fill="#AAA"/>
  <!-- Camera dot -->
  <circle cx="400" cy="188" r="3" fill="#444"/>

  <!-- Measurement calipers = number 7 (curved measuring tool) -->
  <g transform="translate(560, 320)">
    <path d="M 0,0 Q -20,-80 -10,-120 Q 0,-150 20,-160"
          fill="none" stroke="#888" stroke-width="6" stroke-linecap="round"/>
    <path d="M 0,0 Q -20,-80 -10,-120 Q 0,-150 20,-160"
          fill="none" stroke="#CCC" stroke-width="3" opacity="0.5"/>
    <!-- Metal tips -->
    <circle cx="0" cy="0" r="5" fill="#666"/>
    <circle cx="20" cy="-160" r="4" fill="#666"/>
  </g>

  <!-- Ruler at bottom -->
  <rect x="180" y="580" width="440" height="30" rx="3" fill="#F5F0E8" stroke="#CCC" stroke-width="1.5"/>
  <g stroke="#999" stroke-width="1">
    <line x1="200" y1="580" x2="200" y2="595"/>
    <line x1="220" y1="580" x2="220" y2="590"/>
    <line x1="240" y1="580" x2="240" y2="595"/>
    <line x1="260" y1="580" x2="260" y2="590"/>
    <line x1="280" y1="580" x2="280" y2="595"/>
    <line x1="300" y1="580" x2="300" y2="590"/>
    <line x1="320" y1="580" x2="320" y2="595"/>
    <line x1="340" y1="580" x2="340" y2="590"/>
    <line x1="360" y1="580" x2="360" y2="595"/>
    <line x1="380" y1="580" x2="380" y2="590"/>
    <line x1="400" y1="580" x2="400" y2="595"/>
    <line x1="420" y1="580" x2="420" y2="590"/>
    <line x1="440" y1="580" x2="440" y2="595"/>
    <line x1="460" y1="580" x2="460" y2="590"/>
    <line x1="480" y1="580" x2="480" y2="595"/>
    <line x1="500" y1="580" x2="500" y2="590"/>
    <line x1="520" y1="580" x2="520" y2="595"/>
    <line x1="540" y1="580" x2="540" y2="590"/>
    <line x1="560" y1="580" x2="560" y2="595"/>
    <line x1="580" y1="580" x2="580" y2="590"/>
    <line x1="600" y1="580" x2="600" y2="595"/>
  </g>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">17=仪器</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">1像屏幕直直立，7是量尺弯弯测</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
