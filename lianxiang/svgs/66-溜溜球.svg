<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">66=溜溜球</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">6像线盘圆圆转，6是双轮快快溜</text>
  <!-- 绳子 -->
  <path d="M400 250 Q440 300 480 380 Q500 420 512 450" fill="none" stroke="#607D8B" stroke-width="3"/>
  <!-- 上轮 - 6形圆 -->
  <circle cx="480" cy="480" r="60" fill="#F44336"/>
  <circle cx="480" cy="480" r="50" fill="#EF5350"/>
  <circle cx="480" cy="480" r="15" fill="#B71C1C"/>
  <!-- 连接轴 -->
  <rect x="505" y="540" width="14" height="40" rx="4" fill="#607D8B"/>
  <!-- 下轮 - 6形圆 -->
  <circle cx="512" cy="640" r="60" fill="#F44336"/>
  <circle cx="512" cy="640" r="50" fill="#EF5350"/>
  <circle cx="512" cy="640" r="15" fill="#B71C1C"/>
  <!-- 高光 -->
  <ellipse cx="465" cy="460" rx="15" ry="10" fill="white" opacity="0.2"/>
  <ellipse cx="497" cy="620" rx="15" ry="10" fill="white" opacity="0.2"/>
  <!-- 运动弧线 -->
  <path d="M420 440 Q380 480 400 520" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <path d="M572 600 Q610 640 590 680" fill="none" stroke="#E53935" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- 手指 -->
  <circle cx="400" cy="250" r="25" fill="#FFCCBC"/>
  <path d="M390 240 Q380 235 385 225" fill="none" stroke="#FFCCBC" stroke-width="6" stroke-linecap="round"/>
</svg>