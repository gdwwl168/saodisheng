<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient>
    <radialGradient id="ball" cx="45%" cy="40%"><stop offset="0%" stop-color="#FF8A65"/><stop offset="60%" stop-color="#E64A19"/><stop offset="100%" stop-color="#BF360C"/></radialGradient>
  </defs>
  <!-- 卡片背景 -->
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">29=篮球</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">2像弧线弯弯投，9是篮网长长挂</text>

  <!-- 篮球场地板 -->
  <rect x="150" y="600" width="724" height="300" rx="8" fill="#FFECB3" opacity="0.3"/>

  <!-- 地板线条 -->
  <line x1="512" y1="600" x2="512" y2="900" stroke="#BCAAA4" stroke-width="3" opacity="0.3"/>

  <!-- 篮板 -->
  <rect x="700" y="250" width="16" height="120" rx="4" fill="#546E7A"/>
  <!-- 篮板面板 -->
  <rect x="680" y="250" width="40" height="80" rx="4" fill="white" stroke="#546E7A" stroke-width="2" opacity="0.8"/>
  <rect x="690" y="270" width="20" height="40" rx="3" fill="none" stroke="#F44336" stroke-width="2"/>

  <!-- 篮框 -->
  <ellipse cx="700" cy="350" rx="25" ry="8" fill="none" stroke="#F44336" stroke-width="4"/>

  <!-- 篮网 - 9形长长的 -->
  <path d="M675 350 Q670 370 672 400 Q674 430 678 450 Q682 470 686 480" fill="none" stroke="#ECEFF1" stroke-width="3" opacity="0.7"/>
  <path d="M700 358 Q700 380 700 410 Q700 440 700 460 Q700 480 700 490" fill="none" stroke="#ECEFF1" stroke-width="2.5" opacity="0.6"/>
  <path d="M725 350 Q730 370 728 400 Q726 430 722 450 Q718 470 714 480" fill="none" stroke="#ECEFF1" stroke-width="3" opacity="0.7"/>
  <!-- 篮网横向 -->
  <line x1="676" y1="400" x2="724" y2="398" stroke="#ECEFF1" stroke-width="2" opacity="0.5"/>
  <line x1="678" y1="430" x2="722" y2="428" stroke="#ECEFF1" stroke-width="2" opacity="0.4"/>
  <line x1="682" y1="455" x2="718" y2="452" stroke="#ECEFF1" stroke-width="2" opacity="0.3"/>

  <!-- 篮球 -->
  <circle cx="350" cy="550" r="80" fill="url(#ball)"/>
  <!-- 篮球纹理线 -->
  <path d="M350 470 Q400 550 350 630" fill="none" stroke="#2C1810" stroke-width="3" opacity="0.5"/>
  <path d="M275 510 Q350 480 425 510" fill="none" stroke="#2C1810" stroke-width="3" opacity="0.5"/>
  <path d="M275 590 Q350 620 425 590" fill="none" stroke="#2C1810" stroke-width="3" opacity="0.5"/>
  <!-- 篮球高光 -->
  <ellipse cx="325" cy="515" rx="20" ry="12" fill="white" opacity="0.2" transform="rotate(-30 325 515)"/>

  <!-- 投篮弧线 - 2形 -->
  <path d="M350 550 Q450 300 700 350" fill="none" stroke="#F44336" stroke-width="4" stroke-dasharray="10,6" opacity="0.6"/>

  <!-- 人物剪影 -->
  <circle cx="300" cy="720" r="20" fill="#8D6E63" opacity="0.5"/>
  <rect x="285" y="740" width="30" height="50" rx="8" fill="#8D6E63" opacity="0.5"/>
  <rect x="275" y="790" width="15" height="40" rx="5" fill="#8D6E63" opacity="0.5"/>
  <rect x="310" y="790" width="15" height="40" rx="5" fill="#8D6E63" opacity="0.5"/>

  <!-- 星星效果 -->
  <text x="730" y="290" font-size="30" fill="#F9A825" opacity="0.5">★</text>
</svg>