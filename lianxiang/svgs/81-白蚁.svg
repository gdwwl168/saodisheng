  <line x1="320" y1="550" x2="315" y2="565" stroke="#5D4037" stroke-width="2"/>
  <line x1="350" y1="540" x2="345" y2="555" stroke="#5D4037" stroke-width="2"/>
  <line x1="365" y1="540" x2="360" y2="558" stroke="#5D4037" stroke-width="2"/>
  <line x1="385" y1="535" x2="380" y2="552" stroke="#5D4037" stroke-width="2"/>
  <line x1="400" y1="535" x2="395" y2="555" stroke="#5D4037" stroke-width="2"/>
  <!-- 蚁路 - 1形直 -->
  <path d="M180 580 Q512 620 844 550" fill="none" stroke="#D7CCC8" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
