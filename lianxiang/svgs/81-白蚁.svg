  <ellipse cx="570" cy="517" rx="16" ry="15" fill="#5D4037"/>
  <ellipse cx="605" cy="515" rx="14" ry="13" fill="#5D4037"/>
  <!-- 蚂蚁3 -->
  <ellipse cx="700" cy="508" rx="16" ry="15" fill="#5D4037"/>
  <ellipse cx="730" cy="506" rx="13" ry="12" fill="#5D4037"/>
