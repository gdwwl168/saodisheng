<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">98=酒杯</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">9像杯口弯弯杯，8是美酒满满斟</text>
  <!-- 酒杯 - 9形弯 -->
  <ellipse cx="512" cy="480" rx="70" ry="15" fill="#B0BEC5"/>
  <path d="M442 480 Q440 530 460 580 Q480 600 490 620" fill="none" stroke="#B0BEC5" stroke-width="3"/>
  <path d="M582 480 Q584 530 564 580 Q544 600 534 620" fill="none" stroke="#B0BEC5" stroke-width="3"/>
  <!-- 杯身 -->
  <path d="M442 480 Q440 560 470 620 Q500 650 512 650 Q524 650 554 620 Q584 560 582 480" fill="#E3F2FD" stroke="#90A4AE" stroke-width="2"/>
  <!-- 酒液 - 8形满 -->
  <path d="M445 500 Q484 520 579 500 L579 550 Q544 610 512 620 Q480 610 445 550Z" fill="#FFC107" opacity="0.5"/>
  <path d="M448 510 Q484 525 576 510 L576 540 Q544 595 512 605 Q480 595 448 540Z" fill="#FFD54F" opacity="0.4"/>
  <!-- 杯脚 -->
  <rect x="500" y="650" width="24" height="40" rx="4" fill="#B0BEC5"/>
  <ellipse cx="512" cy="695" rx="50" ry="12" fill="#B0BEC5"/>
  <ellipse cx="512" cy="695" rx="40" ry="8" fill="#CFD8DC"/>
  <!-- 气泡 -->
  <circle cx="480" cy="520" r="4" fill="white" opacity="0.3"/>
  <circle cx="530" cy="540" r="3" fill="white" opacity="0.25"/>
  <circle cx="510" cy="570" r="3.5" fill="white" opacity="0.2"/>
  <!-- 碰杯效果 -->
  <text x="650" y="500" font-size="30" opacity="0.3">🥂</text>
</svg>