<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">56=蜗牛</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">5像蜗壳弯弯卷，6是壳纹圈圈绕</text>
  <!-- 叶片 -->
  <ellipse cx="400" cy="800" rx="250" ry="35" fill="#C8E6C9" opacity="0.5"/>
  <path d="M200 800 Q400 780 600 800" fill="none" stroke="#A5D6A7" stroke-width="2"/>
  <!-- 蜗壳 - 6形螺旋 -->
  <circle cx="480" cy="560" r="110" fill="#A1887F"/>
  <circle cx="480" cy="560" r="100" fill="#8D6E63"/>
  <!-- 螺旋纹 -->
  <path d="M480 460 Q560 460 560 520 Q560 630 480 660 Q380 630 380 560 Q380 500 450 480 Q510 460 530 520 Q540 570 480 590 Q430 600 420 560" fill="none" stroke="#D7CCC8" stroke-width="3" opacity="0.6"/>
  <!-- 身体 - 5形 -->
  <path d="M480 660 Q460 700 420 730 Q360 760 300 750 Q240 740 220 710 Q200 680 220 660 Q240 640 280 650 Q320 660 350 680" fill="#8BC34A" stroke="#7CB342" stroke-width="2"/>
  <!-- 头部 -->
  <circle cx="220" cy="650" r="20" fill="#9CCC65"/>
  <!-- 触角 -->
  <line x1="210" y1="635" x2="195" y2="610" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
  <circle cx="195" cy="608" r="3" fill="#2C1810"/>
  <line x1="225" y1="635" x2="235" y2="610" stroke="#7CB342" stroke-width="3" stroke-linecap="round"/>
  <circle cx="235" cy="608" r="3" fill="#2C1810"/>
  <!-- 眼睛 -->
  <circle cx="215" cy="645" r="3" fill="#2C1810"/>
  <!-- 黏液 -->
  <path d="M200 750 Q180 760 160 755" fill="none" stroke="#B2DFDB" stroke-width="2" opacity="0.4"/>
</svg>