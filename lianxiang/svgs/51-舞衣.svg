  <path d="M360 550 Q450 510 550 580" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.3"/>
  <path d="M340 620 Q450 570 600 650" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.3"/>
  <!-- 手臂 -->
