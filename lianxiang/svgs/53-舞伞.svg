<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">53=舞伞</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">5像伞面弯弯转，3是伞柄弯弯握</text>
  <!-- 伞柄 - 3形弯 -->
  <path d="M512 520 L512 760 Q512 800 540 830" fill="none" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
  <circle cx="540" cy="835" r="10" fill="#795548"/>
  <!-- 伞面 - 5形弯弧 -->
  <path d="M200 500 Q360 420 512 420 Q664 420 824 500 Q664 460 512 460 Q360 460 200 500Z" fill="#E91E63" opacity="0.7"/>
  <path d="M220 490 Q370 410 512 410 Q654 410 804 490 Q654 450 512 450 Q370 450 220 490Z" fill="#F06292" opacity="0.6"/>
  <!-- 伞面花纹 -->
  <path d="M240 480 Q380 440 512 440 Q644 440 784 480" fill="none" stroke="#FFD54F" stroke-width="2" opacity="0.4"/>
  <path d="M280 470 Q400 450 512 450 Q624 450 744 470" fill="none" stroke="#FFD54F" stroke-width="2" opacity="0.3"/>
  <!-- 伞尖 -->
  <circle cx="512" cy="410" r="8" fill="#FFD54F"/>
  <line x1="512" y1="402" x2="512" y2="380" stroke="#FFD54F" stroke-width="4" stroke-linecap="round"/>
  <!-- 旋转效果 -->
  <circle cx="512" cy="440" r="130" fill="none" stroke="#FF80AB" stroke-width="1.5" stroke-dasharray="8,8" opacity="0.3"/>
</svg>