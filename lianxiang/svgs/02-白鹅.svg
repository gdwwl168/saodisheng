<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
    <linearGradient id="gooseBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#F8F4EC"/>
      <stop offset="100%" stop-color="#E8DDD0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#1a1a2e"/>

  <!-- Water ripples -->
  <g fill="none" stroke="#4A8ABF" stroke-width="2" opacity="0.5">
    <path d="M 100,580 Q 200,570 300,580 Q 400,590 500,580 Q 600,570 700,580"/>
    <path d="M 80,610 Q 180,600 280,610 Q 380,620 480,610 Q 580,600 680,610"/>
    <path d="M 120,640 Q 220,630 320,640 Q 420,650 520,640 Q 620,630 720,640"/>
    <path d="M 90,670 Q 190,660 290,670 Q 390,680 490,670 Q 590,660 690,670"/>
    <path d="M 110,700 Q 210,690 310,700 Q 410,710 510,700 Q 610,690 710,700"/>
    <path d="M 60,730 Q 160,720 260,730 Q 360,740 460,730 Q 560,720 660,730"/>
  </g>

  <!-- Goose body reflection -->
  <ellipse cx="410" cy="600" rx="100" ry="20" fill="white" opacity="0.1"/>

  <!-- Goose body (waterline) -->
  <g transform="translate(380, 520)">
    <!-- Body -->
    <ellipse cx="10" cy="40" rx="110" ry="55" fill="url(#gooseBody)" stroke="#D4CCC0" stroke-width="1.5"/>
    <!-- Wing detail -->
    <path d="M 20,10 Q 80,-20 120,20 Q 80,40 20,50 Z" fill="#F0E8D8" stroke="#D4CCC0" stroke-width="1" opacity="0.7"/>
    <!-- Tail feathers -->
    <path d="M 110,20 Q 140,0 135,25 Q 145,10 130,35 Q 125,50 115,40 Z" fill="#F8F4EC" stroke="#D4CCC0" stroke-width="1"/>
  </g>

  <!-- Goose neck = number 2 -->
  <path d="M 400,500 Q 420,420 440,360 Q 455,320 440,290" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <path d="M 400,500 Q 420,420 440,360 Q 455,320 440,290" fill="none" stroke="#F8F4EC" stroke-width="26" stroke-linecap="round"/>
  <path d="M 400,500 Q 420,420 440,360 Q 455,320 440,290" fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Neck outline -->
  <path d="M 400,500 Q 420,420 440,360 Q 455,320 440,290" fill="none" stroke="#D4CCC0" stroke-width="29" stroke-linecap="round" opacity="0.3"/>

  <!-- Goose head = number 0 -->
  <circle cx="440" cy="265" r="35" fill="white" stroke="#D4CCC0" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="452" cy="258" r="5" fill="#222"/>
  <circle cx="454" cy="256" r="2" fill="white"/>
  <!-- Beak -->
  <polygon points="475,265 510,270 475,278" fill="#FF6B35"/>
  <line x1="475" y1="271" x2="505" y2="272" stroke="#E05525" stroke-width="1"/>

  <!-- Crown/top of head highlight -->
  <circle cx="440" cy="265" r="35" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#FFEECC">02=白鹅</text>

  <!-- Subtitle -->
  <text x="400" y="770" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#CCBBAA">0像鹅头圆圆昂，2像长颈弯弯唱</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
