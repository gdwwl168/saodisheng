<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BB5E8"/>
      <stop offset="60%" stop-color="#8DD4F7"/>
      <stop offset="100%" stop-color="#C8EDFF"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="hullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4956B"/>
      <stop offset="30%" stop-color="#C0784A"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <linearGradient id="sailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EDE0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="160" cy="160" rx="70" ry="28"/>
    <ellipse cx="210" cy="148" rx="55" ry="32"/>
    <ellipse cx="120" cy="152" rx="45" ry="22"/>

    <ellipse cx="560" cy="200" rx="60" ry="24"/>
    <ellipse cx="610" cy="190" rx="48" ry="28"/>
    <ellipse cx="530" cy="195" rx="38" ry="18"/>

    <ellipse cx="380" cy="120" rx="40" ry="18"/>
    <ellipse cx="415" cy="112" rx="35" ry="22"/>
  </g>

  <!-- Sun -->
  <circle cx="680" cy="130" r="50" fill="#FFE066"/>
  <circle cx="680" cy="130" r="40" fill="#FFD700"/>
  <g stroke="#FFE066" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="680" y1="60" x2="680" y2="45"/>
    <line x1="680" y1="200" x2="680" y2="215"/>
    <line x1="610" y1="130" x2="595" y2="130"/>
    <line x1="750" y1="130" x2="765" y2="130"/>
    <line x1="630" y1="80" x2="620" y2="70"/>
    <line x1="730" y1="180" x2="740" y2="190"/>
    <line x1="730" y1="80" x2="740" y2="70"/>
    <line x1="630" y1="180" x2="620" y2="190"/>
  </g>

  <!-- Seagulls -->
  <g stroke="#444" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 140,300 Q 152,288 170,294 Q 164,290 158,280"/>
    <path d="M 500,310 Q 512,298 530,304 Q 524,300 518,290"/>
  </g>

  <!-- Sea -->
  <rect x="20" y="440" width="760" height="340" fill="url(#seaGrad)"/>

  <!-- Wave lines -->
  <g fill="none" stroke="#44A6D6" stroke-width="2.5" opacity="0.5">
    <path d="M 20,470 Q 50,460 80,470 Q 110,480 140,470 Q 170,460 200,470 Q 230,480 260,470 Q 290,460 320,470 Q 350,480 380,470 Q 410,460 440,470 Q 470,480 500,470 Q 530,460 560,470 Q 590,480 620,470 Q 650,460 680,470 Q 710,480 740,470 Q 760,465 780,470"/>
    <path d="M 20,510 Q 55,500 90,510 Q 125,520 160,510 Q 195,500 230,510 Q 265,520 300,510 Q 335,500 370,510 Q 405,520 440,510 Q 475,500 510,510 Q 545,520 580,510 Q 615,500 650,510 Q 685,520 720,510 Q 750,505 780,510"/>
    <path d="M 20,550 Q 50,545 80,550 Q 110,555 140,550 Q 170,545 200,550 Q 230,555 260,550 Q 290,545 320,550 Q 350,555 380,550 Q 410,545 440,550 Q 470,555 500,550 Q 530,545 560,550 Q 590,555 620,550 Q 650,545 680,550 Q 710,555 740,550 Q 760,548 780,550"/>
  </g>

  <!-- Boat hull = number 0 -->
  <g transform="translate(400, 500)">
    <!-- Shadow under hull -->
    <ellipse cx="0" cy="65" rx="150" ry="25" fill="#0D3048" opacity="0.4"/>
    <!-- Main hull -->
    <path d="M -150,40 Q -160,60 -140,80 L 140,80 Q 160,60 150,40 Q 100,75 0,75 Q -100,75 -150,40 Z"
          fill="url(#hullGrad)" stroke="#5A2A0A" stroke-width="2"/>
    <!-- Hull top highlight -->
    <path d="M -140,42 Q -100,55 0,55 Q 100,55 140,42" fill="none" stroke="#DEB887" stroke-width="3" opacity="0.5"/>
    <!-- Plank lines -->
    <line x1="-140" y1="55" x2="140" y2="55" stroke="#8B5A30" stroke-width="1.5" opacity="0.4"/>
    <line x1="-142" y1="68" x2="142" y2="68" stroke="#8B5A30" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Mast -->
  <rect x="394" y="230" width="12" height="240" rx="3" fill="#8B5A30"/>
  <rect x="394" y="230" width="4" height="240" fill="#A07040" opacity="0.6"/>

  <!-- Main triangular sail = number 4 -->
  <g>
    <!-- Sail shadow -->
    <polygon points="395,250 540,480 430,480" fill="#D0C8B0" opacity="0.3"/>
    <!-- Sail -->
    <polygon points="400,250 530,470 400,470" fill="url(#sailGrad)" stroke="#C4B890" stroke-width="2"/>
    <!-- Sail curve -->
    <path d="M 400,250 Q 480,360 530,470" fill="none" stroke="#C4B890" stroke-width="1.5" opacity="0.5"/>
    <!-- Sail seam lines -->
    <line x1="400" y1="300" x2="480" y2="470" stroke="#D5CAA0" stroke-width="1" opacity="0.5"/>
    <line x1="400" y1="350" x2="455" y2="470" stroke="#D5CAA0" stroke-width="1" opacity="0.5"/>

    <!-- Small jib sail -->
    <polygon points="400,270 260,470 400,470" fill="#FFFAFA" stroke="#C4B890" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Flag at top -->
  <rect x="400" y="215" width="4" height="25" fill="#8B5A30"/>
  <polygon points="404,216 435,226 404,236" fill="#E74C3C"/>

  <!-- Water reflections -->
  <g fill="white" opacity="0.12">
    <rect x="300" y="560" width="70" height="4" rx="2"/>
    <rect x="340" y="580" width="90" height="4" rx="2"/>
    <rect x="260" y="600" width="60" height="4" rx="2"/>
    <rect x="360" y="620" width="80" height="4" rx="2"/>
    <rect x="280" y="650" width="50" height="4" rx="2"/>
  </g>

  <!-- Title -->
  <text x="400" y="85" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="42" font-weight="bold" fill="#1a1a2e">04=帆船</text>

  <!-- Subtitle -->
  <text x="400" y="770" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#334455">0像船身圆圆浮，4是船帆三角扬</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
