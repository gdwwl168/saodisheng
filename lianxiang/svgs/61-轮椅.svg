<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">61=轮椅</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">6像轮子圆圆转，1是座身直直靠</text>
  <!-- 大轮 - 6形 -->
  <circle cx="300" cy="650" r="100" fill="none" stroke="#546E7A" stroke-width="10"/>
  <circle cx="300" cy="650" r="70" fill="none" stroke="#78909C" stroke-width="3"/>
  <circle cx="300" cy="650" r="12" fill="#37474F"/>
  <!-- 轮辐 -->
  <line x1="300" y1="555" x2="300" y2="745" stroke="#78909C" stroke-width="3"/>
  <line x1="205" y1="650" x2="395" y2="650" stroke="#78909C" stroke-width="3"/>
  <line x1="232" y1="582" x2="368" y2="718" stroke="#78909C" stroke-width="3"/>
  <line x1="368" y1="582" x2="232" y2="718" stroke="#78909C" stroke-width="3"/>
  <!-- 小轮 -->
  <circle cx="650" cy="750" r="45" fill="none" stroke="#546E7A" stroke-width="8"/>
  <circle cx="650" cy="750" r="30" fill="none" stroke="#78909C" stroke-width="2"/>
  <circle cx="650" cy="750" r="6" fill="#37474F"/>
  <!-- 座架 - 1形直靠背 -->
  <line x1="300" y1="650" x2="500" y2="550" stroke="#546E7A" stroke-width="8"/>
  <line x1="420" y1="570" x2="650" y2="750" stroke="#546E7A" stroke-width="6"/>
  <rect x="380" y="480" width="80" height="90" rx="10" fill="#455A64" opacity="0.8"/>
  <rect x="380" y="460" width="80" height="20" rx="8" fill="#607D8B"/>
  <!-- 扶手 -->
  <line x1="380" y1="480" x2="340" y2="500" stroke="#607D8B" stroke-width="8" stroke-linecap="round"/>
  <!-- 脚踏 -->
  <line x1="420" y1="580" x2="440" y2="680" stroke="#607D8B" stroke-width="4"/>
  <rect x="430" y="680" width="40" height="8" rx="4" fill="#607D8B"/>
</svg>