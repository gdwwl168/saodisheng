<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">64=柳丝</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">6像柳条弯弯垂，4是柳叶尖尖飘</text>
  <!-- 树干 -->
  <rect x="490" y="280" width="44" height="250" rx="10" fill="#6D4C41"/>
  <path d="M500 280 Q510 240 520 280 Q530 230 540 280" fill="#6D4C41" opacity="0.5"/>
  <!-- 柳条 - 6形弯曲 -->
  <path d="M440 350 Q400 420 430 500 Q460 580 420 660 Q380 720 390 780" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <path d="M470 340 Q440 400 460 480 Q480 560 450 630 Q420 690 430 760" fill="none" stroke="#81C784" stroke-width="3"/>
  <path d="M510 330 Q520 400 500 480 Q480 560 510 630 Q540 690 530 760" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <path d="M550 340 Q580 400 560 480 Q540 560 570 630 Q600 690 590 760" fill="none" stroke="#81C784" stroke-width="3"/>
  <path d="M580 350 Q600 420 580 500 Q560 580 590 650 Q620 710 600 780" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <!-- 柳叶 - 4形尖 -->
  <ellipse cx="420" cy="550" rx="20" ry="5" fill="#A5D6A7" transform="rotate(30 420 550)"/>
  <ellipse cx="450" cy="600" rx="18" ry="4" fill="#A5D6A7" transform="rotate(25 450 600)"/>
  <ellipse cx="500" cy="580" rx="20" ry="5" fill="#A5D6A7" transform="rotate(-20 500 580)"/>
  <ellipse cx="570" cy="620" rx="18" ry="4" fill="#A5D6A7" transform="rotate(-30 570 620)"/>
  <ellipse cx="540" cy="560" rx="16" ry="4" fill="#A5D6A7" transform="rotate(15 540 560)"/>
  <ellipse cx="400" cy="680" rx="18" ry="4" fill="#C8E6C9" transform="rotate(20 400 680)"/>
  <ellipse cx="560" cy="700" rx="16" ry="4" fill="#C8E6C9" transform="rotate(-15 560 700)"/>
  <!-- 水面倒影 -->
  <ellipse cx="500" cy="800" rx="100" ry="15" fill="#C8E6C9" opacity="0.2"/>
  <!-- 小鸟 -->
  <path d="M650 350 Q660 342 670 350" fill="none" stroke="#90A4AE" stroke-width="2" opacity="0.4"/>
</svg>