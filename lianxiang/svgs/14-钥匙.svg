<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="40%" stop-color="#E8B800"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="keyShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Key shadow -->
  <ellipse cx="415" cy="600" rx="100" ry="15" fill="#DDD" opacity="0.3"/>

  <!-- Key shaft = number 1 (straight) -->
  <rect x="385" y="250" width="16" height="320" rx="4" fill="url(#keyGrad)"/>
  <!-- Shaft highlight -->
  <rect x="387" y="250" width="5" height="320" fill="white" opacity="0.3"/>

  <!-- Key teeth/bittings shaped as "1" and "4" patterns -->
  <g fill="url(#keyGrad)">
    <!-- "1" shaped tooth -->
    <rect x="370" y="380" width="15" height="25" rx="2"/>
    <rect x="375" y="410" width="10" height="18" rx="2"/>
    <!-- Gap -->
    <rect x="368" y="440" width="17" height="15" fill="#FFF8F0"/>
    <!-- "4" shaped teeth -->
    <rect x="370" y="460" width="15" height="40" rx="2"/>
    <rect x="395" y="470" width="15" height="15" rx="2"/>
    <rect x="395" y="490" width="15" height="10" rx="2"/>
  </g>
  <!-- Tooth highlights -->
  <rect x="372" y="382" width="4" height="20" fill="white" opacity="0.15"/>
  <rect x="372" y="462" width="4" height="35" fill="white" opacity="0.15"/>

  <!-- Key bow/handle = number 4 (triangular handle) -->
  <g transform="translate(385, 230)">
    <!-- Triangle handle -->
    <polygon points="0,0 -70,-70 -70,0" fill="url(#keyGrad)" stroke="#B8860B" stroke-width="2"/>
    <!-- Round hole in handle = part of "14" -->
    <circle cx="-45" cy="-35" r="14" fill="#FFF8F0"/>
    <!-- "14" embossed on handle -->
    <text x="-45" y="-28" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#B8860B">14</text>
  </g>

  <!-- Lock hole hint -->
  <ellipse cx="400" cy="590" rx="25" ry="10" fill="#555" opacity="0.15"/>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">14=钥匙</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">1像钥匙直直插，4是匙把三角握</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
