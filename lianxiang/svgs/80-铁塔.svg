<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">80=铁塔</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">8像塔身弯弯耸，0是塔基圆圆稳</text>
  <!-- 天空 -->
  <rect x="100" y="210" width="824" height="120" fill="#E3F2FD" opacity="0.2"/>
  <!-- 塔身 - 8形 -->
  <path d="M470 300 L300 500 L380 500 L280 700 L440 700 L400 850 L624 850 L584 700 L744 700 L644 500 L724 500 L554 300Z" fill="#546E7A" stroke="#37474F" stroke-width="3"/>
  <path d="M480 300 L320 500 L390 500 L300 700 L440 700 L400 850 L512 750 L624 850 L584 700 L724 700 L634 500 L704 500 L544 300Z" fill="#607D8B"/>
  <!-- 塔基 - 0形圆 -->
  <ellipse cx="512" cy="860" rx="100" ry="20" fill="#37474F"/>
  <!-- 横梁 -->
  <line x1="390" y1="500" x2="634" y2="500" stroke="#37474F" stroke-width="4"/>
  <line x1="300" y1="700" x2="724" y2="700" stroke="#37474F" stroke-width="4"/>
  <!-- 塔尖 -->
  <line x1="512" y1="300" x2="512" y2="240" stroke="#37474F" stroke-width="6" stroke-linecap="round"/>
  <circle cx="512" cy="235" r="8" fill="#FFD54F"/>
  <!-- 云朵 -->
  <ellipse cx="220" cy="320" rx="40" ry="12" fill="white" opacity="0.3"/>
  <ellipse cx="780" cy="350" rx="35" ry="10" fill="white" opacity="0.25"/>
</svg>