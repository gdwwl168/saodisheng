<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="parrotGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CD964"/>
      <stop offset="100%" stop-color="#228B22"/>
    </linearGradient>
    <linearGradient id="parrotRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="parrotBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="parrotYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#FFF8F0"/>

  <!-- Branch = number 1 (straight) -->
  <path d="M 150,500 Q 300,480 650,490" fill="none" stroke="#8B5A30" stroke-width="14" stroke-linecap="round"/>
  <path d="M 150,500 Q 300,480 650,490" fill="none" stroke="#A07040" stroke-width="10" stroke-linecap="round"/>
  <path d="M 150,500 Q 300,480 650,490" fill="none" stroke="#D4A868" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Small leaves on branch -->
  <ellipse cx="200" cy="477" rx="15" ry="6" fill="#4CD964" transform="rotate(-10, 200, 477)"/>
  <ellipse cx="600" cy="485" rx="12" ry="5" fill="#66E080" transform="rotate(5, 600, 485)"/>

  <!-- Parrot body = number 5 (curved body) -->
  <g transform="translate(400, 340)">
    <!-- Tail feathers -->
    <path d="M 30,80 Q 60,140 50,190 Q 45,200 35,190 Q 40,140 20,80 Z" fill="url(#parrotRed)"/>
    <path d="M 20,85 Q 35,140 30,180 Q 25,185 18,180 Q 25,140 10,85 Z" fill="url(#parrotBlue)"/>
    <path d="M 10,85 Q 15,130 10,170 Q 5,175 0,170 Q 8,130 0,85 Z" fill="url(#parrotYellow)"/>

    <!-- Body -->
    <ellipse cx="0" cy="40" rx="55" ry="65" fill="url(#parrotGreen)"/>
    <!-- Belly -->
    <ellipse cx="0" cy="50" rx="35" ry="45" fill="#7AE880"/>
    <!-- Wing -->
    <ellipse cx="-20" cy="30" rx="25" ry="40" fill="#228B22" opacity="0.5"/>
    <path d="M -45,50 Q -30,40 -15,55" fill="none" stroke="#1A6B1A" stroke-width="1.5" opacity="0.5"/>

    <!-- Head -->
    <circle cx="0" cy="-35" r="30" fill="url(#parrotGreen)"/>
    <!-- Eye -->
    <circle cx="12" cy="-40" r="6" fill="white"/>
    <circle cx="13" cy="-40" r="3.5" fill="#222"/>
    <circle cx="14" cy="-41" r="1.2" fill="white"/>

    <!-- Beak -->
    <path d="M 25,-35 L 50,-30 L 28,-25 Z" fill="url(#parrotYellow)"/>
    <path d="M 28,-25 L 48,-27 L 28,-22 Z" fill="#CC8800"/>
    <line x1="25" y1="-35" x2="28" y2="-25" stroke="#CC8800" stroke-width="0.8"/>

    <!-- Head crown feathers -->
    <path d="M -15,-60 Q -12,-80 -8,-85 Q -5,-75 -3,-60" fill="url(#parrotRed)" opacity="0.8"/>
    <path d="M -5,-60 Q -2,-75 2,-80 Q 4,-70 5,-60" fill="url(#parrotYellow)" opacity="0.8"/>

    <!-- Claws gripping branch -->
    <g stroke="#FF9500" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M -10,100 L -15,115 L -20,115"/>
      <path d="M -10,100 L -8,115 L -12,115"/>
      <path d="M 10,100 L 8,115 L 3,115"/>
      <path d="M 10,100 L 15,115 L 20,115"/>
    </g>

    <!-- Cheek patch -->
    <ellipse cx="-8" cy="-32" rx="8" ry="6" fill="white" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#333">15=鹦鹉</text>

  <!-- Subtitle -->
  <text x="400" y="760" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#888">1像树枝直直站，5是鹦鹉弯弯栖</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
