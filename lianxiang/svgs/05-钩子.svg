<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="hookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="30%" stop-color="#A8A8A8"/>
      <stop offset="60%" stop-color="#787878"/>
      <stop offset="100%" stop-color="#555555"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="800" fill="#F5F0E8"/>
  <rect x="20" y="20" width="760" height="760" rx="30" ry="30" fill="#1a1a2e"/>

  <!-- Hook ring at top = number 0 -->
  <circle cx="400" cy="260" r="45" fill="none" stroke="url(#ringGrad)" stroke-width="14"/>
  <circle cx="400" cy="260" r="45" fill="none" stroke="white" stroke-width="3" opacity="0.2"/>
  <!-- Ring shine -->
  <path d="M 370,230 Q 380,225 395,230" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- Hook shaft = straight part of 0 -->
  <rect x="393" y="305" width="14" height="40" rx="2" fill="#888"/>

  <!-- Hook curve = number 5 (curved hook) -->
  <g>
    <!-- Upper curve -->
    <path d="M 400,345 Q 400,310 440,310 Q 480,310 480,350 Q 480,420 440,460 Q 420,480 400,500"
          fill="none" stroke="url(#hookGrad)" stroke-width="22" stroke-linecap="round"/>
    <!-- Shine/Highlight -->
    <path d="M 400,355 Q 405,320 440,320 Q 470,320 470,350 Q 470,415 435,455 Q 420,470 405,488"
          fill="none" stroke="white" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
    <!-- Sharp tip -->
    <path d="M 400,500 L 393,530 L 407,530 Z" fill="#666"/>
    <path d="M 400,500 L 395,530 L 403,530 Z" fill="#888"/>
    <!-- Hook point highlight -->
    <path d="M 395,510 L 398,508" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="110" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="44" font-weight="bold" fill="#FFEECC">05=钩子</text>

  <!-- Subtitle -->
  <text x="400" y="720" text-anchor="middle" font-family="'Microsoft YaHei','SimHei',sans-serif" font-size="26" fill="#CCBBAA">0像圆环弯弯挂，5是钩身弯弯钓</text>

  <rect x="0" y="0" width="800" height="800" rx="28" ry="28" fill="none" stroke="#E8DDD0" stroke-width="4"/>
</svg>
