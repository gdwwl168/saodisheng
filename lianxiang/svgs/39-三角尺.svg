<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">39=三角尺</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">3像直角弯弯量，9是量角半圆盘</text>
  <!-- 三角尺 - 3形直角 -->
  <path d="M250 700 L500 300 L700 550 Z" fill="none" stroke="#2196F3" stroke-width="4" opacity="0.6"/>
  <path d="M250 700 L500 300 L700 550 Z" fill="#E3F2FD" opacity="0.3"/>
  <!-- 直角标记 -->
  <rect x="460" y="520" width="20" height="20" fill="none" stroke="#F44336" stroke-width="2"/>
  <!-- 刻度标记 -->
  <line x1="280" y1="672" x2="280" y2="662" stroke="#1976D2" stroke-width="2"/>
  <line x1="310" y1="648" x2="310" y2="638" stroke="#1976D2" stroke-width="2"/>
  <line x1="340" y1="624" x2="340" y2="614" stroke="#1976D2" stroke-width="2"/>
  <line x1="370" y1="600" x2="370" y2="590" stroke="#1976D2" stroke-width="2"/>
  <line x1="400" y1="576" x2="400" y2="566" stroke="#1976D2" stroke-width="2"/>
  <line x1="430" y1="552" x2="430" y2="542" stroke="#1976D2" stroke-width="2"/>
  <line x1="460" y1="528" x2="460" y2="518" stroke="#1976D2" stroke-width="2"/>
  <line x1="530" y1="340" x2="535" y2="350" stroke="#1976D2" stroke-width="2"/>
  <line x1="560" y1="370" x2="565" y2="380" stroke="#1976D2" stroke-width="2"/>
  <line x1="590" y1="400" x2="595" y2="410" stroke="#1976D2" stroke-width="2"/>
  <line x1="620" y1="430" x2="625" y2="440" stroke="#1976D2" stroke-width="2"/>
  <line x1="650" y1="460" x2="655" y2="470" stroke="#1976D2" stroke-width="2"/>
  <line x1="680" y1="490" x2="685" y2="500" stroke="#1976D2" stroke-width="2"/>
  <!-- 量角器 - 9形半圆 -->
  <path d="M320 750 Q380 630 480 650 Q540 660 580 710" fill="none" stroke="#FF9800" stroke-width="4"/>
  <path d="M320 750 Q360 670 420 660 Q480 655 520 700" fill="none" stroke="#FFB74D" stroke-width="5" opacity="0.4"/>
  <path d="M320 750 L440 650" stroke="#FF9800" stroke-width="1.5" opacity="0.3"/>
  <path d="M320 750 L480 660" stroke="#FF9800" stroke-width="1.5" opacity="0.3"/>
  <path d="M320 750 L510 675" stroke="#FF9800" stroke-width="1.5" opacity="0.3"/>
  <path d="M320 750 L540 695" stroke="#FF9800" stroke-width="1.5" opacity="0.3"/>
  <!-- 角度数字 -->
  <text x="390" y="735" font-size="14" fill="#FF9800" opacity="0.6">0°</text>
  <text x="540" y="710" font-size="14" fill="#FF9800" opacity="0.6">90°</text>
  <text x="450" y="670" font-size="14" fill="#FF9800" opacity="0.6">180°</text>
</svg>