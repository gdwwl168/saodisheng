<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">76=犀牛</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">7像犀角弯弯尖，6是厚皮圆圆身</text>
  <ellipse cx="512" cy="800" rx="220" ry="35" fill="#AED581" opacity="0.2"/>
  <!-- 身体 - 6形圆 -->
  <ellipse cx="480" cy="600" rx="130" ry="120" fill="#9E9E9E"/>
  <ellipse cx="470" cy="590" rx="100" ry="95" fill="#BDBDBD"/>
  <!-- 腿 -->
  <rect x="380" y="690" width="30" height="90" rx="10" fill="#9E9E9E"/>
  <rect x="430" y="700" width="30" height="90" rx="10" fill="#9E9E9E"/>
  <rect x="510" y="700" width="30" height="90" rx="10" fill="#9E9E9E"/>
  <rect x="555" y="690" width="30" height="90" rx="10" fill="#9E9E9E"/>
  <!-- 头部 -->
  <ellipse cx="370" cy="520" rx="60" ry="50" fill="#BDBDBD"/>
  <!-- 犀牛角 - 7形弯尖 -->
  <path d="M340 470 Q320 420 310 380 Q305 360 315 350" fill="none" stroke="#5D4037" stroke-width="14" stroke-linecap="round"/>
  <path d="M360 470 Q345 430 340 400" fill="none" stroke="#5D4037" stroke-width="8" stroke-linecap="round"/>
