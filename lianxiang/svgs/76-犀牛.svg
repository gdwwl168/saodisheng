  <ellipse cx="350" cy="465" rx="12" ry="20" fill="#9E9E9E"/>
  <!-- 尾巴 -->
  <path d="M610 590 Q640 580 645 610 Q650 630 635 635" fill="none" stroke="#9E9E9E" stroke-width="5"/>
</svg>