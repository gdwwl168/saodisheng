<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#FFF8F0"/><stop offset="100%" stop-color="#F5EDE0"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#4A3728" font-family="sans-serif">88=爸爸</text>
  <text x="512" y="165" text-anchor="middle" font-size="30" fill="#8B7355" font-family="sans-serif">8像爸爸弯弯笑，8是孩子圆圆抱</text>
  <!-- 大人身体 -->
  <rect x="380" y="400" width="140" height="250" rx="15" fill="#1565C0"/>
  <!-- 大人头 - 8形 -->
  <circle cx="450" cy="320" r="55" fill="#FFCCBC"/>
  <circle cx="450" cy="320" r="50" fill="#FFDAB9"/>
  <!-- 头发 -->
  <ellipse cx="450" cy="280" rx="48" ry="18" fill="#3E2723"/>
  <rect x="405" y="270" width="90" height="15" rx="6" fill="#3E2723"/>
  <!-- 眼镜 -->
  <circle cx="430" cy="315" r="16" fill="none" stroke="#37474F" stroke-width="3"/>
  <circle cx="475" cy="315" r="16" fill="none" stroke="#37474F" stroke-width="3"/>
  <line x1="446" y1="315" x2="459" y2="315" stroke="#37474F" stroke-width="3"/>
  <circle cx="430" cy="315" r="5" fill="#2C1810"/>
  <circle cx="475" cy="315" r="5" fill="#2C1810"/>
  <!-- 微笑 -->
  <path d="M435 340 Q450 355 465 340" fill="none" stroke="#BF6A4D" stroke-width="3"/>
  <!-- 领带 -->
  <path d="M440 400 L450 440 L460 400Z" fill="#F44336"/>
  <rect x="445" y="390" width="10" height="10" fill="#F44336"/>
  <!-- 孩子 - 8形圆 -->
  <circle cx="560" cy="480" r="45" fill="#FFCCBC"/>
  <circle cx="560" cy="480" r="40" fill="#FFDAB9"/>
  <ellipse cx="560" cy="450" rx="35" ry="15" fill="#3E2723"/>
  <circle cx="550" cy="478" r="5" fill="#2C1810"/>
  <circle cx="572" cy="478" r="5" fill="#2C1810"/>
  <path d="M548 495 Q560 508 572 495" fill="none" stroke="#BF6A4D" stroke-width="2.5"/>
  <!-- 小孩衣服 -->
  <rect x="530" y="525" width="60" height="80" rx="10" fill="#4CAF50"/>
  <!-- 大人手臂抱 -->
  <path d="M380 420 Q350 450 370 500 Q390 530 420 520" fill="none" stroke="#1565C0" stroke-width="20" stroke-linecap="round"/>
  <path d="M520 420 Q560 440 570 480" fill="none" stroke="#1565C0" stroke-width="16" stroke-linecap="round"/>
</svg>