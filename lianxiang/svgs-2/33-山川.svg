<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%"><stop offset="0%" stop-color="#1a1e28"/><stop offset="100%" stop-color="#0a0c14"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">33=山川</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">3像山峰叠叠起，3像川流滚滚来</text>
  <!-- 天空 -->
  <rect x="0" y="200" width="1024" height="350" fill="#1a2040" opacity="0.3"/>
  <!-- 左山 3形 -->
  <path d="M80 650 L280 300 L360 650Z" fill="#3a4050"/>
  <path d="M100 640 L280 320 L340 640Z" fill="#4a5060" opacity="0.5"/>
  <!-- 中山 3形 -->
  <path d="M300 650 L512 250 L724 650Z" fill="#4a5060"/>
  <path d="M320 640 L512 270 L704 640Z" fill="#5a6070" opacity="0.5"/>
  <!-- 雪顶 -->
  <path d="M472 330 L512 250 L552 330Z" fill="white" opacity="0.2"/>
  <!-- 河流 3形川字 -->
  <path d="M400 650 Q380 580 400 520 Q420 460 400 400" fill="none" stroke="#5a80b0" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <path d="M512 650 Q500 580 512 520 Q524 460 512 400" fill="none" stroke="#5a80b0" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <path d="M624 650 Q644 580 624 520 Q604 460 624 400" fill="none" stroke="#5a80b0" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- 河流合并 -->
  <path d="M400 400 Q512 370 624 400" fill="none" stroke="#5a80b0" stroke-width="16" stroke-linecap="round" opacity="0.4"/>
  <!-- 松树 -->
  <path d="M200 500 L210 460 L220 500Z" fill="#2a4030" opacity="0.4"/>
  <path d="M190 520 L210 470 L230 520Z" fill="#2a4030" opacity="0.35"/>
  <rect x="207" y="520" width="6" height="20" fill="#3a2010" opacity="0.3"/>
  <!-- 飞鸟 -->
  <path d="M600 360 Q610 350 620 358" fill="none" stroke="#6090B0" stroke-width="1.5" opacity="0.4"/>
  <path d="M640 340 Q650 330 660 338" fill="none" stroke="#6090B0" stroke-width="1.5" opacity="0.3"/>
  <!-- 太阳 -->
  <circle cx="200" cy="260" r="28" fill="#FFD540" opacity="0.25"/>
</svg>
