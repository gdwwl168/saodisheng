<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1818"/><stop offset="100%" stop-color="#0a0808"/></radialGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5C3A2A"/><stop offset="100%" stop-color="#8B6040"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">18=腰包</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">1是腰带直直系，8是双包挂两边</text>
  <!-- 腰带 1形 -->
  <rect x="200" y="480" width="624" height="24" rx="8" fill="url(#leather)"/>
  <rect x="210" y="484" width="604" height="16" rx="6" fill="#9B7050" opacity="0.4"/>
