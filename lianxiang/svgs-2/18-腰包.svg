  <path d="M634 475 Q634 378 684 370 Q734 362 734 412 Q734 465 684 475Z" fill="#7A5038" opacity="0.6"/>
  <rect x="629" y="440" width="110" height="8" rx="2" fill="#C89830"/>
  <circle cx="684" cy="444" r="5" fill="#A06820"/>
  <!-- 背带 -->
  <path d="M330 335 Q340 280 370 270 Q400 260 410 300" fill="none" stroke="#4a2810" stroke-width="5" opacity="0.5"/>
  <path d="M680 365 Q690 310 720 300 Q750 290 760 330" fill="none" stroke="#4a2810" stroke-width="5" opacity="0.5"/>
</svg>
