  <rect x="185" y="478" width="20" height="28" rx="4" fill="#D0A840" opacity="0.6"/>
  <!-- 带孔 -->
  <circle cx="198" cy="492" r="3" fill="#3a2010"/>
  <circle cx="198" cy="504" r="3" fill="#3a2010"/>
  <!-- 包1 8形上圆 -->
  <path d="M280 460 Q280 340 340 330 Q400 320 400 380 Q400 440 340 460Z" fill="#6B4030"/>
  <path d="M290 455 Q290 350 340 340 Q390 332 390 385 Q390 445 340 455Z" fill="#7A5038" opacity="0.6"/>
  <rect x="285" y="420" width="110" height="8" rx="2" fill="#C89830"/>
  <circle cx="340" cy="424" r="5" fill="#A06820"/>
