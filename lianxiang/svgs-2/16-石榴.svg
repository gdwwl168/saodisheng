<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2a1a20"/><stop offset="100%" stop-color="#120a10"/></radialGradient>
    <linearGradient id="fruit" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E88070"/><stop offset="100%" stop-color="#C05040"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">16=石榴</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">1是树干直直立，6是石榴圆圆肚</text>
  <!-- 树枝 1形 -->
  <line x1="512" y1="260" x2="512" y2="560" stroke="#5C3A20" stroke-width="12" stroke-linecap="round"/>
  <line x1="512" y1="260" x2="512" y2="560" stroke="#7A5030" stroke-width="6" stroke-linecap="round"/>
  <!-- 叶子 -->
  <ellipse cx="460" cy="340" rx="20" ry="8" fill="#4CAF50" transform="rotate(-30 460 340)"/>
  <ellipse cx="564" cy="380" rx="18" ry="7" fill="#66BB6A" transform="rotate(25 564 380)"/>
  <ellipse cx="470" cy="420" rx="16" ry="6" fill="#388E3C" transform="rotate(-15 470 420)"/>
  <!-- 石榴 6形圆肚 -->
  <circle cx="512" cy="580" r="65" fill="url(#fruit)"/>
  <circle cx="512" cy="575" r="55" fill="#E89080" opacity="0.5"/>
  <!-- 石榴高光 -->
  <ellipse cx="490" cy="555" rx="15" ry="25" fill="white" opacity="0.15" transform="rotate(-15 490 555)"/>
  <!-- 石榴萼片 -->
  <path d="M490 518 L500 500 L512 520Z" fill="#5C3A20"/>
  <path d="M512 520 L524 498 L534 518Z" fill="#5C3A20"/>
  <path d="M500 525 L512 510 L524 525Z" fill="#7A5030"/>
  <!-- 石榴籽露出 -->
  <path d="M470 600 Q512 630 554 600 Q540 640 512 650 Q484 640 470 600Z" fill="#C03030" opacity="0.7"/>
  <circle cx="495" cy="615" r="5" fill="#E83030" opacity="0.8"/>
  <circle cx="512" cy="618" r="5" fill="#E83030" opacity="0.8"/>
  <circle cx="530" cy="615" r="5" fill="#E83030" opacity="0.8"/>
  <circle cx="505" cy="630" r="4" fill="#E83030" opacity="0.7"/>
  <circle cx="520" cy="630" r="4" fill="#E83030" opacity="0.7"/>
  <!-- 蒂 -->
  <rect x="508" y="495" width="8" height="12" rx="3" fill="#4A2810"/>
</svg>
