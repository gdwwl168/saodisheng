<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1a28"/><stop offset="100%" stop-color="#0a0a18"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">39=三角尺</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">3是三角板板尖，9是直尺长长量</text>
  <!-- 桌面 -->
  <ellipse cx="512" cy="660" rx="200" ry="18" fill="#0a0a10" opacity="0.4"/>
  <!-- 三角尺 3形 -->
  <path d="M300 600 L450 350 L600 600Z" fill="none" stroke="#80B0D0" stroke-width="3"/>
  <path d="M300 600 L450 350 L600 600Z" fill="#B0D8F0" opacity="0.08"/>
  <!-- 三角尺刻度 -->
  <line x1="450" y1="350" x2="450" y2="475" stroke="#80B0D0" stroke-width="1" opacity="0.4"/>
  <line x1="450" y1="350" x2="375" y2="600" stroke="#80B0D0" stroke-width="1" opacity="0.4"/>
  <!-- 角度弧线 -->
  <path d="M330 585 Q340 570 350 560" fill="none" stroke="#80B0D0" stroke-width="1.5" opacity="0.5"/>
  <text x="330" y="575" font-size="16" fill="#80B0D0" opacity="0.4">90°</text>
  <!-- 直尺 9形长弯尺 -->
  <rect x="420" y="580" width="220" height="30" rx="4" fill="#B0D8F0" opacity="0.15"/>
  <rect x="420" y="580" width="220" height="30" rx="4" fill="none" stroke="#80B0D0" stroke-width="2"/>
  <!-- 刻度线 -->
  <g stroke="#80B0D0" stroke-width="1" opacity="0.35">
    <line x1="430" y1="590" x2="430" y2="598"/>
    <line x1="442" y1="590" x2="442" y2="598"/>
    <line x1="454" y1="590" x2="454" y2="598"/>
    <line x1="466" y1="590" x2="466" y2="598"/>
    <line x1="478" y1="585" x2="478" y2="598"/>
    <line x1="490" y1="585" x2="490" y2="598"/>
    <line x1="502" y1="585" x2="502" y2="598"/>
    <line x1="514" y1="585" x2="514" y2="598"/>
    <line x1="526" y1="580" x2="526" y2="598"/>
    <line x1="538" y1="580" x2="538" y2="598"/>
    <line x1="550" y1="580" x2="550" y2="598"/>
  </g>
  <!-- 数字 -->
  <text x="470" y="575" font-size="10" fill="#80B0D0" opacity="0.35">0</text>
  <text x="514" y="575" font-size="10" fill="#80B0D0" opacity="0.35">5</text>
  <text x="610" y="575" font-size="10" fill="#80B0D0" opacity="0.35">9</text>
  <!-- 9形弯尺立起来 -->
  <path d="M380 520 Q370 460 390 430 Q410 400 380 380" fill="none" stroke="#80B0D0" stroke-width="3" opacity="0.5"/>
  <circle cx="380" cy="380" r="3" fill="#80B0D0" opacity="0.5"/>
</svg>