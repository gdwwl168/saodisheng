<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1a20"/><stop offset="100%" stop-color="#0a0a10"/></radialGradient>
    <radialGradient id="smoke" cx="50%" cy="50%"><stop offset="0%" stop-color="white" stop-opacity="0.15"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">20=香烟</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">2是手指夹，0是烟圈圆圆吐</text>
  <!-- 手掌 -->
  <path d="M340 580 Q330 540 360 500 Q390 470 420 490" fill="none" stroke="#F0C8A0" stroke-width="35" stroke-linecap="round"/>
  <path d="M370 590 Q360 550 390 510" fill="none" stroke="#F5D5B8" stroke-width="25" stroke-linecap="round"/>
  <!-- 手指弯曲 2形 -->
  <path d="M400 480 Q430 460 450 480 Q460 500 445 515" fill="none" stroke="#F0C8A0" stroke-width="14" stroke-linecap="round"/>
  <path d="M420 495 Q445 480 460 500" fill="none" stroke="#F5D5B8" stroke-width="10" stroke-linecap="round"/>
  <!-- 香烟 1形 -->
  <rect x="430" y="440" width="18" height="100" rx="7" fill="white" opacity="0.9"/>
  <rect x="432" y="442" width="14" height="96" rx="5" fill="#F8F8F8" opacity="0.6"/>
  <!-- 滤嘴 -->
  <rect x="430" y="520" width="18" height="20" rx="5" fill="#D89860"/>
  <!-- 燃端 -->
  <ellipse cx="439" cy="442" rx="8" ry="4" fill="#FF6600" opacity="0.7"/>
  <ellipse cx="439" cy="441" rx="6" ry="3" fill="#FF8800" opacity="0.5"/>
  <!-- 烟圈 0形 -->
  <circle cx="500" cy="360" r="30" fill="none" stroke="white" stroke-width="3" opacity="0.25"/>
  <circle cx="530" cy="310" r="35" fill="none" stroke="white" stroke-width="2.5" opacity="0.2"/>
  <circle cx="560" cy="260" r="40" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  <circle cx="590" cy="210" r="45" fill="none" stroke="white" stroke-width="1.5" opacity="0.1"/>
  <!-- 烟雾飘散 -->
  <circle cx="480" cy="400" r="15" fill="url(#smoke)"/>
  <circle cx="510" cy="380" r="20" fill="url(#smoke)"/>
  <circle cx="540" cy="350" r="18" fill="url(#smoke)"/>
</svg>
