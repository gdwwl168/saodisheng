<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#202830"/><stop offset="100%" stop-color="#0a1018"/></radialGradient>
    <linearGradient id="whistle" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C0C8D0"/><stop offset="100%" stop-color="#8898A0"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">09=口哨</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">0像哨口圆圆，9是弯管哨身翘</text>
  <!-- 挂绳 -->
  <path d="M620 350 Q640 300 600 280 Q550 260 530 300 Q520 330 540 350" fill="none" stroke="#5a6070" stroke-width="4" opacity="0.5"/>
  <!-- 哨身 9形弯管 -->
  <path d="M490 450 Q490 350 560 340 Q620 330 640 400 Q660 470 590 520 Q530 560 480 530" fill="none" stroke="url(#whistle)" stroke-width="28" stroke-linecap="round"/>
  <path d="M490 450 Q490 350 560 340 Q620 330 640 400 Q660 470 590 520 Q530 560 480 530" fill="none" stroke="#A0A8B0" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
  <!-- 哨口 0形 -->
  <circle cx="480" cy="530" r="22" fill="#1a1a28"/>
  <circle cx="480" cy="530" r="16" fill="#0a0a18"/>
  <!-- 出气孔 -->
  <rect x="470" y="450" width="8" height="14" rx="2" fill="#606870"/>
  <!-- 高光 -->
  <path d="M520 370 Q570 360 600 400" fill="none" stroke="white" stroke-width="2.5" opacity="0.2"/>
  <!-- 声波 -->
  <g stroke="#6080a0" fill="none" opacity="0.3">
    <path d="M320 500 Q280 500 260 480"/>
    <path d="M310 520 Q260 525 230 500"/>
    <path d="M330 480 Q290 475 275 455"/>
  </g>
  <!-- 音符 -->
  <text x="210" y="480" font-size="22" fill="#6080a0" opacity="0.3">♪</text>
  <text x="190" y="450" font-size="16" fill="#6080a0" opacity="0.2">♫</text>
</svg>
