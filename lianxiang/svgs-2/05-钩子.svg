<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1e202a"/><stop offset="100%" stop-color="#0a0c14"/></radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C0C8D0"/><stop offset="40%" stop-color="#889098"/><stop offset="100%" stop-color="#505860"/></linearGradient>
    <linearGradient id="hook" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D0D8E0"/><stop offset="50%" stop-color="#9098A0"/><stop offset="100%" stop-color="#586068"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">05=钩子</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">0像挂钩圆圆环，5是钩尖弯弯挂</text>
  <!-- 木板背景 -->
  <rect x="200" y="250" width="624" height="500" rx="12" fill="#3a3030" opacity="0.3"/>
  <rect x="210" y="260" width="604" height="480" rx="8" fill="#4a3a30" opacity="0.2"/>
  <!-- 螺丝1 -->
  <circle cx="330" cy="530" r="16" fill="#606060"/>
  <circle cx="330" cy="530" r="10" fill="#707070"/>
  <line x1="324" y1="530" x2="336" y2="530" stroke="#505050" stroke-width="1.5"/>
  <line x1="330" y1="524" x2="330" y2="536" stroke="#505050" stroke-width="1.5"/>
  <!-- 螺丝2 -->
  <circle cx="694" cy="530" r="16" fill="#606060"/>
  <circle cx="694" cy="530" r="10" fill="#707070"/>
  <line x1="688" y1="530" x2="700" y2="530" stroke="#505050" stroke-width="1.5"/>
  <line x1="694" y1="524" x2="694" y2="536" stroke="#505050" stroke-width="1.5"/>
  <!-- 固定板 -->
  <rect x="300" y="480" width="424" height="30" rx="6" fill="url(#metal)"/>
  <rect x="310" y="484" width="404" height="22" rx="4" fill="#808890" opacity="0.3"/>
  <!-- 挂钩环 0形 -->
  <circle cx="512" cy="380" r="45" fill="none" stroke="url(#metal)" stroke-width="16"/>
  <circle cx="512" cy="380" r="45" fill="none" stroke="#B0B8C0" stroke-width="8" opacity="0.5"/>
  <circle cx="512" cy="380" r="45" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <!-- 钩身 5形弯 -->
  <path d="M552 400 Q600 420 620 480 Q640 550 590 600 Q540 650 480 660" fill="none" stroke="url(#hook)" stroke-width="20" stroke-linecap="round"/>
  <path d="M552 400 Q600 420 620 480 Q640 550 590 600 Q540 650 480 660" fill="none" stroke="#B0B8C0" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <!-- 钩尖 -->
  <path d="M480 660 Q450 665 435 650 Q420 635 430 620" fill="none" stroke="#889098" stroke-width="12" stroke-linecap="round"/>
  <path d="M430 620 L425 610" stroke="#889098" stroke-width="6" stroke-linecap="round"/>
  <!-- 高光 -->
  <path d="M555 410 Q590 430 605 470" fill="none" stroke="white" stroke-width="2" opacity="0.25"/>
  <!-- 挂着的钥匙环 -->
  <circle cx="460" cy="650" r="18" fill="none" stroke="#D0A050" stroke-width="4" opacity="0.6"/>
</svg>
