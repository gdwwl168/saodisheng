<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1820"/><stop offset="100%" stop-color="#0a0810"/></radialGradient>
    <linearGradient id="sofa" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4a6a80"/><stop offset="100%" stop-color="#6088a0"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">38=沙发</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">3人坐上8字形沙发，38谐音</text>
  <!-- 地面 -->
  <ellipse cx="512" cy="680" rx="260" ry="20" fill="#0a0808" opacity="0.4"/>
  <!-- 沙发座 3+8形 -->
  <rect x="280" y="520" width="464" height="50" rx="12" fill="url(#sofa)"/>
  <rect x="290" y="525" width="444" height="40" rx="8" fill="#78A0B8" opacity="0.3"/>
  <!-- 沙发靠背 3人位 -->
  <rect x="280" y="400" width="464" height="130" rx="18" fill="url(#sofa)"/>
  <rect x="292" y="412" width="440" height="110" rx="14" fill="#78A0B8" opacity="0.25"/>
  <!-- 靠背分区 8形3段 -->
  <rect x="300" y="420" width="140" height="100" rx="12" fill="#588098" opacity="0.4"/>
  <rect x="450" y="415" width="124" height="105" rx="12" fill="#588098" opacity="0.4"/>
  <rect x="584" y="420" width="140" height="100" rx="12" fill="#588098" opacity="0.4"/>
  <!-- 扶手 -->
  <rect x="260" y="450" width="40" height="100" rx="14" fill="#3a5a70"/>
  <rect x="724" y="450" width="40" height="100" rx="14" fill="#3a5a70"/>
  <!-- 坐垫 -->
  <ellipse cx="512" cy="545" rx="200" ry="12" fill="#E8A060" opacity="0.3"/>
  <ellipse cx="512" cy="542" rx="180" ry="8" fill="#F0C080" opacity="0.2"/>
  <!-- 沙发脚 -->
  <rect x="310" y="565" width="14" height="40" rx="4" fill="#3a5050"/>
  <rect x="700" y="565" width="14" height="40" rx="4" fill="#3a5050"/>
  <rect x="490" y="568" width="14" height="35" rx="4" fill="#3a5050"/>
</svg>