<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs><radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1a22"/><stop offset="100%" stop-color="#0a0a12"/></radialGradient></defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">44=石狮</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">4脚石狮左右立，4方守门威威风</text>
  <!-- 底座 -->
  <rect x="280" y="600" width="200" height="30" rx="4" fill="#505060"/>
  <rect x="544" y="600" width="200" height="30" rx="4" fill="#505060"/>
  <!-- 左石狮 4形 -->
  <ellipse cx="380" cy="520" rx="55" ry="40" fill="#606070"/>
  <ellipse cx="380" cy="515" rx="45" ry="32" fill="#707080" opacity="0.5"/>
  <!-- 左头 -->
  <circle cx="340" cy="460" r="30" fill="#606070"/>
  <circle cx="338" cy="455" r="24" fill="#707080" opacity="0.4"/>
  <!-- 左鬃毛 -->
  <g stroke="#686878" stroke-width="3" opacity="0.5">
    <path d="M315 460 Q305 450 310 440"/>
    <path d="M318 475 Q305 478 300 470"/>
    <path d="M328 488 Q318 495 312 490"/>
  </g>
  <!-- 左眼 -->
  <circle cx="330" cy="452" r="5" fill="#FFD540" opacity="0.4"/>
  <!-- 左嘴 -->
  <path d="M320 470 Q335 475 345 470" fill="none" stroke="#505060" stroke-width="2"/>
  <!-- 左腿4条 -->
  <rect x="345" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="365" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="395" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="415" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <!-- 右石狮 -->
  <ellipse cx="644" cy="520" rx="55" ry="40" fill="#606070"/>
  <ellipse cx="644" cy="515" rx="45" ry="32" fill="#707080" opacity="0.5"/>
  <circle cx="684" cy="460" r="30" fill="#606070"/>
  <circle cx="686" cy="455" r="24" fill="#707080" opacity="0.4"/>
  <circle cx="694" cy="452" r="5" fill="#FFD540" opacity="0.4"/>
  <path d="M704 470 Q689 475 679 470" fill="none" stroke="#505060" stroke-width="2"/>
  <!-- 右腿 -->
  <rect x="609" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="629" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="649" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <rect x="669" y="550" width="12" height="50" rx="4" fill="#585868"/>
  <!-- 石球 -->
  <circle cx="420" cy="555" r="16" fill="#606070"/>
  <circle cx="420" cy="553" r="10" fill="#707080" opacity="0.4"/>
  <!-- 绣球 -->
  <circle cx="604" cy="555" r="14" fill="#606070"/>
  <path d="M598 550 L610 560 M610 550 L598 560" stroke="#707080" stroke-width="1" opacity="0.4"/>
</svg>