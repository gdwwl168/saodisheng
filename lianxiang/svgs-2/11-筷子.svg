<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1e1a18"/><stop offset="100%" stop-color="#0e0a08"/></radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C89860"/><stop offset="100%" stop-color="#E8C898"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">11=筷子</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">1是筷子1直，1是筷子2直，11成双对</text>
  <!-- 桌面 -->
  <ellipse cx="512" cy="650" rx="280" ry="40" fill="#1a120a" opacity="0.4"/>
  <!-- 筷1 1形 -->
  <rect x="440" y="320" width="18" height="320" rx="6" fill="url(#wood)"/>
  <rect x="444" y="320" width="5" height="320" fill="#F0D8B0" opacity="0.35"/>
  <!-- 筷1 顶部花纹 -->
  <rect x="440" y="320" width="18" height="30" rx="4" fill="#C08040"/>
  <line x1="449" y1="325" x2="449" y2="345" stroke="#A06830" stroke-width="1" opacity="0.5"/>
  <!-- 筷2 1形 -->
  <rect x="566" y="320" width="18" height="320" rx="6" fill="url(#wood)"/>
  <rect x="570" y="320" width="5" height="320" fill="#F0D8B0" opacity="0.35"/>
  <rect x="566" y="320" width="18" height="30" rx="4" fill="#C08040"/>
  <line x1="575" y1="325" x2="575" y2="345" stroke="#A06830" stroke-width="1" opacity="0.5"/>
  <!-- 碗 -->
  <path d="M370 650 Q380 540 512 530 Q644 540 654 650Z" fill="#E8E0D8"/>
  <path d="M380 645 Q390 545 512 535 Q634 545 644 645Z" fill="#F5F0EA"/>
  <ellipse cx="512" cy="640" rx="137" ry="22" fill="#DDD5CA"/>
  <!-- 碗内米饭 -->
  <ellipse cx="512" cy="600" rx="110" ry="35" fill="white" opacity="0.7"/>
  <ellipse cx="512" cy="598" rx="100" ry="30" fill="#FFFAF5" opacity="0.6"/>
  <!-- 蒸汽 -->
  <path d="M460 520 Q455 500 460 480" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <path d="M512 510 Q507 490 512 470" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <path d="M564 520 Q559 500 564 480" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
</svg>
