<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1818"/><stop offset="100%" stop-color="#0a0808"/></radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6B3A20"/><stop offset="100%" stop-color="#A06030"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">25=二胡</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">2根琴弦绷绷直，5度定音悠悠扬</text>
  <!-- 琴杆 1形 -->
  <rect x="500" y="280" width="24" height="380" rx="6" fill="url(#wood)"/>
  <rect x="506" y="280" width="8" height="380" fill="#C08040" opacity="0.3"/>
  <!-- 琴头 -->
  <rect x="490" y="260" width="44" height="30" rx="8" fill="#5a2a10"/>
  <!-- 弦轴 5形弯 -->
  <ellipse cx="480" cy="320" rx="12" ry="6" fill="#A06030"/>
  <ellipse cx="544" cy="350" rx="12" ry="6" fill="#A06030"/>
  <!-- 两根弦 2形直 -->
  <line x1="506" y1="290" x2="506" y2="640" stroke="#D0B898" stroke-width="1.5"/>
  <line x1="518" y1="290" x2="518" y2="640" stroke="#D0B898" stroke-width="1.5"/>
  <!-- 琴筒 0形 -->
  <ellipse cx="512" cy="640" rx="55" ry="20" fill="#5a2a10"/>
  <ellipse cx="512" cy="635" rx="55" ry="20" fill="#7a3a1a"/>
  <!-- 琴筒面/蛇皮 -->
  <ellipse cx="512" cy="635" rx="42" ry="14" fill="#D0B090" opacity="0.6"/>
  <ellipse cx="512" cy="635" rx="35" ry="10" fill="#E0C8A0" opacity="0.3"/>
  <!-- 弓 2形弯 -->
  <path d="M280 500 Q350 440 420 480" fill="none" stroke="#E8D8B0" stroke-width="4" stroke-linecap="round"/>
  <path d="M280 500 Q350 440 420 480" fill="none" stroke="#D0B898" stroke-width="2" stroke-linecap="round"/>
  <!-- 弓毛 -->
  <path d="M280 510 Q350 455 420 490" fill="none" stroke="#E8E0D0" stroke-width="2" opacity="0.5"/>
  <!-- 琴码 -->
  <rect x="506" y="630" width="12" height="5" rx="2" fill="#A06030"/>
  <!-- 音符 -->
  <text x="400" y="380" font-size="22" fill="#C89860" opacity="0.25">♪</text>
  <text x="620" y="420" font-size="18" fill="#C89860" opacity="0.2">♫</text>
</svg>
