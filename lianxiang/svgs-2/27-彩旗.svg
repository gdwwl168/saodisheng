<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%"><stop offset="0%" stop-color="#1a2030"/><stop offset="100%" stop-color="#0a0a18"/></radialGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E85D3A"/><stop offset="100%" stop-color="#C04030"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">27=彩旗</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">2是旗杆直直立，7是旗面飘飘扬</text>
  <!-- 旗杆 2形直 -->
  <line x1="350" y1="250" x2="350" y2="700" stroke="#8898A0" stroke-width="12" stroke-linecap="round"/>
  <line x1="350" y1="250" x2="350" y2="700" stroke="#A0B0B8" stroke-width="5" stroke-linecap="round"/>
  <!-- 旗杆顶球 -->
  <circle cx="350" cy="240" r="14" fill="#D0A030"/>
  <circle cx="350" cy="240" r="8" fill="#E0B848" opacity="0.6"/>
  <!-- 旗面 7形扬 -->
  <path d="M354 300 Q450 290 500 340 Q550 390 500 440" fill="url(#flag)" opacity="0.85"/>
  <path d="M354 300 Q450 295 500 340 Q540 380 500 435" fill="none" stroke="#F08060" stroke-width="1.5" opacity="0.4"/>
  <!-- 波纹折线 -->
  <path d="M354 300 Q400 320 420 340 Q440 360 460 380 Q480 400 500 420 Q510 430 500 440" fill="none" stroke="#FFD540" stroke-width="2" opacity="0.5"/>
  <!-- 小彩旗2 -->
  <line x1="674" y1="350" x2="674" y2="650" stroke="#8898A0" stroke-width="8" stroke-linecap="round"/>
  <circle cx="674" cy="342" r="10" fill="#D0A030"/>
  <path d="M678 380 Q740 370 760 410 Q780 450 750 480" fill="#4CAF50" opacity="0.7"/>
  <path d="M678 380 Q740 375 758 410 Q772 445 750 475" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.4"/>
  <!-- 地面的风 -->
  <path d="M200 680 Q300 670 400 675" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
  <path d="M500 690 Q600 680 700 685" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>
