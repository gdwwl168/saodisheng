<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a2028"/><stop offset="100%" stop-color="#0a1018"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">13=医生</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">1是针筒直，3是听诊器弯弯挂</text>
  <!-- 白大褂身体 -->
  <rect x="380" y="380" width="264" height="340" rx="30" fill="white" opacity="0.85"/>
  <rect x="390" y="380" width="244" height="330" rx="25" fill="#F8F8FF" opacity="0.5"/>
  <!-- 领口 -->
  <path d="M460 380 L512 440 L564 380" fill="none" stroke="#D0D8E0" stroke-width="3"/>
  <!-- 纽扣 -->
  <circle cx="512" cy="490" r="5" fill="#C0C8D0"/>
  <circle cx="512" cy="550" r="5" fill="#C0C8D0"/>
  <circle cx="512" cy="610" r="5" fill="#C0C8D0"/>
  <!-- 口袋 -->
  <rect x="400" y="520" width="50" height="60" rx="4" fill="white" stroke="#D0D8E0" stroke-width="1"/>
  <!-- 针筒 1形 -->
  <rect x="400" y="250" width="14" height="150" rx="4" fill="#D0D8E0"/>
  <rect x="404" y="250" width="5" height="150" fill="white" opacity="0.5"/>
  <rect x="397" y="350" width="20" height="30" rx="4" fill="#B0B8C0"/>
  <!-- 针头 -->
  <line x1="407" y1="380" x2="407" y2="410" stroke="#A0A8B0" stroke-width="2.5"/>
  <!-- 针筒刻度 -->
  <line x1="414" y1="280" x2="418" y2="280" stroke="#A0A8B0" stroke-width="0.8"/>
  <line x1="414" y1="300" x2="418" y2="300" stroke="#A0A8B0" stroke-width="0.8"/>
  <line x1="414" y1="320" x2="418" y2="320" stroke="#A0A8B0" stroke-width="0.8"/>
  <!-- 听诊器 3形 -->
  <path d="M540 440 Q560 400 600 420 Q630 435 640 470 Q645 495 630 520" fill="none" stroke="#505860" stroke-width="8" stroke-linecap="round"/>
  <!-- 听诊头 -->
  <circle cx="630" cy="530" r="18" fill="#404850"/>
  <circle cx="630" cy="530" r="12" fill="#505860"/>
  <circle cx="630" cy="530" r="6" fill="#606870"/>
  <!-- 耳塞 -->
  <path d="M540 440 Q530 420 520 425" stroke="#505860" stroke-width="6" stroke-linecap="round"/>
  <!-- 红十字 -->
  <rect x="610" y="380" width="20" height="35" rx="3" fill="#E85D3A" opacity="0.8"/>
  <rect x="600" y="390" width="40" height="15" rx="3" fill="#E85D3A" opacity="0.8"/>
</svg>
