<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2a1a28"/><stop offset="100%" stop-color="#120a14"/></radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C878A0"/><stop offset="100%" stop-color="#E8A0C0"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">08=孕妇</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">0像孕妇圆圆肚，8是双身大肚叠</text>
  <!-- 头部 -->
  <circle cx="512" cy="320" r="45" fill="#F5D5B8"/>
  <circle cx="512" cy="318" r="40" fill="#FDE0C8"/>
  <!-- 头发 -->
  <path d="M472 300 Q470 270 512 268 Q554 270 552 300" fill="#3a2020"/>
  <ellipse cx="512" cy="280" rx="40" ry="15" fill="#4a2828"/>
  <!-- 五官 -->
  <circle cx="498" cy="318" r="3" fill="#3a2020"/>
  <circle cx="526" cy="318" r="3" fill="#3a2020"/>
  <path d="M506 335 Q512 340 518 335" fill="none" stroke="#D48888" stroke-width="2"/>
  <!-- 身体 8形双圆 -->
  <ellipse cx="512" cy="460" rx="55" ry="60" fill="url(#dress)" opacity="0.8"/>
  <ellipse cx="512" cy="600" rx="75" ry="70" fill="url(#dress)"/>
  <!-- 8形腰部 -->
  <ellipse cx="512" cy="540" rx="40" ry="20" fill="#B86890" opacity="0.4"/>
  <!-- 连衣裙纹理 -->
  <path d="M460 430 Q512 470 564 430" fill="none" stroke="#D898B0" stroke-width="1.5" opacity="0.5"/>
  <path d="M450 550 Q512 590 574 550" fill="none" stroke="#D898B0" stroke-width="1.5" opacity="0.5"/>
  <!-- 手臂 -->
  <path d="M452 420 Q410 480 420 540" fill="none" stroke="#F5D5B8" stroke-width="16" stroke-linecap="round"/>
  <path d="M572 420 Q614 480 604 540" fill="none" stroke="#F5D5B8" stroke-width="16" stroke-linecap="round"/>
  <!-- 双手抚肚 -->
  <ellipse cx="470" cy="590" rx="15" ry="10" fill="#F5D5B8" transform="rotate(-15 470 590)"/>
  <ellipse cx="554" cy="590" rx="15" ry="10" fill="#F5D5B8" transform="rotate(15 554 590)"/>
  <!-- 爱心 -->
  <path d="M470 670 Q470 650 490 650 Q512 650 512 670 Q512 650 534 650 Q554 650 554 670 Q554 700 512 720 Q470 700 470 670Z" fill="#E87080" opacity="0.3"/>
