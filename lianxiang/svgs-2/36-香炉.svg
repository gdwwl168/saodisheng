<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#1a1618"/><stop offset="100%" stop-color="#0a0608"/></radialGradient>
    <radialGradient id="smoke" cx="50%" cy="50%"><stop offset="0%" stop-color="white" stop-opacity="0.08"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">36=香炉</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">3是炉肚圆圆鼓，6是香烟袅袅升</text>
  <!-- 桌面 -->
  <ellipse cx="512" cy="620" rx="200" ry="20" fill="#0a0604" opacity="0.4"/>
  <!-- 香炉身 3形圆肚 -->
  <path d="M420 620 Q380 550 420 480 Q460 440 512 440 Q564 440 604 480 Q644 550 604 620Z" fill="#8B6040"/>
  <path d="M430 615 Q395 550 430 485 Q465 450 512 450 Q559 450 594 485 Q629 550 594 615Z" fill="#A07050" opacity="0.5"/>
  <!-- 炉口 -->
  <ellipse cx="512" cy="450" rx="40" ry="10" fill="#5a2a10"/>
  <!-- 炉颈 -->
  <rect x="485" y="430" width="54" height="20" rx="5" fill="#7a4a20"/>
  <!-- 炉耳 -->
  <path d="M430 490 Q400 480 400 510 Q400 530 430 520" fill="none" stroke="#7a4a20" stroke-width="10" stroke-linecap="round"/>
  <path d="M594 490 Q624 480 624 510 Q624 530 594 520" fill="none" stroke="#7a4a20" stroke-width="10" stroke-linecap="round"/>
  <!-- 炉脚 3个 -->
  <path d="M460 610 L450 650" stroke="#6a3a18" stroke-width="10" stroke-linecap="round"/>
  <path d="M512 615 L512 655" stroke="#6a3a18" stroke-width="10" stroke-linecap="round"/>
  <path d="M564 610 L574 650" stroke="#6a3a18" stroke-width="10" stroke-linecap="round"/>
  <!-- 香烟 6形袅绕 -->
  <path d="M512 420 Q500 380 520 340 Q540 300 510 260 Q480 220 500 180" fill="none" stroke="white" stroke-width="3" opacity="0.2"/>
  <path d="M515 410 Q530 370 510 330 Q490 290 520 250 Q545 210 515 170" fill="none" stroke="white" stroke-width="2" opacity="0.12"/>
  <!-- 烟团 -->
  <circle cx="500" cy="300" r="15" fill="url(#smoke)"/>
  <circle cx="520" cy="250" r="12" fill="url(#smoke)"/>
  <circle cx="505" cy="200" r="10" fill="url(#smoke)"/>
</svg>