<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%"><stop offset="0%" stop-color="#2a2040"/><stop offset="100%" stop-color="#0f0b1a"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="0.5"><stop offset="0%" stop-color="#FFD580" stop-opacity="0.5"/><stop offset="100%" stop-color="#FF9900" stop-opacity="0"/></radialGradient>
    <linearGradient id="wax" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFF5E6"/><stop offset="50%" stop-color="#FFEED5"/><stop offset="100%" stop-color="#E8D5B7"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">01=蜡烛</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">1是蜡烛身，0像烛台圆底座</text>
  <!-- 光晕 -->
  <circle cx="512" cy="380" r="150" fill="url(#glow)"/>
  <circle cx="512" cy="380" r="80" fill="#FFD580" opacity="0.08"/>
  <!-- 烛台底座 0形 -->
  <ellipse cx="512" cy="720" rx="110" ry="30" fill="#5C4A3A" opacity="0.4"/>
  <ellipse cx="512" cy="705" rx="90" ry="24" fill="#7A6652"/>
  <rect x="422" y="648" width="180" height="57" rx="8" fill="#6B5A48"/>
  <ellipse cx="512" cy="648" rx="90" ry="24" fill="#8B7A65"/>
  <ellipse cx="512" cy="705" rx="90" ry="24" fill="#7A6652"/>
  <!-- 蜡烛身 1形直 -->
  <rect x="486" y="400" width="52" height="250" rx="6" fill="url(#wax)"/>
  <rect x="490" y="400" width="10" height="250" fill="white" opacity="0.4"/>
  <rect x="530" y="400" width="5" height="250" fill="#C0A890" opacity="0.3"/>
  <!-- 蜡泪 -->
  <path d="M486 490 Q478 530 486 560 Q490 550 495 510Z" fill="#E8D5B7" opacity="0.7"/>
  <path d="M538 450 Q544 490 538 520 Q534 500 533 470Z" fill="#E8D5B7" opacity="0.6"/>
  <!-- 火焰 -->
  <ellipse cx="512" cy="370" rx="12" ry="22" fill="white" opacity="0.8"/>
  <path d="M512 330 Q528 390 512 410 Q496 390 512 330Z" fill="#FFDD55"/>
  <path d="M512 350 Q520 385 512 400 Q504 385 512 350Z" fill="#FF9900"/>
  <path d="M512 370 Q516 395 512 405 Q508 395 512 370Z" fill="#FF6600" opacity="0.6"/>
  <line x1="512" y1="405" x2="512" y2="415" stroke="#2a2040" stroke-width="3"/>
  <!-- 光线 -->
  <g stroke="#FFD580" stroke-width="1.5" opacity="0.2">
    <line x1="512" y1="300" x2="512" y2="270"/>
    <line x1="555" y1="330" x2="578" y2="310"/>
    <line x1="469" y1="330" x2="446" y2="310"/>
    <line x1="570" y1="370" x2="595" y2="362"/>
    <line x1="454" y1="370" x2="429" y2="362"/>
