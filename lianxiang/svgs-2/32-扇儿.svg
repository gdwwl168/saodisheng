<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%"><stop offset="0%" stop-color="#2a1820"/><stop offset="100%" stop-color="#120a10"/></radialGradient>
    <linearGradient id="fan" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F0D8C0"/><stop offset="100%" stop-color="#D4A880"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="32" fill="url(#bg)"/>
  <text x="512" y="115" text-anchor="middle" font-size="64" font-weight="bold" fill="#E8D5B7" font-family="sans-serif">32=扇儿</text>
  <text x="512" y="170" text-anchor="middle" font-size="28" fill="#A09080" font-family="sans-serif">3是扇面展展开，2是扇柄直直握</text>
  <!-- 扇面 3形展开 -->
  <path d="M512 620 Q300 450 280 350 Q280 380 340 440 Q440 560 512 620" fill="url(#fan)" opacity="0.35"/>
  <path d="M512 620 Q724 450 744 350 Q744 380 684 440 Q584 560 512 620" fill="url(#fan)" opacity="0.35"/>
  <path d="M512 620 Q340 520 300 380 Q380 520 512 620" fill="#E8C8A0" opacity="0.5"/>
  <path d="M512 620 Q684 520 724 380 Q644 520 512 620" fill="#E8C8A0" opacity="0.5"/>
  <!-- 扇骨 -->
  <g stroke="#B88860" stroke-width="1.5" opacity="0.5">
    <line x1="512" y1="620" x2="380" y2="420"/>
    <line x1="512" y1="620" x2="440" y2="400"/>
    <line x1="512" y1="620" x2="512" y2="390"/>
    <line x1="512" y1="620" x2="584" y2="400"/>
    <line x1="512" y1="620" x2="644" y2="420"/>
  </g>
  <!-- 扇面装饰 花鸟 -->
  <circle cx="460" cy="450" r="15" fill="#E8A0A0" opacity="0.3"/>
  <circle cx="460" cy="450" r="8" fill="#E8C080" opacity="0.3"/>
  <circle cx="564" cy="460" r="12" fill="#A0C8E8" opacity="0.25"/>
  <path d="M520 440 Q530 420 540 440" fill="none" stroke="#80A0C0" stroke-width="1.5" opacity="0.3"/>
  <!-- 扇柄 2形直 -->
  <rect x="502" y="620" width="20" height="100" rx="5" fill="#8B5A30"/>
  <rect x="505" y="620" width="8" height="100" fill="#A07040" opacity="0.5"/>
  <!-- 扇坠 -->
  <circle cx="512" cy="725" r="8" fill="#C84040"/>
  <line x1="512" y1="720" x2="512" y2="708" stroke="#E8C898" stroke-width="2"/>
  <path d="M512 733 Q505 740 512 745 Q519 740 512 733Z" fill="#C84040" opacity="0.6"/>
</svg>
