<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="mt-theme">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="12345.png">
<link rel="icon" href="12345.png" type="image/png">
<title>凑十法 · 小学数学</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --bg: #fefce8; --text: #422006; --accent: #f59e0b;
  --card-bg: #fff; --border: #fde68a; --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --pink: #ec4899;
}
[data-theme="dark"] {
  --bg: #1a1a2e; --text: #fef3c7; --accent: #fbbf24;
  --card-bg: #252540; --border: #3a3a55; --shadow: 0 4px 20px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; flex-direction: column;
  user-select: none; -webkit-user-select: none;
}

.header {
  display: flex; align-items: center; padding: 10px 20px;
  border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap;
}
.header a { color: var(--accent); text-decoration: none; font-size: 14px; }
.header h1 { font-size: 1.3em; letter-spacing: 2px; flex: 1; }
.header button, .header .nav-link {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--card-bg); color: var(--text); cursor: pointer;
  font-family: inherit; font-size: 0.85em;
  text-decoration: none; display: inline-flex; align-items: center;
  white-space: nowrap;
}
.header .nav-link:hover { border-color: var(--accent); color: var(--accent); }

.main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 16px; }

/* Question card */
.q-card {
  background: var(--card-bg); border: 2px solid var(--border); border-radius: 24px;
  padding: 28px 36px; text-align: center; box-shadow: var(--shadow);
  min-width: 300px;
}
.q-label { font-size: 0.9em; opacity: 0.6; margin-bottom: 8px; }
.q-formula {
  font-size: 3em; font-weight: 900; letter-spacing: 0.1em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.q-num { color: var(--accent); }
.q-plus { opacity: 0.4; font-size: 0.7em; }
.q-blank {
  display: inline-block; width: 80px; height: 70px; line-height: 70px;
  color: var(--accent); font-size: 1.1em;
  animation: pulse 1.5s ease-in-out infinite;
}
.q-ten { color: var(--green); font-weight: 900; }
.q-ten.pulse {
  color: var(--accent);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.15); }
}
.q-equals { opacity: 0.4; font-size: 0.7em; }
.q-ten { color: var(--green); font-weight: 900; }
.q-ten.pulse {
  color: var(--accent);
  animation: pulse 1.5s ease-in-out infinite;
}

/* Visual blocks */
.blocks-row {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.block-group {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
  max-width: 400px;
}
.block {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85em; font-weight: 700; color: #fff;
  transition: all 0.3s;
}
.block.filled { background: var(--accent); box-shadow: 0 2px 6px rgba(245,158,11,0.3); }
.block.empty { background: #e5e7eb; }
.block.answer { background: var(--green); animation: popIn 0.4s ease-out; }
@keyframes popIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Answer choices */
.choices {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.choice-btn {
  width: 64px; height: 64px; border-radius: 16px;
  border: 2px solid var(--border); background: var(--card-bg);
  font-size: 1.6em; font-weight: 900; color: var(--text);
  cursor: pointer; transition: all 0.2s;
  box-shadow: var(--shadow);
}
.choice-btn:hover { transform: translateY(-3px); border-color: var(--accent); }
.choice-btn:active { transform: scale(0.95); }
.target-btn {
  padding: 8px 20px; border: 2px solid var(--border); border-radius: 20px;
  background: var(--card-bg); color: var(--text); font-family: inherit;
  font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.target-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.choice-btn.correct { background: var(--green); color: #fff; border-color: var(--green); }
.choice-btn.wrong { background: var(--red); color: #fff; border-color: var(--red); animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Stats */
.stats {
  display: flex; gap: 20px; font-size: 0.95em; opacity: 0.7;
}
.stats strong { color: var(--accent); }

/* Stars */
.stars {
  display: flex; gap: 4px; justify-content: center; font-size: 1.5em;
}
.star { opacity: 0.2; transition: opacity 0.3s; }
.star.earned { opacity: 1; animation: starPop 0.5s ease-out; }
@keyframes starPop {
  0% { transform: scale(0) rotate(-180deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Celebration */
.celebrate {
  position: fixed; inset: 0; pointer-events: none; z-index: 99;
  display: flex; align-items: center; justify-content: center;
  font-size: 5em; animation: celebrateAnim 1.5s ease-out forwards;
  opacity: 0;
}
@keyframes celebrateAnim {
  0% { opacity: 1; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.5); }
  100% { opacity: 0; transform: scale(2); }
}

.footer { text-align: center; padding: 8px; opacity: 0.3; font-size: 0.7em; }

@media (max-width: 480px) {
  .q-formula { font-size: 2em; }
  .q-blank { width: 60px; height: 56px; line-height: 56px; }
  .block { width: 28px; height: 28px; font-size: 0.7em; }
  .choice-btn { width: 52px; height: 52px; font-size: 1.3em; }
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html"><img src="12345.png" alt="logo" style="width:20px;height:20px;border-radius:4px;vertical-align:middle;margin-right:4px;">← 藏经阁</a>
  <h1>凑十法 · 快乐数学</h1>
  <a class="nav-link" href="make-ten-match.html" title="进阶：凑数连连看">🔗 连连看</a>
  <button onclick="toggleTheme()">🌓</button>
</div>

<div class="main">
  <div class="stars" id="stars"></div>

  <div style="display:flex;gap:6px;justify-content:center;">
    <button class="target-btn active" onclick="setTarget(10)">🎯 凑 10</button>
    <button class="target-btn" onclick="setTarget(20)">🎯 凑 20</button>
    <button class="target-btn" onclick="setTarget(30)">🎯 凑 30</button>
    <button class="target-btn" onclick="setTarget(0)">➕ 加法</button>
  </div>

  <div class="q-card">
    <div class="q-label">想一想，括号里应该填几？</div>
    <div class="q-formula">
      <span class="q-num" id="qNum">3</span>
      <span class="q-plus">+</span>
      <span class="q-blank" id="qBlank">?</span>
      <span class="q-equals">=</span>
      <span class="q-ten" id="qTen">10</span>
    </div>
  </div>

  <div class="blocks-row" id="blocksRow"></div>

  <div class="choices" id="choices"></div>

  <div class="stats">
    <span>⭐ 连对：<strong id="streakCount">0</strong></span>
    <span>✅ 正确：<strong id="correctCount">0</strong></span>
    <span>📝 第 <strong id="roundCount">1</strong> 题</span>
  </div>
</div>

<div class="footer">扫地僧创作 · 二〇二六</div>

<script>
let currentNum = 5;
let target = 10;
let streak = 0;
let correctCount = 0;
let roundCount = 0;
let totalStars = 0;

// ═══════ Sounds ═══════
function popSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=c.currentTime;const o=c.createOscillator();const g=c.createGain();o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.08);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.2)}catch(e){}}
function wrongSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=c.currentTime;const o=c.createOscillator();const g=c.createGain();o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(150,t+.15);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.25)}catch(e){}}
function cheerSound(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=c.currentTime;[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator();const g=c.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*.1);g.gain.setValueAtTime(.15,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.4);o.connect(g);g.connect(c.destination);o.start(t+i*.1);o.stop(t+i*.1+.5)})}catch(e){}}
function blockNote(n){try{const c=new(window.AudioContext||window.webkitAudioContext)();const t=c.currentTime;const notes=[262,294,330,349,392,440,494,523,587,659,698,784,880,988,1047,1175,1319,1397,1568,1760];const idx=((n-1)%notes.length+notes.length)%notes.length;const dur = target <= 10 ? 0.3 : target <= 20 ? 0.4 : 0.5;const o=c.createOscillator();const g=c.createGain();o.type='sine';o.frequency.setValueAtTime(notes[idx],t);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+.05)}catch(e){}}

// ═══════ Game ═══════
function setTarget(t) {
  target = t;
  document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('active'));
  const sel = t === 0 ? 'setTarget(0)' : 'setTarget(' + t + ')';
  const btn = document.querySelector('.target-btn[onclick="' + sel + '"]');
  if (btn) btn.classList.add('active');
  correctCount = 0; streak = 0; roundCount = 0; totalStars = 0;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('streakCount').textContent = '0';
  renderStars();
  newQuestion();
}

function newQuestion() {
  if (target === 0) {
    // Addition mode: two 1-digit numbers
    currentNum = Math.floor(Math.random() * 5) + 1; // 1-5
    const num2 = Math.floor(Math.random() * 5) + 1; // 1-5
    roundCount++;
    const answer = currentNum + num2;
    document.getElementById('qNum').textContent = currentNum;
    document.getElementById('qBlank').textContent = num2;
    document.getElementById('qBlank').style.animation = 'none';
    document.getElementById('qTen').textContent = '?';
    document.getElementById('qTen').classList.add('pulse');
    document.getElementById('roundCount').textContent = roundCount;
    // Show all blocks filled
    let blocksHtml = '<div class="block-group">';
    for (let i = 0; i < answer; i++) {
      const c = i < currentNum ? '#f59e0b' : '#3b82f6';
      blocksHtml += '<div class="block" style="background:' + c + ';box-shadow:0 2px 6px ' + c + '33;" onclick="blockNote(' + (i+1) + ')">' + (i+1) + '</div>';
    }
    blocksHtml += '</div>';
    document.getElementById('blocksRow').innerHTML = blocksHtml;
    // Generate choices
    let choices = [answer];
    while (choices.length < 4) {
      const r = Math.floor(Math.random() * 10) + 1;
      if (!choices.includes(r)) choices.push(r);
    }
    choices = choices.sort(() => Math.random() - 0.5);
    document.getElementById('choices').innerHTML = choices.map(c =>
      `<button class="choice-btn" onclick="check(${c})">${c}</button>`
    ).join('');
    return;
  }
  currentNum = Math.floor(Math.random() * (target - 1)) + 1;
  roundCount++;
  const answer = target - currentNum;

  document.getElementById('qNum').textContent = currentNum;
  document.getElementById('qBlank').textContent = '?';
  document.getElementById('qBlank').style.animation = '';
  document.getElementById('qTen').textContent = target;
  document.getElementById('qTen').classList.remove('pulse');
  document.getElementById('roundCount').textContent = roundCount;

  // Render blocks: show currentNum filled + answer empty
  const blockSize = target > 20 ? '24px' : target > 10 ? '30px' : '36px';
  const blockFont = target > 20 ? '0.6em' : target > 10 ? '0.75em' : '0.85em';
  let blocksHtml = '<div class="block-group">';
  for (let i = 0; i < target; i++) {
    const style = 'width:' + blockSize + ';height:' + blockSize + ';font-size:' + blockFont + ';';
    if (i < currentNum) blocksHtml += '<div class="block filled" style="' + style + '" onclick="blockNote(' + (i+1) + ')">' + (i+1) + '</div>';
    else blocksHtml += '<div class="block empty" style="' + style + '" id="eb-' + i + '"></div>';
  }
  blocksHtml += '</div>';
  document.getElementById('blocksRow').innerHTML = blocksHtml;

  // Generate answer choices (4 options including correct)
  let choices = [answer];
  while (choices.length < 4) {
    const r = Math.floor(Math.random() * (target - 1)) + 1;
    if (!choices.includes(r)) choices.push(r);
  }
  choices = choices.sort(() => Math.random() - 0.5);

  document.getElementById('choices').innerHTML = choices.map(c =>
    `<button class="choice-btn" onclick="check(${c})">${c}</button>`
  ).join('');
}

function check(guess) {
  const answer = target === 0 ? currentNum + parseInt(document.getElementById('qBlank').textContent) : target - currentNum;
  const btns = document.querySelectorAll('.choice-btn');

  if (guess === answer) {
    // Correct!
    correctCount++; streak++;
    if (target === 0) {
      document.getElementById('qTen').textContent = answer;
      document.getElementById('qTen').style.color = 'var(--green)';
    } else {
      document.getElementById('qBlank').textContent = answer;
      document.getElementById('qBlank').style.color = 'var(--green)';
    }
    btns.forEach(b => { if (parseInt(b.textContent) === answer) b.classList.add('correct'); });

    const pauseTime = target === 0 ? 1200 : target <= 10 ? 1200 : target <= 20 ? 2500 : 4000;
    if (target !== 0) {
      const noteDelay = target <= 10 ? 100 : target <= 20 ? 80 : 60;
      for (let i = currentNum; i < target; i++) {
        const eb = document.getElementById('eb-' + i);
        if (eb) {
          setTimeout(() => { eb.classList.add('answer'); eb.classList.remove('empty'); eb.textContent = i+1; blockNote(i+1); }, (i - currentNum) * noteDelay);
        }
      }
    }

    document.getElementById('streakCount').textContent = streak;
    document.getElementById('correctCount').textContent = correctCount;
    popSound();

    // Stars every 5 correct
    if (streak > 0 && streak % 5 === 0) {
      totalStars++; renderStars(); cheerSound();
      celebrate();
    }

    // Disable buttons
    btns.forEach(b => b.style.pointerEvents = 'none');
    const fillDuration = target > 0 ? (target - currentNum) * (target <= 10 ? 100 : target <= 20 ? 80 : 60) : 0;
    setTimeout(newQuestion, Math.max(pauseTime, fillDuration + 600));

  } else {
    // Wrong
    streak = 0;
    document.getElementById('streakCount').textContent = streak;
    btns.forEach(b => { if (parseInt(b.textContent) === guess) { b.classList.add('wrong'); setTimeout(() => b.classList.remove('wrong'), 400); } });
    wrongSound();
  }
}

function renderStars() {
  let html = '';
  for (let i = 0; i < Math.min(totalStars, 10); i++) html += '<span class="star earned">⭐</span>';
  for (let i = totalStars; i < 10; i++) html += '<span class="star">⭐</span>';
  document.getElementById('stars').innerHTML = html;
}

function celebrate() {
  const el = document.createElement('div');
  el.className = 'celebrate';
  el.textContent = ['🎉','🌟','👏','💪','🏆'][Math.floor(Math.random()*5)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// ═══════ Theme ═══════
function toggleTheme() {
  const h = document.documentElement;
  const next = h.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('mt-theme', next);
}

// ═══════ Keyboard ═══════
document.addEventListener('keydown', e => {
  if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    location.href = 'index.html';
    return;
  }
  const num = parseInt(e.key);
  if (num >= 0 && num <= 9) {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => { if (parseInt(b.textContent) === num) b.click(); });
  }
  if (e.key === ' ') { e.preventDefault(); newQuestion(); }
  if (e.key === 't') toggleTheme();
});

// ═══════ Init ═══════
(function() {
  const t = localStorage.getItem('mt-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
  renderStars();
  newQuestion();
})();
</script>
<script src="pwa-register.js" defer></script>
</body>
</html>
