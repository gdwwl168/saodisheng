<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="doodle_theme">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="12345.png">
<title>十二生肖涂鸦 · Kids Doodle</title>
<style>
:root {
  --bg: #fef9f0;
  --card: #fffdf8;
  --text: #4a3728;
  --accent: #d4843a;
  --border: #e0d5c1;
  --tool-bg: #fff8f0;
}
[data-theme="dark"] {
  --bg: #1e1b18;
  --card: #2a2520;
  --text: #d4c5a9;
  --accent: #e8a860;
  --border: #4a3f35;
  --tool-bg: #2a2520;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Noto Serif SC","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* 左侧动物面板 */
.animal-panel {
  width: 260px; min-width: 260px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: background 0.3s;
  z-index: 10;
}
.panel-header {
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.panel-header h1 {
  font-size: 1.2em; color: var(--accent);
  letter-spacing: 2px; margin-bottom: 2px;
}
.panel-header .sub {
  font-size: 0.7em; opacity: 0.5;
}
.animal-grid {
  flex: 1; overflow-y: auto;
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-content: start;
}
.animal-grid::-webkit-scrollbar { width:4px; }
.animal-grid::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.animal-card {
  padding: 8px 6px; border-radius: 10px;
  border: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  background: var(--tool-bg);
}
.animal-card:hover { border-color: var(--accent); background: rgba(212,132,58,0.08); }
.animal-card.active { border-color: var(--accent); background: rgba(212,132,58,0.15); }
.animal-card .zodiac-emoji { font-size: 2em; display: block; }
.animal-card .zodiac-name { font-size: 0.75em; font-weight: 600; margin-top: 2px; }

.panel-footer {
  padding: 10px; border-top: 1px solid var(--border);
  text-align: center;
}
.panel-footer a {
  color: var(--accent); text-decoration: none;
  font-size: 0.75em; font-weight: 600;
}

/* 主区域 */
.main {
  flex: 1; display: flex; flex-direction: column;
}

/* 工具栏 */
.toolbar {
  display: flex; align-items: center;
  padding: 10px 16px; gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  flex-wrap: wrap;
  transition: background 0.3s;
}
.toolbar button {
  padding: 8px 16px; border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--tool-bg);
  color: var(--text);
  font-family: inherit;
  font-size: 0.8em; cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.toolbar button:hover { background: rgba(212,132,58,0.12); border-color: var(--accent); }
.toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.toolbar input[type="color"] {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-radius: 50%; cursor: pointer; padding: 0;
  background: transparent;
}
.toolbar input[type="range"] {
  width: 80px; accent-color: var(--accent);
}
.toolbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.toolbar .spacer { flex: 1; }

/* 画布区域 */
.canvas-wrap {
  flex: 1; display: flex; align-items: center;
  justify-content: center; padding: 0;
  background: #faf5ef;
  position: relative;
  overflow: hidden;
}
[data-theme="dark"] .canvas-wrap { background: #1a1814; }

#drawCanvas {
  border-radius: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  cursor: crosshair;
  background: #fffef9;
  border: 1px solid #d0c8b8;
}
[data-theme="dark"] #drawCanvas { background: #f5f0e5; border-color: #5a4f42; }

/* 全屏模式 - 工具栏移到右侧 */
.main.is-fullscreen,
.main:fullscreen,
.main:-webkit-full-screen {
  flex-direction: row !important;
  background: var(--bg);
}
.main.is-fullscreen .toolbar,
.main:fullscreen .toolbar,
.main:-webkit-full-screen .toolbar {
  flex-direction: column;
  width: 340px;
  min-width: 340px;
  padding: 20px 14px;
  gap: 10px;
  border-bottom: none;
  border-left: 1px solid var(--border);
  border-radius: 20px 0 0 20px;
  overflow-y: auto;
  max-height: 100vh;
  order: 2;
  margin-right: 50px;
}
.main.is-fullscreen .toolbar button,
.main:fullscreen .toolbar button,
.main:-webkit-full-screen .toolbar button {
  padding: 14px 12px;
  font-size: 1em;
  border-radius: 16px;
  text-align: center;
  white-space: nowrap;
  line-height: 1.4;
  width: 100%;
}
.main.is-fullscreen .toolbar .sep,
.main:fullscreen .toolbar .sep,
.main:-webkit-full-screen .toolbar .sep {
  width: 100%;
  height: 1px;
  margin: 6px 0;
}
.main.is-fullscreen .toolbar .spacer,
.main:fullscreen .toolbar .spacer,
.main:-webkit-full-screen .toolbar .spacer { display: none; }
.main.is-fullscreen .toolbar input[type="range"],
.main:fullscreen .toolbar input[type="range"],
.main:-webkit-full-screen .toolbar input[type="range"] {
  width: 280px;
  height: auto;
  margin: 8px auto;
}
.main.is-fullscreen .toolbar #colorPalette,
.main:fullscreen .toolbar #colorPalette,
.main:-webkit-full-screen .toolbar #colorPalette {
  display: flex !important;
  flex-direction: row;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.main.is-fullscreen .toolbar #colorPalette span,
.main:fullscreen .toolbar #colorPalette span,
.main:-webkit-full-screen .toolbar #colorPalette span {
  width: 70px !important;
  height: 70px !important;
  line-height: 70px !important;
  font-size: 16px !important;
}
.main.is-fullscreen .toolbar .action-group,
.main:fullscreen .toolbar .action-group,
.main:-webkit-full-screen .toolbar .action-group {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  width: 100%;
}
.main.is-fullscreen .toolbar .action-group .sep,
.main:fullscreen .toolbar .action-group .sep,
.main:-webkit-full-screen .toolbar .action-group .sep { display: none; }
.main.is-fullscreen .toolbar .tool-group,
.main:fullscreen .toolbar .tool-group,
.main:-webkit-full-screen .toolbar .tool-group {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  width: 100%;
}
.main.is-fullscreen .canvas-wrap,
.main:fullscreen .canvas-wrap,
.main:-webkit-full-screen .canvas-wrap {
  flex: 1;
  padding: 12px;
  background: #faf5ef;
  order: 1;
}
.main.is-fullscreen #drawCanvas,
.main:fullscreen #drawCanvas,
.main:-webkit-full-screen #drawCanvas {
  border-radius: 12px;
  max-width: calc(100vw - 440px);
  max-height: 100vh;
}
[data-theme="dark"] .main.is-fullscreen,
[data-theme="dark"] .main:fullscreen,
[data-theme="dark"] .main:-webkit-full-screen { background: #1e1b18; }
[data-theme="dark"] .main.is-fullscreen .canvas-wrap,
[data-theme="dark"] .main:fullscreen .canvas-wrap,
[data-theme="dark"] .main:-webkit-full-screen .canvas-wrap { background: #1a1814; }

/* 缩放提示 */
.zoom-hint {
  position: absolute; bottom: 20px; right: 24px;
  font-size: 0.7em; opacity: 0.4;
}

/* 模板面板遮罩（移动端） */
.panel-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 15;
}
.panel-backdrop.show { display: block; }
#panelToggleBtn { display: none; }

/* 移动端适配 */
@media (max-width: 768px) {
  .animal-panel {
    position: fixed; left:0; top:0; bottom:0;
    transform: translateX(-100%);
    z-index: 20;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    transition: transform 0.25s ease;
  }
  .animal-panel.open { transform: translateX(0); }
  #panelToggleBtn { display: inline-block; }
  .canvas-wrap { padding: 8px; }
  #drawCanvas { border-radius: 4px; }
  .toolbar { padding: 6px 8px; gap: 4px; }
  .toolbar button { padding: 6px 10px; font-size: 0.7em; }
}

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px; border-radius: 20px;
  background: var(--accent); color: #fff;
  font-size: 0.85em; z-index: 100;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 动物面板 -->
<div class="animal-panel" id="animalPanel">
  <div class="panel-header">
    <h1 id="panelTitle">🐉 十二生肖</h1>
    <div class="sub" id="panelSub">选一个动物开始涂鸦吧</div>
    <div style="display:flex;gap:6px;margin-top:8px;justify-content:center;">
      <button onclick="switchCategory('zodiac')" id="catZodiac" style="padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--accent);color:#fff;font-family:inherit;font-size:0.7em;cursor:pointer;">🐉 生肖</button>
      <button onclick="switchCategory('landscape')" id="catLandscape" style="padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--tool-bg);color:var(--text);font-family:inherit;font-size:0.7em;cursor:pointer;">⛰️ 山川</button>
      <button onclick="switchCategory('plant')" id="catPlant" style="padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--tool-bg);color:var(--text);font-family:inherit;font-size:0.7em;cursor:pointer;">🌱 植物</button>
      <button onclick="switchCategory('food')" id="catFood" style="padding:4px 12px;border-radius:12px;border:1px solid var(--border);background:var(--tool-bg);color:var(--text);font-family:inherit;font-size:0.7em;cursor:pointer;">🍔 食品</button>
    </div>
  </div>
  <div class="animal-grid" id="animalGrid"></div>
  <div class="panel-footer">
    <a href="index.html">🏠 回首页</a>
  </div>
</div>

<!-- 移动端模板面板遮罩 -->
<div class="panel-backdrop" id="panelBackdrop" onclick="closePanel()"></div>

<!-- 主区域 -->
<div class="main">
  <div class="toolbar" id="toolbar">
    <button id="panelToggleBtn" onclick="togglePanel()" title="选择模板">🎨 模板</button>
    <button onclick="newCanvas()" title="新建画布">📄 新建</button>
    <span class="sep"></span>
    <span class="tool-group">
    <button class="active" data-tool="pen" onclick="setTool('pen', this)" id="penBtn">🖊️ 圆头</button>
    <button data-tool="texture" onclick="setTool('texture', this)" id="textureBtn">✏️ 铅笔</button>
    <button data-tool="brush" onclick="setTool('brush', this)" id="brushBtn">💨 喷枪</button>
    <button data-tool="shape" onclick="setTool('shape', this)" id="shapeBtn" title="点击切换：直线 / 圆圈 / 矩形 / 椭圆">📏 直线</button>
    <button data-tool="bucket" onclick="setTool('bucket', this)">🪣 油漆桶</button>
    <button data-tool="eraser" onclick="setTool('eraser', this)">🧽 橡皮</button>
    <button data-tool="stamp" onclick="setTool('stamp', this)">🔴 印章</button>
    </span>
    <input type="range" id="sizeSlider" min="2" max="80" value="25" oninput="setSize(this.value)" title="粗细">
    <span class="sep"></span>
    <span id="colorPalette" style="display:grid;grid-template-columns:repeat(8,1fr);gap:3px;align-items:center;"></span>
    <span class="sep"></span>
    <span class="action-group">
    <button onclick="undo()" title="撤销">↩ 撤销</button>
    <button onclick="clearCanvas()" title="清空">🗑 清空</button>
    <span class="sep"></span>
    <button onclick="toggleOutline()" id="outlineBtn" title="显示/隐藏轮廓">👁️ 轮廓</button>
    <button onclick="toggleTheme()" title="切换主题">🌓</button>
    <button onclick="toggleFullscreen()" id="fullscreenBtn" title="全屏">📺 全屏</button>
    <button onclick="saveDoodle()" title="保存作品">💾 保存</button>
    </span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="drawCanvas"></canvas>
    <div class="zoom-hint">滚轮缩放 | 空格/中键平移 | 0 重置视图 | F 全屏</div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============ 初始化 ============
function init() {
  canvas = document.getElementById('drawCanvas');
  ctx = canvas.getContext('2d', { willReadFrequently: true });
  wrap = document.getElementById('canvasWrap');
  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;
  resizeCanvas();
  makeWhite();
  renderAnimalGrid();
  selectAnimal(0);
  renderPalette();
  loadTheme();

  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('mouseleave', onPointerUp);
  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove', handleTouch, { passive: false });
  canvas.addEventListener('touchend', onPointerUp);
  canvas.addEventListener('wheel', handleWheel, { passive: false });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  // 中键默认会触发自动滚动，平移时禁掉
  canvas.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });

  document.addEventListener('keydown', handleKey);
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      spaceDown = false;
      if (!isPanning && !isDrawing) updateCursor();
    }
  });
}

function applyViewTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function resetView() {
  scale = 1;
  panX = 0;
  panY = 0;
  applyViewTransform();
  showToast('视图已重置');
}

function resizeCanvas() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  const size = Math.min(w, h);
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
}

function makeWhite() {
  currentBg = getComputedStyle(canvas).backgroundColor || '#fffef9';
  ctx.fillStyle = currentBg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ============ 动物面板 ============
function currentData() { return CAT_META[currentCategory].data; }

function updateCategoryUI(cat) {
  const m = CAT_META[cat];
  document.getElementById('panelTitle').innerHTML = m.title;
  document.getElementById('panelSub').textContent = m.sub;
  Object.keys(CAT_META).forEach(k => {
    const el = document.getElementById(CAT_META[k].btn);
    if (!el) return;
    const active = k === cat;
    el.style.background = active ? 'var(--accent)' : 'var(--tool-bg)';
    el.style.color = active ? '#fff' : 'var(--text)';
  });
}

function switchCategory(cat) {
  currentCategory = cat;
  currentAnimal = 0;
  updateCategoryUI(cat);
  renderAnimalGrid();
  selectAnimal(0);
}

function renderAnimalGrid() {
  const grid = document.getElementById('animalGrid');
  const data = currentData();
  grid.innerHTML = data.map((z, i) => `
    <div class="animal-card${i === currentAnimal ? ' active' : ''}" onclick="selectAnimal(${i})">
      <span class="zodiac-emoji">${z.emoji}</span>
      <span class="zodiac-name">${z.name}</span>
    </div>
  `).join('');
}

function selectAnimal(idx) {
  currentAnimal = idx;
  clearStep = 0;
  renderAnimalGrid();
  undoStack = [];
  const data = currentData();
  const bg = data[idx].bg;
  currentBg = bg;
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  redrawOutline();
  closePanel();
}

let outlineId = 0;
function outlineCacheKey(cat, idx, level, s) {
  return `${cat}|${idx}|${level}|${s}`;
}
function loadOutlineImage(cat, idx, level, s) {
  const key = outlineCacheKey(cat, idx, level, s);
  if (outlineCache.has(key)) return Promise.resolve(outlineCache.get(key));
  const z = CAT_META[cat].data[idx];
  // 全部类目统一 0–100 线稿坐标系
  const vb = '0 0 110 110';
  const tr = 'translate(5,5)';
  const baseSw = 1.4;
  const sw = (baseSw * [0, 1, 1.8, 3][level]).toFixed(1);
  const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" width="${s}" height="${s}"><style>path,circle,ellipse,line,rect{fill:none;stroke:#5a4a3a;stroke-width:${sw};stroke-linecap:round;stroke-linejoin:round;opacity:0.65;}</style><g transform="${tr}">${z.svg}</g></svg>`;
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      outlineCache.set(key, img);
      // 简单上限，避免无限增长
      if (outlineCache.size > 80) {
        const first = outlineCache.keys().next().value;
        outlineCache.delete(first);
      }
      resolve(img);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('outline load fail')); };
    img.src = url;
  });
}
function redrawOutline() {
  if (!showOutline) return;
  const s = canvas.width;
  const cat = currentCategory;
  const idx = currentAnimal;
  const level = outlineLevel;
  const id = ++outlineId;
  loadOutlineImage(cat, idx, level, s).then(img => {
    if (id !== outlineId || cat !== currentCategory || idx !== currentAnimal) return;
    ctx.drawImage(img, 0, 0, s, s);
    pushUndo();
  }).catch(() => {});
}

let outlineLevel = 1; // 0=隐藏 1=细 2=中 3=粗
function toggleOutline() {
  outlineLevel = (outlineLevel + 1) % 4;
  const btn = document.getElementById('outlineBtn');
  const labels = ['👁️ 隐藏', '👁️ 细线', '👁️ 中线', '👁️ 粗线'];
  btn.textContent = labels[outlineLevel];
  btn.classList.toggle('active', outlineLevel > 0);
  showOutline = outlineLevel > 0;
  if (showOutline) {
    redrawOutline();
  } else {
    clearCanvas(true);
    if (undoStack.length > 0) {
      const last = undoStack[undoStack.length - 1];
      if (last.isOutline) undoStack.pop();
    }
    if (undoStack.length > 0) {
      ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
    }
  }
}

// ============ 绘制 / 平移 ============
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function startPan(clientX, clientY) {
  isPanning = true;
  panStart = { x: clientX - panX, y: clientY - panY };
  canvas.style.cursor = 'grabbing';
}

function onPointerDown(e) {
  // 中键，或空格+左键：平移
  if (e.button === 1 || (e.button === 0 && spaceDown)) {
    e.preventDefault();
    startPan(e.clientX, e.clientY);
    return;
  }
  startDraw(e);
}

function onPointerMove(e) {
  if (isPanning) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyViewTransform();
    return;
  }
  draw(e);
}

function onPointerUp() {
  if (isPanning) {
    isPanning = false;
    updateCursor();
  }
  stopDraw();
}

function startDraw(e) {
  clearStep = 0;
  if (e.button !== undefined && e.button !== 0) return;
  const pos = getPos(e.touches ? e.touches[0] : e);
  if (tool === 'bucket') {
    floodFill(Math.round(pos.x), Math.round(pos.y));
    return;
  }
  if (tool === 'stamp') {
    pushUndo();
    stampCircle(pos.x, pos.y);
    isDrawing = true;
    return;
  }
  // 直线 / 圆圈 / 矩形 / 椭圆：按下定起点，拖拽预览，松手定稿
  if (SHAPE_SET.has(tool)) {
    isDrawing = true;
    hasMoved = false;
    drawStartPos = pos;
    lastDrawPos = pos;
    pushUndo();
    shapeSnap = ctx.getImageData(0, 0, canvas.width, canvas.height);
    return;
  }
  isDrawing = true;
  hasMoved = false;
  drawStartPos = pos;
  lastDrawPos = pos;
  lastWaterPos = (tool === 'watercolor') ? pos : null;
  waterPath = (tool === 'watercolor') ? [pos] : null;
  highPath = null;
  dashTravel = 0;
  if (tool === 'brush' && brushMode === 0) {
    // 喷枪：rAF 持续喷洒，与屏幕刷新同步
    sprayPos = pos;
    pushUndo();
    if (sprayRaf) cancelAnimationFrame(sprayRaf);
    const loop = () => {
      if (!isDrawing) { sprayRaf = null; return; }
      sprayAt(sprayPos.x, sprayPos.y);
      sprayRaf = requestAnimationFrame(loop);
    };
    sprayRaf = requestAnimationFrame(loop);
    return;
  }
  // 荧光：记录路径，拖动时整段重画（均匀半透明、像马克笔）
  if (tool === 'brush' && brushMode === 1) {
    highPath = [pos];
    pushUndo();
    return;
  }
  applyStyle();
  pushUndo();
  // 自由线只画「上一点→当前点」小段，避免整路径反复 stroke（细线发糊/虚线错乱）
}

/** 荧光笔：宽扁半透明、多层叠色，单笔内不发黑 */
function drawHighlighterStroke(points) {
  if (!points || points.length < 1) return;
  const w = Math.max(10, size * 3.4);
  ctx.save();
  ctx.lineJoin = 'round';
  ctx.lineCap = 'square'; // 扁头马克笔感
  ctx.strokeStyle = color;
  ctx.setLineDash([]);
  ctx.globalCompositeOperation = 'source-over';

  const stroke = (width, alpha) => {
    ctx.lineWidth = width;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    if (points.length === 1) {
      // 单击：画一小段扁头点
      ctx.lineTo(points[0].x + 0.01, points[0].y);
    } else {
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();
  };

  // 外缘轻晕 → 主体 → 中心略浓（模拟笔芯）
  stroke(w * 1.2, 0.10);
  stroke(w, 0.22);
  ctx.lineCap = 'round';
  stroke(w * 0.42, 0.16);
  ctx.restore();
}

function stampCircle(x, y) {
  const r = size / 2;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function sprayAt(x, y) {
  const r = size * 1.5;
  for (let i = 0; i < size; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * r;
    const dx = x + Math.cos(angle) * dist;
    const dy = y + Math.sin(angle) * dist;
    ctx.beginPath();
    ctx.arc(dx, dy, Math.random() * 3 + 1, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }
}

function drawShapePreview(from, to) {
  if (!shapeSnap || !from || !to) return;
  ctx.putImageData(shapeSnap, 0, 0);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
  ctx.beginPath();
  if (tool === 'line') {
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  } else if (tool === 'circle') {
    const r = Math.hypot(to.x - from.x, to.y - from.y);
    if (r > 0.5) {
      ctx.arc(from.x, from.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  } else if (tool === 'rect') {
    const x = Math.min(from.x, to.x);
    const y = Math.min(from.y, to.y);
    const w = Math.abs(to.x - from.x);
    const h = Math.abs(to.y - from.y);
    if (w > 0.5 || h > 0.5) {
      ctx.rect(x, y, w, h);
      ctx.stroke();
    }
  } else if (tool === 'ellipse') {
    const x = Math.min(from.x, to.x);
    const y = Math.min(from.y, to.y);
    const w = Math.abs(to.x - from.x);
    const h = Math.abs(to.y - from.y);
    if (w > 0.5 || h > 0.5) {
      const cx = x + w / 2, cy = y + h / 2;
      ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function draw(e) {
  if (!isDrawing) return;
  hasMoved = true;
  e.preventDefault();
  const pos = getPos(e.touches ? e.touches[0] : e);
  if (tool === 'stamp') {
    stampCircle(pos.x, pos.y);
    return;
  }
  if (SHAPE_SET.has(tool)) {
    lastDrawPos = pos;
    drawShapePreview(drawStartPos, pos);
    return;
  }
  if (tool === 'brush' && brushMode === 0) {
    sprayPos = pos;
  } else if (tool === 'brush' && brushMode === 1) {
    // 荧光：整段重画，笔迹均匀半透明
    if (undoStack.length > 0) {
      ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
      if (!highPath) highPath = [drawStartPos];
      highPath.push(pos);
      drawHighlighterStroke(highPath);
    }
    lastDrawPos = pos;
  } else {
    // 水彩：先擦掉上一段，重画整条路径，避免自重叠
    if (tool === 'watercolor' && undoStack.length > 0) {
      ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
      ctx.beginPath();
      ctx.moveTo(drawStartPos.x, drawStartPos.y);
      // 用保存的路径点重画
      if (!waterPath) waterPath = [drawStartPos];
      waterPath.push(pos);
      ctx.moveTo(waterPath[0].x, waterPath[0].y);
      for (let i = 1; i < waterPath.length; i++) ctx.lineTo(waterPath[i].x, waterPath[i].y);
      ctx.stroke();
    } else {
      // 只 stroke 当前小段（细线/虚线/圆头等都依赖此逻辑）
      applyStyle();
      if (tool === 'pen' && penMode === 3) {
        ctx.lineDashOffset = -dashTravel;
      }
      ctx.beginPath();
      ctx.moveTo(lastDrawPos.x, lastDrawPos.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      dashTravel += Math.hypot(pos.x - lastDrawPos.x, pos.y - lastDrawPos.y);
    }
    // 蜡笔：蜡质刮擦感
    if (tool === 'crayon') {
      const dx = pos.x - lastDrawPos.x, dy = pos.y - lastDrawPos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // 粗蜡芯：宽而不均匀的核心线条
      for (let i = 0; i < 8; i++) {
        const ox = (Math.random() - 0.5) * size * 0.6;
        const oy = (Math.random() - 0.5) * size * 0.6;
        ctx.beginPath();
        ctx.moveTo(lastDrawPos.x + ox, lastDrawPos.y + oy);
        ctx.lineTo(pos.x + ox, pos.y + oy);
        ctx.strokeStyle = color;
        const pressure = Math.random();
        ctx.globalAlpha = 0.02 + pressure * 0.12;
        ctx.lineWidth = size * (0.3 + pressure * 0.5);
        ctx.stroke();
      }
      // 蜡屑：边缘碎粒
      const crumbs = Math.floor(dist * 0.8);
      for (let i = 0; i < crumbs; i++) {
        const t = Math.random();
        const edge = (Math.random() - 0.5) * size * 0.9;
        const px = lastDrawPos.x + dx * t + edge + (Math.random() - 0.5) * size * 0.3;
        const py = lastDrawPos.y + dy * t + edge + (Math.random() - 0.5) * size * 0.3;
        ctx.beginPath();
        ctx.arc(px, py, Math.random() * size * 0.3 + 1, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.01 + Math.random() * 0.04;
        ctx.fill();
      }
      applyStyle();
    } else if (tool === 'oil') {
      // 油画：厚重湿叠，大块涂抹感
      const dx = pos.x - drawStartPos.x, dy = pos.y - drawStartPos.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // 少量大块偏移 → 浓厚堆叠
      for (let i = 0; i < 3; i++) {
        const ox = (Math.random() - 0.5) * size * 0.4;
        const oy = (Math.random() - 0.5) * size * 0.4;
        ctx.beginPath();
        ctx.moveTo(lastDrawPos.x + ox, lastDrawPos.y + oy);
        ctx.lineTo(pos.x + ox, pos.y + oy);
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.25 + Math.random() * 0.15;
        ctx.lineWidth = size * (1.5 + Math.random() * 0.8);
        ctx.stroke();
      }
      // 少量大颗粒 → 油画肌理
      const blobs = Math.floor(dist * 0.15);
      for (let i = 0; i < blobs; i++) {
        const t = Math.random();
        const px = lastDrawPos.x + dx * t + (Math.random() - 0.5) * size * 0.3;
        const py = lastDrawPos.y + dy * t + (Math.random() - 0.5) * size * 0.3;
        ctx.beginPath();
        ctx.arc(px, py, Math.random() * size * 0.5 + size * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.1 + Math.random() * 0.1;
        ctx.fill();
      }
      applyStyle();
    }
    lastDrawPos = pos;
  }
}

function stopDraw() {
  if (sprayRaf) { cancelAnimationFrame(sprayRaf); sprayRaf = null; }
  if (!isDrawing) return;
  isDrawing = false;
  if (tool === 'stamp') return;
  if (SHAPE_SET.has(tool)) {
    // 拖过才留下图形；单击无位移则不画
    if (hasMoved && drawStartPos && lastDrawPos) {
      drawShapePreview(drawStartPos, lastDrawPos);
    } else if (shapeSnap) {
      ctx.putImageData(shapeSnap, 0, 0);
    }
    shapeSnap = null;
    drawStartPos = null;
    return;
  }
  if (waterPath) waterPath = null;
  // 荧光单击：留下一个扁头色点
  if (tool === 'brush' && brushMode === 1) {
    if (!hasMoved && highPath && highPath.length && undoStack.length > 0) {
      ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
      drawHighlighterStroke(highPath);
    }
    highPath = null;
    drawStartPos = null;
    return;
  }
  if (highPath) highPath = null;
  // 橡皮单击（未拖动）：擦出一个圆
  if (tool === 'eraser' && !hasMoved && drawStartPos) {
    const pos = drawStartPos;
    const r = size / 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = currentBg;
    ctx.fill();
  }
  // 笔类单击：留下一个圆点
  if (tool === 'pen' && !hasMoved && drawStartPos) {
    applyStyle();
    const r = Math.max(0.6, (ctx.lineWidth || size) / 2);
    ctx.beginPath();
    ctx.arc(drawStartPos.x, drawStartPos.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = 1;
    ctx.fill();
  }
  dashTravel = 0;
  drawStartPos = null;
}

function handleTouch(e) {
  e.preventDefault();
  if (e.type === 'touchstart') {
    // 双指：准备平移（记录中心）
    if (e.touches.length === 2) {
      isDrawing = false;
      if (sprayRaf) { cancelAnimationFrame(sprayRaf); sprayRaf = null; }
      const t0 = e.touches[0], t1 = e.touches[1];
      startPan((t0.clientX + t1.clientX) / 2, (t0.clientY + t1.clientY) / 2);
      return;
    }
    startDraw(e);
  } else if (e.type === 'touchmove') {
    if (isPanning && e.touches.length >= 1) {
      const t = e.touches.length >= 2
        ? { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 }
        : { x: e.touches[0].clientX, y: e.touches[0].clientY };
      panX = t.x - panStart.x;
      panY = t.y - panStart.y;
      applyViewTransform();
      return;
    }
    draw(e);
  }
}

function applyStyle() {
  ctx.strokeStyle = tool === 'eraser' ? currentBg : (tool === 'pencil' ? '#000000' : color);
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
  ctx.lineDashOffset = 0;
  ctx.globalCompositeOperation = 'source-over';
  if (tool === 'brush') {
    ctx.lineWidth = size * 1.5;
    if (brushMode === 0) { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.globalAlpha = 0.6; }
    else if (brushMode === 1) { ctx.lineCap = 'square'; ctx.lineJoin = 'round'; ctx.lineWidth = Math.max(10, size * 3.4); ctx.globalAlpha = 0.22; }
    else if (brushMode === 2) { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.globalAlpha = 0.7; }
    else if (brushMode === 3) { ctx.lineCap = 'square'; ctx.lineJoin = 'miter'; ctx.globalAlpha = 0.8; }
  } else if (tool === 'pencil') {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(1, size * 0.3);
    ctx.globalAlpha = 0.85;
  } else if (tool === 'crayon') {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = size * 0.7;
    ctx.globalAlpha = 0.65;
  } else if (tool === 'oil') {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = size * 1.2;
    ctx.globalAlpha = 0.45;
  } else if (tool === 'watercolor') {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.lineWidth = size * 2;
    ctx.globalAlpha = 0.3;
  } else if (tool === 'pen') {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (penMode === 0) {
      // 圆头
      ctx.lineWidth = size;
      ctx.globalAlpha = 1;
    } else if (penMode === 1) {
      // 细线：真正细、实线、不沿用虚线状态
      ctx.lineWidth = Math.max(1, size * 0.22);
      ctx.globalAlpha = 1;
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    } else if (penMode === 2) {
      // 粗线
      ctx.lineWidth = size * 2;
      ctx.globalAlpha = 0.85;
    } else if (penMode === 3) {
      // 虚线
      ctx.lineWidth = Math.max(1, size * 0.9);
      ctx.globalAlpha = 1;
      const dash = Math.max(4, size * 1.2);
      const gap = Math.max(4, size * 1.4);
      ctx.setLineDash([dash, gap]);
      ctx.lineDashOffset = -dashTravel;
    }
  } else {
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
}

// ============ 油漆桶（scanline + Uint8Array，避免字符串 Set 卡顿） ============
function floodFill(x, y) {
  const w = canvas.width, h = canvas.height;
  x = Math.max(0, Math.min(w - 1, x | 0));
  y = Math.max(0, Math.min(h - 1, y | 0));
  const imgData = ctx.getImageData(0, 0, w, h);
  const data = imgData.data;
  const idx = (y * w + x) * 4;
  const tr = data[idx], tg = data[idx + 1], tb = data[idx + 2], ta = data[idx + 3];

  const fillC = hexToRgb(color);
  if (tr === fillC.r && tg === fillC.g && tb === fillC.b && ta === fillC.a) return;

  pushUndo();

  const match = (i) =>
    Math.abs(data[i] - tr) <= 1 &&
    Math.abs(data[i + 1] - tg) <= 1 &&
    Math.abs(data[i + 2] - tb) <= 1 &&
    Math.abs(data[i + 3] - ta) <= 1;

  const paint = (i) => {
    data[i] = fillC.r;
    data[i + 1] = fillC.g;
    data[i + 2] = fillC.b;
    data[i + 3] = fillC.a;
  };

  const visited = new Uint8Array(w * h);
  const stack = [x, y];

  while (stack.length > 0) {
    const cy = stack.pop();
    let cx = stack.pop();
    // 向左扩展到区段起点
    while (cx > 0 && !visited[cy * w + cx - 1] && match((cy * w + cx - 1) * 4)) cx--;
    let spanUp = false, spanDown = false;
    while (cx < w) {
      const p = cy * w + cx;
      const i = p * 4;
      if (visited[p] || !match(i)) break;
      visited[p] = 1;
      paint(i);
      if (cy > 0) {
        const up = p - w;
        if (!visited[up] && match(i - w * 4)) {
          if (!spanUp) { stack.push(cx, cy - 1); spanUp = true; }
        } else spanUp = false;
      }
      if (cy < h - 1) {
        const dn = p + w;
        if (!visited[dn] && match(i + w * 4)) {
          if (!spanDown) { stack.push(cx, cy + 1); spanDown = true; }
        } else spanDown = false;
      }
      cx++;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function hexToRgb(hex) {
  const c = hex.replace('#', '');
  return {
    r: parseInt(c.substring(0, 2), 16),
    g: parseInt(c.substring(2, 4), 16),
    b: parseInt(c.substring(4, 6), 16),
    a: 255
  };
}

// ============ 撤销栈 ============
function pushUndo(data) {
  const d = data || ctx.getImageData(0, 0, canvas.width, canvas.height);
  undoStack.push(d);
  while (undoStack.length > maxUndo) {
    undoStack.shift(); // 丢弃最旧快照，便于 GC 回收 ~2MB/张
  }
}

function undo() {
  if (undoStack.length <= 1) return;
  undoStack.pop();
  const prev = undoStack[undoStack.length - 1];
  ctx.putImageData(prev, 0, 0);
  showToast('已撤销 ↩');
}

let clearStep = 0;
function clearCanvas(silent) {
  if (silent) { makeWhite(); clearStep = 0; return; }
  clearStep++;
  pushUndo();
  if (clearStep >= 3) {
    makeWhite();
    clearStep = 0;
    showToast('已清空 🗑');
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    showToast(`淡出 ${clearStep}/3 🌫️`);
  }
}

function newCanvas() {
  const all = [];
  Object.keys(CAT_META).forEach(cat => {
    CAT_META[cat].data.forEach((d, i) => all.push({ ...d, cat, idx: i }));
  });
  const pick = all[Math.floor(Math.random() * all.length)];
  currentCategory = pick.cat;
  currentAnimal = pick.idx;
  undoStack = [];
  updateCategoryUI(pick.cat);
  renderAnimalGrid();
  currentBg = pick.bg;
  ctx.fillStyle = pick.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  redrawOutline();
  if (isMobilePanel()) openPanel();
  showToast(`随机模板：${pick.emoji} ${pick.name} 📄`);
}

// ============ 工具 ============
function setTool(t, btn) {
  if (t === 'brush') {
    if (tool === 'brush') brushMode = (brushMode + 1) % 4; else brushMode = 0;
    document.getElementById('brushBtn').textContent = BRUSH_NAMES[brushMode];
  }
  if (t === 'pen') {
    if (tool === 'pen') penMode = (penMode + 1) % 4; else penMode = 0;
    document.getElementById('penBtn').textContent = PEN_NAMES[penMode];
  }
  if (t === 'texture') {
    if (tool === 'pencil' || tool === 'crayon' || tool === 'oil' || tool === 'watercolor') {
      textureMode = (textureMode + 1) % 4;
    } else {
      textureMode = 0;
    }
    document.getElementById('textureBtn').textContent = TEXTURE_NAMES[textureMode];
    t = ['pencil','crayon','oil','watercolor'][textureMode];
  }
  if (t === 'shape') {
    if (SHAPE_SET.has(tool)) {
      shapeMode = (shapeMode + 1) % SHAPE_TOOLS.length;
    } else {
      shapeMode = 0;
    }
    document.getElementById('shapeBtn').textContent = SHAPE_NAMES[shapeMode];
    t = SHAPE_TOOLS[shapeMode];
  }
  tool = t;
  document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // 形状子工具时保持「形状」按钮高亮
  if (SHAPE_SET.has(tool)) {
    const shapeBtn = document.getElementById('shapeBtn');
    if (shapeBtn) shapeBtn.classList.add('active');
  }
  updateCursor();
}

function updateCursor() {
  if (isPanning) { canvas.style.cursor = 'grabbing'; return; }
  if (spaceDown) { canvas.style.cursor = 'grab'; return; }
  if (tool === 'eraser' || tool === 'stamp') {
    const d = Math.max(10, size);
    const pad = 3;
    const sz = d + pad * 2;
    const c = document.createElement('canvas');
    c.width = c.height = sz;
    const cx = c.getContext('2d');
    cx.beginPath();
    cx.arc(sz / 2, sz / 2, d / 2, 0, Math.PI * 2);
    cx.fillStyle = tool === 'eraser' ? 'rgba(255,255,255,0.85)' : color;
    cx.fill();
    cx.strokeStyle = '#999';
    cx.lineWidth = 1;
    cx.stroke();
    canvas.style.cursor = `url(${c.toDataURL()}) ${sz / 2} ${sz / 2}, auto`;
  } else {
    canvas.style.cursor = 'crosshair';
  }
}

const NOTES = [523,587,659,698,784,880,988,1047,1175,1319,1397,1568,1760,1976,2093,2349]; // C5-E7 两八度
function playMuyu(idx) {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    if (!audioCtx) audioCtx = new AC();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.value = NOTES[idx] || 800;
    const t0 = audioCtx.currentTime;
    g.gain.setValueAtTime(0.25, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
    o.start(t0);
    o.stop(t0 + 0.3);
  } catch (_) { /* 静默忽略音频限制 */ }
}

function setColor(c, noteIdx) {
  color = c;
  if (tool === 'eraser') setTool('pen', document.querySelector('[data-tool="pen"]'));
  updateCursor();
  renderPalette();
  if (noteIdx != null) playMuyu(noteIdx);
}

function renderPalette() {
  const p = document.getElementById('colorPalette');
  const selR = color === randomColor ? '3px solid var(--accent)' : '2px solid var(--border)';
  // 随机色放第一位→音符0，固定色→音符1-14，红色→音符15
  const randSpan = `<span onclick="randomColor=randomHex();COLORS[15]=randomColor;setColor(randomColor,0);renderPalette();" style="display:inline-block;width:22px;height:22px;background:${randomColor};border:${selR};border-radius:4px;cursor:pointer;flex-shrink:0;position:relative;line-height:22px;text-align:center;font-size:7px;color:rgba(255,255,255,0.6);text-shadow:0 0 2px rgba(0,0,0,0.4);font-weight:700;" title="随机色 · 点击换色">100+</span>`;
  const fixedSpans = COLORS.slice(1, 15).map((c, i) => {
    const sel = color === c ? '3px solid var(--accent)' : '2px solid var(--border)';
    return `<span onclick="setColor('${c}',${i+1})" style="display:inline-block;width:22px;height:22px;background:${c};border:${sel};border-radius:4px;cursor:pointer;flex-shrink:0;"></span>`;
  });
  const sel0 = color === COLORS[0] ? '3px solid var(--accent)' : '2px solid var(--border)';
  const redSpan = `<span onclick="setColor('${COLORS[0]}',15)" style="display:inline-block;width:22px;height:22px;background:${COLORS[0]};border:${sel0};border-radius:4px;cursor:pointer;flex-shrink:0;"></span>`;
  p.innerHTML = [randSpan, ...fixedSpans, redSpan].join('');
}

function setSize(s) {
  size = parseInt(s);
  updateCursor();
}

// ============ 缩放 / 视图 ============
function handleWheel(e) {
  e.preventDefault();
  // 滚轮直接缩放；ctrl/meta 时步长稍大（触控板捏合常带 ctrl）
  const step = (e.ctrlKey || e.metaKey) ? 0.002 : 0.0012;
  const next = Math.max(0.5, Math.min(3, scale - e.deltaY * step));
  scale = next;
  applyViewTransform();
}

// ============ 保存（高分辨率导出） ============
function saveDoodle() {
  // 工作画布 CANVAS_SIZE；导出时放大到 EXPORT_SIZE，避免「保存后图片很小」
  const out = document.createElement('canvas');
  out.width = EXPORT_SIZE;
  out.height = EXPORT_SIZE;
  const octx = out.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  // 铺底，防止透明区域在部分查看器里发灰
  octx.fillStyle = currentBg || '#fffef9';
  octx.fillRect(0, 0, EXPORT_SIZE, EXPORT_SIZE);
  octx.drawImage(canvas, 0, 0, EXPORT_SIZE, EXPORT_SIZE);

  const name = (currentData()[currentAnimal].name || 'doodle').replace(/[\\/:*?"<>|]/g, '');
  // 文件名勿用 toLocaleDateString（会带 /，Windows 无法保存）
  const stamp = new Date();
  const pad = n => String(n).padStart(2, '0');
  const fileName = `doodle-${name}-${stamp.getFullYear()}${pad(stamp.getMonth() + 1)}${pad(stamp.getDate())}-${pad(stamp.getHours())}${pad(stamp.getMinutes())}${pad(stamp.getSeconds())}.png`;

  const triggerDownload = (href, revoke) => {
    const a = document.createElement('a');
    a.download = fileName;
    a.href = href;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
    if (revoke) setTimeout(() => URL.revokeObjectURL(href), 2500);
    showToast(`已保存 ${EXPORT_SIZE}×${EXPORT_SIZE} · 见下载文件夹 💾`);
  };

  // 优先 toBlob（大图更稳，避免 dataURL 过长失败）
  if (out.toBlob) {
    out.toBlob(blob => {
      if (blob) {
        triggerDownload(URL.createObjectURL(blob), true);
      } else {
        try {
          triggerDownload(out.toDataURL('image/png'), false);
        } catch (e) {
          showToast('保存失败，请再试一次');
        }
      }
    }, 'image/png');
  } else {
    try {
      triggerDownload(out.toDataURL('image/png'), false);
    } catch (e) {
      showToast('保存失败，请再试一次');
    }
  }
}

// ============ 主题 ============
function toggleTheme() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? '' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('doodle_theme', next);
}

function loadTheme() {
  const t = localStorage.getItem('doodle_theme');
  document.documentElement.setAttribute('data-theme', t || 'dark');
}

// ============ 全屏 ============
function toggleFullscreen() {
  const el = document.querySelector('.main');
  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const main = document.querySelector('.main');
  const btn = document.getElementById('fullscreenBtn');
  if (document.fullscreenElement) {
    main.classList.add('is-fullscreen');
    btn.textContent = '📺 退出';
    btn.classList.add('active');
  } else {
    main.classList.remove('is-fullscreen');
    btn.textContent = '📺 全屏';
    btn.classList.remove('active');
  }
  // 全屏只改布局尺寸，像素缓冲与笔迹保留，不重画轮廓
  setTimeout(resizeCanvas, 200);
});

// ============ 面板切换（移动端侧栏 + 遮罩） ============
function isMobilePanel() {
  return window.matchMedia('(max-width: 768px)').matches;
}
function openPanel() {
  document.getElementById('animalPanel').classList.add('open');
  document.getElementById('panelBackdrop').classList.add('show');
}
function closePanel() {
  document.getElementById('animalPanel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('show');
}
function togglePanel() {
  const panel = document.getElementById('animalPanel');
  if (panel.classList.contains('open')) closePanel();
  else openPanel();
}

// ============ 键盘快捷键 ============
function handleKey(e) {
  if (e.code === 'Space' && !e.repeat) {
    // 输入框内不抢空格
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
      spaceDown = true;
      e.preventDefault();
      if (!isDrawing && !isPanning) canvas.style.cursor = 'grab';
    }
  }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveDoodle(); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); const n=currentData().length; selectAnimal((currentAnimal - 1 + n) % n); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); selectAnimal((currentAnimal + 1) % currentData().length); }
  if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) { e.preventDefault(); toggleFullscreen(); }
  if ((e.key === '0' || e.code === 'Digit0' || e.code === 'Numpad0') && !e.ctrlKey && !e.metaKey) {
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') { e.preventDefault(); resetView(); }
  }
  if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
      e.preventDefault();
      window.open('index.html', '_self');
    }
  }
}

// ============ Toast ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1500);
}

// ============ 启动 ============
// init → selectAnimal 已画轮廓，勿再 redrawOutline 以免叠线
init();
