<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="cjg-theme-key" content="daociyiyou-theme">
<script src="theme-boot.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="12345.png">
<link rel="icon" href="12345.png" type="image/png">
<title>到此一游 · 扫地僧藏经阁</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

:root {
  --bg: #f5f0e8;
  --text: #3d3226;
  --accent: #8b4513;
  --gold: #c9a96e;
  --card-bg: #faf7f2;
  --border: #d4c5a9;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --tag-bg: #ede4d3;
  --ink: #2c1810;
}
[data-theme="dark"] {
  --bg: #1a1610;
  --text: #d4c5a9;
  --accent: #c9a96e;
  --gold: #c9a96e;
  --card-bg: #252018;
  --border: #3a3028;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --tag-bg: #2a2018;
  --ink: #d4c5a9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif SC', "STSong", "SimSun", serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  overflow-x: hidden;
}

/* ── 背景装饰 ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(139,69,19,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 60%, rgba(201,169,110,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── 顶部导航 ── */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  z-index: 100;
  pointer-events: none;
}
.toolbar > * { pointer-events: auto; }
.btn-home {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text); cursor: pointer; font-size: 1em;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; transition: all 0.3s;
}
.btn-home:hover { border-color: var(--accent); color: var(--accent); }
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text); cursor: pointer; font-size: 1em;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* ── 顶部标题区 ── */
.hero {
  text-align: center;
  padding: 60px 20px 20px;
  position: relative; z-index: 1;
}
.hero .stamp {
  display: inline-block;
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 3em;
  color: var(--accent);
  border: 3px solid var(--accent);
  padding: 8px 28px;
  transform: rotate(-3deg);
  letter-spacing: 0.3em;
  opacity: 0.85;
  margin-bottom: 10px;
}
.hero .subtitle {
  font-size: 0.85em;
  opacity: 0.45;
  letter-spacing: 0.2em;
  margin-top: 10px;
}

/* ── 主体布局：左扫码 + 右排行 ── */
.main-layout {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10px 24px 40px;
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 28px;
  position: relative; z-index: 1;
}

@media (max-width: 768px) {
  .main-layout {
    grid-template-columns: 1fr;
    max-width: 420px;
  }
}

/* ── 扫码区 ── */
.qr-panel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  position: relative;
  box-shadow: var(--shadow);
}
.qr-panel .section-label {
  font-size: 0.78em;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 16px;
  opacity: 0.7;
}
.qr-wrapper {
  display: inline-block;
  padding: 16px;
  background: #fff;
  border-radius: 12px;
  border: 2px solid var(--border);
  position: relative;
}
[data-theme="dark"] .qr-wrapper { background: #f5f0e8; }
.qr-wrapper canvas,
.qr-wrapper img {
  display: block;
  width: 200px; height: 200px;
}
.qr-tip {
  margin-top: 16px;
  font-size: 0.8em;
  opacity: 0.5;
  letter-spacing: 0.05em;
  line-height: 1.8;
}
.qr-tip .wechat-icon {
  color: #07c160;
  font-weight: 700;
}
.qr-status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 14px;
  font-size: 0.75em; margin-top: 12px;
  letter-spacing: 0.05em;
  background: rgba(7,193,96,0.08); color: #07c160;
  border: 1px solid rgba(7,193,96,0.2);
}
.qr-status.error {
  background: rgba(220,53,69,0.08); color: #dc3545;
  border-color: rgba(220,53,69,0.2);
}
.qr-status .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: currentColor;
  animation: pulse-dot 1.8s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ── 访客统计 ── */
.visitor-count {
  margin-top: 14px;
  font-size: 0.8em;
  opacity: 0.5;
  letter-spacing: 0.05em;
}
.visitor-count strong {
  color: var(--accent);
  font-size: 1.2em;
}

/* ── 排行榜区 ── */
.board-panel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px;
  box-shadow: var(--shadow);
  max-height: 65vh;
  display: flex;
  flex-direction: column;
}
.board-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.board-header .title {
  font-size: 1em;
  letter-spacing: 0.15em;
  color: var(--accent);
  font-weight: 700;
}
.board-header .count {
  font-size: 0.75em;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

/* ── 滚动列表 ── */
.board-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-right: 4px;
}
.board-list::-webkit-scrollbar { width: 4px; }
.board-list::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 2px;
}
.board-list::-webkit-scrollbar-track { background: transparent; }

/* ── 单个访客条目 ── */
.visitor-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  transition: all 0.3s;
  position: relative;
  animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.visitor-item.new-highlight {
  animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
             glowPulse 2s ease-out;
  background: rgba(201,169,110,0.08);
}
@keyframes glowPulse {
  0%   { background: rgba(201,169,110,0.2); }
  100% { background: transparent; }
}
.visitor-item:hover {
  background: var(--tag-bg);
}
.visitor-rank {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7em; font-weight: 700;
  flex-shrink: 0;
  color: #999;
}
.visitor-rank.top { color: var(--gold); font-size: 0.85em; }
.visitor-rank.top1 { color: #d4a017; font-size: 0.95em; }
.visitor-rank.top2 { color: #a0a0a0; font-size: 0.88em; }
.visitor-rank.top3 { color: #cd7f32; font-size: 0.82em; }

.visitor-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  background: var(--tag-bg);
  object-fit: cover;
}
.visitor-avatar.placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3em;
}
.visitor-info {
  flex: 1; min-width: 0;
}
.visitor-info .name {
  font-size: 0.92em;
  font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.visitor-info .time {
  font-size: 0.7em;
  opacity: 0.45;
  margin-top: 2px;
}

/* ── 空状态 ── */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0.35;
  gap: 8px;
}
.empty-state .icon { font-size: 3em; }
.empty-state .text { font-size: 0.85em; letter-spacing: 0.1em; }

/* ── 底部 ── */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.35;
  font-size: 0.7em;
  letter-spacing: 0.08em;
  position: relative; z-index: 1;
}

/* ── Toast 提示 ── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text); padding: 10px 24px;
  border-radius: 24px; font-size: 0.85em;
  letter-spacing: 0.08em;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 999;
  animation: toastIn 0.4s ease-out, toastOut 0.4s 2.6s ease-in forwards;
  pointer-events: none;
}
@keyframes toastIn  { from { opacity: 0; top: 10px; } to { opacity: 1; top: 20px; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ── 墨迹装饰 ── */
.ink-blot {
  position: fixed; pointer-events: none; z-index: 0;
  opacity: 0.03; font-size: 18em;
}
.ink-blot.tl { top: -60px; left: -40px; }
.ink-blot.br { bottom: -60px; right: -40px; }
</style>
</head>
<body>

<div class="ink-blot tl">墨</div>
<div class="ink-blot br">迹</div>

<!-- 工具栏 -->
<div class="toolbar">
  <a href="index.html" class="btn-home" title="回藏经阁">🏠</a>
  <button class="theme-toggle" id="themeToggle" title="切换主题">🌓</button>
</div>

<!-- 标题 -->
<div class="hero">
  <div class="stamp">到此一游</div>
  <p class="subtitle">扫 码 签 到 · 留 下 足 迹</p>
</div>

<!-- 主体 -->
<div class="main-layout">
  <!-- 左侧：扫码区 -->
  <div class="qr-panel" id="qrPanel">
    <div class="section-label">📱 微信扫码签到</div>
    <div class="qr-wrapper" id="qrCode"></div>
    <div class="qr-tip">
      打开<span class="wechat-icon"> 微信 </span>扫一扫<br>授权后即可留下足迹
    </div>
    <div class="qr-status" id="qrStatus">
      <span class="dot"></span> 等待扫码中
    </div>
    <div class="visitor-count">
      已有 <strong id="totalCount">0</strong> 位访客留下足迹
    </div>
  </div>

  <!-- 右侧：排行榜 -->
  <div class="board-panel">
    <div class="board-header">
      <span class="title">🏆 访客排行榜</span>
      <span class="count" id="boardCount">共 0 人</span>
    </div>
    <div class="board-list" id="boardList">
      <div class="empty-state">
        <span class="icon">📜</span>
        <span class="text">虚位以待</span>
      </div>
    </div>
  </div>
</div>

<div class="footer">扫地僧 · 藏经阁 到此一游</div>

<!-- Toast 容器 -->
<div id="toastContainer"></div>

<!-- QR码生成库（CDN + 备用CDN） -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
</script>
<script>
// CDN备用：如果主CDN加载失败，尝试备用CDN
if (typeof QRCode === 'undefined') {
  document.write('<script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"><\/script>');
}
</script>

<script>
// ==================== 配置 ====================
// ⚠️ 部署时修改为你的服务器地址
const API_BASE = 'http://localhost:3456';

// ==================== DOM引用 ====================
const $qrCode   = document.getElementById('qrCode');
const $qrStatus = document.getElementById('qrStatus');
const $boardList = document.getElementById('boardList');
const $totalCount = document.getElementById('totalCount');
const $boardCount = document.getElementById('boardCount');
const $toastContainer = document.getElementById('toastContainer');

// ==================== 状态 ====================
let visitors = [];
let knownIds = new Set();
let pollTimer = null;

// ==================== 主题切换 ====================
(function(){
  const saved = localStorage.getItem('daociyiyou-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
})();

document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? '' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('daociyiyou-theme', next);
});

// ==================== 生成二维码 ====================
async function generateQR() {
  try {
    const resp = await fetch(`${API_BASE}/api/qrcode-url`);
    const data = await resp.json();
    const url = data.url;

    // 使用qrcodejs生成二维码
    $qrCode.innerHTML = '';
    if (typeof QRCode !== 'undefined') {
      new QRCode($qrCode, {
        text: url,
        width: 200,
        height: 200,
        colorDark: '#2c1810',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    } else {
      // 纯CSS二维码降级方案：显示扫码URL
      $qrCode.innerHTML = `<div style="padding:30px 20px;font-size:0.7em;word-break:break-all;color:#666;text-align:center;">
        <p style="margin-bottom:10px;">📱 二维码加载失败</p>
        <p style="font-size:0.85em;">请将以下链接发送到微信打开：</p>
        <p style="margin-top:8px;padding:6px;background:#f0f0f0;border-radius:6px;font-family:monospace;font-size:0.75em;">${url}</p>
      </div>`;
    }

    setQRStatus('normal', '等待扫码中');
  } catch (err) {
    console.error('获取二维码URL失败:', err);
    $qrCode.innerHTML = '<div style="padding:40px;color:#999;font-size:0.85em;">二维码加载失败<br>请检查服务器是否启动</div>';
    setQRStatus('error', '服务未连接');
  }
}

function setQRStatus(type, text) {
  $qrStatus.className = 'qr-status' + (type === 'error' ? ' error' : '');
  $qrStatus.innerHTML = type === 'error'
    ? `<span class="dot"></span> ${text}`
    : `<span class="dot"></span> ${text}`;
}

// ==================== 加载排行榜 ====================
async function loadLeaderboard() {
  try {
    const resp = await fetch(`${API_BASE}/api/leaderboard`);
    const data = await resp.json();

    // 检测新增访客
    const newVisitors = data.visitors.filter(v => !knownIds.has(v.nickname + v.created_at));
    if (newVisitors.length > 0 && visitors.length > 0) {
      // 有新访客！
      newVisitors.forEach(v => {
        showToast(`🎉 ${v.nickname} 刚刚签到！`);
        playCheckinSound();
      });
    }

    // 更新已知ID集合
    knownIds = new Set(data.visitors.map(v => v.nickname + v.created_at));
    visitors = data.visitors;

    // 更新显示
    renderLeaderboard();
    $totalCount.textContent = data.total;
    $boardCount.textContent = `共 ${data.total} 人`;

    // 更新二维码状态
    if (data.total > 0) {
      const last = data.visitors[0];
      setQRStatus('normal', `最近签到: ${last.nickname}`);
    }
  } catch (err) {
    console.error('加载排行榜失败:', err);
  }
}

// ==================== 渲染排行榜 ====================
function renderLeaderboard() {
  if (visitors.length === 0) {
    $boardList.innerHTML = `
      <div class="empty-state">
        <span class="icon">📜</span>
        <span class="text">虚位以待</span>
      </div>`;
    return;
  }

  $boardList.innerHTML = visitors.map((v, i) => {
    const rank = i + 1;
    let rankClass = '';
    let rankIcon = rank;
    if (rank === 1) { rankClass = 'top top1'; rankIcon = '👑'; }
    else if (rank === 2) { rankClass = 'top top2'; rankIcon = '🥈'; }
    else if (rank === 3) { rankClass = 'top top3'; rankIcon = '🥉'; }

    const avatarHTML = v.headimgurl
      ? `<img class="visitor-avatar" src="${escapeHTML(v.headimgurl)}" alt="${escapeHTML(v.nickname)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
      : '';

    const fallbackAvatar = v.headimgurl
      ? `<div class="visitor-avatar placeholder" style="display:none;">🚶</div>`
      : `<div class="visitor-avatar placeholder">🚶</div>`;

    return `
      <div class="visitor-item" style="animation-delay:${i * 0.03}s">
        <div class="visitor-rank ${rankClass}">${rankIcon}</div>
        ${avatarHTML}${fallbackAvatar}
        <div class="visitor-info">
          <div class="name">${escapeHTML(v.nickname)}</div>
          <div class="time">${escapeHTML(v.time_display)}</div>
        </div>
      </div>`;
  }).join('');
}

// ==================== 音效 ====================
function playCheckinSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 木鱼声
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) { /* 静默失败 */ }
}

// ==================== Toast ====================
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  $toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ==================== 工具函数 ====================
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== 微信内提示 ====================
function isWechat() {
  return /micromessenger/i.test(navigator.userAgent);
}

// ==================== 启动 ====================
async function init() {
  await generateQR();
  await loadLeaderboard();

  // 每5秒轮询排行榜
  pollTimer = setInterval(loadLeaderboard, 5000);

  // 如果在微信内打开（通过授权回调回来），显示欢迎
  const params = new URLSearchParams(location.search);
  if (params.get('from') === 'wechat') {
    const nick = params.get('nickname');
    if (nick) {
      showToast(`🏮 ${decodeURIComponent(nick)}，欢迎来到藏经阁！`);
    }
    // 清除URL参数
    history.replaceState(null, '', location.pathname);
  }
}

init();

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', (e) => {
  if (e.key === '?' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    alert('📋 快捷键:\n\nH - 回首页\nR - 刷新排行榜\nF5 - 强制刷新\n\n扫码后微信会自动跳转授权页面，授权后你的头像和昵称就会出现在排行榜上。');
  }
  if (e.key === 'h' || e.key === 'H') {
    if (!e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
      location.href = 'index.html';
    }
  }
  if (e.key === 'r' || e.key === 'R') {
    if (!e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
      loadLeaderboard();
      showToast('🔄 排行榜已刷新');
    }
  }
});
</script>

<script src="pwa-register.js" defer></script>
</body>
</html>
