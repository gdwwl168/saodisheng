<html lang="zh-CN">

<title>五笔86 · 编码练习</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
:root { --bg:#f5f0e8; --text:#3d3226; --accent:#8b4513; --gold:#c9a96e; --card-bg:#faf7f2; --sidebar-bg:#ede4d3; --border:#d4c5a9; --success:#6b8e5a; --danger:#b85450; --highlight:#e8d5b0; --shadow:0 2px 12px rgba(0,0,0,0.08); --code-bg:#fffaf0; }
[data-theme="dark"] { --bg:#1a1a2e; --text:#d4c5a9; --accent:#c9a96e; --gold:#c9a96e; --card-bg:#252540; --sidebar-bg:#1f1f35; --border:#3a3a55; --highlight:#3a3040; --shadow:0 2px 12px rgba(0,0,0,0.3); --code-bg:#2a2a3a; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Serif SC","SimSun","KaiTi",serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background 0.3s,color 0.3s}
.sidebar{width:300px;min-width:300px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-header h1{font-size:1.5em;color:var(--accent);letter-spacing:.15em;font-weight:700}
.sidebar-header .subtitle{font-size:.75em;opacity:.6;margin-top:4px}
.sidebar-controls{padding:12px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sidebar-controls select{flex:1;min-width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:inherit;font-size:.8em;cursor:pointer}
.chapter-list{flex:1;overflow-y:auto;padding:8px}
.chapter-list::-webkit-scrollbar{width:4px}
.chapter-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chapter-item{display:flex;align-items:center;padding:9px 12px;border-radius:8px;cursor:pointer;transition:.2s;margin-bottom:2px;gap:8px;flex-wrap:nowrap;min-width:0}
.chapter-item:hover{background:var(--highlight)}
.chapter-item.active{background:var(--accent);color:#fff}
.chapter-item.active .ch-num,.chapter-item.active .ch-preview{color:#fff;opacity:.95}
.ch-num{font-size:.9em;font-weight:700;color:var(--accent);min-width:22px;text-align:center;flex-shrink:0}
.ch-hint{font-size:1.0em;font-weight:600;color:var(--gold);background:rgba(201,169,110,.15);padding:3px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;line-height:1.25;letter-spacing:.02em}
.chapter-item.active .ch-hint{background:rgba(255,255,255,.25);color:#fff}
.ch-preview{flex:1;min-width:0;font-size:1.05em;font-weight:700;color:var(--text);opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.ch-best{font-size:.72em;color:var(--gold);white-space:nowrap;flex-shrink:0;margin-left:4px}
.chapter-item.active .ch-best{color:#fff;opacity:.85}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;background:var(--bg)}
.topbar button{padding:7px 14px;border:1px solid var(--border);border-radius:18px;background:var(--card-bg);color:var(--text);cursor:pointer;font-family:inherit;font-size:.78em;transition:.2s;white-space:nowrap}
.topbar button:hover{background:var(--highlight)}
.topbar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar .spacer{flex:1}
.topbar .icon-btn{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:1.1em}
.mode-switch{display:flex;gap:0;border:1px solid var(--border);border-radius:18px;overflow:hidden}
.mode-switch button{border-radius:0;border:none;margin:0}
.mode-switch button:first-child{border-radius:18px 0 0 18px}
.mode-switch button:last-child{border-radius:0 18px 18px 0}
.content{flex:1;overflow-y:auto;padding:24px 36px;display:flex;justify-content:center}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chapter-container{max-width:820px;width:100%}
.chapter-header{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid rgba(180,160,130,.25)}
.chapter-header .ch-title{font-size:2em;color:var(--accent);font-weight:700;letter-spacing:.2em}
.chapter-header .ch-subtitle{font-size:.85em;opacity:.5;margin-top:8px}
.char-grid{display:flex;flex-wrap:wrap;gap:3px;line-height:1;justify-content:flex-start}
.char-block{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:58px;min-height:82px;border-radius:6px;padding:4px 2px 2px;cursor:pointer;transition:.15s;border:1px solid transparent;position:relative}
.char-block:hover{border-color:var(--gold);background:rgba(201,169,110,.08)}
.char-block .wb-code{font-size:.82em;font-family:"Courier New",monospace;color:var(--accent);font-weight:700;letter-spacing:1px;background:var(--code-bg);padding:2px 5px;border-radius:3px;margin-bottom:3px;min-height:18px;line-height:1.35;white-space:nowrap;transition:all .2s}
.char-block .wb-char{font-size:var(--char-size, 28px);font-weight:700;line-height:1.3;transition:color .15s}
.char-block.punct .wb-char{color:#999;font-size:calc(var(--char-size, 28px)*.85)}
.char-block.punct .wb-code{opacity:.4}
.char-block.space-block{min-width:16px;border:none;cursor:default}
.char-block.space-block:hover{border-color:transparent;background:transparent}
.char-block.hide-code .wb-code{visibility:hidden}
.char-block.show-code .wb-code{visibility:visible}
.char-block.current-char{border-color:var(--accent)!important;background:rgba(139,69,19,.1)}
.char-block.correct-char{border-color:var(--success)!important;background:rgba(107,142,90,.1)}
.char-block.wrong-char{border-color:var(--danger)!important;background:rgba(184,84,80,.1)}
.type-input-area{display:flex;gap:8px;align-items:center;justify-content:center;padding:12px 8px;flex-wrap:wrap}
.type-input-area input{padding:8px 12px;border:2px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);font-family:"Courier New",monospace;font-size:1.1em;letter-spacing:3px;width:140px;text-align:center;outline:none;text-transform:uppercase}
.type-input-area input:focus{border-color:var(--accent)}
.type-input-area input.correct-flash{border-color:var(--success);background:rgba(107,142,90,.1)}
.type-input-area input.wrong-flash{border-color:var(--danger);background:rgba(184,84,80,.1)}
.type-feedback{font-size:.85em;font-weight:600;min-width:80px;text-align:center}
.stats-bar{display:flex;gap:16px;padding:10px 24px;border-top:1px solid var(--border);font-size:.8em;opacity:.7;justify-content:center;flex-wrap:wrap}
/* 练习模式 - 行分段 */
.practice-section{margin-bottom:28px;padding:16px;border-radius:10px;border:1px solid var(--border);background:var(--card-bg);transition:.2s}
.practice-section.completed{border-color:var(--success)}
.practice-section .ref-line{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px dashed rgba(180,160,130,.2)}
.practice-input-row{display:flex;align-items:center;gap:8px}
.practice-input-row input{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:8px;background:var(--code-bg);color:var(--text);font-family:"Noto Serif SC","SimSun",sans-serif;font-size:var(--char-size, 22px);letter-spacing:4px;outline:none;transition:.2s}
.practice-input-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,69,19,.1)}
.practice-input-row input.correct{border-color:var(--success);background:rgba(107,142,90,.08)}
.practice-input-row input.wrong{border-color:var(--danger);background:rgba(184,84,80,.08)}
.practice-input-row .line-status{font-size:.8em;min-width:50px;text-align:right}
.practice-char-block{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:52px;min-height:76px;border-radius:5px;padding:3px 2px;transition:.15s}
.practice-char-block .pwb-code{font-size:.78em;font-family:"Courier New",monospace;color:var(--accent);font-weight:700;background:var(--code-bg);padding:1px 4px;border-radius:3px;margin-bottom:2px;line-height:1.3;white-space:nowrap}
.practice-char-block .pwb-char{font-size:var(--char-size, 24px);font-weight:700;line-height:1.3}
.practice-char-block.punct-char .pwb-char{color:#999;font-size:calc(var(--char-size, 24px)*.75)}
.practice-char-block.matched .pwb-char{color:var(--success)}
.practice-char-block.unmatched .pwb-char{color:var(--danger);text-decoration:underline wavy var(--danger)}
.practice-char-block.pending .pwb-char{opacity:.5}
.char-display-area{flex:1;overflow:hidden}
/* 全局工具栏 */
.practice-global-toolbar{display:flex;gap:8px;align-items:center;justify-content:center;padding:10px 0;flex-wrap:wrap}
.practice-global-toolbar button{padding:7px 16px;border:1px solid var(--border);border-radius:18px;background:var(--card-bg);color:var(--text);cursor:pointer;font-family:inherit;font-size:.8em;transition:.2s}
.practice-global-toolbar button:hover{background:var(--highlight)}

@media (max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .content{padding:12px}
  .char-block{min-width:44px;min-height:64px}
  .char-block .wb-char{font-size:calc(var(--char-size, 24px)*.85)}
  .chapter-header .ch-title{font-size:1.4em}
  .practice-section{padding:10px}
  .practice-char-block{min-width:38px;min-height:56px}
}
@media (max-width:480px){
  .char-block{min-width:36px;min-height:56px}
  .char-block .wb-char{font-size:calc(var(--char-size, 20px)*.8)}
  .char-block .wb-code{font-size:.7em}
  .practice-char-block .pwb-code{font-size:.68em}
  .practice-char-block{min-width:32px;min-height:48px}
  .practice-char-block .pwb-char{font-size:calc(var(--char-size, 20px)*.75)}
}

.corpus-bar{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 12px 6px}
.corpus-bar button{padding:5px 10px;border:1px solid var(--border);border-radius:14px;background:var(--card-bg);color:var(--text);font-family:inherit;font-size:.78em;cursor:pointer;transition:.2s}
.corpus-bar button:hover{background:var(--highlight)}
.corpus-bar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>

<script>


// ===== 道德经全文 =====
const daodejing = [
{ch:1,text:'道可道，非常道；名可名，非常名。无名，天地之始；有名，万物之母。故常无欲，以观其妙；常有欲，以观其徼。此两者同出而异名，同谓之玄。玄之又玄，众妙之门。'},
{ch:2,text:'天下皆知美之为美，斯恶已；皆知善之为善，斯不善已。故有无相生，难易相成，长短相形，高下相倾，音声相和，前后相随。是以圣人处无为之事，行不言之教；万物作焉而不辞，生而不有，为而不恃，功成而弗居。夫唯弗居，是以不去。'},
{ch:3,text:'不尚贤，使民不争；不贵难得之货，使民不为盗；不见可欲，使民心不乱。是以圣人之治，虚其心，实其腹，弱其志，强其骨。常使民无知无欲，使夫智者不敢为也。为无为，则无不治。'},
{ch:4,text:'道冲，而用之或不盈。渊兮，似万物之宗。挫其锐，解其纷，和其光，同其尘。湛兮，似或存。吾不知谁之子，象帝之先。'},
{ch:5,text:'天地不仁，以万物为刍狗；圣人不仁，以百姓为刍狗。天地之间，其犹橐龠乎？虚而不屈，动而愈出。多言数穷，不如守中。'},
{ch:6,text:'谷神不死，是谓玄牝。玄牝之门，是谓天地根。绵绵若存，用之不勤。'},
{ch:7,text:'天长地久。天地所以能长且久者，以其不自生，故能长生。是以圣人后其身而身先，外其身而身存。非以其无私邪？故能成其私。'},
{ch:8,text:'上善若水。水善利万物而不争，处众人之所恶，故几于道。居善地，心善渊，与善仁，言善信，政善治，事善能，动善时。夫唯不争，故无尤。'},
{ch:9,text:'持而盈之，不如其已。揣而锐之，不可长保。金玉满堂，莫之能守。富贵而骄，自遗其咎。功遂身退，天之道也。'},
{ch:10,text:'载营魄抱一，能无离乎？专气致柔，能如婴儿乎？涤除玄鉴，能无疵乎？爱民治国，能无为乎？天门开阖，能为雌乎？明白四达，能无知乎。生之，畜之。生而不有，为而不恃，长而不宰，是谓玄德。'},
{ch:11,text:'三十辐共一毂，当其无，有车之用。埏埴以为器，当其无，有器之用。凿户牖以为室，当其无，有室之用。故有之以为利，无之以为用。'},
{ch:12,text:'五色令人目盲，五音令人耳聋，五味令人口爽，驰骋畋猎令人心发狂，难得之货令人行妨。是以圣人为腹不为目，故去彼取此。'},
{ch:13,text:'宠辱若惊，贵大患若身。何谓宠辱若惊？宠为下，得之若惊，失之若惊，是谓宠辱若惊。何谓贵大患若身？吾所以有大患者，为吾有身，及吾无身，吾有何患？故贵以身为天下，若可寄天下；爱以身为天下，若可托天下。'},
{ch:14,text:'视之不见名曰夷，听之不闻名曰希，搏之不得名曰微。此三者不可致诘，故混而为一。其上不皦，其下不昧，绳绳不可名，复归于无物。是谓无状之状，无物之象，是谓惚恍。迎之不见其首，随之不见其后。执古之道，以御今之有。能知古始，是谓道纪。'},
{ch:15,text:'古之善为士者，微妙玄通，深不可识。夫唯不可识，故强为之容：豫兮，若冬涉川；犹兮，若畏四邻；俨兮，其若客；涣兮，若冰之将释；敦兮，其若朴；旷兮，其若谷；混兮，其若浊。孰能浊以止，静之徐清？孰能安以久，动之徐生？保此道者不欲盈。夫唯不盈，故能蔽而新成。'},
{ch:16,text:'致虚极，守静笃。万物并作，吾以观复。夫物芸芸，各复归其根。归根曰静，是谓复命。复命曰常，知常曰明。不知常，妄作凶。知常容，容乃公，公乃王，王乃天，天乃道，道乃久，没身不殆。'},
{ch:17,text:'太上，下知有之；其次，亲而誉之；其次，畏之；其次，侮之。信不足焉，有不信焉。悠兮，其贵言。功成事遂，百姓皆谓我自然。'},
{ch:18,text:'大道废，有仁义；智慧出，有大伪；六亲不和，有孝慈；国家昏乱，有忠臣。'},
{ch:19,text:'绝圣弃智，民利百倍；绝仁弃义，民复孝慈；绝巧弃利，盗贼无有。此三者以为文不足，故令有所属：见素抱朴，少私寡欲，绝学无忧。'},
{ch:20,text:'唯之与阿，相去几何？善之与恶，相去若何？人之所畏，不可不畏。荒兮，其未央哉。众人熙熙，如享太牢，如春登台。我独泊兮，其未兆，如婴儿之未孩；傫傫兮，若无所归。众人皆有余，而我独若遗。我愚人之心也哉！沌沌兮！俗人昭昭，我独昏昏。俗人察察，我独闷闷。澹兮，其若海；飂兮，若无止。众人皆有以，而我独顽且鄙。我独异于人，而贵食母。'},
{ch:21,text:'孔德之容，惟道是从。道之为物，惟恍惟惚。惚兮恍兮，其中有象；恍兮惚兮，其中有物。窈兮冥兮，其中有精。其精甚真，其中有信。自古及今，其名不去，以阅众甫。吾何以知众甫之状哉？以此。'},
{ch:22,text:'曲则全，枉则直，洼则盈，敝则新，少则得，多则惑。是以圣人抱一为天下式。不自见故明，不自是故彰，不自伐故有功，不自矜故长。夫唯不争，故天下莫能与之争。古之所谓曲则全者，岂虚言哉！诚全而归之。'},
{ch:23,text:'希言自然。故飘风不终朝，骤雨不终日。孰为此者？天地。天地尚不能久，而况于人乎。故从事于道者，道者同于道，德者同于德，失者同于失。同于道者，道亦乐得之；同于德者，德亦乐得之；同于失者，失亦乐得之。信不足焉，有不信焉。'},
{ch:24,text:'企者不立，跨者不行。自见者不明，自是者不彰，自伐者无功，自矜者不长。其在道也，曰余食赘行。物或恶之，故有道者不处。'},
{ch:25,text:'有物混成，先天地生。寂兮寥兮，独立而不改，周行而不殆，可以为天下母。吾不知其名，字之曰道，强为之名曰大。大曰逝，逝曰远，远曰反。故道大，天大，地大，王亦大。域中有四大，而王居其一焉。人法地，地法天，天法道，道法自然。'},
{ch:26,text:'重为轻根，静为躁君。是以圣人终日行不离辎重。虽有荣观，燕处超然。奈何万乘之主，而以身轻天下？轻则失本，躁则失君。'},
{ch:27,text:'善行无辙迹，善言无瑕谪，善数不用筹策，善闭无关楗而不可开，善结无绳约而不可解。是以圣人常善救人，故无弃人；常善救物，故无弃物。是谓袭明。故善人者，不善人之师；不善人者，善人之资。不贵其师，不爱其资，虽智大迷，是谓要妙。'},
{ch:28,text:'知其雄，守其雌，为天下谿。为天下谿，常德不离，复归于婴儿。知其白，守其黑，为天下式。为天下式，常德不忒，复归于无极。知其荣，守其辱，为天下谷。为天下谷，常德乃足，复归于朴。朴散则为器，圣人用之则为官长。故大制不割。'},
{ch:29,text:'将欲取天下而为之，吾见其不得已。天下神器，不可为也。为者败之，执者失之。是以圣人无为，故无败；无执，故无失。故物或行或随，或嘘或吹，或强或羸，或挫或隳。是以圣人去甚，去奢，去泰。'},
{ch:30,text:'以道佐人主者，不以兵强天下，其事好还。师之所处，荆棘生焉。大军之后，必有凶年。善有果而已，不敢以取强。果而勿矜，果而勿伐，果而勿骄，果而不得已，果而勿强。物壮则老，是谓不道，不道早已。'},
{ch:31,text:'夫佳兵者，不祥之器，物或恶之，故有道者不处。君子居则贵左，用兵则贵右。兵者不祥之器，非君子之器，不得已而用之，恬淡为上。胜而不美，而美之者，是乐杀人。夫乐杀人者，则不可以得志于天下矣。吉事尚左，凶事尚右。偏将军居左，上将军居右，言以丧礼处之。杀人之众，以哀悲泣之，战胜以丧礼处之。'},
{ch:32,text:'道常无名，朴虽小，天下莫能臣。侯王若能守之，万物将自宾。天地相合，以降甘露，民莫之令而自均。始制有名，名亦既有，夫亦将知止。知止可以不殆。譬道之在天下，犹川谷之于江海。'},
{ch:33,text:'知人者智，自知者明。胜人者有力，自胜者强。知足者富，强行者有志。不失其所者久，死而不亡者寿。'},
{ch:34,text:'大道泛兮，其可左右。万物恃之以生而不辞，功成而不有。衣养万物而不为主，常无欲，可名于小；万物归焉而不为主，可名为大。以其终不自为大，故能成其大。'},
{ch:35,text:'执大象，天下往。往而不害，安平太。乐与饵，过客止。道之出口，淡乎其无味，视之不足见，听之不足闻，用之不足既。'},
{ch:36,text:'将欲歙之，必固张之；将欲弱之，必固强之；将欲废之，必固兴之；将欲夺之，必固与之。是谓微明。柔弱胜刚强。鱼不可脱于渊，国之利器不可以示人。'},
{ch:37,text:'道常无为而无不为。侯王若能守之，万物将自化。化而欲作，吾将镇之以无名之朴。无名之朴，夫亦将不欲。不欲以静，天下将自定。'},
{ch:38,text:'上德不德，是以有德；下德不失德，是以无德。上德无为而无以为；下德为之而有以为。上仁为之而无以为；上义为之而有以为。上礼为之而莫之应，则攘臂而扔之。故失道而后德，失德而后仁，失仁而后义，失义而后礼。夫礼者，忠信之薄，而乱之首。前识者，道之华，而愚之始。是以大丈夫处其厚，不居其薄；处其实，不居其华。故去彼取此。'},
{ch:39,text:'昔之得一者：天得一以清，地得一以宁，神得一以灵，谷得一以盈，万物得一以生，侯王得一以为天下贞。其致之也：天无以清，将恐裂；地无以宁，将恐废；神无以灵，将恐歇；谷无以盈，将恐竭；万物无以生，将恐灭；侯王无以贵高，将恐蹶。故贵以贱为本，高以下为基。是以侯王自称孤、寡、不穀。此非以贱为本邪？非乎？故致数誉无誉。不欲琭琭如玉，珞珞如石。'},
{ch:40,text:'反者道之动，弱者道之用。天下万物生于有，有生于无。'},
{ch:41,text:'上士闻道，勤而行之；中士闻道，若存若亡；下士闻道，大笑之。不笑不足以为道。故建言有之：明道若昧，进道若退，夷道若颣，上德若谷，大白若辱，广德若不足，建德若偷，质真若渝，大方无隅，大器晚成，大音希声，大象无形，道隐无名。夫唯道，善贷且成。'},
{ch:42,text:'道生一，一生二，二生三，三生万物。万物负阴而抱阳，冲气以为和。人之所恶，唯孤、寡、不穀，而王公以为称。故物或损之而益，或益之而损。人之所教，我亦教之。强梁者不得其死，吾将以为教父。'},
{ch:43,text:'天下之至柔，驰骋天下之至坚。无有入无间，吾是以知无为之有益。不言之教，无为之益，天下希及之。'},
{ch:44,text:'名与身孰亲？身与货孰多？得与亡孰病？是故甚爱必大费，多藏必厚亡。知足不辱，知止不殆，可以长久。'},
{ch:45,text:'大成若缺，其用不弊。大盈若冲，其用不穷。大直若屈，大巧若拙，大辩若讷。躁胜寒，静胜热。清静为天下正。'},
{ch:46,text:'天下有道，却走马以粪。天下无道，戎马生于郊。祸莫大于不知足，咎莫大于欲得。故知足之足，常足矣。'},
{ch:47,text:'不出户，知天下；不窥牖，见天道。其出弥远，其知弥少。是以圣人不行而知，不见而名，不为而成。'},
{ch:48,text:'为学日益，为道日损。损之又损，以至于无为。无为而无不为。取天下常以无事，及其有事，不足以取天下。'},
{ch:49,text:'圣人无常心，以百姓心为心。善者吾善之，不善者吾亦善之，德善。信者吾信之，不信者吾亦信之，德信。圣人在天下，歙歙为天下浑其心。百姓皆注其耳目，圣人皆孩之。'},
{ch:50,text:'出生入死。生之徒十有三，死之徒十有三，人之生，动之死地，亦十有三。夫何故？以其生生之厚。盖闻善摄生者，陆行不遇兕虎，入军不被甲兵。兕无所投其角，虎无所措其爪，兵无所容其刃。夫何故？以其无死地。'},
{ch:51,text:'道生之，德畜之，物形之，势成之。是以万物莫不尊道而贵德。道之尊，德之贵，夫莫之命而常自然。故道生之，德畜之，长之育之，亭之毒之，养之覆之。生而不有，为而不恃，长而不宰，是谓玄德。'},
{ch:52,text:'天下有始，以为天下母。既得其母，以知其子；既知其子，复守其母，没身不殆。塞其兑，闭其门，终身不勤。开其兑，济其事，终身不救。见小曰明，守柔曰强。用其光，复归其明，无遗身殃，是为习常。'},
{ch:53,text:'使我介然有知，行于大道，唯施是畏。大道甚夷，而民好径。朝甚除，田甚芜，仓甚虚，服文彩，带利剑，厌饮食，财货有余，是谓盗夸。非道也哉！'},
{ch:54,text:'善建者不拔，善抱者不脱，子孙以祭祀不辍。修之于身，其德乃真；修之于家，其德乃余；修之于乡，其德乃长；修之于国，其德乃丰；修之于天下，其德乃普。故以身观身，以家观家，以乡观乡，以国观国，以天下观天下。吾何以知天下然哉？以此。'},
{ch:55,text:'含德之厚，比于赤子。毒虫不螫，猛兽不据，攫鸟不搏。骨弱筋柔而握固。未知牝牡之合而朘作，精之至也。终日号而不嗄，和之至也。知和曰常，知常曰明。益生曰祥，心使气曰强。物壮则老，谓之不道，不道早已。'},
{ch:56,text:'知者不言，言者不知。塞其兑，闭其门，挫其锐，解其纷，和其光，同其尘，是谓玄同。故不可得而亲，不可得而疏；不可得而利，不可得而害；不可得而贵，不可得而贱。故为天下贵。'},
{ch:57,text:'以正治国，以奇用兵，以无事取天下。吾何以知其然哉？以此：天下多忌讳，而民弥贫；民多利器，国家滋昏；人多伎巧，奇物滋起；法令滋彰，盗贼多有。故圣人云：我无为而民自化，我好静而民自正，我无事而民自富，我无欲而民自朴。'},
{ch:58,text:'其政闷闷，其民淳淳；其政察察，其民缺缺。祸兮福之所倚，福兮祸之所伏。孰知其极？其无正。正复为奇，善复为妖。人之迷，其日固久。是以圣人方而不割，廉而不刿，直而不肆，光而不耀。'},
{ch:59,text:'治人事天，莫若啬。夫唯啬，是谓早服。早服谓之重积德，重积德则无不克，无不克则莫知其极，莫知其极，可以有国；有国之母，可以长久。是谓深根固柢，长生久视之道。'},
{ch:60,text:'治大国若烹小鲜。以道莅天下，其鬼不神。非其鬼不神，其神不伤人。非其神不伤人，圣人亦不伤人。夫两不相伤，故德交归焉。'},
{ch:61,text:'大国者下流，天下之交，天下之牝。牝常以静胜牡，以静为下。故大国以下小国，则取小国；小国以下大国，则取大国。故或下以取，或下而取。大国不过欲兼畜人，小国不过欲入事人。夫两者各得其所欲，大者宜为下。'},
{ch:62,text:'道者万物之奥，善人之宝，不善人之所保。美言可以市尊，美行可以加人。人之不善，何弃之有？故立天子，置三公，虽有拱璧以先驷马，不如坐进此道。古之所以贵此道者何？不曰：求以得，有罪以免邪？故为天下贵。'},
{ch:63,text:'为无为，事无事，味无味。大小多少，报怨以德。图难于其易，为大于其细。天下难事必作于易，天下大事必作于细。是以圣人终不为大，故能成其大。夫轻诺必寡信，多易必多难。是以圣人犹难之，故终无难矣。'},
{ch:64,text:'其安易持，其未兆易谋，其脆易泮，其微易散。为之于未有，治之于未乱。合抱之木，生于毫末；九层之台，起于累土；千里之行，始于足下。为者败之，执者失之。是以圣人无为故无败，无执故无失。民之从事，常于几成而败之。慎终如始，则无败事。是以圣人欲不欲，不贵难得之货；学不学，复众人之所过。以辅万物之自然而不敢为。'},
{ch:65,text:'古之善为道者，非以明民，将以愚之。民之难治，以其智多。故以智治国，国之贼；不以智治国，国之福。知此两者亦稽式。常知稽式，是谓玄德。玄德深矣远矣，与物反矣，然后乃至大顺。'},
{ch:66,text:'江海所以能为百谷王者，以其善下之，故能为百谷王。是以欲上民，必以言下之；欲先民，必以身后之。是以圣人处上而民不重，处前而民不害。是以天下乐推而不厌。以其不争，故天下莫能与之争。'},
{ch:67,text:'天下皆谓我道大，似不肖。夫唯大，故似不肖。若肖，久矣其细也夫！我有三宝，持而保之：一曰慈，二曰俭，三曰不敢为天下先。慈故能勇，俭故能广，不敢为天下先故能成器长。今舍慈且勇，舍俭且广，舍后且先，死矣！夫慈，以战则胜，以守则固。天将救之，以慈卫之。'},
{ch:68,text:'善为士者不武，善战者不怒，善胜敌者不与，善用人者为之下。是谓不争之德，是谓用人之力，是谓配天古之极。'},
{ch:69,text:'用兵有言：吾不敢为主而为客，不敢进寸而退尺。是谓行无行，攘无臂，扔无敌，执无兵。祸莫大于轻敌，轻敌几丧吾宝。故抗兵相加，哀者胜矣。'},
{ch:70,text:'吾言甚易知，甚易行。天下莫能知，莫能行。言有宗，事有君。夫唯无知，是以不我知。知我者希，则我者贵。是以圣人被褐怀玉。'},
{ch:71,text:'知不知，上；不知知，病。夫唯病病，是以不病。圣人不病，以其病病，是以不病。'},
{ch:72,text:'民不畏威，则大威至。无狎其所居，无厌其所生。夫唯不厌，是以不厌。是以圣人自知不自见，自爱不自贵。故去彼取此。'},
{ch:73,text:'勇于敢则杀，勇于不敢则活。此两者或利或害。天之所恶，孰知其故？是以圣人犹难之。天之道，不争而善胜，不言而善应，不召而自来，繟然而善谋。天网恢恢，疏而不失。'},
{ch:74,text:'民不畏死，奈何以死惧之？若使民常畏死，而为奇者，吾得执而杀之，孰敢？常有司杀者杀。夫代司杀者杀，是谓代大匠斫。夫代大匠斫者，希有不伤其手矣。'},
{ch:75,text:'民之饥，以其上食税之多，是以饥。民之难治，以其上之有为，是以难治。民之轻死，以其上求生之厚，是以轻死。夫唯无以生为者，是贤于贵生。'},
{ch:76,text:'人之生也柔弱，其死也坚强。万物草木之生也柔脆，其死也枯槁。故坚强者死之徒，柔弱者生之徒。是以兵强则灭，木强则折。强大处下，柔弱处上。'},
{ch:77,text:'天之道，其犹张弓与？高者抑之，下者举之；有余者损之，不足者补之。天之道，损有余而补不足。人之道则不然，损不足以奉有余。孰能有余以奉天下？唯有道者。是以圣人为而不恃，功成而不处，其不欲见贤。'},
{ch:78,text:'天下莫柔弱于水，而攻坚强者莫之能胜，以其无以易之。弱之胜强，柔之胜刚，天下莫不知，莫能行。是以圣人云：受国之垢，是谓社稷主；受国不祥，是为天下王。正言若反。'},
{ch:79,text:'和大怨，必有余怨，安可以为善？是以圣人执左契而不责于人。有德司契，无德司彻。天道无亲，常与善人。'},
{ch:80,text:'小国寡民。使有什伯之器而不用，使民重死而不远徙。虽有舟舆，无所乘之；虽有甲兵，无所陈之。使民复结绳而用之。甘其食，美其服，安其居，乐其俗。邻国相望，鸡犬之声相闻，民至老死不相往来。'},
{ch:81,text:'信言不美，美言不信。善者不辩，辩者不善。知者不博，博者不知。圣人不积，既以为人己愈有，既以与人己愈多。天之道，利而不害；圣人之道，为而不争。'}
];

// ===== 可选语料（与贪吃蛇同源：小学/初中/高中/苏轼）=====

function firstFourHans(text) {
  return String(text || '').replace(/[^\u4e00-\u9fff]/g, '').slice(0, 4) || '—';
}

function buildItemsForCorpus(id) {
  if (id === 'ddj') {
    return daodejing.map(function (c) {
      return { ch: c.ch, title: firstFourHans(c.text), text: c.text, dynasty: '先秦', author: '老子' };
    });
  }
  const c = CORPUS[id];
  if (!c || !c.items) return [];
  return c.items.map(function (it, i) {
    return {
      ch: i + 1,
      title: it.title || ('第' + (i + 1) + '篇'),
      text: it.text || '',
      dynasty: it.dynasty || '',
      author: it.author || ''
    };
  });
}

let corpusId = localStorage.getItem('ddj86_corpus') || 'ddj';
if (!CORPUS[corpusId]) corpusId = 'ddj';
let currentItems = buildItemsForCorpus(corpusId);

function getCorpus() { return CORPUS[corpusId] || CORPUS.ddj; }
function getItem(ch) {
  return currentItems.find(function (c) { return c.ch === ch; }) || currentItems[0];
}
function maxChapter() {
  return currentItems.length ? currentItems[currentItems.length - 1].ch : 1;
}

function refreshCorpusBar() {
  const bar = document.getElementById('corpusBar');
  if (!bar) return;
  bar.innerHTML = CORPUS_ORDER.map(function (id) {
    const c = CORPUS[id];
    if (!c) return '';
    const n = id === 'ddj' ? 81 : ((c.items && c.items.length) || 0);
    const active = id === corpusId ? ' active' : '';
    return '<button type="button" data-corpus="' + id + '" class="' + active.trim() +
      '" title="' + c.name + ' · ' + n + ' 篇">' + c.name + '</button>';
  }).join('');
  bar.querySelectorAll('button[data-corpus]').forEach(function (btn) {
    btn.onclick = function () { setCorpus(btn.getAttribute('data-corpus')); };
  });
  const h1 = document.getElementById('corpusTitleH1');
  const sub = document.getElementById('corpusSubtitle');
  if (h1) h1.textContent = getCorpus().name;
  if (sub) sub.textContent = '五笔86版 · 编码练习 · ' + currentItems.length + ' 篇';
}

function setCorpus(id) {
  if (!CORPUS[id] || id === corpusId) return;
  corpusId = id;
  localStorage.setItem('ddj86_corpus', id);

// ===== 获取Wubi编码 =====
function getWubi(ch) {
  if (/[\s\n\r]/.test(ch)) return ' ';
  if (/[，。；：？！、""''（）《》…—·\u3000]/.test(ch)) return ch;
  return wubiDict[ch] || '??';
}
function isPunct(ch) {
  return /[，。；：？！、""''（）《》…—·；：？\u3000]/.test(ch);
}

// ===== 状态 =====
let currentChapter = 1;
let viewMode = 'practice';
let charSize = 28;

// ===== 界面初始化 =====
function init() {
  const saved = localStorage.getItem('ddj86_theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
  // 支持 ?corpus=junior#5 从背诵页跳转
  try {
    const params = new URLSearchParams(location.search || '');
    const qCorpus = params.get('corpus') || params.get('c');
    if (qCorpus && CORPUS[qCorpus]) {
      corpusId = qCorpus;
      localStorage.setItem('ddj86_corpus', corpusId);
      currentItems = buildItemsForCorpus(corpusId);
    }
  } catch (e) {}
  const hash = parseInt(window.location.hash.replace('#',''));
  const savedCh = parseInt(localStorage.getItem('ddj86_chapter') || '1');
  const maxCh = maxChapter();
  currentChapter = (hash >= 1 && hash <= maxCh) ? hash : savedCh;
  if (currentChapter < 1 || currentChapter > maxCh) currentChapter = 1;
  changeFontSize(localStorage.getItem('ddj86_fontsize') || '28');
  document.getElementById('fontSizeSelect').value = localStorage.getItem('ddj86_fontsize') || '28';
  refreshCorpusBar();
  renderChapterList();
  selectChapter(currentChapter);
  // 默认进入打字练习模式
  setViewMode('practice');
  // 键盘事件
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
    else if (e.key === 'ArrowUp' && e.ctrlKey) { e.preventDefault(); changeFontSize(Math.min(56, charSize + 4)); }
    else if (e.key === 'ArrowDown' && e.ctrlKey) { e.preventDefault(); changeFontSize(Math.max(12, charSize - 4)); }
    else if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey && !e.altKey) {
      e.preventDefault();
      location.href = 'index.html';
    }
    else if (e.key === '1') setCorpus('ddj');
    else if (e.key === '2') setCorpus('xiaoxue');
    else if (e.key === '3') setCorpus('junior');
    else if (e.key === '4') setCorpus('gaokao');
    else if (e.key === '5') setCorpus('sushi');
  });
}

// ===== 计时器 =====
function startPracticeTimer() {
  stopPracticeTimer();
  practiceSeconds = 0;
  updateTimerDisplay();
  practiceTimerId = setInterval(() => {
    practiceSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopPracticeTimer() {
  if (practiceTimerId) {
    clearInterval(practiceTimerId);
    practiceTimerId = null;
  }
}

function resetPracticeTimer() {
  stopPracticeTimer();
  practiceSeconds = 0;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(practiceSeconds / 60);
  const s = practiceSeconds % 60;
  const display = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  const statsTimer = document.getElementById('practiceTimer');
  if (statsTimer) statsTimer.textContent = display;
  const toolbarTimer = document.getElementById('practiceToolbarTimer');
  if (toolbarTimer) toolbarTimer.textContent = display;
}

function sortChapters() {
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'len') {
    currentItems = currentItems.slice().sort(function (a, b) { return b.text.length - a.text.length; });
  } else {
    currentItems = buildItemsForCorpus(corpusId);
  }
  renderChapterList();
  selectChapter(currentChapter);
}

// ===== 章节选择 =====
function selectChapter(ch) {
  stopPracticeTimer();
  currentChapter = ch;
  localStorage.setItem('ddj86_chapter', ch);
  renderChapterList();
  renderChapter();
  setViewMode('practice');
  updateBestTimeDisplay(ch);
  // 滚动到当前章节
  const items = document.querySelectorAll('.chapter-item');
  const idx = currentItems.findIndex(c => c.ch === ch);
  if (items[idx]) items[idx].scrollIntoView({block:'nearest'});
}

function goPrev() { const idx = currentItems.findIndex(c=>c.ch===currentChapter); if(idx>0) selectChapter(currentItems[idx-1].ch); }
function goNext() { const idx = currentItems.findIndex(c=>c.ch===currentChapter); if(idx<currentItems.length-1) selectChapter(currentItems[idx+1].ch); }

// ===== 渲染章节 =====
function splitLines(text) {
  // 按。？！：等句末标点分割，保留标点
  const lines = [];
  let current = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    current += ch;
    if ('。？！：'.includes(ch) && current.trim().length > 1) {
      lines.push(current.trim());
      current = '';
    }
  }
  if (current.trim()) lines.push(current.trim());
  return lines;
}

function getCleanChars(line) {
  // 获取一行中的纯汉字（非标点、非空格）
  return [...line].filter(ch => !isPunct(ch) && !/[\s\n\r]/.test(ch));
}

function renderChapter() {
  const chapter = getItem(currentChapter);
  if (!chapter) return;
  const container = document.getElementById('chapterContainer');
  document.getElementById('charCount').textContent = chapter.text.replace(/[，。；：？！、\s]/g,'').length;
  
  const uniqueCodes = new Set();
  for (let ch of chapter.text) {
    if (!isPunct(ch) && !/[\s\n\r]/.test(ch)) {
      const wb = getWubi(ch);
      if (wb && wb !== '??') uniqueCodes.add(wb);
    }
  }
  document.getElementById('uniqueCount').textContent = uniqueCodes.size;

  const lines = splitLines(chapter.text);
  const headTitle = corpusId === 'ddj'
    ? ('第 ' + chapter.ch + ' 章 · ' + (chapter.title || ''))
    : (chapter.ch + '. ' + (chapter.title || ''));
  // 副标题：年代 · 作者（无则回退语料名）
  const metaBits = [];
  if (chapter.dynasty) metaBits.push(chapter.dynasty);
  if (chapter.author) metaBits.push(chapter.author);
  const subLine = metaBits.length
    ? metaBits.join(' · ')
    : (getCorpus().name + (corpusId === 'ddj' ? ' · 老子' : ''));
  let html = '<div class="chapter-header"><div class="ch-title">'+headTitle+'</div>'+
    '<div class="ch-subtitle">'+subLine+'</div></div>';
  
  // 浏览/隐藏模式 - 传统的 char-grid
  html += '<div id="studyArea">';
  html += '<div class="char-grid" id="charGrid">';
  for (let i = 0; i < chapter.text.length; i++) {
    const ch = chapter.text[i];
    if (ch === '\n' || ch === '\r') continue;
    if (ch === '，' || ch === '；') {
      html += '<div class="char-block punct"><div class="wb-code">'+ch+'</div><div class="wb-char">'+ch+'</div></div>';
      html += '<div class="char-block space-block"><div class="wb-code">&nbsp;</div><div class="wb-char">&nbsp;</div></div>';
    } else if (ch === '。' || ch === '？' || ch === '！' || ch === '：') {
      html += '<div class="char-block punct"><div class="wb-code">'+ch+'</div><div class="wb-char">'+ch+'</div></div>';
      html += '<div class="char-block space-block" style="min-width:24px"><div class="wb-code">&nbsp;</div><div class="wb-char">&nbsp;</div></div>';
    } else if (isPunct(ch)) {
      html += '<div class="char-block punct"><div class="wb-code">'+ch+'</div><div class="wb-char">'+ch+'</div></div>';
    } else {
      const wb = getWubi(ch);
      html += '<div class="char-block show-code" data-char="'+ch+'" data-wubi="'+wb+'"><div class="wb-code">'+wb+'</div><div class="wb-char">'+ch+'</div></div>';
    }
  }
  html += '</div></div>';
  
  // 练习模式区域
  html += '<div id="practiceArea" style="display:none">';
  
  // 全局工具栏
  html += '<div class="practice-global-toolbar">'+
  '<span style=\"font-size:1.3em;font-weight:700;color:var(--accent);min-width:70px;text-align:center;font-variant-numeric:tabular-nums\" id=\"practiceToolbarTimer\">00:00</span>'+
  '<button onclick=\"practiceCheckAll()\" style=\"font-size:.85em;padding:8px 18px\">✅ 全部检查</button>'+
  '<button onclick=\"practiceResetAll()\" style=\"font-size:.85em;padding:8px 18px\">🔄 重新开始</button>'+
  '<label style=\"font-size:.8em;display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:8px\">'+
  '<input type=\"checkbox\" id=\"showWubiCheck\" checked onchange=\"togglePracticeWubi()\">显示五笔编码</label>'+
  '</div>';
    '<label style="font-size:.8em;display:flex;align-items:center;gap:4px;cursor:pointer">'+
    '<input type="checkbox" id="showWubiCheck" checked onchange="togglePracticeWubi()">显示五笔编码</label>'+
    '</div>';
  
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const cleanChars = getCleanChars(line);
    html += '<div class="practice-section" id="psection-'+li+'">';
    
    // 参考行：显示字符+编码
    html += '<div class="ref-line" id="refline-'+li+'">';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '\n' || ch === '\r') continue;
      if (isPunct(ch)) {
        html += '<span class="practice-char-block punct-char"><span class="pwb-code">'+ch+'</span><span class="pwb-char">'+ch+'</span></span>';
      } else {
        const wb = getWubi(ch);
        html += '<span class="practice-char-block pending" data-pchar="'+ch+'" data-pwubi="'+wb+'" data-pidx="'+i+'"><span class="pwb-code">'+wb+'</span><span class="pwb-char">'+ch+'</span></span>';
      }
    }
    html += '</div>';
    
    // 输入行
    html += '<div class="practice-input-row">'+
      '<input type="text" class="practice-line-input" id="pline-'+li+'" data-line="'+li+'" placeholder="在此输入汉字…" autocomplete="off" oninput="onPracticeLineInput('+li+')" onkeydown="onPracticeLineKey(event,'+li+')">'+
      '<span class="line-status" id="lstatus-'+li+'"></span>'+
      '</div>';
    
    html += '</div>';
  }
  html += '</div>';
  // 回对应语料的背诵 L3（无提示默写）
  const recitePages = {
    ddj: 'daodejing.html',
    xiaoxue: 'xiaoxue.html',
    junior: '789.html',
    gaokao: 'gaokao.html',
    sushi: 'sushi-works.html'
  };
  const recitePage = recitePages[corpusId] || 'daodejing.html';
  const reciteHref = recitePage + '?mode=recite&level=3#' + chapter.ch;
  html += '<div style="margin-top:14px;text-align:center;padding-bottom:16px;">'+
    '<a href="'+reciteHref+'" target="_blank" rel="noopener" style="display:inline-block;color:var(--accent);text-decoration:underline;font-size:0.95em;">🗣️ 回背诵 L3 默打</a>'+
    '</div>';

  container.innerHTML = html;
  applyViewMode();
  // 顶栏「正文」随语料跳转
  const btnStudy = document.getElementById('btnStudy');
  if (btnStudy) {
    btnStudy.href = recitePage + '#' + chapter.ch;
    btnStudy.title = '打开' + getCorpus().name + '正文';
  }
}

// ===== 视图模式 =====
function setViewMode(mode) {
  viewMode = mode;
  const studyArea = document.getElementById('studyArea');
  const practiceArea = document.getElementById('practiceArea');
  const practiceStats = document.getElementById('practiceStats');
  const btnStudy = document.getElementById('btnStudy');
  const btnPractice = document.getElementById('btnPractice');

  if (mode === 'practice') {
    practiceStats.style.display = '';
    if (studyArea) studyArea.style.display = 'none';
    if (practiceArea) practiceArea.style.display = '';
    if (btnStudy) { btnStudy.classList.remove('active'); btnStudy.style.background = 'var(--card-bg)'; btnStudy.style.color = 'var(--text)'; }
    if (btnPractice) { btnPractice.classList.add('active'); btnPractice.style.background = 'var(--accent)'; btnPractice.style.color = '#fff'; }
    practiceTotalChars = 0;
    practiceCorrectChars = 0;
    updatePracticeStats();
    startPracticeTimer();
    // 聚焦第一行输入框
    setTimeout(() => {
      const firstInput = document.getElementById('pline-0');
      if (firstInput) firstInput.focus();
    }, 100);
  } else {
    stopPracticeTimer();
    practiceStats.style.display = 'none';
    if (studyArea) studyArea.style.display = '';
    if (practiceArea) practiceArea.style.display = 'none';
    if (btnStudy) { btnStudy.classList.add('active'); btnStudy.style.background = 'var(--accent)'; btnStudy.style.color = '#fff'; }
    if (btnPractice) { btnPractice.classList.remove('active'); btnPractice.style.background = 'var(--card-bg)'; btnPractice.style.color = 'var(--text)'; }
  }
}

function applyViewMode() {
  // 始终显示编码（仅保留打字练习模式）
  const blocks = document.querySelectorAll('.char-block');
  blocks.forEach(block => {
    if (block.classList.contains('punct') || block.classList.contains('space-block')) return;
    block.classList.remove('hide-code');
    block.classList.add('show-code');
  });
}

// ===== 打字练习(汉字输入) =====
let practiceTotalChars = 0;
let practiceCorrectChars = 0;
let showPracticeWubi = true;
let practiceSeconds = 0;
let practiceTimerId = null;

function togglePracticeWubi() {
  showPracticeWubi = document.getElementById('showWubiCheck').checked;
  document.querySelectorAll('#practiceArea .pwb-code').forEach(el => {
    el.style.display = showPracticeWubi ? '' : 'none';
  });
}

function onPracticeLineInput(lineIdx) {
  const input = document.getElementById('pline-'+lineIdx);
  if (!input) return;
  const typed = [...input.value].filter(ch => !isPunct(ch) && !/[\s\n\r]/.test(ch));
  const section = document.getElementById('psection-'+lineIdx);
  const charBlocks = section.querySelectorAll('.practice-char-block:not(.punct-char)');
  
  let correct = 0;
  
  charBlocks.forEach((block, i) => {
    const expected = block.dataset.pchar;
    block.classList.remove('matched','unmatched','pending');
    if (i < typed.length) {
      if (typed[i] === expected) {
        block.classList.add('matched');
        correct++;
      } else {
        block.classList.add('unmatched');
      }
    } else {
      block.classList.add('pending');
    }
  });
  
  // 更新行状态
  const total = charBlocks.length;
  const statusEl = document.getElementById('lstatus-'+lineIdx);
  if (typed.length >= total && correct === total) {
    statusEl.textContent = '✅ 全对';
    statusEl.style.color = 'var(--success)';
    section.classList.add('completed');
    input.classList.add('correct');
    input.classList.remove('wrong');
  } else if (typed.length >= total && correct < total) {
    statusEl.textContent = '❌ '+(total-correct)+'字错';
    statusEl.style.color = 'var(--danger)';
    section.classList.remove('completed');
    input.classList.add('wrong');
    input.classList.remove('correct');
  } else {
    statusEl.textContent = typed.length+'/'+total;
    statusEl.style.color = 'var(--text)';
    section.classList.remove('completed');
    input.classList.remove('correct','wrong');
  }
  
  recalcGlobalStats();
}

function onPracticeLineKey(e, lineIdx) {
  if (e.key === 'Enter') {
    e.preventDefault();
    // 跳到下一行
    const nextInput = document.getElementById('pline-'+(lineIdx+1));
    if (nextInput) nextInput.focus();
  }
}

function practiceCheckAll() {
  const inputs = document.querySelectorAll('.practice-line-input');
  inputs.forEach(input => {
    const li = parseInt(input.dataset.line);
    onPracticeLineInput(li);
  });
  recalcGlobalStats();
}

function practiceResetAll() {
  document.querySelectorAll('.practice-line-input').forEach(input => {
    input.value = '';
    input.classList.remove('correct','wrong');
  });
  document.querySelectorAll('#practiceArea .practice-char-block').forEach(block => {
    block.classList.remove('matched','unmatched');
    block.classList.add('pending');
  });
  document.querySelectorAll('.line-status').forEach(el => { el.textContent = ''; });
  document.querySelectorAll('.practice-section').forEach(el => { el.classList.remove('completed'); });
  practiceTotalChars = 0;
  practiceCorrectChars = 0;
  updatePracticeStats();
  resetPracticeTimer();
  startPracticeTimer();
  const firstInput = document.getElementById('pline-0');
  if (firstInput) firstInput.focus();
}


function formatSeconds(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

/** 每分钟字数，取整 */
function calcCpm(chars, seconds) {
  if (!chars || !seconds || seconds <= 0) return 0;
  return Math.round(chars * 60 / seconds);
}

function loadBestCpm() {
  try { return JSON.parse(localStorage.getItem('ddj86_bestcpm') || '{}'); }
  catch(e) { return {}; }
}

function bestCpmKey(ch) { return corpusId + ':' + ch; }

function saveBestCpm(ch, cpm) {
  if (!cpm || cpm <= 0) return false;
  const bt = loadBestCpm();
  const k = bestCpmKey(ch);
  const prev = bt[k];
  if (prev != null && cpm <= prev) return false;
  bt[k] = cpm;
  localStorage.setItem('ddj86_bestcpm', JSON.stringify(bt));
  return true;
}

function getStoredCpm(ch) {
  const bt = loadBestCpm();
  const v = bt[bestCpmKey(ch)];
  return (v != null && v > 0) ? v : null;
}

/** 左栏：显示最佳打字速度（字/分） */
function getChapterBest(ch) {
  const v = getStoredCpm(ch);
  if (v != null) return v + '字/分';
  return '';
}

function recalcGlobalStats() {
  let total = 0, correct = 0;
  document.querySelectorAll('#practiceArea .practice-char-block:not(.punct-char)').forEach(block => {
    total++;
    if (block.classList.contains('matched')) correct++;
  });
  practiceTotalChars = total;
  practiceCorrectChars = correct;
  updatePracticeStats();
  // 整章完成：记每分钟字数（取整），越高越好
  if (total > 0 && correct === total) {
    stopPracticeTimer();
    const cpm = calcCpm(total, practiceSeconds);
    if (saveBestCpm(currentChapter, cpm)) {
      const el = document.getElementById('bestTime');
      if (el) el.textContent = String(cpm);
      renderChapterList();
    } else {
      updateBestTimeDisplay(currentChapter);
    }
  }
}

function updateBestTimeDisplay(ch) {
  const el = document.getElementById('bestTime');
  const v = getStoredCpm(ch);
  if (el) el.textContent = v != null ? String(v) : '--';
}

function updatePracticeStats() {
  document.getElementById('correctNum').textContent = practiceCorrectChars;
  document.getElementById('wrongNum').textContent = practiceTotalChars - practiceCorrectChars;
  document.getElementById('progressNum').textContent = practiceCorrectChars;
  document.getElementById('totalNum').textContent = practiceTotalChars;
}

// ===== 字号 =====
function changeFontSize(size) {
  charSize = parseInt(size);
  document.documentElement.style.setProperty('--char-size', charSize + 'px');
  localStorage.setItem('ddj86_fontsize', size);
  document.getElementById('fontSizeSelect').value = size;
}

// ===== 主题 =====
function toggleTheme() {
  const h = document.documentElement;
  const next = h.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  h.setAttribute('data-theme', next);
  localStorage.setItem('ddj86_theme', next);
}

// ===== 侧边栏 =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== 启动 =====
init();
