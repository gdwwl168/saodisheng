<style>
:root {
  --bg: #f5f0e8;
  --text: #3d3226;

  --accent: #8b4513;

  --border: #d4c5a9;

  --chip-active: #8b4513;
  --chip-active-text: #faf7f2;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --text: #e4d8c0;
  --text-muted: rgba(228,216,192,0.55);
  --accent: #c9a96e;
  --gold: #c9a96e;
  --card-bg: #252540;
  --border: #3a3a55;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --input-bg: #1f1f35;
  --chip-active: #c9a96e;
  --chip-active-text: #1a1a2e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  transition: background 0.25s, color 0.25s;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; color: inherit; cursor: pointer; }

.page {
  max-width: 820px;
  margin: 0 auto;
  padding: 16px 14px calc(28px + var(--safe-bottom));
}

.header { text-align: center; padding: 14px 8px 6px; }
.header .eyebrow {
  font-size: 0.75em; letter-spacing: 0.28em; color: var(--text-muted); margin-bottom: 8px;
}
.header h1 {
  font-size: 1.7em; color: var(--accent); letter-spacing: 0.16em; font-weight: 700;
}
.header .sub {

}
.nav-links {

.nav-links a {

}
.nav-links a.here {

}

.stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 14px 0 12px;
}
.stat {

  padding: 10px 6px; text-align: center; box-shadow: var(--shadow);
}
.stat .num {
  font-size: 1.15em; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums;
}
.stat .label { margin-top: 3px; font-size: 0.72em; color: var(--text-muted); }

.toolbar {
  position: sticky; top: 0; z-index: 20;

  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);

}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; border: 1px solid var(--border); background: var(--input-bg); color: var(--text);

}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .count {

}
.chips {

}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);

}
.chip.active {

.talk-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }

<script>
(function () {
  var data = window.WWG_TALKS || { TALKS: [] };
  var talks = (data.TALKS || []).slice().sort(function (a, b) {
    return (a.no || 0) - (b.no || 0);
  });
  var activeTag = '全部';
  var query = '';
  var TAG_ORDER = ['发刊词', '基本世界观', '成长战略', '决策判断', '学习教育', '赚钱逻辑', '参与者', '领导者', '演化者', '尾声'];

  var $list = document.getElementById('talkList');
  var $empty = document.getElementById('emptyState');
  var $search = document.getElementById('searchInput');
  var $resultCount = document.getElementById('resultCount');
  var $chips = document.getElementById('tagChips');
  var $toast = document.getElementById('toast');

  function toast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { $toast.classList.remove('show'); }, 1600);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function highlight(text, q) {
    var s = escapeHtml(text);
    if (!q) return s;
    var re;
    try { re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'); }
    catch (e) { return s; }
    return s.replace(re, '<mark class="hit">$1</mark>');
  }

  function pileFor(a) {
    var n = a.no || 0;
    if (!n) return { n: 0, emoji: '', hint: '', label: '' };
    if (n <= 100) {
      var emoji = (typeof hintEmoji !== 'undefined' && hintEmoji[n]) || '';
      var hint = (typeof hintsMap !== 'undefined' && hintsMap[n]) || '';
      var label = (emoji ? emoji + ' ' : '') + n + (hint ? ' · ' + hint : '');
      return { n: n, emoji: emoji, hint: hint, label: label };
    }
    return { n: n, emoji: '', hint: '', label: String(n) };
  }

  function tagCounts() {
    var map = {};
    talks.forEach(function (a) {
      (a.tags || []).forEach(function (t) { map[t] = (map[t] || 0) + 1; });
    });
    return map;
  }

  function allTags() {
    var map = tagCounts();
    return Object.keys(map).sort(function (a, b) {
      var ia = TAG_ORDER.indexOf(a);
      var ib = TAG_ORDER.indexOf(b);
      if (ia === -1) ia = 999;
      if (ib === -1) ib = 999;
      if (ia !== ib) return ia - ib;
      return (map[b] || 0) - (map[a] || 0);
    });
  }

  function filtered() {
    var q = query.trim().toLowerCase();
    return talks.filter(function (a) {
      if (activeTag !== '全部' && !(a.tags || []).includes(activeTag)) return false;
      if (!q) return true;
      var p = pileFor(a);
      var blob = [a.title, a.summary, (a.tags || []).join(' '), p.label, p.hint, String(p.n)]
        .join('\n').toLowerCase();
      return blob.indexOf(q) !== -1;
    });
  }

  function renderStats() {
    document.getElementById('statCount').textContent = String(talks.length);
    document.getElementById('statTags').textContent = String(allTags().length);
  }

  function renderChips() {
    var counts = tagCounts();
    var tags = allTags();
    var html = '<button type="button" class="' +
      (activeTag === '全部' ? 'chip active' : 'chip') +
      '" data-tag="全部">全部 ' + talks.length + '</button>';
    html += tags.map(function (t) {
      var cls = t === activeTag ? 'chip active' : 'chip';
      return '<button type="button" class="' + cls + '" data-tag="' + escapeHtml(t) + '">' +
        escapeHtml(t) + ' ' + (counts[t] || 0) + '</button>';
    }).join('');
    $chips.innerHTML = html;
  }

  function renderList() {
    var list = filtered();
    var q = query.trim();
    $resultCount.textContent = String(list.length);
    if (!list.length) {
      $list.innerHTML = '';
      $empty.hidden = false;
      return;
    }
    $empty.hidden = true;
    $list.innerHTML = list.map(function (a) {
      var pile = pileFor(a);
      var booksHtml = '';
      if (a.books && a.books.length) {
        booksHtml = '<div class="book-row">' + a.books.map(function (b) {
          var url = 'https://weread.qq.com/web/shelf';
          return '<a class="book-link" href="' + url + '" target="_blank" rel="noopener" data-book="' + escapeHtml(b.title) + '" title="打开微信读书 · 书名已复制">📖 ' + escapeHtml(b.title) + (b.author ? ' · ' + escapeHtml(b.author) : '') + '</a>';
        }).join('') + '</div>';
      }
      var copyText = '万维钢 现代思维工具 ' + a.title;
      return (
        '<article class="card-item" data-id="' + escapeHtml(a.id) + '">' +
          (pile.label ? '<div class="pile">' + highlight(pile.label, q) + '</div>' : '') +
          '<div class="title-row">' +
            '<button type="button" class="title-btn" data-copy="' + escapeHtml(copyText) + '" title="点击复制：万维钢 现代思维工具 + 标题">' +
              highlight(a.title, q) +
            '</button>' +
            '<button type="button" class="search-btn" data-search="' + escapeHtml('万维钢 现代思维工具 ' + a.title) + '" title="弹窗搜索" aria-label="搜索">' +
              '🔍' +
            '</button>' +
          '</div>' +
          booksHtml +
        '</article>'
      );
    }).join('');
  }

  async function copyText(text) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      toast('已复制：' + text);
    } catch (e) {
      toast('复制失败，请长按选择');
    }
  }

  $chips.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-tag]');
    if (!btn) return;
    activeTag = btn.getAttribute('data-tag');
    renderChips();
    renderList();
  });

  $list.addEventListener('click', function (e) {
    var book = e.target.closest('.book-link');
    if (book) {
      var title = book.getAttribute('data-book') || '';
      if (title) copyText(title);
      return;
    }
    var search = e.target.closest('.search-btn');
    if (search) {
      var q = search.getAttribute('data-search') || '';
      if (q) window.open('https://cn.bing.com/search?q=' + encodeURIComponent(q), '_blank');
      return;
    }
    var titleBtn = e.target.closest('.title-btn');
    if (!titleBtn) return;
    var text = titleBtn.getAttribute('data-copy') || '';
    if (text) { copyText(text); openSearch(text); }
  });

  /* ---- 搜索/内容弹窗 ---- */
  var $sOverlay = document.getElementById('searchOverlay');
  var $sFrame = document.getElementById('searchFrame');
  var $sContent = document.getElementById('searchContent');
  var $sTitle = document.getElementById('searchTitle');
  var $searchNav = document.getElementById('searchNav');
  // Build content lookup
  var contentMap = {};
  var contentMapById = {};
  talks.forEach(function (a) { if (a.content) { contentMap[a.id] = a; contentMapById['no' + a.no] = a; } });

  var currentTalkNo = 0;

  function openSearch(q) {
    var found = null;
    var searchTitle = q.replace('万维钢 现代思维工具 ', '');
    for (var id in contentMap) {
      if (contentMap[id].title === searchTitle) { found = contentMap[id]; break; }
    }
    if (found) {
      currentTalkNo = found.no || 0;
      $sTitle.textContent = '第' + found.no + '讲 ' + found.title;
      $sContent.innerHTML = found.content;
      $sContent.classList.add('on');
      $sFrame.classList.remove('on');
      updateNav();
    } else {
      currentTalkNo = 0;
      $sTitle.textContent = '🔍 ' + q;
      $sContent.classList.remove('on');
      $sFrame.classList.add('on');
      $sFrame.src = 'https://www.bing.com/search?q=' + encodeURIComponent(q);
      $searchNav.style.display = 'none';
    }
    $sOverlay.classList.add('show');
  }

  function updateNav() {
    if (!currentTalkNo) { $searchNav.style.display = 'none'; return; }
    $searchNav.style.display = 'flex';
    var prev = contentMapById['no' + (currentTalkNo - 1)];
    var next = contentMapById['no' + (currentTalkNo + 1)];
    document.getElementById('navPrev').disabled = !prev;
    document.getElementById('navNext').disabled = !next;
  }

  function navTo(delta) {
    var target = contentMapById['no' + (currentTalkNo + delta)];
    if (target) { openSearch('万维钢 现代思维工具 ' + target.title); }
  }

  document.getElementById('navPrev').addEventListener('click', function () { navTo(-1); });
  document.getElementById('navNext').addEventListener('click', function () { navTo(1); });

  function closeSearch() {
    $sOverlay.classList.remove('show');
    $sFrame.src = '';
    $sContent.innerHTML = '';
    $sContent.classList.remove('on');
    $sFrame.classList.remove('on');
    $searchNav.style.display = 'none';
    currentTalkNo = 0;
  }

  document.getElementById('searchClose').addEventListener('click', closeSearch);
  $sOverlay.addEventListener('click', function (e) {
    if (e.target === $sOverlay) closeSearch();
  });

  $search.addEventListener('input', function () {
    query = $search.value || '';
    renderList();
  });

  document.getElementById('themeBtn').addEventListener('click', function () {
    var root = document.documentElement;
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try {
      var key = document.querySelector('meta[name="cjg-theme-key"]');
      localStorage.setItem(key ? key.content : 'cangjingge-theme', next);
    } catch (e) {}
  });

  document.addEventListener('keydown', function (e) {
    if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
    if (e.key === 'h' || e.key === 'H') location.href = 'index.html';
  });

  /* ---- 大纲弹窗 ---- */
  var $overlay = document.getElementById('outlineOverlay');
  var $olBody = document.getElementById('outlineBody');
  var MODULE_ORDER = ['发刊词','基本世界观','成长战略','决策判断','学习教育','赚钱逻辑','参与者','领导者','演化者','尾声'];

  function renderOutline() {
    var grouped = {};
    talks.forEach(function (a) {
      var m = a.module || '其他';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(a);
    });
    var html = '';
    MODULE_ORDER.forEach(function (m) {
      if (!grouped[m]) return;
      var items = grouped[m];
      html += '<div class="ol-module open"><button type="button" class="ol-module-btn">' +
        '<span class="arr">▶</span> ' + escapeHtml(m) + ' · ' + items.length + ' 讲' +
        '</button><div class="ol-list">';
      items.forEach(function (a) {
        var no = a.no || '';
        html += '<div class="ol-item" data-copy="' + escapeHtml('万维钢 现代思维工具 ' + a.title) + '">' +
          '<span class="no">' + no + '</span>' + escapeHtml(a.title) + '</div>';
      });
      html += '</div></div>';
    });
    // 其他模块
    Object.keys(grouped).forEach(function (m) {
      if (MODULE_ORDER.indexOf(m) >= 0) return;
      var items = grouped[m];
      html += '<div class="ol-module"><button type="button" class="ol-module-btn">' +
        '<span class="arr">▶</span> ' + escapeHtml(m) + ' · ' + items.length + ' 讲' +
        '</button><div class="ol-list">';
      items.forEach(function (a) {
        html += '<div class="ol-item" data-copy="' + escapeHtml('万维钢 现代思维工具 ' + a.title) + '">' +
          '<span class="no">' + (a.no||'') + '</span>' + escapeHtml(a.title) + '</div>';
      });
      html += '</div></div>';
    });
    $olBody.innerHTML = html;
  }

  // Toggle module expand
  $olBody.addEventListener('click', function (e) {
    var btn = e.target.closest('.ol-module-btn');
    if (btn) { btn.parentElement.classList.toggle('open'); return; }
    var item = e.target.closest('.ol-item');
    if (item) {
      var txt = item.getAttribute('data-copy') || '';
      if (txt) { copyText(txt); openSearch(txt); }
      return;
    }
  });

  function openOutline(q) {
    $overlay.classList.add('show');
    // 展开所有模块
    var mods = $olBody.querySelectorAll('.ol-module');
    mods.forEach(function (m) { m.classList.add('open'); });
    // 移除旧高亮
    $olBody.querySelectorAll('.ol-item.hl').forEach(function (el) { el.classList.remove('hl'); });
    if (q) {
      // 高亮匹配项
      var items = $olBody.querySelectorAll('.ol-item');
      var found = null;
      items.forEach(function (el) {
        var txt = el.getAttribute('data-copy') || '';
        if (txt.indexOf(q.replace('万维钢 现代思维工具 ', '')) >= 0) {
          el.classList.add('hl');
          if (!found) found = el;
        }
      });
      if (found) {
        setTimeout(function () { found.scrollIntoView({ block: 'center', behavior: 'smooth' }); }, 100);
      }
    }
  }
  function closeOutline() { $overlay.classList.remove('show'); }

  document.getElementById('outlineOpen').addEventListener('click', function () { openOutline(); });
  document.getElementById('outlineClose').addEventListener('click', closeOutline);
  $overlay.addEventListener('click', function (e) {
    if (e.target === $overlay) closeOutline();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      if ($sOverlay.classList.contains('show')) { closeSearch(); return; }
      if ($overlay.classList.contains('show')) closeOutline();
    }
    if ($sOverlay.classList.contains('show')) {
      if (e.key === 'ArrowLeft') { navTo(-1); e.preventDefault(); }
      if (e.key === 'ArrowRight') { navTo(1); e.preventDefault(); }
    }
  });

  renderOutline();
  renderStats();
  renderChips();
  renderList();
})();
</script>
<script src="pwa-register.js" defer></script>
</body>
</html>
