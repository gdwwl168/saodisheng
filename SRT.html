    html: `
<p><strong>SRT</strong> 全称 <em>Single Rope Technique</em>（单绳技术），是一套在<strong>同一根固定绳</strong>上完成下降与上升的方法体系。</p>
<p>核心：在<strong>一根固定的低延伸绳（静力绳 / 半静力绳）</strong>上，借助上升器、下降器、牛尾绳等，完成<strong>下降、上升、过点、转换</strong>，在竖井、陡壁等垂直空间移动。</p>
<blockquote>探洞竖井里，现代几乎都以 SRT 为主，而不是背梯子硬爬。维基百科亦将 SRT 描述为「在同一根绳上既下又上」的整套技法。</blockquote>
<h3>SRT 与 DRT</h3>
<p>与 SRT 相对的是 <strong>DRT</strong>（<em>Double-rope technique</em> / 双绳技术，攀树界亦称 <em>moving-rope technique</em> 动绳技术）：</p>
<table>
  <tr><th></th><th>SRT（单绳 / 静绳）</th><th>DRT（双绳 / 动绳）</th></tr>
  <tr><td>绳的状态</td><td>绳固定在锚上，人沿绳移动</td><td>绳可随人移动（环绕树枝等）</td></tr>
  <tr><td>典型场景</td><td>探洞竖井、峡谷、部分高空作业</td><td>攀树、部分救援/作业</td></tr>
  <tr><td>探洞主流</td><td>是</td><td>一般不用作竖井主体系</td></tr>
</table>
<p>攀树社群为避免与探洞用语混淆，常把单绳固定体系称作 <strong>Stationary Rope Technique</strong>（固定绳技术），缩写仍可能写作 SRT。</p>
<h3>不只是「一绳到底」</h3>
<ul>
  <li>自行或协作<strong>架设绳索线路</strong>（锚点、备份、保护点、Y 挂）</li>
  <li>在中间锚点（<strong>re-belay</strong>）与<strong>偏导（deviation）</strong>上过点、换绳</li>
  <li><strong>上升 ⇄ 下降</strong>的安全转换</li>
  <li>避开落石、瀑布、磨绳点；必要时安装绳护</li>
  <li>纠错、自救、协助同伴（进阶，另篇）</li>
</ul>
<h3>常见应用领域</h3>
<table>
  <tr><th>领域</th><th>说明</th></tr>
  <tr><td>洞穴探险 / 竖洞（potholing）</td><td>竖井、天井、多层竖井（本页重点）</td></tr>
  <tr><td>攀岩 / 登山相关</td><td>部分场景用到单绳上下，装备与探洞不完全相同</td></tr>
  <tr><td>溯溪 / 溪降（canyoning）</td><td>单绳下降为主，叠加水力与暴涨风险；详见「<a href="#canyon" onclick="showArticle('canyon');return false;">SRT 溪降</a>」</td></tr>

  <tr><td>攀树（arborist）</td><td>有 SRT/「固定绳」体系，器材与打法不同</td></tr>
</table>

</div>

    html: `
<p>以下时间线主要依据英文维基百科 <a href="https://en.wikipedia.org/wiki/Single-rope_technique" target="_blank" rel="noopener">Single-rope technique</a> 及探洞史常见叙述，便于建立「装备从哪来」的背景感。</p>
<table>
  <tr><th>时期</th><th>事件</th></tr>
  <tr><td>1930 年代</td><td>法国阿尔卑斯一带洞穴俱乐部兴起，竖井探洞逐渐成为户外运动。</td></tr>
  <tr><td>约 1934</td><td>Henri Brenot 的机械上升装置（俗称 “monkeys”）与 prusik 思路，被 Pierre Chevalier 等用于洞穴；单绳技法雏形可追溯至此。</td></tr>
  <tr><td>二战前后</td><td>Chevalier、Fernand Petzl、Charles Petit-Didier 等探索格勒诺布尔附近的 <strong>Dent de Crolles</strong> 洞穴系统，一度成为当时世界最深探索记录（约 −658 m）。物资匮乏倒逼自制装备与技术革新。</td></tr>

<blockquote>机械上升系统的成熟，显著扩展了深竖井探索的可行性与安全性——从「能下能上」变成「更稳、更快、更可重复」。</blockquote>

<table>
  <tr><th>时期</th><th>事件</th></tr>
  <tr><td>1980 年代</td><td>地质勘测等专业人员已开始使用 SRT；社会向探险队普及仍有限。</td></tr>
  <tr><td>约 1984</td><td>桂林等地<strong>中外联合洞穴科考</strong>常被记为把较成体系的 SRT 装备与技术带入国内现代探洞语境的重要节点之一。</td></tr>
  <tr><td>1986 起</td><td>法国洞穴探险家 <strong>让·波塔西（Jean Bottazzi）</strong> 参与中法洞穴活动，此后长期在中国西南（如贵州绥阳双河洞一带）参与科考、培训与推广。</td></tr>
  <tr><td>2005</td><td><strong>中法洞穴培训基地</strong>在贵州<strong>绥阳</strong>设立；公开资料称已多届举办国际洞穴探测及 SRT 培训（报道曾写十余届、受训两百余人量级，以当时最新统计为准）。</td></tr>
  <tr><td>2010–2020s</td><td>俱乐部、高校社团、地方科考与景区体验并存；消防/社会救援亦有 SRT 类培训报道（标准与探洞运动不完全等同）。</td></tr>
  <tr><td>约 2024</td><td>中文译著 <strong>《洞穴探险技术手册》</strong>（对应法式/阿尔卑斯探洞技术体系，与 <em>Alpine Caving Techniques</em> 一脉）由中国大百科全书出版社出版，便于系统自学对照。</td></tr>
</table>
<p>绳与织带的检查退役见「<a href="#rope-care" onclick="showArticle('rope-care');return false;">绳与织带维护</a>」；锚点概念见「<a href="#anchors" onclick="showArticle('anchors');return false;">锚点类型</a>」。国内教学风格整体更接近<strong>欧式多 rebely、轻绳、frog</strong> 体系（受法式培训影响深），具体以你所在俱乐部为准。</p>

<h3>技术重点</h3>
<ol>
  <li><strong>下降控制</strong>：湿绳、喷瀑中手感变重；匀速、随时能停</li>
  <li><strong>站与转换</strong>：瀑顶/小平台湿滑拥挤；先牛尾保护再作业</li>
  <li><strong>拉绳与收绳</strong>：单向通过后常把绳拉下带走——卡绳、磨棱、绳袋被冲走是高频麻烦</li>
  <li><strong>导向 / 牵引下降（guided rappel）</strong>：辅绳把下降路线拉离主水舌或危险落点（须专项学）</li>
  <li><strong>可释放 / 可逃逸思路</strong>：部分体系强调异常时可从上方处理绳（高度依赖训练与架法，本页不写步骤）</li>
  <li><strong>上升能力</strong>：日常以下降为主，但卡绳、上错线、撤退时仍可能要上——完全不会会很被动</li>
</ol>

<h3>装备侧重（概念）</h3>
<table>
  <tr><th>项目</th><th>溪降常见考量</th></tr>
  <tr><td>绳</td><td>半静/静力；长度按瀑段；拉绳策略；吸水后明显变重</td></tr>
  <tr><td>下降器</td><td>湿绳可调摩擦；跟教练体系选型</td></tr>
  <tr><td>安全带</td><td>耐湿、档位；与攀岩座带侧重点可能不同</td></tr>
  <tr><td>头盔</td><td>瀑击与落石；常见排水孔设计</td></tr>
  <tr><td>衣着</td><td>湿衣保温；防割手套；防滑鞋</td></tr>
  <tr><td>浮力 / 包</td><td>绳袋、可漂浮管理；电子设备防水</td></tr>
  <tr><td>刀具</td><td>部分队伍强调可及（缠绕等）；用法与法规跟教练</td></tr>
</table>
<p>是否背全套上升系统（胸式+手式等）按线路等级与队规；「会不会」与「今日带不带」分开评估。</p>

<h3>水相关风险</h3>
<ul>
  <li><strong>暴雨与上游泄水</strong>：水位可短时间暴涨封谷；行前看预报、流域与季节</li>
  <li><strong>水力特征</strong>：底洞、卷浪、虹吸、栅栏状卡物——不是「会游泳就没事」</li>
  <li><strong>瀑布落点</strong>：绳摆进主水舌；落池过浅或有沉木</li>
  <li><strong>低体温</strong>：长时间湿冷会让判断力下降</li>
  <li><strong>跳跃</strong>：很多队伍<strong>禁止盲目跳</strong>；深度与落点必须确认</li>
</ul>
<div class="callout">

</div>

<h3>团队与口令</h3>
<ul>
  <li>瀑顶控制人数：平台挤、踩滑与落石风险高</li>
  <li>下方「绳 / 落石 / 水况」回报更密；水声大时口哨与手势备用</li>
  <li>明确：谁先下探水、谁拉绳、谁最后、绳卡了的预案</li>
  <li>峡谷常无手机信号——地面联系人与返回逾期规则要事先说清</li>
</ul>

<h3>学习路径建议</h3>
<ol>
  <li>游泳与基础水域舒适度（能自浮、冷静即可，不必竞技）</li>
  <li>馆内/矮崖：湿绳下降、停稳、简单拉绳概念</li>
  <li>正规溪降课：读水、锚与单向通过、团队节奏</li>
  <li>简单已知峡谷跟有经验队；再谈流量与难度</li>

<p>凸轮类上升器（Jumar、Croll 等）可沿绳上推，向下受力即锁住；且应能在<strong>仍连着身体</strong>时从绳上取下。攀登/登山应急仍可能用 prusik、Bachmann、Klemheist 等<strong>抓结</strong>，但在探洞 SRT 主体系中已少作日常主上升方式——慢，且泥、冰会严重降低效率。</p>
<h3>1. Frog / 青蛙式（坐站式）</h3>
<p>世界探洞最常用个人系统之一（维基配图亦以 frog 为例）：</p>
<ul>
  <li><strong>胸式上升器</strong>：连安全带，坐回时承重</li>
  <li><strong>手式上升器</strong>：手上推，下挂<strong>脚踏</strong></li>
</ul>
<p><strong>动作循环（概念）</strong></p>
<ol>
  <li>胸式、手式都挂在绳上，收紧上方松弛绳段</li>
  <li><strong>手脚同时用力站直</strong> → 身体上升，胸式被带高（动作像蛙泳夹腿）</li>
  <li>体重轻轻交给胸式，坐下</li>
  <li>手式上移，脚踏上提</li>
  <li>重复：站 → 坐 → 移 → 站</li>
</ol>
<p>优点：结构简单、过 rebely 相对灵活、装备轻。缺点：超长无障碍竖井上不如「绳走式」快。</p>
<p>新手易犯：耸肩、撑直不充分、手式推得不够高。</p>
<h3>2. Rope-walking / 绳走式</h3>
<ul>
  <li>一脚直接连上升器，另一脚经绳段连更高处的上升器，避免两器互撞</li>

</table>
<p>另有 <strong>Mitchell</strong> 等混合/历史系统（一手上升器 + 脚系统组合变体），现已较少作为入门主推；效率与能耗对比因人而异，以俱乐部教学系统为准。</p>

<table>
  <tr><th>做法</th><th>说明</th></tr>

<p>「绳子怎么挂下去」很大程度上决定了你该用哪种上升/下降习惯。维基将探洞架绳习惯粗分为<strong>北美风格</strong>与<strong>欧洲风格</strong>（现实中会混合，以当地洞穴与俱乐部为准）。</p>

  <tr><th>术语</th><th>说明</th></tr>
  <tr><td><strong>SRT</strong></td><td>Single Rope Technique，单绳技术；攀树界或称 Stationary Rope Technique（固定绳）</td></tr>
  <tr><td><strong>DRT</strong></td><td>Double-rope / moving-rope technique，双绳/动绳技术</td></tr>
  <tr><td><strong>Frog / 青蛙式</strong></td><td>坐站式上升：胸式 + 手式脚踏，交替站坐上绳</td></tr>
  <tr><td><strong>Rope-walking / 绳走</strong></td><td>双脚交替迈步式上升，长直井效率高</td></tr>
  <tr><td><strong>Prusik / jugging</strong></td><td>沿绳上升的泛称；prusik 亦特指一种抓结</td></tr>
  <tr><td><strong>Abseil / rappel</strong></td><td>沿绳下降（英/美习惯用词差异）</td></tr>
  <tr><td><strong>Descender</strong></td><td>下降器</td></tr>
  <tr><td><strong>Ascender / jammer</strong></td><td>上升器 / 抓绳器</td></tr>
  <tr><td><strong>Croll</strong></td><td>常特指贴胸使用的胸式上升器（亦是 Petzl 型号名）</td></tr>
  <tr><td><strong>Cow's tails / 牛尾</strong></td><td>连在安全带上的短保护绳，过点与井口挂点用</td></tr>
  <tr><td><strong>Re-belay / rebely</strong></td><td>中间重锚：绳在中途重新固定，把竖井分段</td></tr>
  <tr><td><strong>Deviation / 偏导</strong></td><td>侧向拉绳改变绳线，通常不在该点完全改锚承重</td></tr>
  <tr><td><strong>Y-hang / Y 挂</strong></td><td>两锚成 Y 形分担负荷、改善绳线</td></tr>
  <tr><td><strong>Traverse / 横移</strong></td><td>水平或近水平的绳线移动，常为到达好挂点</td></tr>
  <tr><td><strong>Rope protector / 绳护</strong></td><td>垫在磨点保护主绳</td></tr>
  <tr><td><strong>Pitch / 竖井段</strong></td><td>一段需要绳索通过的垂直落差</td></tr>
  <tr><td><strong>Rebelay loop / 锚环</strong></td><td>中间锚处可供挂牛尾/转换的绳环或锚站结构（叫法因地而异）</td></tr>
  <tr><td><strong>Changeover</strong></td><td>上升⇄下降或过点时的系统转换</td></tr>
  <tr><td><strong>Self-belay</strong></td><td>自我保护（如牛尾挂点）</td></tr>
  <tr><td><strong>Static / low-stretch rope</strong></td><td>静力/低延伸绳，SRT 主绳常用</td></tr>

  <tr><td><strong>Rack</strong></td><td>下降架，多摩擦棒调速</td></tr>
  <tr><td><strong>Bobbin</strong></td><td>双轴/线轴型下降器一类的统称</td></tr>
  <tr><td><strong>Potholing</strong></td><td>英式用语，偏竖向洞穴探险</td></tr>
  <tr><td><strong>Alpine caving</strong></td><td>阿尔卑斯式探洞：轻装、复杂垂直、欧式架绳传统</td></tr>
  <tr><td><strong>Hanger / 挂片</strong></td><td>固定在膨胀栓上的金属连接片，供锁扣挂入</td></tr>
  <tr><td><strong>Bolt / 膨胀栓</strong></td><td>打入基岩的锚栓；探洞常用机械栓或化学锚（以当地与教练为准）</td></tr>
  <tr><td><strong>Natural anchor</strong></td><td>天然锚：岩柱、溶蚀孔、可靠岩体等（需会判断）</td></tr>
  <tr><td><strong>Backup / 备份锚</strong></td><td>主锚之外的冗余连接，降低单点失效后果</td></tr>
  <tr><td><strong>Sheath / core</strong></td><td>绳的外皮与内芯；芯皮绳结构检查重点</td></tr>
  <tr><td><strong>Glazing / 融光</strong></td><td>摩擦过热导致绳表发亮变硬，损伤信号</td></tr>
  <tr><td><strong>Retirement / 退役</strong></td><td>装备达到寿命/损伤标准后停止生命支撑用途</td></tr>
  <tr><td><strong>EN 1891</strong></td><td>低延伸绳常见欧标类型参考（具体型号看铭牌）</td></tr>
  <tr><td><strong>绳自由 / rope free</strong></td><td>该段绳已无人占用，下一人可上绳（定义须全队统一）</td></tr>
  <tr><td><strong>Buddy check / 互检</strong></td><td>同伴互相检查穿戴与连接</td></tr>
  <tr><td><strong>Call-out / 口令</strong></td><td>约定语音或口哨信号</td></tr>
  <tr><td><strong>Survey / 测图</strong></td><td>洞穴测绘；业余探洞也可能简单草图辅助返回</td></tr>
  <tr><td><strong>Belay station / 锚站</strong></td><td>锚与连接构成的站立/转换位置</td></tr>

  <tr><td><strong>架绳 / rig</strong></td><td>设置锚与绳线供通行</td></tr>
  <tr><td><strong>Briefing</strong></td><td>出发前简报：口令、顺序、时间、角色</td></tr>
  <tr><td><strong>泥绳 / muddy rope</strong></td><td>粘泥主绳，上升器易打滑</td></tr>

  <tr><td><strong>Hydraulic / 水力障碍</strong></td><td>卷浪、底洞等水流结构风险</td></tr>
  <tr><td><strong>Rope bag</strong></td><td>绳袋；溪降中常配合投放与漂浮管理</td></tr>

const navList = document.getElementById('navList');
const content = document.getElementById('content');
const titleNow = document.getElementById('titleNow');
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('backdrop');

function renderNav() {
  navList.innerHTML = ARTICLES.map((a, i) => {
    const tag = a.status === 'draft' ? ' <span style="opacity:.7;font-size:.75em">·待补</span>' : '';
    return `<button type="button" class="nav-item" data-id="${a.id}" onclick="showArticle('${a.id}')">
      <span class="num">${String(i + 1).padStart(2, '0')}</span>${a.title}${tag}
    </button>`;
  }).join('');
}

function showArticle(id) {
  const a = ARTICLES.find(x => x.id === id) || ARTICLES[0];
  titleNow.textContent = a.title.replace(/：.*/, '');
  content.innerHTML = `<article class="article">
    <h2>${a.title}${a.status === 'draft' ? '<span class="todo-tag">待补</span>' : ''}</h2>
    <div class="meta">SRT · Single Rope Technique · 藏经阁笔记</div>
    ${a.html}
    <div class="footer-note">扫地僧 · 藏经阁 · SRT 专页 · 仅供学习备忘，操作请跟专业训练</div>
  </article>`;
  content.scrollTop = 0;
  navList.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === a.id);
  });
  history.replaceState(null, '', '#' + a.id);
  closeSidebar();
}

function toggleSidebar() {
  sidebar.classList.toggle('open');
  backdrop.classList.toggle('show');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  backdrop.classList.remove('show');
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? '' : 'dark';
  html.setAttribute('data-theme', next);
  try { localStorage.setItem('srt-theme', next); } catch (e) {}
}

document.addEventListener('keydown', e => {
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'h' || e.key === 'H') { e.preventDefault(); location.href = 'index.html'; }
  if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleTheme(); }
  if (e.key === 'Escape') closeSidebar();
});

// init theme
(function () {
  try {
    const s = localStorage.getItem('srt-theme');
    if (s !== null) document.documentElement.setAttribute('data-theme', s);
    else if (window.cjgResolveTheme) document.documentElement.setAttribute('data-theme', cjgResolveTheme('srt-theme', ''));
  } catch (e) {}
  renderNav();
  const hash = (location.hash || '').replace(/^#/, '');
  showArticle(hash && ARTICLES.some(a => a.id === hash) ? hash : ARTICLES[0].id);
})();
