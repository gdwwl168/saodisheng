<style>
:root {
  --bg: #f5f0e8;
  --text: #3d3226;
  --text-muted: rgba(61,50,38,0.55);
  --accent: #8b4513;
  --gold: #c9a96e;
  --card-bg: #faf7f2;
  --border: #d4c5a9;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --tag-bg: #ede4d3;
  --input-bg: #fff;
  --chip-active: #8b4513;
  --chip-active-text: #faf7f2;
  --cover-bg: #e8dfd0;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --text: #d4c5a9;
  --text-muted: rgba(212,197,169,0.55);
  --accent: #c9a96e;
  --gold: #c9a96e;
  --card-bg: #252540;
  --border: #3a3a55;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --tag-bg: #2a2a40;
  --input-bg: #1f1f35;
  --chip-active: #c9a96e;
  --chip-active-text: #1a1a2e;
  --cover-bg: #2a2a40;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Microsoft YaHei", serif;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s, color 0.3s;
}

a { color: inherit; text-decoration: none; }

.page {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 14px calc(28px + var(--safe-bottom));
}

.header {
  text-align: center;
  padding: 18px 8px 8px;
}

.header .eyebrow {
  font-size: 0.78em;
  letter-spacing: 0.28em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.header h1 {
  font-size: 1.85em;
  color: var(--accent);
  letter-spacing: 0.18em;
  font-weight: 700;
}

.header .sub {
  margin-top: 10px;
  font-size: 0.92em;
  color: var(--text-muted);
  line-height: 1.6;
}

.nav-links {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.nav-links a {
  font-size: 0.82em;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.nav-links a.here {
  color: var(--chip-active-text);
  background: var(--chip-active);
  border-color: var(--chip-active);
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 18px 0 14px;
}

.stat {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}

.stat .num {
  font-size: 1.35em;
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

.stat .label {
  margin-top: 4px;
  font-size: 0.75em;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

.toolbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 10px 0 8px;
  margin: 0 -2px;
}

.search-wrap {
  position: relative;
}

.search-wrap input {
  width: 100%;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  border-radius: 12px;
  padding: 12px 40px 12px 14px;
  font-size: 16px;
  outline: none;
  font-family: inherit;
}

.search-wrap input::placeholder { color: var(--text-muted); }

.search-wrap .count {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.78em;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  pointer-events: none;
}

.chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 2px 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chips::-webkit-scrollbar { display: none; }

.chip {
  flex: 0 0 auto;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 0.82em;
  white-space: nowrap;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}

.chip.active {
  background: var(--chip-active);
  color: var(--chip-active-text);
  border-color: var(--chip-active);
}

.years {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 2px 2px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.years::-webkit-scrollbar { display: none; }

.year-btn {
  flex: 0 0 auto;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.82em;
  padding: 6px 8px;
  cursor: pointer;
  font-family: inherit;
  border-bottom: 2px solid transparent;
}
.year-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px 10px;
  margin-top: 14px;
}

@media (min-width: 560px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 16px 12px; }
}
@media (min-width: 820px) {
  .grid { grid-template-columns: repeat(5, 1fr); }
  .page { padding: 28px 20px 40px; }
  .header h1 { font-size: 2.2em; }
}

.card {
  display: flex;
  flex-direction: column;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  min-width: 0;
}
.card:active { transform: scale(0.98); }

.cover {
  position: relative;
  aspect-ratio: 3 / 4;
  background: var(--cover-bg);
  overflow: hidden;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.cover .fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  text-align: center;
  font-size: 0.78em;
  line-height: 1.4;
  color: var(--text-muted);
}
.cover .badge {
  position: absolute;
  left: 6px;
  top: 6px;
  background: rgba(0,0,0,0.55);
  color: #f5e6c8;
  font-size: 0.68em;
  padding: 2px 6px;
  border-radius: 6px;
  letter-spacing: 0.04em;
}

.meta {
  padding: 8px 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-height: 72px;
}
.meta .title {
  font-size: 0.86em;
  line-height: 1.35;
  font-weight: 700;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.meta .author {
  font-size: 0.72em;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.meta .date {
  font-size: 0.68em;
  color: var(--gold);
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}

.empty {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
  line-height: 1.7;
}

.footer {
  margin-top: 28px;
  text-align: center;
  font-size: 0.78em;
  color: var(--text-muted);
  letter-spacing: 0.12em;
}

.back {
  display: inline-block;
  margin-top: 14px;
  color: var(--accent);
  font-size: 0.88em;
  letter-spacing: 0.08em;
}

.home-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 50;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--accent);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.15em;
  line-height: 1;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.home-btn:active { transform: scale(0.95); }
@media (min-width: 560px) {
  .home-btn { top: 18px; left: 18px; }
}
</style>
</head>

(function () {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const qInput = document.getElementById('q');
  const catChips = document.getElementById('cat-chips');
  const yearChips = document.getElementById('year-chips');
  const shownCount = document.getElementById('shown-count');

  let activeCat = '全部';
  let activeYear = '全部';
  let query = '';

  const cats = new Map();
  const years = new Set();
  BOOKS.forEach(b => {
    cats.set(b.catMain, (cats.get(b.catMain) || 0) + 1);
    if (b.year) years.add(b.year);
  });
  document.getElementById('stat-cats').textContent = String(cats.size);
  document.getElementById('stat-years').textContent = String(years.size);

  const catList = [...cats.entries()].sort((a, b) => b[1] - a[1]);
  function makeChip(parent, label, count, isActive, onClick) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip' + (isActive ? ' active' : '');
    btn.textContent = count != null ? (label + ' ' + count) : label;
    btn.addEventListener('click', onClick);
    parent.appendChild(btn);
    return btn;
  }

  function renderCatChips() {
    catChips.innerHTML = '';
    makeChip(catChips, '全部', BOOKS.length, activeCat === '全部', () => {
      activeCat = '全部';
      renderCatChips();
      render();
    });
    catList.forEach(([name, count]) => {
      makeChip(catChips, name, count, activeCat === name, () => {
        activeCat = name;
        renderCatChips();
        render();
      });
    });
  }

  function renderYearChips() {
    yearChips.innerHTML = '';
    const ys = [...years].sort((a, b) => b - a);
    const allBtn = document.createElement('button');
    allBtn.type = 'button';
    allBtn.className = 'year-btn' + (activeYear === '全部' ? ' active' : '');
    allBtn.textContent = '全部年份';
    allBtn.addEventListener('click', () => { activeYear = '全部'; renderYearChips(); render(); });
    yearChips.appendChild(allBtn);
    ys.forEach(y => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'year-btn' + (activeYear === y ? ' active' : '');
      btn.textContent = String(y);
      btn.addEventListener('click', () => { activeYear = y; renderYearChips(); render(); });
      yearChips.appendChild(btn);
    });
  }

  function matches(b) {
    if (activeCat !== '全部' && b.catMain !== activeCat) return false;
    if (activeYear !== '全部' && b.year !== activeYear) return false;
    if (!query) return true;
    const hay = (b.title + ' ' + b.author + ' ' + b.category).toLowerCase();
    return hay.includes(query);
  }

  function coverHtml(b) {
    const safeTitle = escapeHtml(b.title);
    if (!b.cover) {
      return '<div class="fallback">' + safeTitle + '</div>';
    }
    return '<img loading="lazy" decoding="async" alt="' + safeTitle + '" src="' + escapeAttr(b.cover) + '" onerror="this.style.display=\'none\';this.nextElementSibling.hidden=false"><div class="fallback" hidden>' + safeTitle + '</div>';
  }

  function render() {
    const list = BOOKS.filter(matches);
    shownCount.textContent = list.length + '/' + BOOKS.length;
    grid.innerHTML = '';
    if (!list.length) {
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    const frag = document.createDocumentFragment();
    list.forEach(b => {
      const a = document.createElement('div');
      a.className = 'card';
      a.setAttribute('role', 'button');
      a.tabIndex = 0;
      a.innerHTML =
        '<div class="cover">' +
          coverHtml(b) +
          (b.catMain ? '<span class="badge">' + escapeHtml(b.catMain) + '</span>' : '') +
        '</div>' +
        '<div class="meta">' +
          '<div class="title">' + escapeHtml(b.title) + '</div>' +
          '<div class="author">' + escapeHtml(b.author) + '</div>' +
          '<div class="date">' + (b.date ? ('最近 ' + b.date) : '') + '</div>' +
        '</div>';
      function open() {
        if (window.openBookSocialSheet) openBookSocialSheet(b);
        else if (b.link) window.open(b.link, '_blank', 'noopener,noreferrer');
      }
      a.addEventListener('click', open);
      a.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
      });
      frag.appendChild(a);
    });
    grid.appendChild(frag);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function escapeAttr(s) {
    return escapeHtml(s).replace(/'/g, '&#39;');
  }

  let t = null;
  qInput.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(() => {
      query = qInput.value.trim().toLowerCase();
      render();
    }, 120);
  });

  renderCatChips();
  renderYearChips();
  render();
})();

document.addEventListener('keydown', function (e) {
  if (e.key !== 'h' && e.key !== 'H') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  var tag = (e.target && e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || (e.target && e.target.isContentEditable)) return;
  e.preventDefault();
  location.href = 'index.html';
});
</script>
</body>
</html>
