<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>🐍 贪吃蛇 · 藏经阁</title>
<link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
<link rel="manifest" href="manifest.webmanifest">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
    height: 100%;
    background: #1a1a2e;
    font-family: 'Microsoft YaHei', system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
}
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(8px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right))
             max(8px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
    gap: 6px;
}
.home-bar {
    position: fixed;
    top: max(8px, env(safe-area-inset-top));
    left: max(8px, env(safe-area-inset-left));
    z-index: 30;
}
.home-bar a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 14px;
    background: rgba(22,33,62,0.88);
    border: 1px solid rgba(233,69,96,0.35);
    color: #e8d5c4;
    text-decoration: none;
    font-size: 0.78rem;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}
.home-bar a:active { transform: scale(0.97); }
.sound-btn {
    position: fixed;
    top: max(8px, env(safe-area-inset-top));
    right: max(8px, env(safe-area-inset-right));
    z-index: 30;
    border: 1px solid rgba(233,69,96,0.35);
    background: rgba(22,33,62,0.88);
    color: #e8d5c4;
    border-radius: 14px;
    padding: 6px 10px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
}
.sound-btn:active { transform: scale(0.97); }
.sound-btn.off { opacity: 0.55; }

/* 开始页：学习内容选择 */
.msg-box .corpus-label {
    color: #999;
    font-size: 0.85rem;
    margin: 12px 0 8px;
}
.msg-box .corpus-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 0 0 14px;
}
.msg-box .corpus-bar button {
    border: 1px solid rgba(233,69,96,0.4);
    background: rgba(255,255,255,0.06);
    color: #ddd;
    border-radius: 16px;
    padding: 8px 12px;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
}
.msg-box .corpus-bar button.active {
    background: rgba(233,69,96,0.45);
    color: #fff;
    border-color: #e94560;
}

.header { text-align: center; flex-shrink: 0; }
h1 {
    color: #e94560;
    font-size: clamp(1.25rem, 5vw, 1.7rem);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(233,69,96,0.4);
}
.stats {
    display: flex;
    flex-wrap: nowrap;
    gap: 0.65rem 1rem;
    justify-content: center;
    align-items: baseline;
    margin-top: 4px;
    color: #aaa;
    font-size: 0.85rem;
    min-height: 1.4em; /* 固定行高，避免数字刷新时整行跳动 */
    white-space: nowrap;
}
.stats > span {
    display: inline-flex;
    align-items: baseline;
    gap: 0.2em;
    flex-shrink: 0;
}
.stats b {
    color: #e94560;
    font-size: 1.02rem;
    font-variant-numeric: tabular-nums; /* 数字等宽，不左右抖 */
    font-feature-settings: "tnum";
    min-width: 1.6em;
    text-align: left;
}
.stats b#score { min-width: 2.4em; }
.stats b#high { min-width: 2.4em; }
.stats b#len { min-width: 1.6em; }
.stats b#lives {
    color: #ff6b81 !important;
    min-width: 1.8em;
    letter-spacing: 0;
}
.stats b#level {
    color: #4ecca3 !important;
    min-width: 3.6em; /* 预留「x.x×」宽度，加速时不撑开 */
}
.stats b#level.boost {
    color: #ffd166 !important;
}

/* 主玩区：标题在框上，正文叠在框内 */
.play-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 100%;
    width: 100%;
    padding: 0 8px;
    box-sizing: border-box;
    flex-shrink: 1;
    min-height: 0;
}

/* 框上方：章节标题 + 联想词 */
.ddj-head {
    width: 100%;
    max-width: 520px;
    flex-shrink: 0;
    text-align: center;
    padding: 2px 8px 8px;
    box-sizing: border-box;
}
.ddj-head .ddj-meta {
    color: rgba(200, 190, 175, 0.78);
    font-size: clamp(0.82rem, 1.8vw, 0.95rem);
    margin-top: 4px;
    letter-spacing: 0.14em;
    line-height: 1.35;
    min-height: 1.2em;
}
.ddj-head .ddj-ch {
    color: #ff7a90;
    font-weight: 700;
    font-size: clamp(1.1rem, 2.4vw, 1.4rem);
    letter-spacing: 0.04em;
    line-height: 1.35;
    text-shadow: 0 1px 4px rgba(0,0,0,0.45);
}
.board-wrap {
    position: relative;
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 24px rgba(233,69,96,0.25), inset 0 0 0 2px #e94560;
    /* 底层底色，正文铺在这层之上、棋盘之下 */
    background:
        radial-gradient(ellipse at 50% 30%, rgba(40, 28, 48, 0.55) 0%, transparent 60%),
        #0c1222;
}

/* 游戏层：透明棋盘，蛇/食物画在正文之上 */
canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: transparent;
    touch-action: none;
    position: relative;
    z-index: 2;
}

/* 正文底层：与棋盘同尺寸网格，一字一格 */
.ddj-body {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
}
.ddj-body .gch {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden; /* 绝不撑破格子 */
    color: rgba(248, 242, 232, 0.64); /* 比全白略暗，仍比旧版灰字亮 */
    font-family: 'SimSun', 'Songti SC', 'STSong', 'Noto Serif SC', serif;
    font-size: var(--ddj-cell-font, 16px);
    line-height: 1;
    letter-spacing: 0;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
}
/* 标点略淡，仍锁在格内 */
.ddj-body .gch.is-punct {
    color: rgba(248, 242, 232, 0.42);
    font-size: calc(var(--ddj-cell-font, 16px) * 0.82);
}
.ddj-body .gch.is-empty {
    color: transparent;
}
.ddj-body .empty-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(160, 160, 170, 0.35);
    font-family: 'Microsoft YaHei', system-ui, sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
}

.pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    width: min(248px, 64vw);
    aspect-ratio: 1;
    flex-shrink: 0;
    margin-top: 2px;
}
.pad button {
    border: none;
    border-radius: 16px;
    background: rgba(233,69,96,0.16);
    color: #e94560;
    font-size: 1.5rem;
    cursor: pointer;
    transition: background .12s, color .12s;
    border: 1px solid rgba(233,69,96,0.35);
    min-height: 0;
    /* 长按不抖：禁止缩放与系统长按手势反馈 */
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.pad button:active, .pad button.active {
    background: rgba(233,69,96,0.45);
    color: #fff;
    /* 不用 scale，长按会抖 */
}
.pad .u { grid-column: 2; grid-row: 1; }
.pad .l { grid-column: 1; grid-row: 2; }
.pad .r { grid-column: 3; grid-row: 2; }
.pad .d { grid-column: 2; grid-row: 3; }
.pad .mid {
    grid-column: 2; grid-row: 2;
    font-size: 0.8rem;
    color: #888;
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
}
.hint { color: #555; font-size: 0.72rem; flex-shrink: 0; }

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    padding: 16px;
}
.overlay.hidden { display: none; }
.msg-box {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 18px;
    padding: 1.6rem 1.8rem;
    text-align: center;
    color: #fff;
    max-width: 320px;
    width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.msg-box h2 { color: #e94560; font-size: 1.6rem; margin-bottom: 0.6rem; }
.msg-box p { color: #bbb; margin-bottom: 0.4rem; line-height: 1.5; font-size: 0.95rem; }
.msg-box .score-line { font-size: 1.15rem; color: #eee; margin: 0.8rem 0 1.2rem; }
.msg-box .score-line b { color: #e94560; }
.msg-box .new-record { color: #4ecca3; font-size: 0.9rem; margin-bottom: 0.8rem; }
.msg-box button {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    font-size: 1.05rem;
    border: none;
    border-radius: 28px;
    background: #e94560;
    color: #fff;
    cursor: pointer;
    font-family: inherit;
}
.msg-box button.secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
}
.msg-box button:active { transform: scale(0.97); }
.msg-box.ceremony {
    border-color: #4ecca3;
    box-shadow: 0 0 40px rgba(78,204,163,0.35), 0 12px 40px rgba(0,0,0,0.5);
    max-width: 360px;
}
.msg-box.ceremony h2 {
    color: #4ecca3;
    font-size: 1.75rem;
    text-shadow: 0 0 20px rgba(78,204,163,0.5);
}
.msg-box.ceremony .ceremony-sub {
    color: #e8d5c4;
    font-size: 1rem;
    margin: 6px 0;
    line-height: 1.55;
}
.msg-box.ceremony .ceremony-quote {
    color: #4ecca3;
    font-size: 0.9rem;
    opacity: 0.9;
    margin: 10px 0 4px;
    letter-spacing: 0.08em;
}
.msg-box.ceremony .ceremony-meta {
    color: #999;
    font-size: 0.85rem;
    margin-bottom: 12px;
}

@media (min-width: 768px) and (hover: hover) {
    .pad { display: none; }
    .hint { display: block; }
}
@media (max-width: 767px), (hover: none) {
    .hint { display: none; }
}
</style>
</head>
<body>
<div class="home-bar">
  <a href="index.html" title="回藏经阁首页 (H)"><img src="12345.png" alt="" width="16" height="16" style="border-radius:3px;vertical-align:middle;"> 藏经阁</a>
</div>
<button type="button" class="sound-btn" id="soundBtn" title="开关音效" aria-label="开关音效">🔊</button>
<div class="header">
    <h1>🐍 贪吃蛇</h1>
    <div class="stats" id="statsBar">
        <span>分 <b id="score">0</b></span>
        <span>高 <b id="high">0</b></span>
        <span>命 <b id="lives">81</b></span>
        <span>长 <b id="len">1</b></span>
        <span>速 <b id="level">1.0×</b></span>
    </div>
</div>

<div class="play-row" id="playRow">
    <div class="ddj-head" id="ddjHead">
        <div class="ddj-ch" id="ddjCh">第 — 章</div>
        <div class="ddj-meta" id="ddjMeta"></div>
    </div>
    <div class="board-wrap" id="boardWrap">
        <div class="ddj-body" id="ddjBody" aria-label="道德经正文"><div class="empty">开始游戏后，蛇身有多长，就显示第几章正文。</div></div>
        <canvas id="game" width="400" height="400"></canvas>
    </div>
</div>

<div class="pad" id="pad">
    <button type="button" class="u" data-dir="up" aria-label="上">▲</button>
    <button type="button" class="l" data-dir="left" aria-label="左">◀</button>
    <button type="button" class="mid" data-dir="pause" aria-label="暂停">⏸</button>
    <button type="button" class="r" data-dir="right" aria-label="右">▶</button>
    <button type="button" class="d" data-dir="down" aria-label="下">▼</button>
</div>
<p class="hint">方向键 / WASD · 长按加速 · 空格/P/Esc 暂停 · 回车开始 · 身长=章号 · M 静音 · H 回首页</p>

<div class="overlay" id="overlay">
    <div class="msg-box" id="msgBox"></div>
</div>

<script src="hints-map.js"></script>
<script src="corpus.js"></script>
<script src="corpus-ui.js"></script>
<script src="sound-snake.js"></script>
<script src="ui-toast.js"></script>
<script>
(() => {
'use strict';


const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const levelEl = document.getElementById('level');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const msgBox = document.getElementById('msgBox');
const boardWrap = document.getElementById('boardWrap');
const padEl = document.getElementById('pad');
const ddjChEl = document.getElementById('ddjCh');
const ddjMetaEl = document.getElementById('ddjMeta');
const ddjBodyEl = document.getElementById('ddjBody');
const lenEl = document.getElementById('len');

const GRID = 15;       // 格子更大（盘面约 15×15）
const BASE_MS = 480;   // 初始偏慢，便于边玩边看
const MIN_MS = 130;    // 后期上限别太疯（约 3.7×）
const FOODS_PER_LEVEL = 8; // 多吃几颗才升一级
const SPEED_DECAY = 0.965; // 每级只略提速（原 0.93 偏猛）
const MAX_QUEUE = 3;       // 可连拐两三个弯
const SWIPE_MIN = 12;      // 滑动更灵敏
const SWIPE_AXIS = 1.15;   // 主轴略占优才转向，减少误触
const RESPAWN_MS = 900;       // 撞死后「续命中」提示时长
const RESPAWN_READY_MS = 550; // 蛇摆好后的反应时间，再开始动
const BOOST_FACTOR = 0.5;  // 长按加速约 2×，更稳不抖
const BOOST_MIN_MS = 72;
const EAT_PAUSE_MS = 320;  // 刚吃到后稍停，便于看正文/转弯
const POST_EAT_HOLD_MS = 700; // 吃到后若直走即撞，再多给一点转向时间（触屏残留滑动）

let cell, cols, rows;
let snake, prevSnake, food, dir, dirQueue;
let score, high, level, tickMs, lives;
let running, paused, started, dead, respawning;
let particles, eatFlash;
let lastFrame, stepElapsed, moveT;
let eatPauseUntil = 0; // 吃到后短暂停顿截止时间
let postEatHoldUntil = 0; // 吃到后「直走会撞则先停住」的截止
let postEatDir = null;    // 吃到瞬间的朝向；仅保护沿该方向的误撞
let maxSnakeLen = 1; // 本局最大身长 → 道德经章号（开局身长 1）
let corpusCleared = false; // 本局是否已通关语料（继续后不再弹窗）
const boostHolders = new Set(); // 长按加速来源（键盘键 / 虚拟键）
// 触屏滑动：记录最新指针，吃到时重置基准，避免手指惯性继续拐弯
let swipeX = 0, swipeY = 0, swiping = false, lastPtrX = 0, lastPtrY = 0;

function isBoosting() {
    return boostHolders.size > 0 && running && !paused && !dead && !respawning;
}
function effectiveTickMs() {
    if (!isBoosting()) return tickMs;
    return Math.max(BOOST_MIN_MS, Math.round(tickMs * BOOST_FACTOR));
}
function startBoost(id) {
    if (!id) return;
    const was = boostHolders.size > 0;
    boostHolders.add(id);
    if (!was) updateSpeedDisplay(); // 仅进出加速态时刷新，避免长按连抖 UI
}
function endBoost(id) {
    if (!id) return;
    const was = boostHolders.size > 0;
    boostHolders.delete(id);
    if (was && boostHolders.size === 0) updateSpeedDisplay();
}
function clearBoost() {
    if (!boostHolders.size) return;
    boostHolders.clear();
    updateSpeedDisplay();
}

function updateLivesDisplay() {
    if (!livesEl) return;
    // 用数字，不用一长串红心（宽度剧变会导致整行抖动）
    const n = Math.max(0, lives | 0);
    livesEl.textContent = n > 0 ? String(n) : '0';
}

// ——— 布局 ———
function layout() {
    const isTouch = window.matchMedia('(hover: none), (max-width: 767px)').matches;
    const reserveY = isTouch ? 280 : 150; // 含框上标题
    const maxSide = Math.min(window.innerWidth - 24, window.innerHeight - reserveY, 600);
    const side = Math.max(300, Math.floor(maxSide / GRID) * GRID);
    cell = side / GRID;
    cols = rows = GRID;
    canvas.width = side;
    canvas.height = side;
    boardWrap.style.width = side + 'px';
    boardWrap.style.height = side + 'px';
    const head = document.getElementById('ddjHead');
    if (head) head.style.maxWidth = side + 'px';
    // 一字一格：网格与字号都跟棋盘对齐
    if (ddjBodyEl) {
        ddjBodyEl.style.gridTemplateColumns = 'repeat(' + GRID + ', 1fr)';
        ddjBodyEl.style.gridTemplateRows = 'repeat(' + GRID + ', 1fr)';
        // 字号尽量大，但留边不顶破格子
        ddjBodyEl.style.setProperty('--ddj-cell-font', Math.max(14, Math.floor(cell * 0.74)) + 'px');
    }
}

/** 蛇身最大长度 → 章号（1–81） */
function chapterFromLen(len) {
    const max = (getCorpus().items && getCorpus().items.length) || 1;
    return Math.max(1, Math.min(max, len | 0));
}

function isPunctChar(c) {
    return /[，。、；：！？·…—\-—,\.;:!?\(\)（）【】\[\]""''「」『』\s]/.test(c);
}

function updateDdjPanel() {
    // 正文篇号 = min(身长, 语料总篇数)；超过后固定终章
    const len = snake && snake.length ? snake.length : maxSnakeLen;
    if (len > maxSnakeLen) maxSnakeLen = len;
    if (lenEl) lenEl.textContent = String(len);
    const totalItems = (getCorpus().items && getCorpus().items.length) || 1;
    const ch = chapterFromLen(len); // 已 clamp 到 1..totalItems
    const atEnd = len >= totalItems; // 已通关或身长达到/超过终章
    const item = getCorpusItem(ch);
    // 与道德经/小学等共用 01–81 数字联想编码（按篇号）
    const hint = (item && item.hint) || (typeof hintsMap !== 'undefined' && hintsMap[ch]) || '';
    const emoji = (item && item.emoji) || (typeof hintEmoji !== 'undefined' && hintEmoji[ch]) || '';
    const title = (item && item.title) || ('第 ' + ch + ' 篇');
    if (ddjChEl) {
        let label;
        if (corpusId === 'ddj') {
            // 🕯️ 第 1 章 · 道可道非 · 蜡烛（标题=章首四字）
            label = (emoji ? emoji + ' ' : '') + '第 ' + ch + ' 章 · ' + title + (hint ? ' · ' + hint : '');
        } else {
            // 🦢 2. 春晓 · 白鹅
            label = (emoji ? emoji + ' ' : '') + ch + '. ' + title + (hint ? ' · ' + hint : '');
        }
        // 通关后（或身长超过总篇数）：标明终章，无新篇
        if (corpusCleared || len > totalItems) {
            label = '终章 · ' + label;
        }
        ddjChEl.textContent = label;
    }
    if (typeof ddjMetaEl !== 'undefined' && ddjMetaEl) {
        const dynasty = (item && item.dynasty) || '';
        const author = (item && item.author) || '';
        const meta = [dynasty, author].filter(Boolean).join(' · ');
        ddjMetaEl.textContent = meta;
        ddjMetaEl.style.display = meta ? '' : 'none';
    }
    const text = (item && item.text) || '';
    if (!ddjBodyEl) return;

    const total = GRID * GRID;
    // 一字一格；遇 。！？ 换行；整块垂直居中、每行水平居中
    const chars = text ? [...text].filter(function (c) { return !/\s/.test(c); }) : [];
    if (!chars.length) {
        ddjBodyEl.innerHTML = '<div class="empty-hint">开始后身长对应篇目 · 一字一格</div>';
        return;
    }

    const isBreak = function (c) { return c === '。' || c === '！' || c === '？'; };
    // 先按句拆成行，超长行再按 GRID 折行
    const lines = [];
    let buf = [];
    for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        buf.push(c);
        if (isBreak(c) || buf.length >= GRID) {
            lines.push(buf);
            buf = [];
        }
    }
    if (buf.length) lines.push(buf);

    // 超过盘面行数时从开头截断（单章一般够用）
    const useLines = lines.slice(0, GRID);
    const cells = new Array(total).fill('');
    const startRow = Math.max(0, Math.floor((GRID - useLines.length) / 2));
    for (let r = 0; r < useLines.length; r++) {
        const line = useLines[r];
        const startCol = Math.max(0, Math.floor((GRID - line.length) / 2));
        for (let c = 0; c < line.length && c < GRID; c++) {
            cells[(startRow + r) * GRID + startCol + c] = line[c];
        }
    }

    let html = '';
    for (let i = 0; i < total; i++) {
        const c = cells[i] || '';
        if (!c) {
            html += '<span class="gch is-empty"></span>';
            continue;
        }
        const safe = c === '&' ? '&amp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : c;
        const cls = isPunctChar(c) ? 'gch is-punct' : 'gch';
        html += '<span class="' + cls + '">' + safe + '</span>';
    }
    ddjBodyEl.innerHTML = html;
    if (cell) {
        ddjBodyEl.style.setProperty('--ddj-cell-font', Math.max(14, Math.floor(cell * 0.74)) + 'px');
    }
}

high = parseInt(localStorage.getItem('snakeHigh') || '0', 10);
highEl.textContent = high;

// ——— 状态 ———
function showStart() {
    started = running = paused = dead = false;
    respawning = false;
    corpusLocked = false; // 仅开始页可切换学习内容

        '<h2>🐍 贪吃蛇</h2>' +

        '<p class="corpus-label">选择学习内容</p>' +
        '<div class="corpus-bar" id="corpusBar" aria-label="学习内容"></div>' +
        '<p id="startTip" style="color:#666;font-size:.85rem">' + corp.name + ' · ' + lives + ' 条命 · 长按加速 · 身长=篇号</p>' +

function startGame() {
    Sound.unlock();
    overlay.classList.add('hidden');
    reset();
    running = started = true;
    paused = dead = false;
    respawning = false;
    corpusLocked = true; // 开始后锁定语料，只能暂停/游玩
    lastFrame = performance.now();
    // 稍等半拍再动，既不僵也不抢
    stepElapsed = tickMs * 0.45;
    moveT = 1;
    Sound.start();
    // 开始后弹窗关闭，语料选择随弹窗消失
}

function reset() {
    const mid = Math.floor(GRID / 2);
    // 开局身长 1（仅蛇头，序号 1 → 第 1 章）
    snake = [{ x: mid, y: mid }];
    prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
    dir = { x: 1, y: 0 };
    dirQueue = [];
    score = 0;
    level = 1;
    lives = getMaxLives();
    tickMs = BASE_MS;
    particles = [];
    eatFlash = 0;
    eatPauseUntil = 0;
    postEatDir = null;
    postEatHoldUntil = 0;
    corpusCleared = false;
    scoreEl.textContent = '0';
    maxSnakeLen = snake.length;
    updateSpeedDisplay();
    updateLivesDisplay();
    updateDdjPanel();
    placeFood();
}

/** 蛇形路径铺满盘面，用于续命摆放（不缩短身长） */
function buildBoardPath() {
    const path = [];
    for (let y = 0; y < GRID; y++) {
        if (y % 2 === 0) {
            for (let x = 0; x < GRID; x++) path.push({ x: x, y: y });
        } else {
            for (let x = GRID - 1; x >= 0; x--) path.push({ x: x, y: y });
        }
    }
    return path;
}

/** 保留分数/身长/速度，完整身长重新摆盘续命（绝不减节） */
function respawnSnake() {
    const keepLen = Math.max(1, snake ? snake.length : 1);
    const path = buildBoardPath();
    // 取路径前 keepLen 格：path[0] 为尾，path[keepLen-1] 为头
    const n = Math.min(keepLen, path.length);
    const segment = path.slice(0, n);
    snake = [];
    for (let i = n - 1; i >= 0; i--) {
        snake.push({ x: segment[i].x, y: segment[i].y });
    }
    // 朝向：沿路径向前（从颈指向头）；若满盘则随便找安全方向
    if (n >= 2) {
        dir = { x: snake[0].x - snake[1].x, y: snake[0].y - snake[1].y };
    } else {
        dir = { x: 1, y: 0 };
    }
    if (Math.abs(dir.x) + Math.abs(dir.y) !== 1) dir = { x: 1, y: 0 };
    // 若下一步立刻撞墙/撞身，换一个安全方向
    const tries = [dir, { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }];
    for (let t = 0; t < tries.length; t++) {
        const d = tries[t];
        const nx = snake[0].x + d.x, ny = snake[0].y + d.y;
        if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
        let hit = false;
        for (let i = 0; i < snake.length - 1; i++) {
            if (snake[i].x === nx && snake[i].y === ny) { hit = true; break; }
        }
        if (!hit) { dir = d; break; }
    }
    prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
    dirQueue = [];
    particles = [];
    eatFlash = 0.6;
    moveT = 1;
    stepElapsed = 0;
    // 身长不变，正文篇号也不变
    if (snake.length > maxSnakeLen) maxSnakeLen = snake.length;
    // 摆好后再给一点反应时间，方便看清位置、预输入方向
    eatPauseUntil = performance.now() + RESPAWN_READY_MS;
    placeFood();
    updateDdjPanel();
}

function updateSpeedDisplay() {
    if (!levelEl) return;
    // 只显示基础等级速度，加速用颜色提示，避免加减「⚡」导致整行左右抖
    const mul = (BASE_MS / tickMs).toFixed(1) + '×';
    levelEl.textContent = mul;
    levelEl.classList.toggle('boost', isBoosting());
}

function placeFood() {
    if (snake.length >= cols * rows) { win(); return; }
    const head = snake[0];
    let x, y, n = 0, best = null, bestScore = -Infinity;
    // 理想曼哈顿距离：近一点好接，避免旧逻辑「越远分越高」把蛋甩到对角
    // 蛇短时更近；稍长后略远但仍在易达范围
    const ideal = snake.length < 10 ? 5 : Math.min(8, 5 + Math.floor(snake.length / 12));
    while (n < 120) {
        x = Math.floor(Math.random() * cols);
        y = Math.floor(Math.random() * rows);
        n++;
        if (hitSnake(x, y, false)) continue;
        const d = Math.abs(x - head.x) + Math.abs(y - head.y);
        if (d < 3) continue; // 贴脸太近，容易误撞/无操作空间
        // 峰值在 ideal 附近；越远分越低（15×15 上对角约 20+ 会明显扣分）
        const sc = 24 - Math.abs(d - ideal) * 2.2 + Math.random() * 2.5;
        // 略避开贴边四角，减少「绕半场才摸得到」
        const edge = Math.min(x, y, cols - 1 - x, rows - 1 - y);
        const edgeBonus = edge === 0 ? -1.5 : edge === 1 ? -0.4 : 0.3;
        const total = sc + edgeBonus;
        if (total > bestScore) { bestScore = total; best = { x, y }; }
    }
    if (best) { food = best; return; }
    // 兜底：任意空位
    do {
        x = Math.floor(Math.random() * cols);
        y = Math.floor(Math.random() * rows);
        n++;
    } while (hitSnake(x, y, false) && n < 800);
    food = { x, y };
}

/** ignoreTail：本步会收尾时，尾巴格可穿（经典手感） */
function hitSnake(x, y, ignoreTail) {
    const end = ignoreTail ? snake.length - 1 : snake.length;
    for (let i = 0; i < end; i++) {
        if (snake[i].x === x && snake[i].y === y) return true;
    }
    return false;
}

// ——— 输入队列（核心手感）———
function lastIntent() {
    return dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
}

function setDir(nx, ny) {
    if (!running || paused || dead || respawning) return;
    const last = lastIntent();
    if (last.x === nx && last.y === ny) return;
    // 相对队列末尾禁止 180°，可连按拐弯
    if (nx === -last.x && ny === -last.y) return;
    // 相对当前真实朝向也禁止 180°（空队列时 last===dir 已覆盖）
    if (!dirQueue.length && nx === -dir.x && ny === -dir.y) return;
    if (dirQueue.length >= MAX_QUEUE) {
        dirQueue[dirQueue.length - 1] = { x: nx, y: ny };
    } else {
        dirQueue.push({ x: nx, y: ny });
    }
    // 若这一拍马上要走，且只拐一次：略微“抢拍”，手感更跟手
    if (dirQueue.length === 1 && stepElapsed > tickMs * 0.72) {
        stepElapsed = Math.min(tickMs, stepElapsed + tickMs * 0.12);
    }
}

function togglePause() {
    if (!running || !started || dead || respawning) return;
    paused = !paused;
    if (!paused) {
        lastFrame = performance.now();
        Sound.resume();
    } else {
        clearBoost();
        Sound.pause();
    }
}

/** 吃到蛋后：清掉缓冲转向 + 重置滑动基准，避免触屏惯性拐进墙/自己 */
function onAteFood() {
    dirQueue = [];
    // 以当前指位为新起点，同一按住手势里已发生的位移不再累加出额外转向
    swipeX = lastPtrX;
    swipeY = lastPtrY;
    postEatDir = { x: dir.x, y: dir.y };
    const now = performance.now();
    eatPauseUntil = now + EAT_PAUSE_MS;
    postEatHoldUntil = now + EAT_PAUSE_MS + POST_EAT_HOLD_MS;
    moveT = 1;
    stepElapsed = 0;
}

// ——— 逻辑步进 ———
function tick() {
    if (respawning) return;
    if (dirQueue.length) dir = dirQueue.shift();

    prevSnake = snake.map(s => ({ x: s.x, y: s.y }));
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    const willEat = food && head.x === food.x && head.y === food.y;

    // 不吃时尾巴会腾出，允许贴尾转弯（经典蛇感）
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || hitSnake(head.x, head.y, !willEat)) {
        // 触屏常见：蛋贴边，滑过去吃到后仍沿原方向顶墙 → 体感「吃到却减命」
        // 仅在「吃到后短窗 + 仍是吃到时的朝向」时先停住等转向，不减命
        const now = performance.now();
        const sameAsPostEat = postEatDir && dir.x === postEatDir.x && dir.y === postEatDir.y;
        if (sameAsPostEat && now < postEatHoldUntil) {
            moveT = 1;
            stepElapsed = 0;
            return;
        }
        postEatDir = null;
        postEatHoldUntil = 0;
        moveT = 1;
        onCrash();
        return;
    }

    // 成功走出一格后，结束吃后直走保护
    postEatDir = null;
    postEatHoldUntil = 0;

    snake.unshift(head);

    if (willEat) {
        score += 10;
        scoreEl.textContent = score;
        eatFlash = 1;
        spawnParticles(food.x * cell + cell / 2, food.y * cell + cell / 2);
        Sound.eat(snake.length);

        const foods = score / 10;
        if (foods > 0 && foods % FOODS_PER_LEVEL === 0) {
            level++;
            tickMs = Math.max(MIN_MS, Math.round(BASE_MS * Math.pow(SPEED_DECAY, level - 1)));
            updateSpeedDisplay();
            Sound.levelUp();
        }
        if (snake.length > maxSnakeLen) maxSnakeLen = snake.length;
        updateDdjPanel();
        // 刚吃到：停一拍 + 清滑动缓冲，方便看正文/转向
        onAteFood();
        // 身长达到语料最后一篇 → 通关仪式（可继续）
        const goal = getMaxLives();
        if (!corpusCleared && snake.length >= goal) {
            placeFood();
            setTimeout(function () {
                if (!started || dead) return;
                ceremonyClear();
            }, Math.min(EAT_PAUSE_MS, 280));
            return;
        }
        placeFood();
    } else {
        snake.pop();
    }
}

function spawnParticles(cx, cy) {
    for (let i = 0; i < 10; i++) {
        const a = (Math.PI * 2 * i) / 10 + Math.random() * 0.3;
        const sp = 1.4 + Math.random() * 2.4;
        particles.push({
            x: cx, y: cy,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, r: 2 + Math.random() * 2
        });
    }
}

function onCrash() {
    clearBoost();
    eatPauseUntil = 0;
    postEatDir = null;
    postEatHoldUntil = 0;
    dirQueue = [];
    lives = Math.max(0, (lives | 0) - 1);
    updateLivesDisplay();
    if (lives > 0) {
        Sound.hurt();
        respawning = true;
        // 短暂定格后原地续命，保留分数与身长
        setTimeout(() => {
            if (!started || dead) return;
            respawnSnake();
            respawning = false;
            lastFrame = performance.now();
        }, RESPAWN_MS);
        return;
    }
    gameOver();
}

function gameOver() {
    running = false;
    dead = true;
    respawning = false;
    clearBoost();
    // 结束画面无语料选择；回开始页后可选
    const isNew = score > high;
    if (isNew) {
        high = score;
        localStorage.setItem('snakeHigh', String(high));
        highEl.textContent = high;
    }
    Sound.die();
    if (isNew) setTimeout(() => Sound.record(), 280);
    msgBox.innerHTML =
        '<h2>💀 游戏结束</h2>' +
        '<p class="score-line">得分 <b>' + score + '</b></p>' +
        '<p style="color:#888;font-size:.9rem">身长 ' + (snake ? snake.length : maxSnakeLen) + ' · 本局最长 ' + maxSnakeLen + '</p>' +
        (isNew ? '<p class="new-record">🎉 新纪录！</p>' : '<p>最高 ' + high + '</p>') +
        '<button type="button" id="btnAgain">再来一局</button>' +
        '<button type="button" class="secondary" id="btnHome">返回首页</button>';
    overlay.classList.remove('hidden');
    document.getElementById('btnAgain').onclick = startGame;
    document.getElementById('btnHome').onclick = showStart;
}

function spawnCeremonyBurst() {
    const cx = canvas.width / 2, cy = canvas.height / 2;
    for (let i = 0; i < 48; i++) {
        const a = (Math.PI * 2 * i) / 48 + Math.random() * 0.2;
        const sp = 2 + Math.random() * 4.5;
        particles.push({
            x: cx + (Math.random() - 0.5) * cell * 2,
            y: cy + (Math.random() - 0.5) * cell * 2,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 1,
            r: 2.5 + Math.random() * 3.5
        });
    }
}

/** 语料通关仪式：身长达到最后一篇 */
function ceremonyClear() {
    if (corpusCleared || dead) return;
    corpusCleared = true;
    running = false;
    clearBoost();
    eatPauseUntil = 0;
    postEatDir = null;
    postEatHoldUntil = 0;
    moveT = 1;

    const corp = getCorpus();
    const n = getMaxLives();
    const last = getCorpusItem(n);
    let lastTitle = '第 ' + n + ' 篇';
    if (last) {
        const em = last.emoji || (typeof hintEmoji !== 'undefined' && hintEmoji[n]) || '';
        const ht = last.hint || (typeof hintsMap !== 'undefined' && hintsMap[n]) || '';
        const name = corpusId === 'ddj'
            ? ('第 ' + n + ' 章 · ' + last.title)
            : (n + '. ' + last.title);
        lastTitle = ((em ? em + ' ' : '') + name + (ht ? ' · ' + ht : '')).trim();
    }

    const isNew = score > high;
    if (isNew) {
        high = score;
        localStorage.setItem('snakeHigh', String(high));
        highEl.textContent = high;
    }

    spawnCeremonyBurst();
    Sound.ceremony();
    setTimeout(function () { Sound.win(); }, 400);

    msgBox.classList.add('ceremony');
    msgBox.innerHTML =
        '<h2>✨ 通关</h2>' +
        '<p class="ceremony-quote">道成 · 德备 · 文心</p>' +
        '<p class="ceremony-sub">你已贯通「' + corp.name + '」全部 <b style="color:#4ecca3">' + n + '</b> 篇</p>' +
        '<p class="ceremony-sub" style="font-size:0.92rem;color:#c8b8a8;">终章 · ' + lastTitle + '</p>' +
        '<p class="score-line">得分 <b>' + score + '</b> · 身长 <b style="color:#4ecca3">' + snake.length + '</b></p>' +
        (isNew ? '<p class="new-record">🎉 新纪录！</p>' : '') +
        '<p class="ceremony-meta">继续后正文将保持终章；无新篇，可自由游玩</p>' +
        '<button type="button" id="btnContinue">🌟 继续闯荡</button>' +
        '<button type="button" class="secondary" id="btnAgain">再来一局</button>' +
        '<button type="button" class="secondary" id="btnHome">返回选关</button>';
    overlay.classList.remove('hidden');

    document.getElementById('btnContinue').onclick = continueAfterClear;
    document.getElementById('btnAgain').onclick = function () {
        msgBox.classList.remove('ceremony');
        startGame();
    };
    document.getElementById('btnHome').onclick = function () {
        msgBox.classList.remove('ceremony');
        showStart();
    };
}

/** 通关后继续：不重置身长/分数；正文固定终章，不再弹通关窗 */
function continueAfterClear() {
    msgBox.classList.remove('ceremony');
    overlay.classList.add('hidden');
    dead = false;
    running = true;
    paused = false;
    respawning = false;
    clearBoost();
    moveT = 1;
    stepElapsed = 0;
    eatPauseUntil = performance.now() + RESPAWN_READY_MS;
    lastFrame = performance.now();
    // corpusCleared 保持 true：之后只游玩；正文始终是最后一篇
    updateDdjPanel();
    if (snake && snake.length < cols * rows) placeFood();
}

/** 盘面铺满（极少见） */
function win() {
    // 若尚未语料通关，先走仪式；否则当作盘面全满的额外祝贺
    if (!corpusCleared) {
        ceremonyClear();
        return;
    }
    running = false;
    dead = true;
    clearBoost();
    if (score > high) {
        high = score;
        localStorage.setItem('snakeHigh', String(high));
        highEl.textContent = high;
    }
    Sound.win();
    msgBox.classList.add('ceremony');
    msgBox.innerHTML =
        '<h2>🏆 盘面圆满</h2>' +
        '<p class="ceremony-sub">格格皆满，无隙可乘</p>' +
        '<p class="score-line">得分 <b>' + score + '</b></p>' +
        '<button type="button" id="btnAgain">再来一局</button>' +
        '<button type="button" class="secondary" id="btnHome">返回选关</button>';
    overlay.classList.remove('hidden');
    document.getElementById('btnAgain').onclick = function () {
        msgBox.classList.remove('ceremony');
        startGame();
    };
    document.getElementById('btnHome').onclick = function () {
        msgBox.classList.remove('ceremony');
        showStart();
    };
}

// ——— 绘制 ———
function lerp(a, b, t) { return a + (b - a) * t; }
// 轻微 ease-out：慢速时不拖沓，又比线性顺一点
function ease(t) {
    t = Math.max(0, Math.min(1, t));
    return 1 - (1 - t) * (1 - t) * (1 - t * 0.35);
}

function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
}

function drawGrid() {
    // 极淡网格，不压过底层正文
    ctx.strokeStyle = 'rgba(255,255,255,0.045)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= cols; i++) {
        const p = i * cell + 0.5;
        ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(canvas.width, p); ctx.stroke();
    }
}

function segPos(i, t) {
    const to = snake[i];
    const from = prevSnake[i] || prevSnake[prevSnake.length - 1] || to;
    return { x: lerp(from.x, to.x, t), y: lerp(from.y, to.y, t) };
}

function drawSnake() {
    // 加速时用更线性的插值，减少“发颤”感
    const t = isBoosting() ? Math.min(1, moveT) : ease(moveT);
    const pad = cell * 0.1;
    const r = cell * 0.32;
    const n = snake.length;
    // 序号字号随格子缩小，长数字再压一点
    const fontSize = Math.max(8, Math.floor(cell * (n >= 100 ? 0.32 : n >= 10 ? 0.38 : 0.42)));

    for (let i = n - 1; i >= 0; i--) {
        const s = segPos(i, t);
        const k = 1 - i / Math.max(n - 1, 1);
        // 轻阴影，让蛇身在正文上更清晰
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        roundRect(s.x * cell + pad + 1.2, s.y * cell + pad + 1.5, cell - pad * 2, cell - pad * 2, r);
        ctx.fill();
        // 青色蛇身：头亮青，尾略深
        ctx.fillStyle = 'rgb(' +
            Math.round(18 + (64 - 18) * k) + ',' +
            Math.round(90 + (220 - 90) * k) + ',' +
            Math.round(100 + (200 - 100) * k) + ')';
        roundRect(s.x * cell + pad, s.y * cell + pad, cell - pad * 2, cell - pad * 2, r);
        ctx.fill();

        // 蛇身序号：头=当前身长=正文篇号，向尾递减至 1（吃第 N 个 → 头显 N）
        const num = n - i;
        const cx = s.x * cell + cell / 2;
        const cy = s.y * cell + cell / 2;
        ctx.font = 'bold ' + fontSize + 'px Microsoft YaHei, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // 浅色描边保证深色尾段也看得清
        ctx.lineWidth = Math.max(2, cell * 0.06);
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.strokeText(String(num), cx, cy + 0.5);
        ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.88)';
        ctx.fillText(String(num), cx, cy + 0.5);

        if (i === 0) {
            // 头部保留一点高光，序号压在上面已画完
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            roundRect(
                s.x * cell + pad + 2, s.y * cell + pad + 2,
                (cell - pad * 2) * 0.55, (cell - pad * 2) * 0.28, r * 0.55
            );
            ctx.fill();
        }
    }
}

function drawEyes(s) {
    const cx = s.x * cell + cell / 2;
    const cy = s.y * cell + cell / 2;
    const off = cell * 0.17;
    const eyeR = Math.max(2.2, cell * 0.11);
    const pupilR = eyeR * 0.48;
    const ox = dir.x * cell * 0.11;
    const oy = dir.y * cell * 0.11;
    const px = -dir.y * off, py = dir.x * off;
    for (const e of [
        { x: cx + ox + px, y: cy + oy + py },
        { x: cx + ox - px, y: cy + oy - py }
    ]) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e.x, e.y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(e.x + dir.x * pupilR * 0.55, e.y + dir.y * pupilR * 0.55, pupilR, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawFood(now) {
    const pulse = 0.88 + Math.sin(now / 200) * 0.12;
    const cx = food.x * cell + cell / 2;
    const cy = food.y * cell + cell / 2;
    const rad = (cell / 2) * 0.7 * pulse;

    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad * 2);
    g.addColorStop(0, 'rgba(255,107,107,0.4)');
    g.addColorStop(1, 'rgba(255,107,107,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, rad * 2, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(cx - rad * 0.28, cy - rad * 0.28, rad * 0.26, 0, Math.PI * 2); ctx.fill();
}

function drawParticles(dt) {
    const k = Math.min(dt, 40) / 16.67;
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        ctx.fillStyle = 'rgba(255,120,120,' + p.life + ')';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
        p.x += p.vx * k; p.y += p.vy * k;
        p.vx *= Math.pow(0.96, k); p.vy *= Math.pow(0.96, k);
        p.life -= 0.03 * k;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawPause() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.round(cell * 1.35) + 'px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏸ 暂停', canvas.width / 2, canvas.height / 2 - cell * 0.35);
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.font = Math.round(cell * 0.55) + 'px Microsoft YaHei, sans-serif';
    ctx.fillText('空格 / P / Esc 继续', canvas.width / 2, canvas.height / 2 + cell * 0.55);
}

function drawRespawn() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff6b81';
    ctx.font = 'bold ' + Math.round(cell * 1.1) + 'px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('剩余 ' + lives + ' 命', canvas.width / 2, canvas.height / 2 - cell * 0.5);
    ctx.fillStyle = '#eee';
    ctx.font = Math.round(cell * 0.7) + 'px Microsoft YaHei, sans-serif';
    ctx.fillText('续命中…', canvas.width / 2, canvas.height / 2 + cell * 0.15);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = Math.round(cell * 0.55) + 'px Microsoft YaHei, sans-serif';
    ctx.fillText('准备好再出发', canvas.width / 2, canvas.height / 2 + cell * 0.85);
}

function drawPreview() {
    const mid = Math.floor(GRID / 2);
    const body = [
        { x: mid - 1, y: mid }, { x: mid, y: mid },
        { x: mid + 1, y: mid }, { x: mid + 2, y: mid }
    ];
    const pad = cell * 0.12, r = cell * 0.3;
    body.forEach((s, i) => {
        const t = i / (body.length - 1);
        ctx.fillStyle = 'rgb(' +
            Math.round(18 + 46 * t) + ',' +
            Math.round(90 + 130 * t) + ',' +
            Math.round(100 + 100 * t) + ')';
        roundRect(s.x * cell + pad, s.y * cell + pad, cell - pad * 2, cell - pad * 2, r);
        ctx.fill();
    });
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.arc((mid + 4) * cell + cell / 2, mid * cell + cell / 2, cell * 0.3, 0, Math.PI * 2);
    ctx.fill();
}

function draw(now, dt) {
    // 透明清屏，露出下一层正文
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (eatFlash > 0) {
        ctx.fillStyle = 'rgba(233,69,96,' + (eatFlash * 0.12) + ')';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        eatFlash = Math.max(0, eatFlash - dt * 0.004);
    }
    drawGrid();
    if (started) {
        drawFood(now);
        drawSnake();
        drawParticles(dt);
        if (respawning) drawRespawn();
        else if (paused) drawPause();
    } else {
        drawPreview();
    }
}

// ——— 主循环 ———
function loop(now) {
    let dt = now - lastFrame;
    if (!(dt >= 0)) dt = 0;
    if (dt > 50) dt = 50;
    lastFrame = now;

    if (running && !paused && !dead && !respawning) {
        if (now < eatPauseUntil) {
            // 吃到/续命后的缓冲：蛇停在格点上，仍可预输入方向
            moveT = 1;
            stepElapsed = 0;
        } else {
            const stepMs = effectiveTickMs();
            stepElapsed += dt;
            // 每帧最多 1 步；略保留余量，避免掉帧后连跳
            if (stepElapsed >= stepMs) {
                stepElapsed -= stepMs;
                if (stepElapsed > stepMs * 0.35) stepElapsed = stepMs * 0.15;
                tick();
                if (stepElapsed < 0) stepElapsed = 0;
            }
            moveT = Math.min(1, stepElapsed / stepMs);
        }
    }

    draw(now, dt);
    requestAnimationFrame(loop);
}

// ——— 键盘 ———
const keyMap = {
    ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
    ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
    ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
    ArrowRight: [1, 0], d: [1, 0], D: [1, 0]
};

// ——— 学习内容（道德经 + 小学/初中/高中/苏轼）———

let corpusId = localStorage.getItem('snakeCorpus') || 'ddj';
if (!CORPUS[corpusId]) corpusId = 'ddj';
// 开始游戏后锁定语料，仅暂停/游玩；返回开始页才可再切换
let corpusLocked = false;

function getCorpus() {
  return CORPUS[corpusId] || CORPUS.ddj;
}
function getMaxLives() {
  const n = (getCorpus().items && getCorpus().items.length) || 81;
  return Math.max(1, n);
}
function getCorpusItem(ch) {
  const items = getCorpus().items || [];
  return items[ch - 1] || null;
}

function refreshCorpusBar() {
  // 仅在开始弹窗里渲染；对局中没有该节点
  const bar = document.getElementById('corpusBar');
  if (!bar) return;
  bar.innerHTML = CORPUS_ORDER.map(function (id) {
    const c = CORPUS[id];
    if (!c) return '';
    const active = id === corpusId ? ' active' : '';
    const count = (c.items && c.items.length) || 0;
    return '<button type="button" data-corpus="' + id + '" class="' + active.trim() +
      '" title="' + c.name + ' · ' + count + ' 篇">' + c.name + '</button>';
  }).join('');
  bar.querySelectorAll('button[data-corpus]').forEach(function (btn) {
    btn.onclick = function () {
      if (corpusLocked) return;
      setCorpus(btn.getAttribute('data-corpus'));
    };
  });
}

function setCorpus(id) {
  if (!CORPUS[id]) return;
  // 仅开始游戏弹窗可选；对局中 corpusBar 不存在且已锁定
  if (corpusLocked) return;
  if (!document.getElementById('corpusBar')) return;
  corpusId = id;
  localStorage.setItem('snakeCorpus', id);
  lives = getMaxLives();
  maxSnakeLen = 1;
  if (typeof updateLivesDisplay === 'function') updateLivesDisplay();
  if (typeof lenEl !== 'undefined' && lenEl) lenEl.textContent = '1';
  const prev = snake;
  snake = [{ x: 0, y: 0 }];
  if (typeof updateDdjPanel === 'function') updateDdjPanel();
  snake = prev;
  refreshCorpusBar();
  const tip = document.getElementById('startTip');
  if (tip) {
    const corp = getCorpus();
    tip.textContent = corp.name + ' · ' + lives + ' 条命 · 长按加速 · 身长=篇号';
  }
}


document.addEventListener('keydown', e => {
    if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        location.href = 'index.html';
        return;
    }
    if ((e.key === 'm' || e.key === 'M') && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        Sound.unlock();
        Sound.toggle();
        refreshSoundBtn();
        return;
    }
    Sound.unlock();
    const m = keyMap[e.key];
    if (m) {
        e.preventDefault();
        // 长按：保持加速，不重复入队转向
        if (e.repeat) {
            startBoost('key:' + e.key);
            return;
        }
        setDir(m[0], m[1]);
        startBoost('key:' + e.key);
        return;
    }

    // 暂停快捷键：空格 / P / Esc（游戏进行中）
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
        if (running && started && !dead && !respawning) {
            e.preventDefault();
            togglePause();
            return;
        }
    }
    if (e.key === 'Enter' || e.key === ' ') {
        if (!started || !running || dead) {
            if (!overlay.classList.contains('hidden')) {
                const btn = msgBox.querySelector('button');
                if (btn) btn.click();
            }
            e.preventDefault();
            return;
        }
        if (e.key === ' ') { togglePause(); e.preventDefault(); }
        return;
    }
});

document.addEventListener('keyup', e => {
    if (keyMap[e.key]) {
        endBoost('key:' + e.key);
    }
});
// 失焦时清掉键盘加速，避免卡在加速态
window.addEventListener('blur', clearBoost);

// ——— 虚拟方向键（长按加速）———
padEl.addEventListener('contextmenu', e => e.preventDefault());
padEl.addEventListener('pointerdown', e => {
    const btn = e.target.closest('button[data-dir]');
    if (!btn) return;
    e.preventDefault();
    // 部分机型长按会触感震动，尽量关掉
    if (navigator.vibrate) {
        try { navigator.vibrate(0); } catch (_) {}
    }
    btn.classList.add('active');
    const d = btn.dataset.dir;
    if (d === 'pause') {
        togglePause();
        return;
    }
    try { btn.setPointerCapture(e.pointerId); } catch (_) {}
    const id = 'pad:' + d;
    if (d === 'up') setDir(0, -1);
    else if (d === 'down') setDir(0, 1);
    else if (d === 'left') setDir(-1, 0);
    else if (d === 'right') setDir(1, 0);
    startBoost(id);
    btn._boostId = id;
});
function releasePadBoost(e) {
    const btn = e.target.closest('button');
    if (!btn) return;
    btn.classList.remove('active');
    if (btn._boostId) {
        endBoost(btn._boostId);
        btn._boostId = null;
    }
}
padEl.addEventListener('pointerup', releasePadBoost);
padEl.addEventListener('pointercancel', releasePadBoost);
padEl.addEventListener('lostpointercapture', releasePadBoost);
padEl.addEventListener('pointerleave', e => {
    // 仅当未 capture 时离开才松；有 capture 时由 pointerup 处理
    const btn = e.target.closest('button');
    if (btn && !btn.hasPointerCapture?.(e.pointerId)) releasePadBoost(e);
});

// ——— 滑动：滑动中即可转向，可连续滑 ———
canvas.addEventListener('pointerdown', e => {
    swiping = true;
    lastPtrX = swipeX = e.clientX;
    lastPtrY = swipeY = e.clientY;
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
});

canvas.addEventListener('pointermove', e => {
    lastPtrX = e.clientX;
    lastPtrY = e.clientY;
    if (!swiping) return;
    // 吃到后的硬停顿里仍可预输入；但用重置后的基准，避免惯性连拐
    const dx = e.clientX - swipeX;
    const dy = e.clientY - swipeY;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < SWIPE_MIN) return;
    // 主轴要明显一点，避免斜滑乱转
    if (ax >= ay * SWIPE_AXIS) setDir(dx > 0 ? 1 : -1, 0);
    else if (ay >= ax * SWIPE_AXIS) setDir(0, dy > 0 ? 1 : -1);
    else return;
    // 重置起点，允许同一次按住连续改变方向
    swipeX = e.clientX;
    swipeY = e.clientY;
});

canvas.addEventListener('pointerup', () => { swiping = false; });
canvas.addEventListener('pointercancel', () => { swiping = false; });

window.addEventListener('resize', () => {
    clearTimeout(window.__snakeR);
    window.__snakeR = setTimeout(layout, 80);
});

// 音效开关 + 首次交互解锁音频
const soundBtn = document.getElementById('soundBtn');
function refreshSoundBtn() {
    if (!soundBtn) return;
    soundBtn.textContent = Sound.enabled ? '🔊' : '🔇';
    soundBtn.classList.toggle('off', !Sound.enabled);
    soundBtn.title = Sound.enabled ? '关闭音效' : '开启音效';
}
if (soundBtn) {
    refreshSoundBtn();
    soundBtn.addEventListener('click', e => {
        e.preventDefault();
        Sound.unlock();
        Sound.toggle();
        refreshSoundBtn();
    });
}
['pointerdown', 'keydown', 'touchstart'].forEach(ev => {
    document.addEventListener(ev, () => Sound.unlock(), { once: true, passive: true });
});

// 启动
layout();
particles = [];
moveT = 1;
stepElapsed = 0;
lastFrame = performance.now();
showStart();
requestAnimationFrame(loop);
})();
</script>
<script src="pwa-register.js" defer></script>
